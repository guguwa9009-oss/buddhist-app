，我今为汝略说之耳。’\n佛告弥勒：‘其有得闻彼佛名号，欢喜踊跃，乃至一念，当知此人，为得大利，则是具足无上功德。\n是故，弥勒！设有大火，充满三千大千世界，要当过此，闻是经法，欢喜信乐，受持读诵，如说修行。\n所以者何？多有菩萨，欲闻此经，而不能得。\n若有众生，闻此经者，于无上道，终不退转。\n是故，应当专心信受，持诵说行。\n吾今为诸众生，说此经法，令见无量寿佛，及其国土一切所有。\n所当为者，皆可求之，无得以我灭度之后，复生疑惑。\n当来之世，经道灭尽，我以慈悲哀愍，特留此经，止住百岁。\n其有众生，值斯经者，随意所愿，皆可得度。’\n佛语弥勒：‘如来兴世，难值难见；诸佛经道，难得难闻；菩萨胜法，诸波罗蜜，得闻亦难；遇善知识，闻法能行，此亦为难。\n若闻斯经，信乐受持，难中之难，无过此难。\n是故我法，如是作，如是说，如是教。\n应当信顺，如法修行。’\n尔时世尊，说此经法，无量众生，皆发无上正觉之心。\n万二千那由他人，得清净法眼。\n二十二亿诸天人民，得阿那含果。\n八十万比丘，漏尽意解。\n四十亿菩萨，得不退转。\n以弘誓功德而自庄严，于将来世，当成正觉。\n尔时三千大千世界六种震动，大光普照十方国土；百千音乐，自然而作；无量妙华，纷纷而降。\n佛说经已，弥勒菩萨及十方来诸菩萨众、长老阿难、诸大声闻、一切大众，闻佛所说，靡不欢喜。\n","sourceUrl":"https://www.fojingzaixian.com/wuliangshoujing.html","audios":[{"title":"无量寿经读诵·佛经在线","url":""}],"teachAudios":[{"title":"无量寿经讲经开示","url":""}]},{"id":"lengyanzou","title":"楞严咒","fullTitle":"大佛顶首楞严神咒","category":"密咒","summary":"佛教最长神咒，被誉为咒中之王，有降魔护法之威力。","explanation":"修持楞严咒被认为能消除业障、降伏魔障、护佑修行。古来大德皆重视此咒，认为只要有人持诵楞严咒，正法就不会灭尽。日常持诵可令身心清净、远离灾障。","fullText":"妙湛总持不动尊　首楞严王世希有\n销我亿劫颠倒想　不历僧祗获法身\n愿今得果成宝王　还度如是恒沙众\n将此深心奉尘刹　是则名为报佛恩\n伏请世尊为证明　五浊恶世誓先入\n如一众生未成佛　终不于此取泥洹\n大雄大力大慈悲　希更审除微细惑\n令我早登无上觉　于十方界坐道场\n舜若多性可销亡　烁迦罗心无动转\n南无常住十方佛　南无常住十方法\n南无常住十方僧　南无释迦牟尼佛\n南无佛顶首楞严　南无观世音菩萨\n南无金刚藏菩萨\n","sourceUrl":"https://www.fojingzaixian.com/lengyanzou.html","audios":[{"title":"楞严咒读诵·佛经在线","url":""}],"teachAudios":[{"title":"楞严咒讲经开示","url":""}]},{"id":"dabeizhou","title":"大悲咒","fullTitle":"千手千眼无碍大悲心陀罗尼","category":"密咒","summary":"观世音菩萨大悲心咒，持诵消灾、祈福、增善根。","explanation":"大悲咒是观世音菩萨的根本咒，持诵此咒有无量功德。每日清晨持诵，心中默想一切众生皆离苦得乐，是最简单的修行入门。","fullText":"南无喝罗怛那哆罗夜耶。南无阿唎耶。婆卢羯帝烁钵罗耶。\n菩提萨埵婆耶。摩诃萨埵婆耶。摩诃迦卢尼迦耶。\n唵。萨皤罗罚曳。数怛那怛写。南无悉吉栗埵伊蒙阿唎耶。\n婆卢吉帝室佛罗愣驮婆。南无那罗谨墀。\n醯利摩诃皤哆沙咩。萨婆阿他豆输朋。阿逝孕。\n萨婆萨哆那摩婆萨哆。那摩婆伽。摩罚特豆。怛侄他。\n唵。阿婆卢醯。卢迦帝。迦罗帝。夷醯唎。\n摩诃菩提萨埵。萨婆萨婆。摩罗摩罗。摩醯摩醯唎驮孕。\n俱卢俱卢羯蒙。度卢度卢罚阇耶帝。摩诃罚阇耶帝。\n陀罗陀罗。地唎尼。室佛罗耶。遮罗遮罗。摩么罚摩罗。\n穆帝隶。伊醯伊醯。室那室那。阿罗嘇佛罗舍利。\n罚沙罚嘇。佛罗舍耶。呼卢呼卢摩罗。呼卢呼卢醯利。\n娑罗娑罗。悉唎悉唎。苏卢苏卢。菩提夜菩提夜。\n菩驮夜菩驮夜。弥帝唎夜。那罗谨墀。地利瑟尼那。\n婆夜摩那。娑婆诃。悉陀夜。娑婆诃。摩诃悉陀夜。娑婆诃。\n悉陀喻艺。室皤罗耶。娑婆诃。那罗谨墀。娑婆诃。\n摩罗那罗。娑婆诃。悉罗僧阿穆佉耶。娑婆诃。\n娑婆摩诃阿悉陀夜。娑婆诃。者吉罗阿悉陀夜。娑婆诃。\n波陀摩羯悉哆夜。娑婆诃。那罗谨墀皤伽罗耶。娑婆诃。\n摩婆利胜羯罗夜。娑婆诃。\n南无喝罗怛那哆罗夜耶。南无阿唎耶。婆卢吉帝。烁皤罗夜。娑婆诃。\n唵。悉殿都。漫多罗。跋陀耶。娑婆诃。","sourceUrl":"https://www.fojingzaixian.com/dabeizhou.html","audios":[{"title":"大悲咒·齐豫版 ✅","url":"https://www.fojingzaixian.com/img/%E5%A4%A7%E6%82%B2%E5%92%92_%E9%BD%90%E8%B1%AB_53268147.mp3"},{"title":"大悲咒·佛教音乐版 ✅","url":"https://www.fojingzaixian.com/img/%E5%A4%A7%E6%82%B2%E5%92%92_%E4%BD%9B%E6%95%99%E9%9F%B3%E4%B9%90_10288192.mp3"}],"teachAudios":[{"title":"大悲咒讲经开示","url":""}]},{"id":"wangshengzhou","title":"往生咒","fullTitle":"拔一切业障根本得生净土陀罗尼","category":"密咒","summary":"净土宗日课必诵，超度亡灵、消业障、得生净土。","explanation":"往生咒是净土宗早晚课必诵之咒，持诵能消除业障，回向亡灵往生净土。简短易记，每日持诵数遍，功德无量。","fullText":"南无阿弥多婆夜。哆他伽多夜。哆地夜他。\n阿弥利都婆毗。阿弥利哆。悉耽婆毗。\n阿弥利哆。毗迦兰帝。阿弥利哆。毗迦兰多。\n伽弥腻。伽伽那。枳多迦利。娑婆诃。","sourceUrl":"https://www.fojingzaixian.com/wangshengzhou.html","audios":[{"title":"往生咒读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/wangshengzhou.html"}],"teachAudios":[{"title":"往生咒讲经开示","url":""}]},{"id":"zhuntizhou","title":"准提咒","fullTitle":"七俱胝佛母所说准提陀罗尼","category":"密咒","summary":"七俱胝佛母心咒，持诵增福慧、消业障、求诸愿满。","explanation":"准提咒功德广大，\"受持读诵准提神咒，一切罪障悉皆消灭，所求世出世间诸事，无不圆满\"。每日持诵，随愿回向，简单有力。","fullText":"稽首皈依苏悉帝，头面顶礼七俱胝。\n我今称赞大准提，唯愿慈悲垂加护。\n\n南无飒哆喃。三藐三菩陀。俱胝喃。怛侄他。\n唵。折戾主戾。准提。娑婆诃。","sourceUrl":"https://www.fojingzaixian.com/zhuntizhou.html","audios":[{"title":"准提咒读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/zhuntizhou.html"}],"teachAudios":[{"title":"准提咒讲经开示","url":""}]},{"id":"liuzi","title":"六字大明咒","fullTitle":"唵嘛呢叭咪吽","category":"密咒","summary":"观音菩萨心咒，六字含摄一切佛法，持诵利益无量。","explanation":"\"唵嘛呢叭咪吽\"是藏传佛教最广为流传的心咒。六字含摄六道众生的解脱。行走坐卧皆可默念，是最简单也最深广的修行法门。","fullText":"唵（ōng）—— 身、口、意的皈依，一切佛身之精华\n嘛（mā）—— 慈悲\n呢（nī）—— 宝\n叭（bēi）—— 莲花，清净\n咪（mī）—— 智慧\n吽（hōng）—— 合一，心咒的封印\n\n全咒：唵 嘛 呢 叭 咪 吽\n\n持诵方法：\n可以大声持诵，也可以默念，随时随地皆可。\n每日持诵108遍，或随力而为。\n持诵时，发愿一切众生皆离苦得乐，功德回向一切有情。","sourceUrl":"https://www.fojingzaixian.com/liuzidamingzhou.html","audios":[{"title":"六字大明咒·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/liuzidamingzhou.html"}],"teachAudios":[{"title":"六字大明咒讲经开示","url":""}]},{"id":"liuzutanjing","title":"六祖坛经","fullTitle":"六祖大师法宝坛经","category":"禅宗","summary":"禅宗六祖慧能所说，顿悟法门，\"菩提本无树，明镜亦非台\"。","explanation":"《六祖坛经》是唯一由中国人所著而被尊称为\"经\"的佛典。慧能大师以\"不立文字，见性成佛\"的顿悟法门，开创了中国禅宗。\"本来无一物，何处惹尘埃\"，道出心地本自清净的智慧。","fullText":"【行由品第一】\n\n时大师至宝林。韶州韦刺史名璩与官僚入山，请师出，于城中大梵寺讲堂，为众开缘说法。\n师升座。刺史官僚三十余人，儒宗学士三十余人，僧尼道俗一千余人，同时作礼，愿闻法要。\n\n大师告众曰：善知识，菩提自性，本来清净，但用此心，直了成佛。\n\n善知识，且听惠能行由得法事意。\n惠能严父，本贯范阳，左降流于岭南，作新州百姓。此身不幸，父又早亡，老母孤遗，移来南海。艰辛贫乏，于市卖柴。\n\n时有一客买柴，使令送至客店。客收去，惠能得钱，却出门外，见一客诵经。\n惠能一闻经语，心即开悟。\n\n遂问客诵何经。客曰：金刚经。\n复问从何所来，持此经典。\n客云：我从蕲州黄梅县东禅寺来。其寺是五祖忍大师在彼主化，门人一千有余。\n我到彼中礼拜听受此经。大师常劝僧俗，但持金刚经，即自见性，直了成佛。\n\n惠能闻说，宿昔有缘，乃蒙一客，取银十两，与惠能，令充老母衣粮，教便往黄梅参礼五祖。\n\n惠能安置母毕，即便辞违，不经三十余日，便至黄梅，礼拜五祖。\n\n祖问曰：汝何方人，欲求何物。\n惠能对曰：弟子是岭南新州百姓，远来礼师，惟求作佛，不求余物。\n祖言：汝是岭南人，又是獦獠，若为堪作佛。\n惠能曰：人虽有南北，佛性本无南北。獦獠身与和尚不同，佛性有何差别。\n\n五祖更欲与语，且见徒众总在左右，乃令随众作务。\n惠能曰：惠能启和尚，弟子自心常生智慧，不离自性，即是福田。未审和尚教作何务。\n祖云：这獦獠根性大利，汝更勿言，着槽厂去。\n\n惠能退至后院，有一行者，差惠能剁柴踏碓，经八月余。\n\n祖一日忽见惠能曰：吾思汝之见可用，恐有恶人害汝，遂不与汝言，汝知之否。\n惠能曰：弟子亦知师意，不敢行至堂前，令人不觉。\n\n祖一日唤诸门人总来：\n吾向汝说，世人生死事大，汝等终日只求福田，不求出离生死苦海。\n自性若迷，福何可救。\n汝等各去自看智慧，取自本心般若之性，各作一偈，来呈吾看。\n若悟大意，付汝衣法，为第六代祖。\n火急速去，不得迟滞，思量即不中用，见性之人，言下须见，若如此者，轮刀上阵，亦得见之。\n\n众得处分，退而递相谓曰：我等众人，不须澄心用意作偈，将呈和尚，有何所益。\n神秀上座现为教授师，必是他得。我辈谩作偈颂，枉用心力。\n诸人闻语，总皆息心。咸言：我等已后，依止秀师，何烦作偈。\n\n神秀思惟：诸人不呈偈者，为我与他为教授师。\n我须作偈将呈和尚，若不呈偈，和尚如何知我心中见解深浅。\n我呈偈意，求法即善，觅祖即恶，却同凡心，夺其圣位奚别。\n若不呈偈，终不得法，大难大难。\n\n五祖堂前，有步廊三间，拟请供奉卢珍，画楞伽经变相及五祖血脉图，流传供养。\n\n神秀作偈成已，数度欲呈，行至堂前，心中恍惚，遍身汗流，拟呈不得。\n前后经四日，一十三度，呈偈不得。\n\n秀乃思惟：不如向廊下书着，从他和尚看见。\n忽若道好，即出礼拜，云是秀作。若道不堪，枉向山中数年，受人礼拜，更修何道。\n\n是夜三更，不使人知，自执灯，书偈于南廊壁间，呈心所见。偈曰：\n\n身是菩提树　心如明镜台\n时时勤拂拭　勿使惹尘埃\n\n秀书偈了，便却归房，人总不知。\n\n秀复思惟：五祖明日见偈欢喜，即我与法有缘。\n若言不堪，自是我迷，宿业障重，不合得法。圣意难测，房中思想，坐卧不安，直至五更。\n\n祖已知神秀入门未得，不见自性。\n天明，祖唤卢供奉来，向南廊壁间绘画图相，忽见其偈，报言：\n供奉却不用画，劳尔远来。经云，凡所有相，皆是虚妄。\n但留此偈，与人诵持，依此偈修，免堕恶道，依此偈修，有大利益。\n令门人炷香礼敬，尽诵此偈，即得见性。门人诵偈，皆叹善哉。\n\n祖三更，唤秀入堂，问曰：偈是汝作否。\n秀言：实是秀作，不敢妄求祖位，望和尚慈悲，看弟子有少智慧否。\n祖曰：汝作此偈，未见本性，只到门外，未入门内。\n如此见解，觅无上菩提，了不可得。\n无上菩提，须得言下识自本心，见自本性，不生不灭，于一切时中，念念自见，万法无滞。\n一真一切真，万境自如如，如如之心，即是真实，若如是见，即是无上菩提之自性也。\n汝且去，一两日思惟，更作一偈，将来吾看。汝偈若入得门，付汝衣法。\n\n神秀作礼而出。又经数日，作偈不成，心中恍惚，神思不安，犹如梦中，行坐不乐。\n\n复两日，有一童子于碓坊过，唱诵其偈。\n惠能一闻，便知此偈未见本性，虽未蒙教授，早识大意，遂问童子曰：诵者何偈。\n\n童子曰：尔这獦獠不知，大师言，世人生死事大，欲得传付衣法，令门人作偈来看。\n若悟大意，即付衣法，为第六祖。\n神秀上座，于南廊壁上，书无相偈。\n大师令人皆诵，依此偈修，免堕恶道，依此偈修，有大利益。\n\n惠能曰：我亦要诵此，结来生缘。\n上人，我此踏碓，八个余月，未曾行到堂前，望上人引至偈前礼拜。\n童子引至偈前礼拜。\n\n惠能曰：惠能不识字，请上人为读。\n时有江州别驾，姓张，名日用，便高声读。\n惠能闻已，遂言：亦有一偈，望别驾为书。\n别驾言：汝亦作偈，其事希有。\n\n惠能向别驾言：欲学无上菩提，不可轻于初学。\n下下人有上上智，上上人有没意智。\n若轻人，即有无量无边罪。\n别驾言：汝但诵偈，吾为汝书。汝若得法，先须度吾，勿忘此言。\n\n惠能偈曰：\n\n菩提本无树　明镜亦非台\n本来无一物　何处惹尘埃\n\n书此偈已，徒众总惊，无不嗟讶，各相谓言：奇哉，不得以貌取人，何得多时，使他肉身菩萨。\n\n祖见众人惊怪，恐人损害，遂将鞋擦了偈，曰：亦未见性。众以为然。\n\n次日祖潜至碓坊，见能腰石舂米，语曰：求道之人，为法忘躯，当如是乎。\n乃问曰：米熟也未。\n惠能曰：米熟久矣，犹欠筛在。\n\n祖以杖击碓三下而去。惠能即会祖意，三鼓入室。\n\n祖以袈裟遮围，不令人见，为说金刚经。至\"应无所住而生其心\"。\n\n惠能言下大悟，一切万法不离自性，遂启祖言：\n何期自性本自清净！\n何期自性本不生灭！\n何期自性本自具足！\n何期自性本无动摇！\n何期自性能生万法！\n\n祖知悟本性，谓惠能曰：\n不识本心，学法无益。若识自本心，见自本性，即名丈夫、天人师、佛。\n\n三更受法，人尽不知，便传顿教，及衣钵，云：汝为第六代祖，善自护念，广度有情，流布将来，无令断绝。听吾偈曰：\n\n有情来下种　因地果还生\n无情即无种　无性亦无生\n\n祖复曰：昔达摩大师，初来此土，人未之信，故传此衣，以为信体。\n代代相承，法则以心传心，皆令自悟自证。\n自古佛佛惟传本体，师师密付本心。\n衣为争端，止汝勿传。若传此衣，命如悬丝。汝须速去，恐人害汝。\n\n惠能启曰：向甚处去。\n祖云：逢怀则止，遇会则藏。\n\n惠能三更领得衣钵。云：能本是南中人，素不知此山路，如何出得江口。\n五祖言：汝不须忧，吾自送汝。\n\n祖相送直至九江驿边。祖令上船，五祖把橹自摇。\n惠能言：请和尚坐，弟子合摇橹。\n祖云：合是吾渡汝。\n惠能曰：迷时师度，悟了自度，度名虽一，用处不同。\n惠能生在边方，语音不正，蒙师传法，今已得悟，只合自性自度。\n祖云：如是如是。以后佛法，由汝大行。汝去三年，吾方逝世。汝今好去，努力向南，不宜速说，佛法难起。\n\n惠能辞违祖已，发足南行。两月中间，至大庾岭。\n\n五祖归，数日不上堂。众疑，诣问曰：和尚少病少恼否。曰：病即无，衣法已南矣。\n问：谁人传授。曰：能者得之。众乃知焉。逐后数百人来，欲夺衣钵。\n\n一僧俗姓陈，名惠明，先是四品将军，性行粗糙，极意参寻，为众人先，趁及惠能。\n惠能掷下衣钵于石上，曰：此衣表信，可力争耶。能隐草莽中。\n惠明至，提掇不动，乃唤云：行者，行者，我为法来，不为衣来。\n\n惠能遂出，坐盘石上。惠明作礼云：望行者为我说法。\n惠能云：汝既为法而来，可屏息诸缘，勿生一念，吾为汝说明。良久。\n\n惠能云：不思善，不思恶，正与么时，那个是明上座本来面目。\n惠明言下大悟。\n\n复问云：上来密语密意外，还更有密意否。\n惠能云：与汝说者，即非密也。汝若返照，密在汝边。\n明曰：惠明虽在黄梅，实未省自己面目。今蒙指示，如人饮水，冷暖自知。今行者即惠明师也。\n惠能曰：汝若如是，吾与汝同师黄梅，善自护持。\n\n明又问：惠明今后向甚处去。\n惠能曰：逢袁则止，遇蒙则居。明礼辞。\n\n明回至岭下，谓趁众曰：向陟崔嵬，竟无踪迹，当别道寻之。趁众咸以为然。\n\n惠明后改道明，避师上字。\n惠能后至曹溪，又被恶人寻逐，乃于四会，避难猎人队中，凡经一十五载。\n时与猎人随宜说法，猎人常令守网，每见生命，尽放之。\n每至饭时，以菜寄煮肉锅，或问，则对曰：但吃肉边菜。\n\n一日思惟：时当弘法，不可终遯。\n遂出至广州法性寺，值印宗法师讲涅槃经。\n时有风吹幡动，一僧曰风动，一僧曰幡动，议论不已。\n惠能进曰：不是风动，不是幡动，仁者心动。一众骇然。\n\n印宗延至上席，征诘奥义，见惠能言简理当，不由文字。\n宗云：行者定非常人。久闻黄梅衣法南来，莫是行者否。\n惠能曰：不敢。宗于是作礼，告请传来衣钵，出示大众。\n\n宗复问曰：黄梅付嘱，如何指授。\n惠能曰：指授即无，惟论见性，不论禅定解脱。\n宗曰：何不论禅定解脱。\n能曰：为是二法，不是佛法，佛法是不二之法。\n\n宗又问：如何是佛法不二之法。\n惠能曰：法师讲涅槃经，明佛性是佛法不二之法。\n如高贵德王菩萨白佛言：犯四重禁，作五逆罪，及一阐提等，当断善根佛性否。\n佛言：善根有二，一者常，二者无常。佛性非常非无常，是故不断，名为不二。\n一者善，二者不善。佛性非善非不善，是名不二。\n蕴之与界，凡夫见二，智者了达，其性无二，无二之性，即是佛性。\n\n印宗闻说，欢喜合掌，言：某甲讲经，犹如瓦砾，仁者论义，犹如真金。\n于是为惠能剃发，愿事为师。\n惠能遂于菩提树下，开东山法门。\n\n惠能于东山得法，辛苦受尽，命似悬丝。\n今日得与使君官僚僧尼道俗，同此一会，莫非累劫之缘，亦是过去生中供养诸佛，同种善根，方始得闻如上顿教。\n得法之因，教是先圣所传，不是惠能自智。\n愿闻先圣教者，各令净心，闻了，各自除疑，如先代圣人无别。\n一众闻法，欢喜作礼而退。\n\n【般若品第二】\n\n次日，韦使君请益。师升座，告大众曰：总净心念摩诃般若波罗蜜多。\n复云：善知识，菩提般若之智，世人本自有之，只缘心迷，不能自悟。\n须假大善知识，示导见性。\n当知愚人智人，佛性本无差别，只缘迷悟不同，所以有愚有智。\n\n吾今为说摩诃般若波罗蜜法，使汝等各得智慧。志心谛听，吾为汝说。\n\n善知识，世人终日口念般若，不识自性般若，犹如说食不饱。\n口但说空，万劫不得见性，终无有益。\n\n善知识，摩诃般若波罗蜜是梵语，此言大智慧到彼岸。\n此须心行，不在口念。口念心不行，如幻如化，如露如电。\n口念心行，则心口相应，本性是佛，离性无别佛。\n\n何名摩诃？摩诃是大。\n心量广大，犹如虚空，无有边畔，亦无方圆大小，亦非青黄赤白，\n亦无上下长短，亦无瞋无喜，无是无非，无善无恶，无有头尾。\n诸佛刹土，尽同虚空。世人妙性本空，无有一法可得，自性真空，亦复如是。\n\n善知识，莫闻吾说空，便即着空。第一莫着空，若空心静坐，即着无记空。\n\n善知识，世界虚空，能含万物色像。\n日月星宿，山河大地，泉源溪涧，草木丛林，恶人善人，恶法善法，天堂地狱，\n一切大海，须弥诸山，总在空中。\n世人性空，亦复如是。\n\n善知识，自性能含万法是大，万法在诸人性中。\n若见一切人恶之与善，尽皆不取不舍，亦不染着，心如虚空，名之为大，故曰摩诃。\n\n善知识，迷人口说，智者心行。\n又有迷人，空心静坐，百无所思，自称为大。此一辈人，不可与语，为邪见故。\n\n善知识，心量广大，遍周法界。\n用即了了分明，应用便知一切，一切即一，一即一切，去来自由，心体无滞，即是般若。\n\n善知识，一切般若智，皆从自性而生，不从外入，莫错用意，名为真性自用。\n一真一切真，心量大事，不行小道。\n口莫终日说空，心中不修此行，恰似凡人自称国王，终不可得，非吾弟子。\n\n善知识，何名般若？般若者，唐言智慧也。\n一切处所，一切时中，念念不愚，常行智慧，即是般若行。\n一念愚即般若绝，一念智即般若生。\n\n何名波罗蜜？此是西国语，唐言到彼岸。\n解义离生灭，着境生灭起，如水有波浪，即名为此岸。\n离境无生灭，如水常通流，即名为彼岸，故号波罗蜜。\n\n善知识，迷人口念，当念之时，有妄有非。\n念念若行，是名真性，悟此法者，是般若法，修此行者，是般若行。\n不修即凡，一念修行，自身等佛。\n\n善知识，凡夫即佛，烦恼即菩提。\n前念迷即凡夫，后念悟即佛。\n前念着境即烦恼，后念离境即菩提。\n\n善知识，摩诃般若波罗蜜，最尊最上最第一，无住无往亦无来，三世诸佛从中出。\n当用大智慧打破五蕴烦恼尘劳，如此修行，定成佛道，变三毒为戒定慧。\n\n善知识，我此法门，从一般若生八万四千智慧。\n何以故，为世人有八万四千尘劳。若无尘劳，智慧常现，不离自性。\n\n悟此法者，即是无念，无忆无着，不起诳妄，用自真如性，以智慧观照，\n于一切法，不取不舍，即是见性成佛道。\n\n善知识，若欲入甚深法界，及般若三昧者，须修般若行，持诵金刚般若经，即得见性。\n当知此经功德，无量无边，经中分明赞叹，莫能具说。\n\n此法门是最上乘，为大智人说，为上根人说。\n小根小智人闻，心生不信。何以故？\n譬如天龙下雨，于阎浮提，城邑聚落，悉皆漂流，如漂枣叶。\n若雨大海，不增不减。\n\n若大乘人，若最上乘人，闻说金刚经，心开悟解。\n故知本性自有般若之智，自用智慧，常观照故，不假文字。\n\n善知识，小根之人，闻此顿教，犹如草木，根性小者，若被大雨，悉皆自倒，不能增长。\n小根之人，亦复如是。元有般若之智，与大智人更无差别。\n因何闻法不自开悟？缘邪见障重，烦恼根深。\n犹如大云，覆盖于日，不得风吹，日光不现。\n般若之智亦无大小，为一切众生自心迷悟不同。\n迷心外见，修行觅佛，未悟自性，即是小根。\n若开悟顿教，不能外修，但于自心常起正见，烦恼尘劳常不能染，即是见性。\n\n善知识，内外不住，去来自由，能除执心，通达无碍，能修此行，与般若经本无差别。\n\n善知识，一切修多罗及诸文字，大小二乘，十二部经，皆因人置。\n因智慧性，方能建立。若无世人，一切万法，本自不有。\n故知万法本自人兴，一切经书，因人说有。\n缘其人中，有愚有智，愚为小人，智为大人。\n愚者问于智人，智者与愚人说法，愚人忽然悟解心开，即与智人无别。\n\n善知识，不悟即佛是众生，一念悟时，众生是佛。\n故知万法尽在自心，何不从自心中，顿见真如本性。\n\n善知识，我于忍和尚处，一闻言下便悟，顿见真如本性。\n是以将此教法流行，令学道者，顿悟菩提，各自观心，自见本性。\n\n若自不悟，须觅大善知识，解最上乘法者，直示正路。\n\n吾有一无相颂，各须诵取，在家出家，但依此修。若不自修，惟记吾言，亦无有益。听吾颂曰：\n\n说通及心通　如日处虚空　唯传见性法　出世破邪宗\n法即无顿渐　迷悟有迟疾　只此见性门　愚人不可悉\n说即虽万般　合理还归一　烦恼暗宅中　常须生慧日\n邪来烦恼至　正来烦恼除　邪正俱不用　清净至无余\n菩提本自性　起心即是妄　净心在妄中　但正无三障\n世人若修道　一切尽不妨　常自见己过　与道即相当\n色类自有道　各不相妨恼　离道别觅道　终身不见道\n波波度一生　到头还自懊　欲得见真道　行正即是道\n自若无道心　闇行不见道　若真修道人　不见世间过\n若见他人非　自非却是左　他非我不非　我非自有过\n但自却非心　打除烦恼破　憎爱不关心　长伸两脚卧\n欲拟化他人　自须有方便　勿令彼有疑　即是自性现\n佛法在世间　不离世间觉　离世觅菩提　恰如求兔角\n正见名出世　邪见是世间　邪正尽打却　菩提性宛然\n此颂是顿教　亦名大法船　迷闻经累劫　悟则刹那间\n\n师复曰：今于大梵寺，说此顿教，普愿法界众生，言下见性成佛。\n时韦使君与官僚道俗，闻师所说，无不省悟，一时作礼，皆叹善哉。\n何期岭南有佛出世。\n\n【疑问品第三】\n\n一日，韦刺史为师设大会斋。斋讫，刺史请师升座，同官僚士庶，肃容再拜，问曰：\n弟子闻和尚说法，实不可思议。今有少疑，愿大慈悲，特为解说。\n师曰：有疑即问，吾当为说。\n\n韦公曰：和尚所说，可不是达摩大师宗旨乎。\n师曰：是。\n公曰：弟子闻达摩初化梁武帝，帝问云：朕一生造寺度僧，布施设斋，有何功德。\n达摩言：实无功德。弟子未达此理，愿和尚为说。\n\n师曰：实无功德，勿疑先圣之言。武帝心邪，不知正法，造寺度僧，布施设斋，名为求福，不可将福便为功德。功德在法身中，不在修福。\n\n师又曰：见性是功，平等是德。念念无滞，常见本性，真实妙用，名为功德。\n内心谦下是功，外行于礼是德。\n自性建立万法是功，心体离念是德。\n不离自性是功，应用无染是德。\n若觅功德法身，但依此作，是真功德。\n\n若修功德之人，心即不轻，常行普敬。\n心常轻人，吾我不断，即自无功。\n自性虚妄不实，即自无德。\n为吾我自大，常轻一切故。\n\n善知识，念念无间是功，心行平直是德。\n自修性是功，自修身是德。\n善知识，功德须自性内见，不是布施供养之所求也。\n是以福德与功德别，武帝不识真理，非我祖师有过。\n\n刺史又问曰：弟子常见僧俗，念阿弥陀佛，愿生西方，请和尚说，得生彼否，愿为破疑。\n师言：使君善听，惠能与说。\n\n世尊在舍卫城中，说西方引化经文，分明去此不远。\n若论相说，里数有十万八千，即身中十恶八邪便是。\n说远，为其下根；说近，为其上智。\n\n人有两种，法无两般，迷悟有殊，见有迟疾。\n迷人念佛求生于彼，悟人自净其心。\n所以佛言：随其心净，即佛土净。\n\n使君东方人，但心净即无罪。虽西方人，心不净亦有愆。\n东方人造罪，念佛求生西方；西方人造罪，念佛求生何国。\n\n凡愚不了自性，不识身中净土，愿东愿西，悟人在处一般。\n所以佛言：随所住处恒安乐。\n\n使君心地但无不善，西方去此不遥。若怀不善之心，念佛往生难到。\n今劝善知识，先除十恶，即行十万，后除八邪，乃过八千。\n念念见性，常行平直，到如弹指，便睹弥陀。\n\n使君但行十善，何须更愿往生。不断十恶之心，何佛即来迎请。\n若悟无生顿法，见西方只在刹那；不悟，念佛求生路遥，如何得达。\n\n惠能与诸人移西方于刹那间，目前便见，各愿见否。\n众皆顶礼云：若此处见，何须更愿往生。愿和尚慈悲，便现西方，普令得见。\n\n师言：大众，世人自色身是城，眼耳鼻舌是门，外有五门，内有意门。\n心是地，性是王，王居心地上，性在王在，性去王无，性在身心存，性去身心坏。\n佛向性中作，莫向身外求。\n自性迷即是众生，自性觉即是佛。\n慈悲即是观音，喜舍名为势至。\n能净即释迦，平直即弥陀。\n人我是须弥，贪欲是海水，烦恼是波浪，毒害是恶龙，虚妄是鬼神，尘劳是鱼鳖，贪瞋是地狱，愚痴是畜生。\n\n善知识，常行十善，天堂便至。\n除人我，须弥倒；去邪心，海水竭；烦恼无，波浪灭；毒害除，鱼龙绝。\n自心地上，觉性如来，放大光明，外照六门清净，能破六欲诸天。\n自性内照，三毒即除，地狱等罪，一时消灭，内外明彻，不异西方。\n\n不作此修，如何到彼。\n大众闻说，了然见性，悉皆礼拜，俱叹善哉。唱言：普愿法界众生，闻者一时悟解。\n\n师言：善知识，若欲修行，在家亦得，不由在寺。\n在家能行，如东方人心善；在寺不修，如西方人心恶。\n但心清净，即是自性西方。\n\n韦公又问：在家如何修行，愿为教授。\n师言：吾与大众说无相颂，但依此修，常与吾同处无别。颂曰：\n\n心平何劳持戒　行直何用修禅\n恩则孝养父母　义则上下相怜\n让则尊卑和睦　忍则众恶无喧\n若能钻木出火　淤泥定生红莲\n苦口的是良药　逆耳必是忠言\n改过必生智慧　护短心内非贤\n日用常行饶益　成道非由施钱\n菩提只向心觅　何劳向外求玄\n听说依此修行　天堂只在目前\n\n师复曰：善知识，总须依偈修行，见取自性，直成佛道。\n法不相待，众人且散，吾归曹溪。众若有疑，却来相问。\n时刺史官僚，在会善男信女，各得开悟，信受奉行。\n\n【定慧品第四】\n\n师示众云：善知识，我此法门，以定慧为本。\n大众勿迷，言定慧别，定慧一体，不是二。\n定是慧体，慧是定用。即慧之时定在慧，即定之时慧在定。\n若识此义，即是定慧等学。\n\n诸学道人，莫言先定发慧，先慧发定，各别。\n作此见者，法有二相，口说善语，心中不善，空有定慧，定慧不等。\n若心口俱善，内外一如，定慧即等。\n\n善知识，定慧犹如何等？犹如灯光。有灯即光，无灯即暗。\n灯是光之体，光是灯之用，名虽有二，体本同一。\n此定慧法，亦复如是。\n\n师示众云：善知识，一行三昧者，于一切处，行住坐卧，常行一直心是也。\n净名经云：直心是道场，直心是净土。\n莫心行谄曲，口但说直。口说一行三昧，不行直心。\n但行直心，于一切法，勿有执着。\n\n迷人着法相，执一行三昧，直言常坐不动，妄不起心，即是一行三昧。\n作此解者，即同无情，却是障道因缘。\n\n善知识，道须通流，何以却滞。\n心不住法，道即通流；心若住法，名为自缚。\n若言常坐不动是，只如舍利弗宴坐林中，却被维摩诘诃。\n\n善知识，又有人教坐，看心观静，不动不起，从此置功。\n迷人不会，便执成颠，如此者众，如是相教，故知大错。\n\n师示众云：善知识，本来正教无有顿渐，人性自有利钝。\n迷人渐修，悟人顿契，自识本心，自见本性，即无差别，所以立顿渐之假名。\n\n善知识，我此法门，从上以来，先立无念为宗，无相为体，无住为本。\n无相者，于相而离相。\n无念者，于念而无念。\n无住者，人之本性，于世间善恶好丑，乃至冤之与亲，言语触刺欺争之时，\n并将为空，不思酬害，念念之中，不思前境。\n若前念今念后念，念念相续不断，名为系缚。\n于诸法上，念念不住，即无缚也。此是以无住为本。\n\n善知识，外离一切相，名为无相，能离于相，即法体清净，此是以无相为体。\n\n善知识，于诸境上，心不染曰无念。\n于自念上，常离诸境，不于境上生心。\n若只百物不思，念尽除却，一念绝即死，别处受生，是为大错，学道者思之。\n\n善知识，云何立无念为宗？\n只缘口说见性，迷人于境上有念，念上便起邪见，一切尘劳妄想，从此而生。\n自性本无一法可得，若有所得，妄说祸福，即是尘劳邪见，故此法门立无念为宗。\n\n善知识，无者无何事，念者念何物。\n无者无二相，无诸尘劳之心。\n念者念真如本性。真如即是念之体，念即是真如之用。\n真如自性起念，非眼耳鼻舌能念。\n真如有性，所以起念，真如若无，眼耳色声当时即坏。\n\n善知识，真如自性起念，六根虽有见闻觉知，不染万境，而真性常自在。\n故经云：能善分别诸法相，于第一义而不动。\n\n【坐禅品第五】\n\n师示众云：此门坐禅，元不着心，亦不着净，亦不是不动。\n\n若言着心，心原是妄，知心如幻，故无所著也。\n若言着净，人性本净，由妄念故，盖覆真如，但无妄想，性自清净。\n起心着净，却生净妄，妄无处所，著者是妄。\n净无形相，却立净相，言是工夫，作此见者，障自本性，却被净缚。\n\n善知识，若修不动者，但见一切人时，不见人之是非善恶过患，即是自性不动。\n善知识，迷人身虽不动，开口便说他人是非长短好恶，与道违背。\n若着心着净，即障道也。\n\n师示众云：善知识，何名坐禅？\n此法门中，无障无碍，外于一切善恶境界，心念不起，名为坐。\n内见自性不动，名为禅。\n\n善知识，何名禅定？外离相为禅，内不乱为定。\n外若着相，内心即乱；外若离相，心即不乱。\n本性自净自定，只为见境思境即乱，若见诸境心不乱者，是真定也。\n\n善知识，外离相即禅，内不乱即定，外禅内定，是为禅定。\n菩萨戒经云：我本性元自清净。\n善知识，于念念中，自见本性清净，自修自行，自成佛道。\n\n【忏悔品第六】\n\n时大师见广韶洎四方士庶，骈集山中听法，于是升座告众曰：\n来诸善知识，此事须从自性中起，于一切时，念念自净其心，自修自行，见自己法身，见自心佛，自度自戒，始得，不假到此。\n既从远来，一会于此，皆共有缘。今可各各胡跪，先为传自性五分法身香，次授无相忏悔。\n\n众胡跪，师曰：\n\n一、戒香，即自心中，无非，无恶，无嫉妒，无贪瞋，无劫害，名戒香。\n\n二、定香，即睹诸善恶境相，自心不乱，名定香。\n\n三、慧香，自心无碍，常以智慧观照自性，不造诸恶，虽修众善，心不执着，敬上念下，矜恤孤贫，名慧香。\n\n四、解脱香，即自心无所攀缘，不思善，不思恶，自在无碍，名解脱香。\n\n五、解脱知见香，自心既无所攀缘善恶，不可耽空守寂，则须广学多闻，识自本心，达诸佛理，和光接物，无我无人，直至菩提，真性不易，名解脱知见香。\n\n善知识，此香各自内薰，莫向外觅。今与汝等授无相忏悔，灭三世罪，令得三业清净。\n\n善知识，各随我语，一时道：\n弟子等，从前念今念及后念，念念不被愚迷染，从前所有恶业愚迷等罪，悉皆忏悔，愿一时消灭，永不复起。\n弟子等，从前念今念及后念，念念不被憍诳染，从前所有恶业憍诳等罪，悉皆忏悔，愿一时消灭，永不复起。\n弟子等，从前念今念及后念，念念不被嫉妒染，从前所有恶业嫉妒等罪，悉皆忏悔，愿一时消灭，永不复起。\n\n善知识，已上是为无相忏悔。云何名忏，云何名悔？\n忏者，忏其前愆，从前所有恶业，愚迷憍诳嫉妒等罪，悉皆尽忏，永不复起，是名为忏。\n悔者，悔其后过，从今已后，所有恶业，愚迷憍诳嫉妒等罪，今已觉悟，悉皆永断，更不复作，是名为悔。故称忏悔。\n\n凡夫愚迷，只知忏其前愆，不知悔其后过，以不悔故，前愆不灭，后过又生，何名忏悔。\n\n善知识，既忏悔已，与善知识发四弘誓愿，各须用心正听：\n自心众生无边誓愿度，\n自心烦恼无边誓愿断，\n自性法门无尽誓愿学，\n自性无上佛道誓愿成。\n\n善知识，自性无非，无碍无乱，念念般若观照，常离法相，自由自在，纵横尽得，有何可立。\n自性自悟，顿悟顿修，亦无渐次，所以不立一切法，诸法寂灭，有何次第。\n\n善知识，今发四弘愿了，更与善知识授无相三归依戒。\n\n善知识，归依觉，两足尊；归依正，离欲尊；归依净，众中尊。\n从今日去，称觉为师，更不归依邪魔外道，以自性三宝常自证明。\n\n善知识，归依自性三宝。佛者，觉也；法者，正也；僧者，净也。\n自心归依觉，邪迷不生，少欲知足，能离财色，名两足尊。\n自心归依正，念念无邪见，以无邪见故，即无人我贡高贪爱执着，名离欲尊。\n自心归依净，一切尘劳爱欲境界，自性皆不染着，名众中尊。\n若修此行，是自归依。\n\n善知识，吾有一无相颂，若能诵持，言下令汝积劫迷罪，一时消灭。颂曰：\n\n迷人修福不修道　只言修福便是道\n布施供养福无边　心中三恶元来造\n拟将修福欲灭罪　后世得福罪还在\n但向心中除罪缘　各自性中真忏悔\n忽悟大乘真忏悔　除邪行正即无罪\n学道常于自性观　即与诸佛同一类\n吾祖唯传此顿法　普愿见性同一体\n若欲当来觅法身　离诸法相心中洗\n努力自见莫悠悠　后念忽绝一世休\n若悟大乘得自性　虔诚合掌至心求\n\n师言：善知识，总须诵取，依此修行，言下见性。\n虽去吾千里，如常在吾边；于此言下不悟，即对面千里。何勤远来，珍重好去。\n一众闻法，靡不开悟，欢喜奉行。\n\n【机缘品第七】\n\n师自黄梅得法，回至韶州曹侯村，人无知者。\n有儒士刘志略，礼遇甚厚。志略有姑为尼，名无尽藏，常诵大涅槃经。\n师暂听，即知妙义，遂为解说。\n尼乃执卷问字。师曰：字即不识，义即请问。\n尼曰：字尚不识，焉能会义。\n师曰：诸佛妙理，非关文字。尼惊异之。\n\n遍告里中耆德云：此是有道之士，宜请供养。\n有魏武侯玄孙曹叔良，及居民，竞来瞻礼。\n时宝林古寺，自隋末兵火，已废，遂于故基重建梵宇，延师居之，俄成宝坊。\n\n师住九月余日，又为恶党寻逐，师乃遁于前山，被其纵火焚草木。\n师隐身挨入石中得免。石今有师趺坐膝痕，及衣布之纹，因名避难石。\n师忆五祖怀会止藏之嘱，遂行隐于二邑焉。\n\n僧法海，韶州曲江人也，初参祖师，问曰：即心即佛，愿垂指谕。\n师曰：前念不生即心，后念不灭即佛，成一切相即心，离一切相即佛。\n吾若具说，穷劫不尽。听吾偈曰：\n\n即心名慧　即佛乃定　定慧等等　意中清净\n悟此法门　由汝习性　用本无生　双修是正\n\n法海言下大悟，以偈赞曰：\n即心元是佛　不悟而自屈　我知定慧因　双修离诸物\n\n僧法达，洪州人，七岁出家，常诵法华经，来礼祖师，头不至地。\n师诃曰：礼不投地，何如不礼。汝心中必有一物，蕴习何事耶。\n曰：念法华经已及三千部。\n师曰：汝若念至万部，得其经意，不以为胜，则与吾偕行。\n汝今负此事业，都不知过。听吾偈曰：\n\n礼本折慢幢　头奚不至地　有我罪即生　亡功福无比\n\n师又曰：汝名什么。曰：法达。\n师曰：汝名法达，何曾达法。复说偈曰：\n\n汝今名法达　勤诵未休歇　空诵但循声　明心号菩萨\n汝今有缘故　吾今为汝说　但信佛无言　莲华从口发\n\n达闻偈，悔谢曰：而今而后，当谦恭一切。\n弟子诵法华经，未解经义，心常有疑，和尚智慧广大，愿略说经中义理。\n\n师曰：法达，法即甚达，汝心不达。经本无疑，汝心自疑。\n汝念此经，以何为宗。\n达曰：学人根性闇钝，从来但依文诵念，岂知宗趣。\n\n师曰：吾不识文字，汝试取经诵一遍，吾当为汝解说。\n法达即高声念经，至譬喻品，师曰止。\n此经元来以因缘出世为宗，纵说多种譬喻，亦无越于此。\n何者因缘？经云：诸佛世尊，唯以一大事因缘，出现于世。一大事者，佛之知见也。\n\n世人外迷着相，内迷着空。\n若能于相离相，于空离空，即是内外不迷。\n若悟此法，一念心开，是为开佛知见。\n佛，犹觉也，分为四门：开觉知见，示觉知见，悟觉知见，入觉知见。\n若闻开示，便能悟入，即觉知见，本来真性而得出现。\n\n汝慎勿错解经意。见他道开示悟入，自是佛之知见，我辈无分，若作此解，乃是谤经毁佛也。\n彼既是佛，已具知见，何用更开。\n汝今当信，佛知见者，只汝自心，更无别佛。\n\n盖为一切众生自蔽光明，贪爱尘境，外缘内扰，甘受驱驰，\n便劳他世尊从三昧起，种种苦口，劝令寝息，莫向外求，与佛无二，故云开佛知见。\n\n吾亦劝一切人，于自心中，常开佛之知见。\n世人心邪，愚迷造罪，口善心恶，贪瞋嫉妒，谄佞我慢，侵人害物，自开众生知见。\n若能正心，常生智慧，观照自心，止恶行善，是自开佛之知见。\n\n汝须念念开佛知见，勿开众生知见。\n开佛知见，即是出世；开众生知见，即是世间。\n\n达曰：若然者，但得解义，不劳诵经耶。\n师曰：经有何过，岂障汝念。只为迷悟在人，损益由己。\n口诵心行，即是转经；口诵心不行，即是被经转。听吾偈曰：\n\n心迷法华转　心悟转法华\n诵经久不明　与义作雠家\n无念念即正　有念念成邪\n有无俱不计　常御白牛车\n\n达闻偈，不觉悲泣，言下大悟，而告师曰：\n法达从昔已来，实未曾转法华，乃被法华转。\n\n再启曰：经云，诸大声闻，乃至菩萨，皆尽思共度量，不能测佛智。\n今令凡夫但悟自心，便名佛之知见，自非上根，未免疑谤。\n又经说三车，羊鹿之车与白牛之车，如何区别，愿和尚再垂开示。\n\n师曰：经意分明，汝自迷背。\n诸三乘人，不能测佛智者，患在度量也。\n饶伊尽思共推，转加悬远。佛本为凡夫说，不为佛说，此理若不肯信者，从他退席。\n殊不知坐却白牛车，更于门外觅三车。\n况经文明向汝道，唯一佛乘，无有余乘。\n若二若三，乃至无数方便，种种因缘，譬喻言词，是法皆为一佛乘故。\n汝何不省，三车是假，为昔时故；一乘是实，为今时故。\n只教汝去假归实，归实之后，实亦无名。\n应知所有珍财，尽属于汝，由汝受用，更不作父想，亦不作子想，亦无用想，是名持法华经。\n从劫至劫，手不释卷，从昼至夜，无不念时也。\n\n达蒙启发，踊跃欢喜，以偈赞曰：\n经诵三千部　曹溪一句亡　未明出世旨　宁歇累生狂\n羊鹿牛权设　初中后善扬　谁知火宅内　元是法中王\n\n师曰：汝今后方可名念经僧也。达从此领玄旨，亦不辍诵经。\n\n僧智通，寿州安丰人，初看楞伽经约千余遍，而不会三身四智，礼师求解其义。\n师曰：三身者，清净法身，汝之性也；圆满报身，汝之智也；千百亿化身，汝之行也。\n若离本性，别说三身，即名有身无智。\n若悟三身无有自性，即名四智菩提。听吾偈曰：\n\n自性具三身　发明成四智　不离见闻缘　超然登佛地\n吾今为汝说　谛信永无迷　莫学驰求者　终日说菩提\n\n通再启曰：四智之义，可得闻乎。\n师曰：既会三身，便明四智，何更问耶。\n若离三身，别谈四智，此名有智无身，即此有智，还成无智。复说偈曰：\n\n大圆镜智性清净　平等性智心无病\n妙观察智见非功　成所作智同圆镜\n五八六七果因转　但用名言无实性\n若于转处不留情　繁兴永处那伽定\n\n通顿悟性智，遂呈偈曰：\n三身元我体　四智本心明　身智融无碍　应物任随形\n起修皆妄动　守住匪真精　妙旨因师晓　终亡染污名\n\n僧智常，信州贵溪人，髫年出家，志求见性。一日参礼，师问曰：汝从何来，欲求何事。\n曰：学人近往洪州白峰山，礼大通和尚，蒙示见性成佛之义，未决狐疑，远来投礼，伏望和尚慈悲指示。\n\n师曰：彼有何言句，汝试举看。\n曰：智常到彼，凡经三月，未蒙示诲，为法切故，一夕独入丈室，请问如何是某甲本心本性。\n大通乃曰：汝见虚空否。对曰：见。彼曰：汝知虚空有相貌否。对曰：虚空无形，有何相貌。\n彼曰：汝之本性，犹如虚空，了无一物可见，是名正见；无一物可知，是名真知；\n无有青黄长短，但见本源清净觉体圆明，即名见性成佛，亦名如来知见。\n学人虽闻此说，犹未决了，乞和尚开示。\n\n师曰：彼师所说，犹存见知，故令汝未了。吾今示汝一偈：\n\n不见一法存无见　大似浮云遮日面\n不知一法守空知　还如太虚生闪电\n此之知见瞥然兴　错认何曾解方便\n汝当一念自知非　自己灵光常显现\n\n常闻偈已，心意豁然，乃述偈曰：\n无端起知见　着相求菩提　情存一念悟　宁越昔时迷\n自性觉源体　随照枉迁流　不入祖师室　茫然趣两头\n\n智常一日问师曰：佛说三乘法，又言最上乘，弟子未解，愿为教授。\n师曰：汝观自本心，莫着外法相。法无四乘，人心自有等差。\n见闻转诵是小乘，悟法解义是中乘，依法修行是大乘。\n万法尽通，万法俱备，一切不染，离诸法相，一无所得，名最上乘。\n乘是行义，不在口争，汝须自修，莫问吾也。\n一切时中，自性自如。\n\n僧志道，广州南海人也，请益曰：学人自出家，览涅槃经，十载有余，未明大意，愿和尚垂诲。\n师曰：汝何处未明。\n曰：诸行无常，是生灭法，生灭灭已，寂灭为乐，于此疑惑。\n\n师曰：汝作么生疑。\n曰：一切众生皆有二身，谓色身法身也。\n色身无常，有生有灭。法身有常，无知无觉。\n经云：生灭灭已，寂灭为乐者，不审何身寂灭，何身受乐。\n\n师曰：汝是释子，何习外道断常邪见，而议最上乘法。\n据汝所说，则色身外别有法身，离生灭求于寂灭，又推涅槃常乐，言有身受用。\n斯乃执吝生死，耽着世乐。\n汝今当知，佛为一切迷人认五蕴和合为自体相，分别一切法为外尘相，好生恶死，念念迁流，不知梦幻虚假，枉受轮回，以常乐涅槃，翻为苦相，终日驰求。\n佛愍此故，乃示涅槃真乐，刹那无有生相，刹那无有灭相，更无生灭可灭，是则寂灭现前。\n当现前时，亦无现前之量，乃谓常乐。此乐无有受者，亦无不受者。\n岂有一体五用之名，何况更言涅槃禁伏诸法，令永不生，斯乃谤佛毁法。\n\n听吾偈曰：\n\n无上大涅槃　圆明常寂照　凡愚谓之死　外道执为断\n诸求二乘人　目以为无作　尽属情所计　六十二见本\n妄立虚假名　何为真实义　惟有过量人　通达无取舍\n以知五蕴法　及以蕴中我　外现众色像　一一音声相\n平等如梦幻　不起凡圣见　不作涅槃解　二边三际断\n常应诸根用　而不起用想　分别一切法　不起分别想\n劫火烧海底　风鼓山相击　真常寂灭乐　涅槃相如是\n吾今强言说　令汝舍现见　汝勿随言解　许汝知少分\n\n志道闻偈大悟，踊跃作礼而退。\n\n行思禅师，生吉州安城刘氏，闻曹溪法席盛化，径来参礼。\n遂问曰：当何所务，即不落阶级。\n师曰：汝曾作什么来。\n曰：圣谛亦不为。\n师曰：落何阶级。\n曰：圣谛尚不为，何阶级之有。\n师深器之，令思首众。\n一日，师谓曰：汝当分化一方，无令断绝。\n思既得法，遂回吉州青原山，弘法绍化，谥弘济禅师。\n\n怀让禅师，金州杜氏子也，初谒嵩山安国师，安发之曹溪参叩。\n让至礼拜，师曰：甚处来。曰：嵩山。\n师曰：什么物，恁么来。曰：说似一物即不中。\n师曰：还可修证否。曰：修证即不无，污染即不得。\n师曰：只此不污染，诸佛之所护念，汝既如是，吾亦如是。\n西方般若多罗谶：汝足下出一马驹，踏杀天下人，应在汝心，不须速说。\n让豁然契会，遂执侍左右一十五载，日臻玄奥。\n后往南岳大阐禅宗，敕谥大慧禅师。\n\n永嘉玄觉禅师，温州戴氏子，少习经论，精天台止观法门，因看维摩经，发明心地。\n偶师弟子玄策相访，与其剧谈，出言暗合诸祖。\n策云：仁者得法师谁。曰：我听方等经论，各有师承。后于维摩经，悟佛心宗，未有证明者。\n策云：威音王已前即得，威音王已后，无师自悟，尽是天然外道。\n曰：愿仁者为我证据。\n策云：我言轻，曹溪有六祖大师，四方云集，并是受法者，若去则与偕行。\n\n觉遂同策来参，绕师三匝，振锡而立。\n师曰：夫沙门者，具三千威仪，八万细行，大德自何方而来，生大我慢。\n觉曰：生死事大，无常迅速。\n师曰：何不体取无生，了无速乎。\n曰：体即无生，了本无速。\n师曰：如是如是。玄觉方具威仪礼拜，须臾告辞。\n师曰：返太速乎。\n曰：本自非动，岂有速耶。\n师曰：谁知非动。\n曰：仁者自生分别。\n师曰：汝甚得无生之意。\n曰：无生岂有意耶。\n师曰：无意谁当分别。\n曰：分别亦非意。\n师曰：善哉，少留一宿。\n时谓一宿觉，后着证道歌，盛行于世，谥曰无相大师，时称为真觉焉。\n\n禅者智隍，初参五祖，自谓已得正受，庵居长坐，积二十年。\n师弟子玄策，游方至河朔，闻隍之名，造庵问云：汝在此作什么。\n隍曰：入定。\n策云：汝云入定，为有心入耶，为无心入耶。\n若无心入者，一切无情草木瓦石，应合得定。\n若有心入者，一切有情含识之流，亦应得定。\n隍曰：我正入定时，不见有有无之心。\n策曰：不见有有无之心，即是常定，何有出入。若有出入，即非大定。\n隍无对，良久，问曰：师嗣谁耶。\n策云：我师曹溪六祖。隍云：六祖以何为禅定。\n策云：我师所说，妙湛圆寂，体用如如，五阴本空，六尘非有，不出不入，不定不乱，禅性无住，离住禅寂，禅性无生，离生禅想，心如虚空，亦无虚空之量。\n\n隍闻是说，径来谒师。\n师问云：仁者何来。隍具述前缘。\n师云：诚如所言。汝但心如虚空，不着空见，应用无碍，动静无心，凡圣情忘，能所俱泯，性相如如，无不定时也。\n隍于是大悟，二十年所得心，都无影响。\n\n一僧问师云：黄梅意旨，什么人得。\n师云：会佛法人得。\n僧云：和尚还得否。\n师云：我不会佛法。\n\n有一僧来礼拜，云：方辩是西蜀人，昨于南天竺国，见达摩大师，嘱方辩速往唐土。\n吾传大迦叶正法眼藏，及僧伽梨，现传六代于韶州曹溪，汝去瞻礼。方辩远来，愿见我师传来衣钵。\n师乃出示。次问：上人攻何事业。曰：善塑。\n师正色曰：汝试塑看。辩罔措，过数日，塑就真相，可高七寸，曲尽其妙。\n师笑曰：汝只解塑性，不解佛性。师舒手摩方辩顶，曰：永为人天福田。\n\n有僧举卧轮禅师偈曰：\n卧轮有伎俩　能断百思想　对境心不起　菩提日日长\n\n师闻之曰：此偈未明心地，若依而行之，是加系缚。因示一偈曰：\n惠能没伎俩　不断百思想　对境心数起　菩提作么长\n\n【顿渐品第八】\n\n时祖师居曹溪宝林，神秀大师在荆南玉泉寺，于时两宗盛化，人皆称南能北秀，故有南北二宗顿渐之分，而学者莫知宗趣。\n\n师谓众曰：法本一宗，人有南北，法即一种，见有迟疾。何名顿渐？\n法无顿渐，人有利钝，故名顿渐。\n\n然秀之徒众，往往讥南宗祖师不识一字，有何所长。\n秀曰：他得无师之智，深悟上乘，吾不如也。\n且吾师五祖，亲传衣法，岂徒然哉。吾恨不能远去亲近，虚受国恩。\n汝等诸人，毋滞于此，可往曹溪参决。\n\n一日，命门人志诚曰：汝聪明多智，可为吾到曹溪听法。\n若有所闻，尽心记取，还为吾说。\n\n志诚禀命至曹溪，随众参请，不言来处。\n时祖师告众曰：今有盗法之人，潜在此会。\n志诚即出礼拜，具陈其事。\n师曰：汝从玉泉来，应是细作。\n对曰：不是。\n师曰：何得不是。\n对曰：未说即是，说了不是。\n\n师曰：汝师若为示众。\n对曰：常指诲大众，住心观净，长坐不卧。\n师曰：住心观净，是病非禅，常坐拘身，于理何益。听吾偈曰：\n\n生来坐不卧　死去卧不坐　一具臭骨头　何为立功过\n\n志诚再拜曰：弟子在秀大师处，学道九年，不得契悟。今闻和尚一说，便契本心。\n弟子生死事大，和尚大慈，更为教示。\n\n师云：吾闻汝师教示学人戒定慧法，未审汝师说戒定慧行相如何，与吾说看。\n诚曰：秀大师说，诸恶莫作名为戒，诸善奉行名为慧，自净其意名为定。彼说如此，未审和尚以何法诲人。\n师曰：吾若言有法与人，即为诳汝。但且随方解缚，假名三昧。\n如汝师所说戒定慧，实不可思议，吾所见戒定慧又别。\n\n志诚曰：戒定慧只合一种，如何更别。\n师曰：汝师戒定慧接大乘人，吾戒定慧接最上乘人，悟解不同，见有迟疾。\n汝听吾说，与彼同否。吾所说法，不离自性，离性说法，名为相说，自性常迷。\n须知一切万法，皆从自性起用，是真戒定慧法。听吾偈曰：\n\n心地无非自性戒　心地无痴自性慧\n心地无乱自性定　不增不减自金刚\n身去身来本三昧\n\n诚闻偈，悔谢，乃呈一偈曰：\n五蕴幻身　幻何究竟　回趣真如　法还不净\n\n师然之，复语诚曰：\n汝师戒定慧，劝小根智人；吾戒定慧，劝大根智人。\n若悟自性，亦不立菩提涅槃，亦不立解脱知见，无一法可得，方能建立万法。\n若解此意，亦名佛身，亦名菩提涅槃，亦名解脱知见。\n见性之人，立亦得，不立亦得，去来自由，无滞无碍，应用随作，应语随答，普见化身，不离自性，即得自在神通，游戏三昧，是名见性。\n\n志诚再启师曰：如何是不立义。\n师曰：自性无非，无碍无乱，念念般若观照，常离法相，自由自在，纵横尽得，有何可立。\n自性自悟，顿悟顿修，亦无渐次，所以不立一切法，诸法寂灭，有何次第。\n志诚礼拜，愿为执侍，朝夕不懈。\n\n僧志彻，江西人，本姓张，名行昌，少任侠。\n自南北分化，二宗主虽亡彼我，而徒侣竞起爱憎。\n时北宗门人，自立秀师为第六祖，而忌祖师传衣为天下闻，乃嘱行昌来刺师。\n师心通，预知其事，即置金十两于座间。\n时夜暮，行昌入祖室，拔剑加害，祖舒颈就之，行昌挥刃者三，悉无所损。\n\n师曰：正剑不邪，邪剑不正，只负汝金，不负汝命。\n行昌惊仆，久而方苏，求哀悔过，即愿出家。\n师遂与金，言：汝且去，恐徒众翻害于汝，汝可他日易形而来，吾当摄受。\n\n行昌禀旨宵遁，后投僧出家，具戒精进。\n一日，忆师之言，远来礼觐。\n师曰：吾久念汝，汝来何晚。\n曰：昨蒙和尚舍罪，今虽出家苦行，终难报德，其惟传法度生乎。\n\n弟子常览涅槃经，未晓常无常义，乞和尚慈悲，略为解说。\n师曰：无常者，即佛性也；有常者，即一切善恶诸法分别心也。\n曰：和尚所说，大违经文。\n师曰：吾传佛心印，安敢违于佛经。\n\n曰：经说佛性是常，和尚却言无常。善恶诸法乃至菩提心，皆是无常，和尚却言是常。此即相违，今学人转加疑惑。\n师曰：涅槃经，吾昔听尼无尽藏读诵一遍，便为讲说，无一字一义不合经文，乃至为汝，终无二说。\n\n曰：学人识量浅昧，愿和尚委曲开示。\n师曰：汝知否，佛性若常，更说什么善恶诸法，乃至穷劫，无有一人发菩提心者，故吾说无常，正是佛说真常之道也。\n又一切诸法若无常者，即物物皆有自性，容受生死，而真常性有不遍之处，故吾说常者，正是佛说真无常义。\n佛比为凡夫外道执于邪常，诸二乘人于常计无常，共成八倒，故于涅槃了义教中，破彼偏见，而显说真常真乐真我真净。\n汝今依言背义，以断灭无常及确定死常，而错解佛之圆妙最后微言，纵览千遍，有何所益。\n\n行昌忽然大悟，说偈曰：\n因守无常心　佛说有常性　不知方便者　犹春池拾砾\n我今不施功　佛性而现前　非师相授与　我亦无所得\n\n师曰：汝今彻也，宜名志彻。彻礼谢而退。\n\n有一童子名神会，襄阳高氏子，年十三，自玉泉来参礼。\n师曰：知识远来艰辛，还将得本来否。若有本则合识主，试说看。\n会曰：以无住为本，见即是主。\n师曰：这沙弥争合取次语。\n\n会乃问曰：和尚坐禅，还见不见。\n师以拄杖打三下，云：吾打汝是痛不痛。\n对曰：亦痛亦不痛。\n师曰：吾亦见亦不见。\n\n神会问：如何是亦见亦不见。\n师云：吾之所见，常见自心过愆，不见他人是非好恶，是以亦见亦不见。\n汝言亦痛亦不痛如何。\n汝若不痛，同其木石；若痛，则同凡夫，即起恚恨。\n汝向前见不见是二边，痛不痛是生灭。\n汝自性且不见，敢尔弄人。\n\n神会礼拜悔谢。\n\n师又曰：汝若心迷不见，问善知识觅路；汝若心悟，即自见性，依法修行。\n汝自迷不见自心，却来问吾见与不见。\n吾见自知，岂代汝迷。汝若自见，亦不代吾迷。\n何不自知自见，乃问吾见与不见。\n\n神会再礼百余拜，求谢过愆，服勤给侍，不离左右。\n\n一日师告众曰：吾有一物，无头无尾，无名无字，无背无面，诸人还识否。\n神会出曰：是诸佛之本源，神会之佛性。\n师曰：向汝道无名无字，汝便唤作本源佛性，汝向去有把茆盖头也，只成个知解宗徒。\n祖师灭后，会入京洛大弘曹溪顿教，着显宗记盛行于世，是为荷泽禅师。\n\n师见诸宗难问，咸起恶心，多集座下，愍而谓曰：\n学道之人，一切善念恶念应当尽除，无名可名，名于自性，无二之性，是名实性。\n于实性上，建立一切教门，言下便须自见。\n诸人闻说，总皆作礼，请事为师。\n\n【宣诏品第九】\n\n神龙元年上元日，则天中宗诏云：\n朕请安秀二师，宫中供养，万几之暇，每究一乘。\n二师推让云：南方有能禅师，密授忍大师衣法，传佛心印，可请彼问。\n今遣内侍薛简，驰诏迎请，愿师慈念，速赴上京。\n\n师上表辞疾，愿终林麓。\n薛简曰：京城禅德皆云，欲得会道，必须坐禅习定，若不因禅定而得解脱者，未之有也。未审师所说法如何。\n\n师曰：道由心悟，岂在坐也。\n经云：若言如来若坐若卧，是行邪道。何故，无所从来，亦无所去，无生无灭，是如来清净禅。\n诸法空寂，是如来清净坐。究竟无证，岂况坐耶。\n\n简曰：弟子回京，主上必问，愿师慈悲，指示心要，传奏两宫，及京城学道者，譬如一灯，然百千灯，冥者皆明，明明无尽。\n\n师云：道无明暗，明暗是代谢之义，明明无尽亦是有尽，相待立名。\n故净名经云：法无有比，无相待故。\n\n简曰：明喻智慧，暗喻烦恼，修道之人，倘不以智慧照破烦恼，无始生死，凭何出离。\n师曰：烦恼即是菩提，无二无别，若以智慧照破烦恼者，此是二乘见解，羊鹿等机，上智大根，悉不如是。\n\n简曰：如何是大乘见解。\n师曰：明与无明，凡夫见二，智者了达其性无二，无二之性，即是实性。\n实性者，处凡愚而不减，在贤圣而不增，住烦恼而不乱，居禅定而不寂，不断不常，不来不去，不在中间及其内外，不生不灭，性相如如，常住不迁，名之曰道。\n\n简曰：师说不生不灭，何异外道。\n师曰：外道所说不生不灭者，将灭止生，以生显灭，灭犹不灭，生说不生。\n我说不生不灭者，本自无生，今亦不灭，所以不同外道。\n汝若欲知心要，但一切善恶都莫思量，自然得入清净心体，湛然常寂，妙用恒沙。\n\n简蒙指教，豁然大悟，礼辞归阙。\n表奏师语，其年九月三日，有诏奖谕师曰：\n师辞老疾，为朕修道，国之福田。\n师若净名，托疾毗耶，阐扬大乘，传诸佛心，谈不二法。\n薛简传师指授如来知见，朕积善余庆，宿种善根，值师出世，顿悟上乘，感荷师恩，顶戴无已。\n并奉磨衲袈裟，及水晶钵，敕韶州刺史，修饰寺宇，赐师旧居为国恩寺。\n\n【付嘱品第十】\n\n师一日唤门人法海、志诚、法达、神会、智常、智通、志彻、志道、法珍、法如等，曰：\n汝等不同余人，吾灭度后，各为一方师，吾今教汝说法，不失本宗旨。\n\n须举三科法门，动用三十六对，出没即菩提场，说一切法，莫离自性。\n忽有人问汝法，出语尽双，皆取对法，来去相因，究竟二法尽除，更无去处。\n\n三科法门者，阴界入也。\n阴是五阴，色受想行识是也。\n入是十二入，外六尘色声香味触法，内六门眼耳鼻舌身意是也。\n界是十八界，六尘六门六识是也。\n自性能含万法，名含藏识。若起思量，即是转识，生六识，出六门，见六尘，如是一十八界，皆从自性起用。\n\n自性若邪，起十八邪；自性若正，起十八正。\n若恶用即众生用，善用即佛用。用由何等，由自性有对法。\n\n外境无情五对：天与地对，日与月对，明与暗对，阴与阳对，水与火对，此是五对也。\n\n法相语言十二对：语与法对，有与无对，有色与无色对，有相与无相对，有漏与无漏对，色与空对，动与静对，清与浊对，凡与圣对，僧与俗对，老与少对，大与小对，此是十二对也。\n\n自性起用十九对：长与短对，邪与正对，痴与慧对，愚与智对，乱与定对，慈与毒对，戒与非对，直与曲对，实与虚对，险与平对，烦恼与菩提对，常与无常对，悲与害对，喜与瞋对，舍与悭对，进与退对，生与灭对，法身与色身对，化身与报身对，此是十九对也。\n\n师言：此三十六对法，若解用，即道贯一切经法，出入即离两边。\n\n自性动用，共人言语，外于相离相，内于空离空。\n若全着相，即长邪见；若全执空，即长无明。\n执空之人有谤经，直言不用文字，既云不用文字，人亦不合语言，只此语言，便是文字之相。\n又云直道不立文字，即此不立两字，亦是文字。\n见人所说，便即谤他言着文字，汝等须知，自迷犹可，又谤佛经，不要谤经，罪障无数。\n\n若着相于外，而作法求真，或广立道场，说有无之过患，如是之人，累劫不可见性。\n但听依法修行，又莫百物不思，而于道性挂碍。\n若听说不修，令人反生邪念，但依法修行，无住相法施。\n汝等若悟，依此说，依此用，依此行，依此作，即不失本宗。\n\n若有人问汝义，问有将无对，问无将有对，问凡以圣对，问圣以凡对，二道相因，生中道义。\n如一问一对，余问一依此作，即不失理也。\n\n师于太极元年壬子延和七月，命门人往新州国恩寺建塔，仍令促工。\n次年夏末落成。七月一日，集徒众曰：\n吾至八月，欲离世间，汝等有疑，早须相问，为汝破疑，令汝迷尽。\n吾若去后，无人教汝。\n\n法海等，闻悉皆涕泣，惟有神会神情不动，亦无涕泣。\n师云：神会小师，却得善不善等，毁誉不动，哀乐不生，余者不得。\n数年山中，竟修何道。汝今悲泣，为忧阿谁。\n若忧吾不知去处，吾自知去处。吾若不知去处，终不预报于汝。\n汝等悲泣，盖为不知吾去处。若知吾去处，即不合悲泣。\n法性本无生灭去来，汝等尽坐，吾与汝说一偈，名曰真假动静偈，汝等诵取此偈，与吾意同，依此修行，不失宗旨。\n\n众僧作礼，请师说偈，偈曰：\n\n一切无有真　不以见于真　若见于真者　是见尽非真\n若能自有真　离假即心真　自心不离假　无真何处真\n有情即解动　无情即不动　若修不动行　同无情不动\n若觅真不动　动上有不动　不动是不动　无情无佛种\n能善分别相　第一义不动　但作如此见　即是真如用\n报诸学道人　努力须用意　莫于大乘门　却执生死智\n若言下相应　即共论佛义　若实不相应　合掌令欢喜\n此宗本无诤　诤即失道意　执逆诤法门　自性入生死\n\n时徒众闻说偈已，普皆作礼，并体师意，各各摄心，依法修行，更不敢诤。\n乃知大师不久住世。\n\n法海上座再拜问曰：和尚入灭之后，衣法当付何人。\n师曰：吾于大梵寺说法以至于今，钞录流行，目曰法宝坛经。\n汝等守护，递相传授，度诸群生，但依此说，是名正法。\n今为汝等说法，不付其衣，盖为汝等信根淳熟，决定无疑，堪任大事。\n然据先祖达摩大师付授偈意，衣不合传。偈曰：\n\n吾本来兹土　传法救迷情　一华开五叶　结果自然成\n\n师复曰：诸善知识，汝等各各净心，听吾说法。\n若欲成就种智，须达一相三昧、一行三昧。\n若于一切处而不住相，于彼相中不生憎爱，亦无取舍，不念利益成坏等事，安闲恬静，虚融澹泊，此名一相三昧。\n若于一切处，行住坐卧，纯一直心，不动道场，真成净土，此名一行三昧。\n若人具二三昧，如地有种，含藏长养，成熟其实，一相一行，亦复如是。\n\n我今说法，犹如时雨，普润大地。汝等佛性，譬诸种子，遇兹沾洽，悉得发生。\n承吾旨者，决获菩提；依吾行者，定证妙果。听吾偈曰：\n\n心地含诸种　普雨悉皆萌　顿悟华情已　菩提果自成\n\n师说偈已，曰：其法无二，其心亦然，其道清净，亦无诸相。\n汝等慎勿观静，及空其心，此心本净，无可取舍，各自努力，随缘好去。\n\n尔时徒众作礼而退。\n\n大师七月八日，忽谓门人曰：吾欲归新州，汝等速理舟楫。大众哀留甚坚。\n师曰：诸佛出现，犹示涅槃，有来必去，理亦常然。吾此形骸，归必有所。\n众曰：师从此去，早晚可回。\n师曰：叶落归根，来时无口。\n又问曰：正法眼藏，传付何人。\n师曰：有道者得，无心者通。\n又问：后莫有难否。\n师曰：吾灭后五六年，当有一人来取吾首。听吾谶曰：\n\n头上养亲　口里须餐　遇满之难　杨柳为官\n\n又云：吾去七十年，有二菩萨从东方来，一出家，一在家，同时兴化，建立吾宗，缔缉伽蓝，昌隆法嗣。\n\n众复作礼，问曰：未知从上佛祖应现已来，传授几代，愿垂开示。\n师云：古佛应世，已无数量，不可计也。今以七佛为始。\n\n过去庄严劫毗婆尸佛、尸弃佛、毗舍浮佛，今贤劫拘留孙佛、拘那含牟尼佛、迦叶佛、释迦文佛，已上七佛。\n\n今以释迦文佛首传：\n第一摩诃迦叶尊者，第二阿难尊者，第三商那和修尊者，第四优婆鞠多尊者，\n第五提多迦尊者，第六弥遮迦尊者，第七须密多尊者，第八佛驮难提尊者，\n第九伏驮密多尊者，第十胁尊者，十一富那夜奢尊者，十二马鸣大士，\n十三迦毗摩罗尊者，十四龙树大士，十五迦那提婆尊者，十六罗喉罗多尊者，\n十七僧伽难提尊者，十八伽耶舍多尊者，十九鸠摩罗多尊者，二十阇耶多尊者，\n二十一婆修盘头尊者，二十二摩拏罗尊者，二十三鹤勒那尊者，二十四师子尊者，\n二十五婆舍斯多尊者，二十六不如蜜多尊者，二十七般若多罗尊者，二十八菩提达摩尊者，\n二十九慧可大师，三十僧璨大师，三十一道信大师，三十二弘忍大师，\n惠能是为三十三祖。\n\n从上诸祖，各有禀承，汝等向后，递代流传，毋令乖误。\n众人信受，作礼而退。\n\n大师先天二年癸丑岁，八月初三日，于国恩寺斋罢，谓诸徒众曰：\n汝等各依位坐，吾与汝别。\n\n法海白言：和尚留何教法，令后代迷人得见佛性。\n师言：汝等谛听，后代迷人，若识众生，即是佛性；若不识众生，万劫觅佛难逢。\n吾今教汝识自心众生，见自心佛性。\n欲求见佛，但识众生。只为众生迷佛，非是佛迷众生。\n自性若悟，众生是佛；自性若迷，佛是众生。\n自性平等，众生是佛；自性邪险，佛是众生。\n汝等心若险曲，即佛在众生中；一念平直，即是众生成佛。\n我心自有佛，自佛是真佛；自若无佛心，何处求真佛。\n汝等自心是佛，更莫狐疑，外无一物而能建立，皆是本心生万种法。\n故经云：心生种种法生，心灭种种法灭。\n\n吾今留一偈，与汝等别，名自性真佛偈，后代之人，识此偈意，自见本心，自成佛道。偈曰：\n\n真如自性是真佛　邪见三毒是魔王\n邪迷之时魔在舍　正见之时佛在堂\n性中邪见三毒生　即是魔王来住舍\n正见自除三毒心　魔变成佛真无假\n法身报身及化身　三身本来是一身\n若向性中能自见　即是成佛菩提因\n本从化身生净性　净性常在化身中\n性使化身行正道　当来圆满量无穷\n淫性本是净性因　除淫即是净性身\n性中各自离五欲　见性刹那即是真\n今生若遇顿教门　忽悟自性见世尊\n若欲修行觅作佛　不知何处拟求真\n若能心中自见真　有真即是成佛因\n不见自性外觅佛　起心总是大痴人\n顿教法门今已留　救度世人须自修\n报汝当来学道者　不作此见太悠悠\n\n师说偈已，告曰：汝等好住，吾灭度后，莫作世情，悲泣雨泪，受人吊问，身着孝服，非吾弟子，亦非正法。\n但识自本心，见自本性，无动无静，无生无灭，无去无来，无是无非，无住无往。\n恐汝等心迷，不会吾意，今再嘱汝，令汝见性。\n吾灭度后，依此修行，如吾在日。若违吾教，纵吾在世，亦无有益。\n\n复说偈曰：\n\n兀兀不修善　腾腾不造恶　寂寂断见闻　荡荡心无着\n\n师说偈已，端坐至三更，忽谓门人曰：吾行矣。奄然迁化。\n\n于时异香满室，白虹属地，林木变白，禽兽哀鸣。\n广韶新三郡，官僚洎门人僧俗，争迎真身，莫决所之。\n乃焚香祷曰：香烟指处，师所归焉。时香烟直贯曹溪。\n\n十一月十三日，迁神龛并所传衣钵而回。\n次年七月二十五日出龛，弟子方辩以香泥上之。\n门人忆念取首之记，仍以铁叶漆布固护师颈，入塔。\n忽于塔内白光出现，直上冲天，三日始散。韶州奏闻，奉敕立碑，纪师道行。\n\n师春秋七十有六，年二十四传衣，三十九祝发，说法利生三十七载，嗣法四十三人，悟道超凡者莫知其数。\n达摩所传信衣、中宗赐磨衲宝钵，及方辩塑师真相，并道具，永镇宝林道场。\n流传坛经，以显宗旨，兴隆三宝，普利群生者。","sourceUrl":"https://www.fojingzaixian.com/liuzutanjing.html","audios":[{"title":"六祖坛经讲解·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/liuzutanjing.html"}],"teachAudios":[{"title":"六祖坛经讲经开示","url":""}]},{"id":"yaoshijing","title":"药师经","fullTitle":"药师琉璃光如来本愿功德经","category":"药师","summary":"药师如来十二大愿，消灾延寿、离苦得乐，东方净琉璃世界。","explanation":"药师佛发十二大愿，愿令众生离苦得乐，病苦消除，延寿增福。持诵《药师经》，称念\"南无药师琉璃光如来\"，对于病痛在身的老年人，有极大的安慰与加持。","fullText":"唐三藏法师玄奘奉诏译\n\n如是我闻：\n一时薄伽梵，游化诸国，至广严城，住乐音树下。\n与大苾刍众八千人俱，菩萨摩诃萨三万六千，\n及国王、大臣，婆罗门、居士，天龙八部，人非人等，无量大众，恭敬围绕，而为说法。\n\n尔时，曼殊室利法王子，承佛威神，从座而起，偏袒一肩，右膝著地，向薄伽梵，曲躬合掌。\n白言：世尊！惟愿演说如是相类诸佛名号，及本大愿殊胜功德，\n令诸闻者业障销除，为欲利乐像法转时诸有情故。\n\n尔时，世尊赞曼殊室利童子言：\n善哉！善哉！曼殊室利！汝以大悲，劝请我说诸佛名号，本愿功德，\n为拔业障所缠有情，利益安乐像法转时诸有情故。\n汝今谛听！极善思惟！当为汝说。\n\n曼殊室利言：唯然，愿说！我等乐闻！\n\n佛告曼殊室利：\n东方去此，过十殑伽沙等佛土，有世界名净琉璃，\n佛号药师琉璃光如来、应、正等觉，明行圆满、善逝、世间解、\n无上士、调御丈夫、天人师、佛、薄伽梵。\n\n曼殊室利！彼世尊药师琉璃光如来本行菩萨道时，发十二大愿，令诸有情，所求皆得。\n\n第一大愿：愿我来世，得阿耨多罗三藐三菩提时，\n自身光明炽然照耀无量无数无边世界，以三十二大丈夫相，八十随形庄严其身；\n令一切有情如我无异。\n\n第二大愿：愿我来世得菩提时，身如琉璃，内外明彻，净无瑕秽；\n光明广大，功德巍巍，身善安住，焰网庄严过于日月；\n幽冥众生，悉蒙开晓，随意所趣，作诸事业。\n\n第三大愿：愿我来世得菩提时，以无量无边智慧方便，\n令诸有情皆得无尽所受用物，莫令众生，有所乏少。\n\n第四大愿：愿我来世得菩提时，若诸有情行邪道者，悉令安住菩提道中；\n若行声闻独觉乘者，皆以大乘而安立之。\n\n第五大愿：愿我来世得菩提时，若有无量无边有情，于我法中修行梵行，\n一切皆令得不缺戒、具三聚戒；\n设有毁犯，闻我名已还得清净，不堕恶趣！\n\n第六大愿：愿我来世得菩提时，若诸有情，其身下劣，诸根不具，\n丑陋、顽愚、盲、聋、喑、哑、挛躄、背偻、白癞、颠狂、种种病苦；\n闻我名已，一切皆得端正黠慧，诸根完具，无诸疾苦。\n\n第七大愿：愿我来世得菩提时，若诸有情众病逼切，无救无归，无医无药，无亲无家，贫穷多苦；\n我之名号一经其耳，众病悉除，身心安乐，家属资具悉皆丰足，乃至证得无上菩提。\n\n第八大愿：愿我来世得菩提时，若有女人为女百恶之所逼恼，极生厌离，愿舍女身；\n闻我名已，一切皆得转女成男，具丈夫相，乃至证得无上菩提。\n\n第九大愿：愿我来世得菩提时，令诸有情出魔罥网，解脱一切外道缠缚；\n若堕种种恶见稠林，皆当引摄置于正见，渐令修习诸菩萨行，速证无上正等菩提！\n\n第十大愿：愿我来世得菩提时，若诸有情王法所加，缚录鞭挞，系闭牢狱，或当刑戮，\n及余无量灾难凌辱，悲愁煎逼，身心受苦；\n若闻我名，以我福德威神力故，皆得解脱一切忧苦！\n\n第十一大愿：愿我来世得菩提时，若诸有情饥渴所恼，为求食故造诸恶业；\n得闻我名，专念受持，我当先以上妙饮食饱足其身，后以法味毕竟安乐而建立之。\n\n第十二大愿：愿我来世得菩提时，若诸有情贫无衣服，蚊虻寒热，昼夜逼恼；\n若闻我名，专念受持，如其所好即得种种上妙衣服，\n亦得一切宝庄严具，华鬘、涂香，鼓乐众伎，随心所玩，皆令满足。\n\n曼殊室利！是为彼世尊药师琉璃光如来、应、正等觉行菩萨道时，所发十二微妙上愿。\n\n复次，曼殊室利！彼世尊药师琉璃光如来行菩萨道时，所发大愿，及彼佛土功德庄严，\n我若一劫、若一劫余，说不能尽。\n然彼佛土，一向清净，无有女人，亦无恶趣，及苦音声；\n琉璃为地，金绳界道，城、阙、宫、阁，轩、窗、罗网，皆七宝成；\n亦如西方极乐世界，功德庄严，等无差别。\n于其国中，有二菩萨摩诃萨：一名日光遍照，二名月光遍照。\n是彼无量无数菩萨众之上首，次补佛处，悉能持彼世尊药师琉璃光如来正法宝藏。\n是故曼殊室利！诸有信心善男子、善女人，应当愿生彼佛世界。\n\n尔时，世尊，复告曼殊室利童子言：\n曼殊室利！有诸众生，不识善恶，惟怀贪吝，不知布施及施果报，愚痴无智，阙于信根，\n多聚财宝，勤加守护。见乞者来，其心不喜，设不获已而行施时，如割身肉，深生痛惜。\n复有无量悭贪有情，积集资财，于其自身尚不受用，何况能与父母、妻子、奴婢作使，及来乞者？\n彼诸有情，从此命终生饿鬼界，或傍生趣。\n由昔人间曾得暂闻药师琉璃光如来名故，今在恶趣，暂得忆念彼如来名，\n即于念时从彼处没，还生人中；\n得宿命念，畏恶趣苦，不乐欲乐，好行惠施，赞叹施者，一切所有悉无贪惜，\n渐次尚能以头目手足血肉身分施来求者，况余财物？\n\n复次，曼殊室利！若诸有情，虽于如来受诸学处，而破尸罗；\n有虽不破尸罗而破轨则；有于尸罗、轨则，虽则不坏，然毁正见；\n有虽不毁正见而弃多闻，于佛所说契经深义不能解了；\n有虽多闻而增上慢，由增上慢覆蔽心故，自是非他，嫌谤正法，为魔伴党。\n如是愚人，自行邪见，复令无量俱胝有情，堕大险坑。\n此诸有情，应于地狱、傍生、鬼趣流转无穷。\n若得闻此药师琉璃光如来名号，便舍恶行，修诸善法，不堕恶趣；\n设有不能舍诸恶行、修行善法，堕恶趣者，以彼如来本愿威力令其现前，\n暂闻名号，从彼命终还生人趣，得正见精进，善调意乐，\n便能舍家趣于非家，如来法中，受持学处无有毁犯，\n正见多闻，解甚深义，离增上慢，不谤正法，不为魔伴，\n渐次修行诸菩萨行，速得圆满。\n\n复次，曼殊室利！若诸有情悭贪、嫉妒，自赞毁他，当堕三恶趣中，无量千岁受诸剧苦！\n受剧苦已，从彼命终，来生人间，作牛、马、驼、驴，恒被鞭挞，饥渴逼恼，又常负重随路而行。\n或得为人，生居下贱，作人奴婢，受他驱役，恒不自在。\n若昔人中曾闻世尊药师琉璃光如来名号，由此善因，今复忆念，至心归依。\n以佛神力，众苦解脱，诸根聪利，智慧多闻，恒求胜法，常遇善友，\n永断魔罥，破无明壳，竭烦恼河，解脱一切生老病死忧愁苦恼。\n\n复次，曼殊室利！若诸有情好憙乖离，更相斗讼，恼乱自他，\n以身语意，造作增长种种恶业，展转常为不饶益事，互相谋害。\n告召山林树冢等神；杀诸众生，取其血肉祭祀药叉、罗刹婆等；\n书怨人名，作其形像，以恶咒术而咒诅之；厌魅蛊道，咒起尸鬼，令断彼命，及坏其身。\n是诸有情，若得闻此药师琉璃光如来名号，彼诸恶事悉不能害，\n一切展转皆起慈心，利益安乐，无损恼意及嫌恨心，各各欢悦，\n于自所受生于喜足，不相侵凌互为饶益。\n\n复次，曼殊室利！若有四众：苾刍、苾刍尼、邬波索迦、邬波斯迦，\n及余净信善男子、善女人等，有能受持八分斋戒，或经一年、或复三月受持学处，\n以此善根，愿生西方极乐世界无量寿佛所听闻正法而未定者，\n若闻世尊药师琉璃光如来名号，临命终时，有八大菩萨，其名曰：\n文殊师利菩萨，观世音菩萨，得大势菩萨，无尽意菩萨，\n宝檀华菩萨，药王菩萨，药上菩萨，弥勒菩萨。\n是八大菩萨乘空而来，示其道路，即于彼界种种杂色众宝华中，自然化生。\n\n或有因此，生于天上，虽生天上，而本善根，亦未穷尽，不复更生诸余恶趣。\n天上寿尽，还生人间，或为轮王，统摄四洲，威德自在，安立无量百千有情于十善道；\n或生刹帝利、婆罗门、居士大家，多饶财宝，仓库盈溢，形相端严，眷属具足，聪明智慧，勇健威猛，如大力士。\n若是女人，得闻世尊药师琉璃光如来名号，至心受持，于后不复更受女身。\n\n复次，曼殊室利！彼药师琉璃光如来得菩提时，由本愿力，观诸有情，\n遇众病苦瘦挛、干消、黄热等病；或被厌魅、蛊毒所中；或复短命，或时横死；\n欲令是等病苦消除所求愿满。\n\n时彼世尊，入三摩地，名曰除灭一切众生苦恼。\n既入定已，于肉髻中出大光明，光中演说，大陀罗尼曰：\n那谟薄伽筏帝，裨杀社窭噜，薜琉璃钵剌婆喝啰阇也，怛陀揭多耶，阿罗诃帝，三藐三勃陀耶。\n怛侄阤：唵，鞞杀逝，鞞杀逝，鞞杀社，三没揭帝娑诃。\n\n尔时，光中说此咒已，大地震动，放大光明，一切众生病苦皆除，受安隐乐。\n\n曼殊室利！若见男子、女人有病苦者，应当一心，为彼病人，常清净澡漱，\n或食、或药、或无虫水、咒一百八遍，与彼服食，所有病苦悉皆消灭。\n若有所求，志心念诵，皆得如是无病延年；\n命终之后，生彼世界，得不退转，乃至菩提。\n是故曼殊室利！若有男子、女人，于彼药师琉璃光如来，至心殷重，恭敬供养者，\n常持此咒，勿令废忘。\n\n复次，曼殊室利！若有净信男子女人，得闻药师琉璃光如来应正等觉所有名号，闻已诵持。\n晨嚼齿木，澡漱清净，以诸香花，烧香、涂香，作众伎乐，供养形象。\n于此经典，若自书，若教人书，一心受持，听闻其义。\n于彼法师，应修供养：一切所有资身之具，悉皆施与，勿令乏少。\n如是便蒙诸佛护念，所求愿满，乃至菩提。\n\n尔时，曼殊室利童子白佛言：\n世尊！我当誓于像法转时，以种种方便，令诸净信善男子、善女人等，\n得闻世尊药师琉璃光如来名号，乃至睡中亦以佛名觉悟其耳。\n世尊！若于此经受持读诵，或复为他演说开示；若自书、若教人书；\n恭敬尊重，以种种华香、涂香、末香、烧香、花鬘、璎珞、幡盖、伎乐，而为供养；\n以五色彩，作囊盛之；扫洒净处，敷设高座，而用安处。\n尔时，四大天王与其眷属，及余无量百千天众，皆诣其所，供养守护。\n世尊！若此经宝流行之处，有能受持，以彼世尊药师琉璃光如来本愿功德，\n及闻名号，当知是处无复横死；亦复不为诸恶鬼神夺其精气，\n设已夺者，还得如故，身心安乐。\n\n佛告曼殊室利：如是！如是！如汝所说。\n曼殊室利！若有净信善男子、善女人等，欲供养彼世尊药师琉璃光如来者，\n应先造立彼佛形像，敷清净座而安处之。\n散种种花，烧种种香，以种种幢幡庄严其处。\n七日七夜，受八分斋戒，食清净食，澡浴香洁，著清净衣，\n应生无垢浊心，无怒害心，于一切有情起利益安乐，慈、悲、喜、舍平等之心，\n鼓乐歌赞，右绕佛像。\n复应念彼如来本愿功德，读诵此经，思惟其义，演说开示。\n随所乐求，一切皆遂：求长寿，得长寿；求富饶，得富饶；求官位，得官位；求男女，得男女。\n\n若复有人，忽得恶梦，见诸恶相；或怪鸟来集；或于住处百怪出现。\n此人若以众妙资具，恭敬供养彼世尊药师琉璃光如来者，恶梦、恶相诸不吉祥，皆悉隐没，不能为患。\n或有水、火、刀、毒、悬险、恶象、师子、虎、狼、熊、罴、毒蛇、恶蝎、蜈蚣、蚰蜒、蚊、虻等怖；\n若能至心忆念彼佛，恭敬供养，一切怖畏皆得解脱。\n若他国侵扰，盗贼反乱，忆念恭敬彼如来者，亦皆解脱。\n\n复次，曼殊室利！若有净信善男子、善女人等，乃至尽形不事余天，唯当一心，归佛法僧，受持禁戒：\n若五戒、十戒，菩萨四百戒、苾刍二百五十戒，苾刍尼五百戒。\n于所受中或有毁犯，怖堕恶趣，若能专念彼佛名号，恭敬供养者，必定不受三恶趣生。\n或有女人，临当产时，受于极苦；若能志心称名礼赞，恭敬供养彼如来者，众苦皆除。\n所生之子，身分具足，形色端正，见者欢喜，利根聪明，安隐少病，无有非人，夺其精气。\n\n尔时，世尊告阿难言：\n如我称扬彼世尊药师琉璃光如来所有功德，此是诸佛甚深行处，难可解了，汝为信不？\n\n阿难白言：大德世尊！我于如来所说契经不生疑惑。\n所以者何？一切如来身语意业无不清净。\n世尊！此日月轮可令堕落，妙高山王可使倾动，诸佛所言无有异也。\n\n世尊！有诸众生，信根不具，闻说诸佛甚深行处，作是思惟：\n云何但念药师琉璃光如来一佛名号，便获尔所功德胜利？\n由此不信，还生诽谤，彼于长夜失大利乐，堕诸恶趣，流转无穷！\n\n佛告阿难：是诸有情若闻世尊药师琉璃光如来名号，至心受持，不生疑惑，堕恶趣者无有是处。\n\n阿难！此是诸佛甚深所行，难可信解；汝今能受，当知皆是如来威力。\n阿难！一切声闻、独觉，及未登地诸菩萨等，皆悉不能如实信解，唯除一生所系菩萨。\n阿难！人身难得；于三宝中，信敬尊重，亦难可得；闻世尊药师琉璃光如来名号，复难于是。\n\n阿难！彼药师琉璃光如来，无量菩萨行，无量善巧方便，无量广大愿；\n我若一劫，若一劫余而广说者，劫可速尽，彼佛行愿，善巧方便无有尽也！\n\n尔时，众中有一菩萨摩诃萨，名曰救脱，即从座起，偏袒一肩，右膝著地，曲躬合掌而白佛言：\n大德世尊！像法转时，有诸众生为种种患之所困厄，长病赢瘦，不能饮食，喉唇干燥，见诸方暗，死相现前，父母、亲属、朋友、知识啼泣围绕；\n然彼自身卧在本处，见琰魔使，引其神识至于琰魔法王之前。\n然诸有情，有俱生神，随其所作若罪若福，皆具书之，尽持授与琰魔法王。\n尔时，彼王推问其人，计算所作，随其罪福而处断之。\n\n时彼病人，亲属、知识，若能为彼归依世尊药师琉璃光如来，请诸众僧，转读此经，\n然七层之灯，悬五色续命神旛，或有是处彼识得还，如在梦中明了自见。\n或经七日，或二十一日，或三十五日，或四十九日，彼识还时，如从梦觉，\n皆自忆知善不善业所得果报；\n由自证见业果报故，乃至命难，亦不造作诸恶之业。\n是故净信善男子善女人等，皆应受持药师琉璃光如来名号，随力所能，恭敬供养。\n\n尔时，阿难问救脱菩萨曰：\n善男子！应云何恭敬供养彼世尊药师琉璃光如来？续命旛灯复云何造？\n\n救脱菩萨言：大德！若有病人，欲脱病苦，当为其人，七日七夜受持八分斋戒。\n应以饮食及余资具，随力所办，供养苾刍僧。\n昼夜六时，礼拜行道，供养彼世尊药师琉璃光如来。\n读诵此经四十九遍，然四十九灯；\n造彼如来形像七躯，一一像前各置七灯，一一灯量大如车轮，乃至四十九日光明不绝。\n造五色彩旛，长四十九褶手，应放杂类众生至四十九，可得过度危厄之难，不为诸横恶鬼所持。\n\n复次，阿难！若刹帝利、灌顶王等，灾难起时，所谓：\n人众疾疫难，他国侵逼难，自界叛逆难，星宿变怪难，日月薄蚀难，非时风雨难，过时不雨难。\n彼刹帝利灌顶王等，尔时应于一切有情起慈悲心，赦诸系闭。\n依前所说供养之法，供养彼世尊药师琉璃光如来。\n由此善根及彼如来本愿力故，令其国界即得安隐，风雨顺时，谷稼成熟，一切有情无病欢乐。\n于其国中，无有暴恶药叉等神恼有情者，一切恶相皆即隐没；\n而刹帝利灌顶王等寿命色力，无病自在，皆得增益。\n\n阿难！若帝后、妃主，储君、王子，大臣、辅相，中宫、彩女，百官、黎庶，为病所苦，及余厄难；\n亦应造立五色神旛，然灯续明，放诸生命，散杂色花，烧众名香；病得除愈，众难解脱。\n\n尔时，阿难问救脱菩萨言：善男子！云何已尽之命而可增益？\n\n救脱菩萨言：大德！汝岂不闻如来说有九横死耶？是故劝造续命旛灯，修诸福德，以修福故，尽其寿命不经苦患。\n\n阿难问言：九横云何？\n\n救脱菩萨言：\n若诸有情，得病虽轻，然无医药及看病者，设复遇医，授以非药，实不应死而便横死。\n又信世间邪魔、外道妖孽之师妄说祸福，便生恐动，心不自正，\n卜问觅祸，杀种种众生，解奏神明，呼诸魍魉，请乞福祐，欲冀延年，终不能得。\n愚痴迷惑，信邪倒见，遂令横死入于地狱，无有出期，是名初横。\n二者、横被王法之所诛戮。\n三者、畋猎嬉戏，耽淫嗜酒，放逸无度，横为非人夺其精气。\n四者、横为火焚。\n五者、横为水溺。\n六者、横为种种恶兽所啖。\n七者、横堕山崖。\n八者、横为毒药、厌祷、咒诅、起尸鬼等之所中害。\n九者、饥渴所困，不得饮食而便横死。\n是为如来略说横死，有此九种，其余复有无量诸横，难可具说！\n\n复次，阿难！彼琰魔王主领世间名籍之记，若诸有情，不孝五逆，破辱三宝，坏君臣法，毁于性戒，琰魔法王随罪轻重，考而罚之。\n是故我今劝诸有情，然灯造旛，放生修福，令度苦厄，不遭众难。\n\n尔时，众中有十二药叉大将，俱在会坐，所谓：\n宫毗罗大将，伐折罗大将，迷企罗大将，安底罗大将，頞你罗大将，珊底罗大将，\n因达罗大将，波夷罗大将，摩虎罗大将，真达罗大将，招杜罗大将，毗羯罗大将。\n此十二药叉大将，一一各有七千药叉，以为眷属。\n\n同时举声白佛言：世尊！我等今者蒙佛威力，得闻世尊药师琉璃光如来名号，不复更有恶趣之怖。\n我等相率，皆同一心，乃至尽形归佛法僧，誓当荷负一切有情，为作义利，饶益安乐。\n随于何等村城国邑，空闲林中，若有流布此经，或复受持药师琉璃光如来名号恭敬供养者，\n我等眷属卫护是人，皆使解脱一切苦难，诸有愿求悉令满足。\n或有疾厄求度脱者，亦应读诵此经，以五色缕，结我名字，得如愿已，然后解结。\n\n尔时，世尊赞诸药叉大将言：善哉！善哉！大药叉将！\n汝等念报世尊药师琉璃光如来恩德者，常应如是利益安乐一切有情。\n\n尔时，阿难白佛言：世尊！当何名此法门？我等云何奉持？\n\n佛告阿难：\n此法门名说药师琉璃光如来本愿功德；\n亦名说十二神将饶益有情结愿神咒；\n亦名拔除一切业障；应如是持！\n\n时薄伽梵，说是语已，\n诸菩萨摩诃萨，及大声闻，国王、大臣，婆罗门、居士，\n天龙、药叉、健达缚、阿素洛、揭路荼、紧捺洛、莫呼洛伽、人、非人等一切大众，\n闻佛所说，皆大欢喜，信受奉行。","sourceUrl":"https://www.fojingzaixian.com/yaoshijing.html","audios":[{"title":"药师经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/yaoshijing.html"}],"teachAudios":[{"title":"药师经讲经开示","url":""}]},{"id":"fahuajing","title":"法华经","fullTitle":"妙法莲华经","category":"法华","summary":"\"诸法实相\"，佛陀一代时教精髓，天台宗所依经典。","explanation":"《法华经》被誉为\"经中之王\"，全经以莲花喻妙法，阐明一乘之道——一切众生皆可成佛。受持读诵此经，功德无量。","fullText":"妙法莲华经\n\n姚秦鸠摩罗什译\n\n【弘传序】\n唐终南山释道宣述\n\n妙法莲华经者，统诸佛降灵之本致也。蕴结大夏，出彼千龄。东传震旦，三百余载。西晋惠帝永康年中，长安青门、炖煌菩萨竺法护者，初翻此经，名正法华。东晋安帝、隆安年中，后秦弘始，龟兹沙门鸠摩罗什、次翻此经，名妙法莲华。隋氏仁寿，大兴善寺、北天竺沙门阇那、笈多、后所翻者，同名妙法。三经重遝，文旨互陈。时所宗尚，皆弘秦本。自余支品、别偈，不无其流。具如叙历，故所非述。\n\n夫以灵岳降灵，非大圣无由开化。适化所及，非昔缘无以导心。所以仙苑告成，机分小大之别。金河顾命，道殊半满之科。岂非教被乘时，无足核其高会。是知五千退席，为进增慢之俦。五百授记，俱崇密化之迹。所以放光现瑞，开发请之教源。出定扬德，畅佛慧之宏略。朽宅通入大之文轨，化城引昔缘之不坠。系珠明理性之常在，凿井显示悟之多方。词义宛然，喻陈惟远。自非大哀旷济，拔滞溺之沈流。一极悲心，拯昏迷之失性。\n\n自汉至唐六百余载，总历群籍、四千余轴。受持盛者，无出此经。将非机教相扣，并智胜之遗尘。闻而深敬，俱威王之余绩。辄于经首，序而综之。庶得早净六根，仰慈尊之嘉会。速成四德，趣乐土之玄猷。弘赞莫穷，永贻诸后云尔。\n\n【序品第一】\n\n如是我闻。一时、佛住王舍城、耆阇崛山中，与大比丘众万二千人俱。皆是阿罗汉，诸漏已尽，无复烦恼，逮得己利，尽诸有结，心得自在。其名曰：阿若憍陈如、摩诃迦叶、优楼频螺迦叶、伽耶迦叶、那提迦叶、舍利弗、大目犍连、摩诃迦旃延、阿冕楼驮、劫宾那、憍梵波提、离婆多、毕陵伽婆蹉、薄拘罗、摩诃拘絺罗、难陀、孙陀罗难陀、富楼那弥多罗尼子、须菩提、阿难、罗侯罗，如是众所知识、大阿罗汉等。\n\n复有学、无学二千人。摩诃波阇波提比丘尼，与眷属六千人俱。罗侯罗母耶输陀罗比丘尼，亦与眷属俱。菩萨摩诃萨八万人，皆于阿耨多罗三藐三菩提不退转，皆得陀罗尼。乐说辩才，转不退转法轮。供养无量百千诸佛，于诸佛所、植众德本，常为诸佛之所称叹。以慈修身，善入佛慧。通达大智，到于彼岸。名称普闻无量世界，能度无数百千众生。其名曰：文殊师利菩萨、观世音菩萨、得大势菩萨、常精进菩萨、不休息菩萨、宝掌菩萨、药王菩萨、勇施菩萨、宝月菩萨、月光菩萨、满月菩萨、大力菩萨、无量力菩萨、越三界菩萨、跋陀婆罗菩萨、弥勒菩萨、宝积菩萨、导师菩萨，如是等菩萨摩诃萨八万人俱。\n\n尔时释提桓因，与其眷属二万天子俱。复有名月天子、普香天子、宝光天子、四大天王，与其眷属万天子俱。自在天子、大自在天子，与其眷属三万天子俱。娑婆世界主、梵天王、尸弃大梵、光明大梵等，与其眷属万二千天子俱。有八龙王、难陀龙王、跋难陀龙王、娑伽罗龙王、和修吉龙王、德叉迦龙王、阿那婆达多龙王、摩那斯龙王、优钵罗龙王等，各与若干百千眷属俱。有四紧那罗王、法紧那罗王、妙法紧那罗王、大法紧那罗王、持法紧那罗王，各与若干百千眷属俱。有四乾闼婆王、乐乾闼婆王、乐音乾闼婆王、美乾闼婆王、美音乾闼婆王，各与若干百千眷属俱。有四阿修罗王、婆稚阿修罗王、佉罗骞驮阿修罗王、毗摩质多罗阿修罗王、罗侯阿修罗王，各与若干百千眷属俱。有四迦楼罗王、大威德迦楼罗王、大身迦楼罗王、大满迦楼罗王、如意迦楼罗王，各与若干百千眷属俱。韦提希子阿阇世王，与若干百千眷属俱。各礼佛足，退坐一面。\n\n尔时世尊，四众围绕，供养、恭敬、尊重、赞叹。为诸菩萨说大乘经，名无量义，教菩萨法，佛所护念。佛说此经已，结跏趺坐，入于无量义处三昧，身心不动。是时天雨曼陀罗华，摩诃曼陀罗华，曼殊沙华，摩诃曼殊沙华，而散佛上、及诸大众。普佛世界，六种震动。\n\n尔时会中，比丘、比丘尼、优婆塞、优婆夷、天龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人，及诸小王、转轮圣王。是诸大众，得未曾有，欢喜合掌，一心观佛。\n\n尔时佛放眉间白毫相光，照东方万八千世界，靡不周遍，下至阿鼻地狱，上至阿迦尼吒天。于此世界，尽见彼土六趣众生，又见彼土现在诸佛。及闻诸佛所说经法。并见彼诸比丘、比丘尼、优婆塞、优婆夷、诸修行得道者。复见诸菩萨摩诃萨、种种因缘、种种信解、种种相貌、行菩萨道。复见诸佛般涅槃者。复见诸佛般涅槃后，以佛舍利、起七宝塔。\n\n尔时弥勒菩萨作是念：今者、世尊现神变相，以何因缘而有此瑞。今佛世尊入于三昧，是不可思议、现稀有事，当以问谁，谁能答者。复作此念：是文殊师利、法王之子，已曾亲近供养过去无量诸佛，必应见此稀有之相，我今当问。\n\n尔时文殊师利语弥勒菩萨摩诃萨、及诸大士，善男子等：如我惟忖，今佛世尊欲说大法，雨大法雨，吹大法螺，击大法鼓，演大法义。诸善男子，我于过去诸佛，曾见此瑞，放斯光已，即说大法。是故当知今佛现光，亦复如是，欲令众生，咸得闻知一切世间难信之法，故现斯瑞。\n\n诸善男子，如过去无量无边不可思议阿僧祇劫，尔时有佛，号日月灯明如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊，演说正法，初善、中善、后善，其义深远，其语巧妙，纯一无杂，具足清白梵行之相。为求声闻者、说应四谛法，度生老病死，究竟涅槃。为求辟支佛者、说应十二因缘法。为诸菩萨、说应六波罗蜜，令得阿耨多罗三藐三菩提，成一切种智。\n\n次复有佛、亦名日月灯明，次复有佛、亦名日月灯明，如是二万佛、皆同一字，号日月灯明，又同一姓，姓颇罗堕。弥勒当知，初佛后佛，皆同一字，名日月灯明，十号具足。所可说法，初中后善。其最后佛，未出家时、有八王子，一名有意，二名善意，三名无量意，四名宝意，五名增意，六名除疑意，七名向意，八名法意。是八王子，威德自在，各领四天下。是诸王子，闻父出家，得阿耨多罗三藐三菩提。悉舍王位，亦随出家，发大乘意，常修梵行，皆为法师，已于千万佛所、植诸善本。\n\n是时日月灯明佛说大乘经，名无量义、教菩萨法、佛所护念。说是经已，即于大众中、结跏趺坐，入于无量义处三昧，身心不动。是时、天雨曼陀罗华，摩诃曼陀罗华，曼殊沙华，摩诃曼殊沙华，而散佛上、及诸大众。普佛世界，六种震动。\n\n尔时如来放眉间白毫相光，照东方万八千佛土，靡不周遍，如今所见、是诸佛土。弥勒当知，尔时会中，有二十亿菩萨、乐欲听法。是诸菩萨，见此光明、普照佛土，得未曾有，欲知此光所为因缘。时有菩萨，名曰妙光，有八百弟子。是时日月灯明佛从三昧起，因妙光菩萨、说大乘经，名妙法莲华、教菩萨法、佛所护念。六十小劫、不起于座。时会听者、亦坐一处，六十小劫、身心不动，听佛所说，谓如食顷。是时众中，无有一人、若身若心而生懈倦。\n\n日月灯明佛于六十小劫说是经已，即于梵、魔、沙门、婆罗门、及天、人、阿修罗、众中，而宣此言，如来于今日中夜，当入无余涅槃。时有菩萨，名曰德藏，日月灯明佛即授其记。告诸比丘：是德藏菩萨，次当作佛，号曰净身，多陀阿伽度、阿罗诃、三藐三佛陀。佛授记已，便于中夜、入无余涅槃。佛灭度后，妙光菩萨持妙法莲华经，满八十小劫、为人演说。日月灯明佛八子、皆师妙光。妙光教化，令其坚固阿耨多罗三藐三菩提。是诸王子、供养无量百千万亿佛已，皆成佛道，其最后成佛者，名曰燃灯。八百弟子中，有一人、号曰求名，贪著利养，虽复读诵众经，而不通利，多所忘失，故号求名。是人亦以种诸善根因缘故，得值无量百千万亿诸佛，供养、恭敬，尊重、赞叹。\n\n弥勒当知，尔时妙光菩萨、岂异人乎，我身是也，求名菩萨，汝身是也。今见此瑞、与本无异，是故惟忖，今日如来当说大乘经，名妙法莲华、教菩萨法、佛所护念。\n\n【方便品第二】\n\n尔时，世尊从三昧安详而起，告舍利弗：诸佛智慧，甚深无量，其智慧门，难解难入，一切声闻、辟支佛、所不能知。所以者何。佛曾亲近百千万亿无数诸佛，尽行诸佛无量道法，勇猛精进，名称普闻。成就甚深未曾有法，随宜所说，意趣难解。舍利弗，吾从成佛已来，种种因缘，种种譬喻，广演言教，无数方便、引导众生，令离诸著。所以者何。如来方便知见波罗蜜、皆已具足。舍利弗，如来知见，广大深远，无量无碍，力、无所畏、禅定、解脱三昧、深入无际，成就一切未曾有法。舍利弗，如来能种种分别，巧说诸法，言辞柔软，悦可众心。舍利弗，取要言之，无量无边未曾有法，佛悉成就。\n\n止，舍利弗，不须复说。所以者何。佛所成就第一稀有难解之法，唯佛与佛、乃能究尽诸法实相。所谓诸法、如是相，如是性，如是体，如是力，如是作，如是因，如是缘，如是果，如是报，如是本末究竟等。\n\n舍利弗，十方世界中，尚无二乘，何况有三。舍利弗，诸佛出于五浊恶世，所谓劫浊、烦恼浊、众生浊、见浊、命浊。如是舍利弗，劫浊乱时，众生垢重，悭贪嫉妒，成就诸不善根故，诸佛以方便力，于一佛乘、分别说三。舍利弗，若我弟子，自谓阿罗汉、辟支佛者，不闻不知诸佛如来、但教化菩萨事，此非佛弟子，非阿罗汉，非辟支佛。\n\n诸佛世尊唯以一大事因缘故、出现于世。舍利弗，云何名诸佛世尊唯以一大事因缘故、出现于世。诸佛世尊欲令众生开佛知见、使得清净故，出现于世。欲示众生、佛之知见故，出现于世。欲令众生悟佛知见故，出现于世。欲令众生入佛知见道故，出现于世。舍利弗，是为诸佛以一大事因缘故、出现于世。\n\n十方佛土中，唯有一乘法，无二亦无三。除佛方便说，但以假名字，引导于众生，说佛智慧故。诸佛出于世，唯此一事实，余二则非真，终不以小乘、济度于众生。佛自住大乘，如其所得法、定慧力庄严，以此度众生。\n\n【譬喻品第三】\n\n尔时舍利弗踊跃欢喜，即起、合掌、瞻仰尊颜、而白佛言：今从世尊闻此法音，心怀踊跃，得未曾有。所以者何。我昔从佛闻如是法，见诸菩萨授记作佛，而我等不与斯事，甚自感伤、失于如来无量知见。世尊，我常独处山林树下，若坐若行，每作是念：我等同入法性，云何如来以小乘法而见济度。\n\n尔时佛告舍利弗：汝于未来世，过无量无边、不可思议劫，供养若干千万亿佛，奉持正法，具足菩萨所行之道，当得作佛，号曰华光如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。国名离垢，其土平正，清净严饰，安隐、丰乐，天人炽盛。琉璃为地，有八交道，黄金为绳、以界其侧。其傍、各有七宝行树，常有华果。华光如来、亦以三乘教化众生。\n\n如来亦复如是，则为一切世间之父。于诸怖畏、衰恼、忧患、无明闇蔽，永尽无余，而悉成就无量知见、力无所畏，有大神力及智慧力，具足方便、智慧波罗蜜，大慈、大悲，常无懈倦，恒求善事，利益一切。而生三界朽故火宅，为度众生、生老病死、忧悲、苦恼、愚痴、闇蔽、三毒之火，教化、令得阿耨多罗三藐三菩提。\n\n舍利弗，如彼长者、初以三车诱引诸子，然后但与大车，宝物庄严，安隐第一，然彼长者无虚妄之咎。如来亦复如是、无有虚妄，初说三乘、引导众生，然后但以大乘而度脱之。以是因缘，当知诸佛方便力故，于一佛乘、分别说三。\n\n【信解品第四】\n\n尔时慧命须菩提、摩诃迦旃延、摩诃迦叶、摩诃目犍连，从佛所、闻未曾有法，世尊授舍利弗阿耨多罗三藐三菩提记，发稀有心，欢喜踊跃。\n\n世尊，我等今者乐说譬喻、以明斯义，譬若有人，年既幼稚，舍父逃逝，久住他国，或十、二十、至五十岁，年既长大，加复穷困，驰骋四方、以求衣食，渐渐游行，遇向本国。其父先来、求子不得，中止一城。其家大富，财宝无量，金、银、琉璃、珊瑚、琥珀、玻璃、珠、等，其诸仓库，悉皆盈溢，多有僮仆、臣佐、吏民，象马、车乘、牛羊、无数，出入息利，乃遍他国，商估贾客、亦甚众多。\n\n世尊，大富长者、则是如来，我等皆似佛子，如来常说、我等为子。我等以三苦故，于生死中、受诸热恼，迷惑无知，乐著小法。今日世尊，令我等思惟捐除诸法戏论之粪，我等于中勤加精进，得至涅槃一日之价，既得此已，心大欢喜，自以为足，便自谓言：于佛法中勤精进故，所得宏多。然世尊先知我等心著敝欲，乐于小法，便见纵舍，不为分别、汝等当有如来知见宝藏之分。世尊以方便力、说如来智慧，我等从佛，得涅槃一日之价，以为大得，于此大乘，无有志求。\n\n【药草喻品第五】\n\n尔时世尊告摩诃迦叶、及诸大弟子：善哉、善哉，迦叶善说如来真实功德。诚如所言，如来复有无量无边阿僧祇功德，汝等若于无量亿劫、说不能尽。迦叶，当知如来是诸法之王，若有所说，皆不虚也。于一切法，以智方便而演说之，其所说法，皆悉到于一切智地。\n\n迦叶，譬如三千大千世界、山川溪谷土地，所生卉木丛林、及诸药草，种类若干，名色各异。密云弥布，遍覆三千大千世界，一时等澍，其泽普洽。卉木丛林、及诸药草，小根小茎、小枝小叶，中根中茎、中枝中叶，大根大茎、大枝大叶，诸树大小，随上中下、各有所受，一云所雨，称其种性而得生长，华果敷实。虽一地所生，一雨所润，而诸草木、各有差别。\n\n迦叶，当知如来亦复如是、出现于世，如大云起，以大音声、普遍世界天、人、阿修罗，如彼大云遍覆三千大千国土。于大众中、而唱是言：我是如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊，未度者令度，未解者令解，未安者令安，未涅槃者令得涅槃，今世后世、如实知之。我是一切知者、一切见者、知道者、开道者、说道者、汝等天、人、阿修罗众、皆应到此，为听法故。\n\n【授记品第六】\n\n尔时世尊说是偈已，告诸大众，唱如是言：我此弟子摩诃迦叶，于未来世、当得奉觐三百万亿诸佛世尊，供养、恭敬，尊重、赞叹，广宣诸佛无量大法。于最后身、得成为佛，名曰光明如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。国名光德，劫名大庄严。佛寿、十二小劫，正法住世、二十小劫，像法亦住二十小劫。国界严饰，无诸秽恶、瓦砾荆棘、便利不净。其土平正，无有高下、坑坎堆阜。琉璃为地，宝树行列，黄金为绳、以界道侧，散诸宝华，周遍清净。其国菩萨、无量千亿，诸声闻众、亦复无数，无有魔事，虽有魔及魔民，皆护佛法。\n\n尔时须菩提，于当来世、奉觐三百万亿那由他佛，供养恭敬，尊重赞叹，常修梵行，具菩萨道。于最后身、得成为佛，号曰名相如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。劫名有宝。国名宝生。其土平正，玻璃为地，宝树庄严，无诸丘坑、沙砾、荆棘、便利之秽，宝华覆地，周遍清净。\n\n大迦旃延、于当来世，以诸供具、供养奉事八千亿佛，恭敬、尊重。于最后身、得成为佛，号曰阎浮那提金光如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。\n\n大目犍连、当以种种供具、供养八千诸佛。当得成佛，号曰多摩罗跋栴檀香如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。劫名喜满，国名意乐。\n\n【化城喻品第七】\n\n佛告诸比丘：乃往过去无量无边不可思议阿僧祇劫，尔时有佛，名大通智胜如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊，其国名好城，劫名大相。\n\n大通智胜佛、寿五百四十万亿那由他劫。其佛本坐道场，破魔军已，垂得阿耨多罗三藐三菩提，而诸佛法不现在前，如是一小劫乃至十小劫，结跏趺坐，身心不动，而诸佛法犹不在前。\n\n大通智胜佛过十小劫，诸佛之法、乃现在前，成阿耨多罗三藐三菩提。其佛未出家时，有十六子。是时日月灯明佛说大乘经已，十六沙弥为阿耨多罗三藐三菩提故，皆共受持，讽诵通利。说是经时，十六菩萨沙弥皆悉信受，声闻众中、亦有信解，其余众生、千万亿种，皆生疑惑。\n\n诸比丘，我今语汝，彼佛弟子十六沙弥，今皆得阿耨多罗三藐三菩提，于十方国土、现在说法。其二沙弥，东方作佛，一名阿閦，在欢喜国，二名须弥顶。东南方二佛，一名师子音，二名师子相。南方二佛，一名虚空住，二名常灭。西南方二佛，一名帝相，二名梵相。西方二佛，一名阿弥陀，二名度一切世间苦恼。西北方二佛，一名多摩罗跋栴檀香神通，二名须弥相。北方二佛，一名云自在，二名云自在王。东北方佛、名坏一切世间怖畏，第十六、我释迦牟尼佛，于娑婆国土、成阿耨多罗三藐三菩提。\n\n诸比丘，如来方便、深入众生之性，如其志乐小法，深著五欲，为是等故、说于涅槃，是人若闻，则便信受。譬如五百由旬险难恶道，旷绝无人、怖畏之处，若有多众，欲过此道、至珍宝处。有一导师，聪慧明达，善知险道通塞之相，将导众人，欲过此难。所将人众、中路懈退，白导师言：我等疲极、而复怖畏，不能复进，前路犹远，今欲退还。导师多诸方便、而作是念，此等可愍，云何舍大珍宝而欲退还。作是念已，以方便力，于险道中，过三百由旬、化作一城。告众人言：汝等勿怖，莫得退还。今此大城，可于中止，随意所作，若入是城，快得安隐。若能前至宝所，亦可得去。\n\n诸比丘，如来亦复如是，今为汝等作大导师，知诸生死烦恼恶道、险难长远，应去应度。若众生但闻一佛乘者，则不欲见佛，不欲亲近，便作是念：佛道长远，久受勤苦、乃可得成。佛知是心、怯弱下劣，以方便力，而于中道为止息故，说二涅槃。若众生住于二地，如来尔时即便为说：汝等所作未办，汝所住地、近于佛慧，当观察筹量所得涅槃、非真实也。但是如来方便之力，于一佛乘、分别说三。\n\n【五百弟子受记品第八】\n\n尔时富楼那弥多罗尼子、从佛闻是智慧方便、随宜说法，又闻授诸大弟子阿耨多罗三藐三菩提记，复闻宿世因缘之事，复闻诸佛有大自在神通之力，得未曾有，心净踊跃。\n\n富楼那，于当来世，过无量阿僧祇劫，当于此土、得阿耨多罗三藐三菩提，号曰法明如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。\n\n其佛、以恒河沙等三千大千世界、为一佛土，七宝为地，地平如掌，无有山陵溪涧沟壑，七宝台观、充满其中，诸天宫殿，近处虚空，人天交接，两得相见。无诸恶道，亦无女人，一切众生，皆以化生，无有淫欲。得大神通，身出光明，飞行自在，志念坚固，精进智慧，普皆金色，三十二相、而自庄严。其国众生，常以二食，一者、法喜食，二者、禅悦食。劫名宝明，国名善净。其佛、寿命无量阿僧祇劫。\n\n尔时千二百阿罗汉心自在者、佛告摩诃迦叶：是千二百阿罗汉，我今当现前次第与授阿耨多罗三藐三菩萨记。于此众中，我大弟子憍陈如比丘，当供养六万二千亿佛，然后得成为佛，号曰普明如来。其五百阿罗汉、优楼频螺迦叶、伽耶迦叶、那提迦叶、迦留陀夷、优陀夷、阿冕楼驮、离婆多、劫宾那、薄拘罗、周陀、莎伽陀、等，皆当得阿耨多罗三藐三菩提，尽同一号，名曰普明。\n\n五百阿罗汉欲重宣此义，而说偈言：我等昔来，未曾从佛、闻如是说，未曾有法，断诸疑悔，身意泰然。我等昔来，终日竟夜、每自克责。而今从佛，闻所未闻、未曾有法，断诸疑悔，身意泰然，快得安隐。今日乃知真是佛子，从佛口生，从法化生，得佛法分。\n\n【授学无学人记品第九】\n\n尔时阿难、罗侯罗、而作是念：我等每自思惟，设得授记，不亦快乎。即从座起，到于佛前，头面礼足，俱白佛言：世尊，我等于此、亦应有分，惟有如来，我等所归。\n\n尔时佛告阿难：汝于来世、当得作佛，号山海慧自在通王如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。当供养六十二亿诸佛，护持法藏，然后得阿耨多罗三藐三菩提。国名常立胜幡，其土清净，琉璃为地，劫名妙音遍满。其佛、寿命无量千万亿阿僧祇劫，正法住世、倍于寿命，像法住世、复倍正法。\n\n尔时佛告罗侯罗：汝于来世、当得作佛，号蹈七宝华如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。当供养十世界微尘等数诸佛如来，常为诸佛而作长子，犹如今也。\n\n尔时见学无学二千人、闻佛授记，欢喜踊跃、而说偈言：世尊慧灯明，我闻授记音，心欢喜充满，如甘露见灌。\n\n【法师品第十】\n\n尔时世尊因药王菩萨、告八万大士：药王，汝见是大众中，无量诸天、龙王、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人与非人、及比丘、比丘尼、优婆塞、优婆夷、求声闻者，求辟支佛者，求佛道者，如是等类，咸于佛前、闻妙法华经一偈一句、乃至一念随喜者，我皆与授记，当得阿耨多罗三藐三菩提。\n\n药王，若有人问，何等众生，于未来世、当得作佛。应示、是诸人等，于未来世、必得作佛。何以故。若善男子、善女人，于法华经、乃至一句，受持、读诵、解说、书写，种种供养经卷，华、香、璎珞，末香、涂香、烧香，缯盖、幢幡，衣服、伎乐，合掌恭敬，是人、一切世间所应瞻奉，应以如来供养而供养之。当知此人是大菩萨，成就阿耨多罗三藐三菩提，哀愍众生，愿生此间，广演分别妙法华经。\n\n药王，在在处处，若说、若读、若诵、若书，若经卷所住处，皆应起七宝塔，极令高广严饰，不需复安舍利。所以者何。此中已有如来全身。此塔、应以一切华、香、璎珞，缯盖、幢幡，伎乐、歌颂，供养、恭敬，尊重、赞叹。若有人得见此塔，礼拜、供养，当知是等、皆近阿耨多罗三藐三菩提。\n\n【见宝塔品第十一】\n\n尔时佛前有七宝塔，高五百由旬，纵广二百五十由旬，从地涌出，住在空中，种种宝物而庄校之。五千栏楯，龛室千万，无数幢幡以为严饰，垂宝璎珞宝铃万亿而悬其上。四面皆出多摩罗跋栴檀之香，充遍世界。其诸幡盖，以金、银、琉璃、砗磲、玛瑙、真珠、玫瑰、七宝合成，高至四天王宫。三十三天、雨天曼陀罗华、供养宝塔。\n\n尔时宝塔中、出大音声，叹言：善哉善哉，释迦牟尼世尊，能以平等大慧教菩萨法、佛所护念、妙法华经、为大众说。如是如是，释迦牟尼世尊，如所说者，皆是真实。\n\n尔时多宝如来、于宝塔中、分半座与释迦牟尼佛，而作是言：释迦牟尼佛、可就此座。即时释迦牟尼佛入其塔中，坐其半座，结跏趺坐。尔时、大众见二如来在七宝塔中师子座上、结跏趺坐，各作是念：佛座高远，惟愿如来以神通力，令我等辈、俱处虚空。即时释迦牟尼佛、以神通力，接诸大众、皆在虚空。以大音声、普告四众：谁能于此娑婆国土、广说妙法华经，今正是时。如来不久当入涅槃，佛欲以此妙法华经、付嘱有在。\n\n【提婆达多品第十二】\n\n尔时佛告诸菩萨、及天人四众：吾于过去无量劫中，求法华经，无有懈倦。于多劫中、常作国王，发愿求于无上菩提，心不退转。为欲满足六波罗蜜，勤行布施，心无吝惜，象、马、七珍、国、城、妻、子，奴婢、仆从，头、目、髓、脑，身、肉、手、足，不惜躯命。\n\n佛告诸比丘：尔时王者，则我身是。时仙人者，今提婆达多是。由提婆达多善知识故，令我具足六波罗蜜，慈悲喜舍，三十二相，八十种好，紫磨金色，十力、四无所畏、四摄法、十八不共、神通道力，成等正觉，广度众生，皆因提婆达多善知识故。\n\n告诸四众：提婆达多却后过无量劫，当得成佛，号曰天王如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。世界名天道。时天王佛、住世二十中劫，广为众生说于妙法，恒河沙众生得阿罗汉果，无量众生发缘觉心，恒河沙众生发无上道心，得无生忍，至不退转。\n\n尔时龙女有一宝珠，价值三千大千世界，持以上佛。佛即受之。龙女谓智积菩萨、尊者舍利弗言：我献宝珠，世尊纳受，是事疾否？答言：甚疾。女言：以汝神力、观我成佛，复速于此。当时众会，皆见龙女、忽然之间、变成男子，具菩萨行，即往南方无垢世界，坐宝莲华，成等正觉，三十二相、八十种好，普为十方一切众生、演说妙法。\n\n【劝持品第十三】\n\n尔时药王菩萨摩诃萨、及大乐说菩萨摩诃萨、与二万菩萨眷属俱，皆于佛前、作是誓言：惟愿世尊不以为虑，我等于佛灭后，当奉持、读诵、说此经典。后恶世众生，善根转少，多增上慢，贪利供养，增不善根，远离解脱。虽难可教化，我等当起大忍力，读诵此经，持说、书写、种种供养、不惜身命。\n\n尔时世尊视八十万亿那由他诸菩萨摩诃萨。是诸菩萨，皆是阿惟越致，转不退法轮，得诸陀罗尼。即从座起，至于佛前，一心合掌，而作是念：若世尊告敕我等、持说此经者，当如佛教，广宣斯法。\n\n时诸菩萨敬顺佛意，并欲自满本愿，便于佛前、作师子吼，而发誓言：世尊，我等于如来灭后，周旋往返十方世界，能令众生书写此经，受持、读诵，解说其义，如法修行，正忆念，皆是佛之威力，惟愿世尊，在于他方、遥见守护。\n\n【安乐行品第十四】\n\n尔时文殊师利法王子菩萨摩诃萨、白佛言：世尊，是诸菩萨，甚为稀有，敬顺佛故，发大誓愿，于后恶世、护持读说是法华经。世尊，菩萨摩诃萨、于后恶世、云何能说是经。\n\n佛告文殊师利：若菩萨摩诃萨，于后恶世、欲说是经，当安住四法。一者、安住菩萨行处及亲近处，能为众生演说是经。\n\n文殊师利，云何名菩萨摩诃萨行处，若菩萨摩诃萨住忍辱地，柔和善顺、而不卒暴，心亦不惊，又复于法、无所行，而观诸法如实相，亦不行、不分别，是名菩萨摩诃萨行处。\n\n如来室者，一切众生中、大慈悲心是，如来衣者，柔和忍辱心是，如来座者，一切法空是，安住是中，然后以不懈怠心，为诸菩萨及四众、广说是法华经。\n\n【从地涌出品第十五】\n\n尔时他方国土诸来菩萨摩诃萨，过八恒河沙数，于大众中起，合掌作礼、而白佛言：世尊，若听我等、于佛灭后，在此娑婆世界，勤加精进，护持、读诵、书写、供养、是经典者，当于此土而广说之。尔时佛告诸菩萨摩诃萨众：止，善男子，不需汝等护持此经。所以者何。我娑婆世界、自有六万恒河沙等菩萨摩诃萨，一一菩萨、各有六万恒河沙眷属，是诸人等，能于我灭后、护持读诵广说此经。\n\n佛说是时，娑婆世界三千大千国土，地皆震裂，而于其中，有无量千万亿菩萨摩诃萨、同时涌出。是诸菩萨，身皆金色，三十二相，无量光明，先尽在此娑婆世界之下、此界虚空中住。\n\n是菩萨众中、有四导师，一、名上行，二、名无边行，三、名净行，四、名安立行，是四菩萨，于其众中、最为上首唱导之师。\n\n尔时世尊告弥勒菩萨：我今于此大众、宣告汝等，阿逸多，是诸大菩萨摩诃萨，无量无数阿僧祇、从地涌出，汝等昔所未见者，我于是娑婆世界、得阿耨多罗三藐三菩提已，教化示导是诸菩萨，调伏其心，令发道意。此诸菩萨，皆于是娑婆世界之下、此界虚空中住，于诸经典，读诵通利，思惟分别、正忆念。\n\n【如来寿量品第十六】\n\n尔时、佛告诸菩萨及一切大众：诸善男子，汝等当信解如来诚谛之语。复告大众：汝等当信解如来诚谛之语。又复告诸大众：汝等当信解如来诚谛之语。是时菩萨大众，弥勒为首，合掌白佛言：世尊，惟愿说之，我等当信受佛语。\n\n尔时世尊知诸菩萨三请不止，而告之言：汝等谛听，如来秘密神通之力。一切世间天、人、及阿修罗，皆谓，今释迦牟尼佛、出释氏宫，去伽耶城不远，坐于道场，得阿耨多罗三藐三菩提。然善男子，我实成佛已来、无量无边、百千万亿那由他劫。\n\n诸善男子，如来所演经典，皆为度脱众生，或说己身，或说他身，或示己身，或示他身，或示己事，或示他事，诸所言说，皆实不虚。如来如实知见三界之相，无有生死、若退若出，亦无在世、及灭度者，非实非虚，非如非异，不如三界、见于三界，如斯之事，如来明见，无有错谬。以诸众生有种种性、种种欲、种种行、种种忆想分别故，欲令生诸善根，以若干因缘、譬喻、言辞、种种说法，所作佛事，未曾暂废。如是，我成佛已来、甚大久远，寿命无量阿僧祇劫，常住不灭。\n\n诸善男子，我本行菩萨道、所成寿命，今犹未尽，复倍上数。然今非实灭度，而便唱言、当取灭度，如来以是方便、教化众生。所以者何。若佛久住于世，薄德之人，不种善根，贫穷下贱，贪著五欲，入于忆想妄见网中，若见如来常在不灭，便起憍恣、而怀厌怠，不能生难遭之想、恭敬之心，是故如来以方便说。\n\n譬如良医，智慧聪达，明练方药，善治众病。其人多诸子息，若十、二十、乃至百数，以有事缘，远至余国。诸子于后、饮他毒药，药发、闷乱，宛转于地。是时其父还来归家，诸子饮毒，或失本心，或不失者，遥见其父，皆大欢喜，拜跪、问讯、善安隐归：我等愚痴，误服毒药，愿见救疗，更赐寿命。父见子等苦恼如是，依诸经方，求好药草，色香美味、皆悉具足，捣筛和合，与子令服。其诸子中、不失心者，见此良药、色香俱好，即便服之，病尽除愈。余失心者，见其父来，虽亦欢喜问讯，求索治病，然与其药、而不肯服。父作是念：此子可愍，为毒所中，心皆颠倒，虽见我喜，求索救疗，如是好药、而不肯服，我今当设方便、令服此药。即作是言：汝等当知，我今衰老，死时已至，是好良药，今留在此，汝可取服，勿忧不瘥。作是教已，复至他国，遣使还告：汝父已死。是时诸子闻父背丧，心大忧恼，而作是念：若父在者，慈愍我等，能见救护，今者、舍我远丧他国。自惟孤露，无复恃怙，常怀悲感，心遂醒悟，乃知此药色味香美。即取服之，毒病皆愈。其父闻子悉已得瘥，寻便来归，咸使见之。\n\n诸善男子，于意云何，颇有人、能说此良医虚妄罪否？不也，世尊。佛言：我亦如是，成佛已来、无量无边百千万亿那由他阿僧祇劫，为众生故，以方便力、言当灭度，亦无有能如法说我虚妄过者。\n\n【分别功德品第十七】\n\n尔时大会、闻佛说寿命劫数长远如是，无量无边阿僧祇众生、得大饶益。于时世尊告弥勒菩萨摩诃萨：阿逸多，我说是如来寿命长远时，六百八十万亿那由他恒河沙众生、得无生法忍，复有千倍菩萨摩诃萨、得闻持陀罗尼门，复有一世界微尘数菩萨摩诃萨、得乐说无碍辩才。\n\n阿逸多，若有闻佛寿命长远，解其言趣，是人所得功德、无有限量，能起如来无上之慧。何况广闻是经、若教人闻，若自持、若教人持，若自书、若教人书，若以华、香、璎珞，幢幡、缯盖，香油、酥灯，供养经卷，是人功德、无量无边，能生一切种智。\n\n阿逸多，若我灭后，闻是经典，有能受持，若自书、若教人书，则为起立僧坊，以赤栴檀、作诸殿堂三十有二，高八多罗树，高广严好，百千比丘、于其中止，园林、浴池，经行、禅窟，衣服、饮食，床褥、汤药，一切乐具、充满其中。\n\n【随喜功德品第十八】\n\n尔时、弥勒菩萨摩诃萨白佛言：世尊，若有善男子、善女人，闻是法华经、随喜者，得几所福。\n\n尔时佛告弥勒菩萨摩诃萨：阿逸多，如来灭后，若比丘、比丘尼、优婆塞、优婆夷，及余智者、若长若幼，闻是经、随喜已，从法会出，至于余处，若在僧坊，若空闲地，若城邑、巷陌、聚落、田里，如其所闻，为父母、宗亲、善友、知识、随力演说，是诸人等，闻已、随喜，复行转教，余人闻已，亦随喜转教，如是展转、至第五十。\n\n若四百万亿阿僧祇世界六趣四生众生，卵生、胎生、湿生、化生，若有形、无形，有想、无想，非有想、非无想，无足、二足、四足、多足、如是等、在众生数者，有人求福，随其所欲娱乐之具、皆给与之，一一众生、与满阎浮提金、银、琉璃、砗磲、玛瑙、珊瑚、琥珀、诸妙珍宝，及象、马、车乘，七宝所成宫殿楼阁等，是大施主、如是布施、满八十年已，而作是念：我已施众生娱乐之具、随意所欲，然此众生、皆已衰老，年过八十，发白、面皱，将死不久，我当以佛法而训导之。即集此众生，宣布法化，示教利喜，一时皆得须陀洹道、斯陀含道、阿那含道、阿罗汉道，尽诸有漏，于深禅定、皆得自在，具八解脱。\n\n佛告弥勒：我今分明语汝，是人以一切乐具、施于四百万亿阿僧祇世界六趣众生，又令得阿罗汉果，所得功德，不如是第五十人闻法华经一偈、随喜功德，百分、千分、百千万亿分、不及其一，乃至算数譬喻所不能知。\n\n【法师功德品第十九】\n\n尔时佛告常精进菩萨摩诃萨：若善男子、善女人，受持是法华经，若读、若诵，若解说、若书写，是人当得八百眼功德、千二百耳功德、八百鼻功德、千二百舌功德、八百身功德、千二百意功德，以是功德、庄严六根，皆令清净。是善男子、善女人，父母所生清净肉眼，见于三千大千世界、内外所有山林河海，下至阿鼻地狱，上至有顶，亦见其中一切众生，及业因缘、果报生处，悉见悉知。\n\n复次、常精进，若善男子、善女人，受持此经，若读、若诵，若解说、若书写，得千二百耳功德。以是清净耳，闻三千大千世界，下至阿鼻地狱，上至有顶，其中内外种种语言音声。\n\n复次、常精进，若善男子、善女人，受持是经，若读、若诵，若解说，若书写，成就八百鼻功德。以是清净鼻根，闻于三千大千世界、上下内外种种诸香。\n\n复次、常精进，若善男子、善女人，受持是经，若读、若诵，若解说、若书写，得千二百舌功德。若好、若丑，若美、不美，及诸苦涩物，在其舌根，皆变成上味，如天甘露，无不美者。若以舌根、于大众中有所演说，出深妙声，能入其心，皆令欢喜快乐。\n\n复次、常精进，若善男子、善女人，受持是经，若读、若诵，若解说，若书写，得八百身功德。得清净身、如净琉璃，众生喜见。其身净故，三千大千世界众生，生时、死时，上下、好丑，生善处、恶处，悉于中现。\n\n复次、常精进，若善男子、善女人，如来灭后、受持是经，若读、若诵，若解说，若书写，得千二百意功德。以是清净意根，乃至闻一偈一句，通达无量无边之义，解是义已，能演说一句一偈、至于一月、四月、乃至一岁，诸所说法，随其义趣，皆与实相不相违背。\n\n【常不轻菩萨品第二十】\n\n尔时佛告得大势菩萨摩诃萨：汝今当知，若比丘、比丘尼、优婆塞、优婆夷、持法华经者，若有恶口、骂詈诽谤，获大罪报，如前所说，其所得功德，如向所说、眼耳鼻舌身意清净。\n\n得大势，乃往古昔，过无量无边不可思议阿僧祇劫，有佛、名威音王如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。最初威音王如来、既已灭度，正法灭后，于像法中，增上慢比丘有大势力。尔时有一菩萨比丘、名常不轻，得大势以何因缘、名常不轻，是比丘、凡有所见，若比丘、比丘尼、优婆塞、优婆夷，皆悉礼拜赞叹、而作是言：我深敬汝等，不敢轻慢。所以者何。汝等皆行菩萨道，当得作佛。而是比丘、不专读诵经典，但行礼拜，乃至远见四众，亦复故往礼拜赞叹、而作是言：我不敢轻于汝等，汝等皆当作佛。四众之中，有生嗔恚、心不净者，恶口骂詈言：是无智比丘、从何所来？自言我不轻汝，而与我等授记，当得作佛，我等不用如是虚妄授记。如此经历多年，常被骂詈，不生嗔恚，常作是言：汝当作佛。\n\n是比丘、临欲终时，于虚空中，具闻威音王佛、先所说法华经二十千万亿偈，悉能受持，即得如上眼根清净、耳鼻舌身意根清净。得是六根清净已，更增寿命二百万亿那由他岁，广为人说是法华经。\n\n得大势，是常不轻菩萨摩诃萨、供养如是若干诸佛，恭敬、尊重、赞叹、种诸善根，于后复值千万亿佛，亦于诸佛法中、说是经典，功德成就，当得作佛。得大势，于意云何，尔时常不轻菩萨、岂异人乎，则我身是。\n\n【如来神力品第二十一】\n\n尔时千世界微尘等菩萨摩诃萨、从地涌出者，皆于佛前、一心合掌，瞻仰尊颜，而白佛言：世尊，我等于佛灭后，世尊分身所在国土、灭度之处，当广说此经，所以者何。我等亦自欲得是真净大法，受持、读诵、解说、书写、而供养之。\n\n尔时世尊于文殊师利等、无量百千万亿旧住娑婆世界菩萨摩诃萨，及诸比丘、比丘尼、优婆塞、优婆夷、天龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人、等，一切众前，现大神力，出广长舌上至梵世，一切毛孔、放于无量无数色光，皆悉遍照十方世界。\n\n尔时佛告上行等菩萨大众：诸佛神力，如是无量无边、不可思议，若我以是神力，于无量无边百千万亿阿僧祇劫，为嘱累故、说此经功德，犹不能尽。以要言之，如来一切所有之法，如来一切自在神力，如来一切所秘要之藏，如来一切甚深之事，皆于此经、宣示显说。是故汝等于如来灭后，应一心受持、读诵、解说、书写、如说修行。所在国土，若有受持、读诵、解说、书写、如说修行，若经卷所住处，若于园中，若于林中，若于树下，若于僧坊，若白衣舍，若在殿堂，若山谷旷野，是中皆应起塔供养。所以者何。当知是处、即是道场，诸佛于此、得阿耨多罗三藐三菩提，诸佛于此、转于法轮，诸佛于此、而般涅槃。\n\n【嘱累品第二十二】\n\n尔时释迦牟尼佛从法座起，现大神力，以右手摩无量菩萨摩诃萨顶，而作是言：我于无量百千万亿阿僧祇劫、修习是难得阿耨多罗三藐三菩提法，今以付嘱汝等，汝等应当一心流布此法，广令增益。如是三摩诸菩萨摩诃萨顶、而作是言：我于无量百千万亿阿僧祇劫、修习是难得阿耨多罗三藐三菩提法，今以付嘱汝等，汝等当受持、读诵、广宣此法，令一切众生、普得闻知。所以者何。如来有大慈悲，无诸悭吝，亦无所畏，能与众生、佛之智慧、如来智慧、自然智慧，如来是一切众生之大施主。汝等亦应随学如来之法，勿生悭吝，于未来世，若有善男子、善女人、信如来智慧者，当为演说此法华经，使得闻知，为令其人得佛慧故。若有众生不信受者，当于如来余深法中、示教利喜，汝等若能如是，则为已报诸佛之恩。\n\n【药王菩萨本事品第二十三】\n\n尔时宿王华菩萨白佛言：世尊，药王菩萨、云何游于娑婆世界，世尊，是药王菩萨、有若干百千万亿那由他难行苦行，善哉、世尊，愿少解说。\n\n尔时佛告宿王华菩萨：乃往过去无量恒河沙劫，有佛、号日月净明德如来。是一切众生喜见菩萨，乐习苦行，于日月净明德佛法中、精进经行，一心求佛、满万二千岁已，得现一切色身三昧。得此三昧已，心大欢喜，即作念言，我得现一切色身三昧，皆是得闻法华经力，我今当供养日月净明德佛、及法华经。\n\n作是供养已，从三昧起，而自念言：我虽以神力供养于佛，不如以身供养。即服诸香，栴檀、薰陆、兜楼婆、毕力迦、沉水、胶香，又饮瞻卜诸华香油，满千二百岁已，香油涂身，于日月净明德佛前，以天宝衣而自缠身，灌诸香油，以神通力愿、而自燃身，光明遍照八十亿恒河沙世界。其中诸佛、同时赞言：善哉、善哉，善男子，是真精进，是名真法供养如来。\n\n尔时一切众生喜见菩萨见佛灭度，悲感、懊恼，恋慕于佛，即以海此岸栴檀为柴、供养佛身，而以烧之。火灭已后，收取舍利，作八万四千宝瓶、以起八万四千塔，高三世界，表刹庄严，垂诸幡盖，悬众宝铃。\n\n尔时一切众生喜见菩萨复自念言：我虽作是供养，心犹未足，我今当更供养舍利。便语诸菩萨大弟子、及天龙、夜叉、等一切大众：汝等当一心念，我今供养日月净明德佛舍利。作是语已，即于八万四千塔前，燃百福庄严臂七万二千岁、而以供养，令无数求声闻众、无量阿僧祇人、发阿耨多罗三藐三菩提心，皆使得住现一切色身三昧。\n\n佛告宿王华菩萨：于汝意云何，一切众生喜见菩萨，岂异人乎，今药王菩萨是也，其所舍身布施，如是无量百千万亿那由他数。\n\n【妙音菩萨品第二十四】\n\n尔时释迦牟尼佛放大人相、肉髻光明，及放眉间白毫相光，遍照东方百八万亿那由他恒河沙等诸佛世界。过是数已，有世界、名净光庄严，其国有佛，号净华宿王智如来，为无量无边菩萨大众恭敬围绕、而为说法，释迦牟尼佛白毫光明遍照其国。\n\n尔时一切净光庄严国中，有一菩萨、名曰妙音，久已植众德本，供养亲近无量百千万亿诸佛，而悉成就甚深智慧，得妙幢相三昧、法华三昧、净德三昧，乃至得如是等百千万亿恒河沙等诸大三昧。\n\n华德，汝但见妙音菩萨、其身在此，而是菩萨、现种种身，处处为诸众生说是经典，或现梵王身，或现帝释身，或现自在天身，或现大自在天身，或现天大将军身，或现毗沙门天王身，或现转轮圣王身，或现诸小王身，或现长者身，或现居士身，或现宰官身，或现婆罗门身，或现比丘、比丘尼、优婆塞、优婆夷身，或现长者居士妇女身，或现宰官妇女身，或现婆罗门妇女身，或现童男童女身，或现天龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人、等身，而说是经。诸有地狱、饿鬼、畜生、及众难处，皆能救济，乃至于王后宫，变为女身、而说是经。\n\n华德，是妙音菩萨，能救护娑婆世界诸众生者，是妙音菩萨如是种种变化现身，在此娑婆国土，为诸众生说是经典，于神通、变化、智慧、无所损减。\n\n【观世音菩萨普门品第二十五】\n\n尔时无尽意菩萨、即从座起，偏袒右肩，合掌向佛、而作是言：世尊，观世音菩萨、以何因缘、名观世音。佛告无尽意菩萨：善男子，若有无量百千万亿众生、受诸苦恼，闻是观世音菩萨，一心称名，观世音菩萨即时观其音声，皆得解脱。若有持是观世音菩萨名者，设入大火，火不能烧，由是菩萨威神力故。若为大水所漂，称其名号，即得浅处。若有百千万亿众生，为求金、银、琉璃、砗磲、玛瑙、珊瑚、琥珀、真珠、等宝，入于大海，假使黑风吹其船舫、飘堕罗刹鬼国，其中若有乃至一人、称观世音菩萨名者，是诸人等，皆得解脱罗刹之难。以是因缘，名观世音。\n\n若复有人、临当被害，称观世音菩萨名者，彼所执刀杖、寻段段坏，而得解脱。若三千大千国土，满中夜叉、罗刹，欲来恼人，闻其称观世音菩萨名者，是诸恶鬼、尚不能以恶眼视之，况复加害。设复有人，若有罪、若无罪，杻械、枷锁、检系其身，称观世音菩萨名者，皆悉断坏，即得解脱。若三千大千国土、满中怨贼，有一商主，将诸商人，赍持重宝、经过险路，其中一人、作是唱言：诸善男子、勿得恐怖，汝等应当一心称观世音菩萨名号，是菩萨能以无畏施于众生，汝等若称名者，于此怨贼、当得解脱。众商人闻，俱发声言：南无观世音菩萨。称其名故，即得解脱。\n\n无尽意，观世音菩萨摩诃萨威神之力、巍巍如是。若有众生、多于淫欲，常念恭敬观世音菩萨，便得离欲。若多嗔恚，常念恭敬观世音菩萨，便得离嗔。若多愚痴，常念恭敬观世音菩萨，便得离痴。\n\n无尽意，若有人、受持六十二亿恒河沙菩萨名字，复尽形供养饮食、衣服、卧具、医药，于汝意云何，是善男子、善女人、功德多否。无尽意言：甚多，世尊。佛言：若复有人、受持观世音菩萨名号，乃至一时礼拜、供养，是二人福，正等无异，于百千万亿劫、不可穷尽，无尽意，受持观世音菩萨名号，得如是无量无边福德之利。\n\n佛告无尽意菩萨：善男子，若有国土众生、应以佛身得度者，观世音菩萨即现佛身而为说法。应以辟支佛身得度者，即现辟支佛身而为说法。应以声闻身得度者，即现声闻身而为说法。应以梵王身得度者，即现梵王身而为说法。应以帝释身得度者，即现帝释身而为说法。应以自在天身得度者，即现自在天身而为说法。应以大自在天身得度者，即现大自在天身而为说法。应以天大将军身得度者，即现天大将军身而为说法。应以毗沙门身得度者，即现毗沙门身而为说法。应以小王身得度者，即现小王身而为说法。应以长者身得度者，即现长者身而为说法。应以居士身得度者，即现居士身而为说法。应以宰官身得度者，即现宰官身而为说法。应以婆罗门身得度者，即现婆罗门身而为说法。应以比丘、比丘尼、优婆塞、优婆夷身得度者，即现比丘、比丘尼、优婆塞、优婆夷身而为说法。应以长者、居士、宰官、婆罗门妇女身得度者，即现妇女身而为说法。应以童男、童女身得度者，即现童男、童女身而为说法。应以天龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人、等身、得度者，即皆现之而为说法。应以执金刚神得度者，即现执金刚神而为说法。\n\n无尽意，是观世音菩萨成就如是功德，以种种形、游诸国土，度脱众生，是故汝等应当一心供养观世音菩萨。是观世音菩萨摩诃萨，于怖畏急难之中、能施无畏，是故此娑婆世界、皆号之为施无畏者。\n\n具足神通力，广修智方便，十方诸国土，无刹不现身。种种诸恶趣，地狱鬼畜生，生老病死苦，以渐悉令灭。真观清净观，广大智慧观，悲观及慈观，常愿常瞻仰。无垢清净光、慧日破诸闇，能伏灾风火，普明照世间。悲体戒雷震，慈意妙大云，澍甘露法雨，灭除烦恼焰。诤讼经官处，怖畏军阵中，念彼观音力，众怨悉退散。妙音观世音、梵音海潮音，胜彼世间音，是故须常念，念念勿生疑。观世音净圣，于苦恼死厄、能为作依怙。具一切功德，慈眼视众生，福聚海无量，是故应顶礼。\n\n【陀罗尼品第二十六】\n\n尔时药王菩萨、即从座起，偏袒右肩，合掌向佛、而白佛言：世尊，若善男子、善女人，有能受持法华经者。若读诵通利，若书写经卷，得几所福。佛告药王：若有善男子、善女人，供养八百万亿那由他恒河沙等诸佛，于汝意云何，其所得福、宁为多否。甚多，世尊。佛言：若善男子、善女人，能于是经，乃至受持一四句偈，读诵、解义，如说修行，功德甚多。\n\n尔时药王菩萨白佛言：世尊，我今当与说法者陀罗尼咒、以守护之。即说咒曰：\n\n安尔 曼尔 摩祢 摩摩祢 旨隶 遮梨第 赊□ 赊履多玮 膻帝 目帝 目多履 娑履 阿玮娑覆 桑履 娑履 叉裔 阿叉裔 阿耆腻 膻帝 赊履 陀罗尼 阿卢伽婆娑簸蔗毗叉腻 祢毗剃 阿便哆逻祢履剃 阿亶哆波隶输地 沤究隶 牟究隶 阿罗隶 波罗隶 首迦差 阿三磨三履 佛驮毗吉利□帝 达磨波利差帝 僧伽涅瞿沙祢 婆舍婆舍输地 曼哆逻 曼哆逻叉夜多 邮楼哆 邮楼哆憍舍略 恶叉逻 恶叉冶多冶 阿婆卢 阿磨若那多夜\n\n世尊，是陀罗尼神咒，六十二亿恒河沙等诸佛所说，若有侵毁此法师者，则为侵毁是诸佛已。\n\n【妙庄严王本事品第二十七】\n\n尔时佛告诸大众：乃往古世、过无量无边不可思议阿僧祇劫，有佛、名云雷音宿王华智、多陀阿伽度、阿罗诃、三藐三佛陀，国名光明庄严，劫名喜见。\n\n彼佛法中有王，名妙庄严，其王夫人、名曰净德，有二子，一名净藏，二名净眼。是二子、有大神力，福德智慧，久修菩萨所行之道。\n\n尔时二子、涌在虚空，高七多罗树，现种种神变，于虚空中、行住坐卧，身上出水、身下出火，身下出水、身上出火，或现大身满虚空中，而复现小，小复现大，于空中灭，忽然在地，入地如水，履水如地，现如是等种种神变，令其父王心净信解。时父见子神力如是，心大欢喜，得未曾有，合掌向子言：汝等、师为是谁，谁之弟子。二子白言：大王，彼云雷音宿王华智佛，今在七宝菩提树下、法座上坐，于一切世间天人众中、广说法华经，是我等师，我是弟子。\n\n尔时妙庄严王、与群臣眷属俱，净德夫人、与后宫婇女眷属俱，其王二子、与四万二千人俱，一时共诣佛所，到已，头面礼足，绕佛三匝，却住一面。\n\n尔时彼佛为王说法，示教利喜，王大欢悦。\n\n佛告大众：于意云何，妙庄严王、岂异人乎，今华德菩萨是。其净德夫人，今佛前光照庄严相菩萨是，哀愍妙庄严王及诸眷属故，于彼中生。其二子者，今药王菩萨、药上菩萨是，是药王药上菩萨、成就如此诸大功德，已于无量百千万亿诸佛所、植众德本，成就不可思议诸善功德，若有人、识是二菩萨名字者，一切世间诸天人民、亦应礼拜。\n\n【普贤菩萨劝发品第二十八】\n\n尔时普贤菩萨、以自在神通力，威德名闻，与大菩萨无量无边不可称数、从东方来，所经诸国，普皆震动，雨宝莲华，作无量百千万亿种种伎乐。又与无数诸天、龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人、等，大众围绕，各现威德神通之力。到娑婆世界、耆阇崛山中，头面礼释迦牟尼佛，右绕七匝，白佛言：世尊，我于宝威德上王佛国，遥闻此娑婆世界、说法华经，与无量无边百千万亿诸菩萨众、共来听受，惟愿世尊当为说之，若善男子、善女人，于如来灭后，云何能得是法华经。\n\n佛告普贤菩萨：若善男子、善女人，成就四法，于如来灭后，当得是法华经，一者、为诸佛护念，二者、植众德本，三者、入正定聚，四者、发救一切众生之心，善男子、善女人，如是成就四法，于如来灭后，必得是经。\n\n尔时普贤菩萨白佛言：世尊，于后五百岁、浊恶世中，其有受持是经典者，我当守护，除其衰患，令得安隐，使无伺求、得其便者，若魔、若魔子、若魔女、若魔民、若为魔所著者、若夜叉、若罗刹、若鸠槃荼、若毗舍阇、若吉遮、若富单那、若韦陀罗、等，诸恼人者，皆不得便。是人若行、若立、读诵此经，我尔时乘六牙白象王，与大菩萨众、俱诣其所，而自现身，供养守护，安慰其心，亦为供养法华经故。\n\n尔时释迦牟尼佛赞言：善哉、善哉，普贤，汝能护助是经，令多所众生、安乐利益，汝已成就不可思议功德、深大慈悲，从久远来，发阿耨多罗三藐三菩提意，而能作是神通之愿，守护是经，我当以神通力，守护能受持普贤菩萨名者。\n\n普贤，若有受持、读诵，正忆念，修习书写是法华经者，当知是人、则见释迦牟尼佛，如从佛口、闻此经典，当知是人、供养释迦牟尼佛，当知是人、佛赞善哉，当知是人、为释迦牟尼佛手摩其头，当知是人、为释迦牟尼佛衣之所覆，如是之人，不复贪著世乐，不好外道经书、手笔，亦复不喜亲近其人、及诸恶者，若屠儿、若畜猪羊鸡狗、若猎师、若炫卖女色，是人心意质直，有正忆念，有福德力，是人不为三毒所恼，亦复不为嫉妒、我慢、邪慢、增上慢、所恼，是人少欲知足，能修普贤之行。\n\n说是普贤劝发品时、恒河沙等无量无边菩萨、得百千万亿旋陀罗尼，三千大千世界微尘等诸菩萨、具普贤道。佛说是经时，普贤等、诸菩萨，舍利弗等、诸声闻，及诸天、龙、人非人、等，一切大会，皆大欢喜，受持佛语，作礼而去。\n\n【后序】\n后秦沙门僧睿述\n\n法华经者，诸佛之秘藏，众经之实体也。以华为名者，照其本也；称芬陀利者，美其盛也。所兴既玄，其旨甚婉；自非达识传之，罕有得其门者。夫百卉药木之英，物实之本也；八万四千法藏者，道果之原也，故以喻焉。\n\n诸华之中，莲华最胜，华尚未敷，名屈摩罗；敷而将落，名迦摩罗；处中盛时，名芬陀利。未敷喻二道，将落譬泥洹，荣曜独足以喻斯典，至如般若诸经，深无不极，故道者以之而归；大无不该，故乘者以之而济；然其大略，皆以适化为大；应务之门，不得不以善权为用。权之为化，悟物虽弘，于实体不足，皆属法华，固其宜矣。\n\n经流兹土，虽复垂及百年，译者昧其虚津，灵关莫之或启；谈者乖其准格，幽踪罕得而履；徒复搜研皓首，并未有窥其门者。秦司隶校尉左将军安城侯姚嵩，拟韵玄门，宅心世表，注诚斯典，信诣弥至，每思寻其文，深识译者之失。既遇鸠摩罗法师，为之传写，指其大归真，若披重霄而高蹈，登昆仑而俯盻矣。于时听受领悟之僧八百余人。皆是诸方英秀，一时之杰也。是岁弘始八年。岁次鹑火。\n","sourceUrl":"https://www.fojingzaixian.com/fahuajing.html","audios":[{"title":"妙法莲华经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/fahuajing.html"}],"teachAudios":[{"title":"法华经讲经开示","url":""}]},{"id":"puxianxingyuanpin","title":"普贤行愿品","fullTitle":"大方广佛华严经普贤菩萨行愿品","category":"华严","summary":"普贤菩萨十大行愿，礼敬、称赞、供养、忏悔……回向众生。","explanation":"《普贤行愿品》是华严经的精髓，以十大愿王涵摄一切菩萨行。每日持诵，以礼敬诸佛、称赞如来、广修供养、忏悔业障、随喜功德……回向一切，是发大心的入门修行。","fullText":"大方广佛华严经普贤行愿品\n唐罽宾国三藏般若奉诏译\n\n尔时，普贤菩萨摩诃萨，称赞如来胜功德已，告诸菩萨及善财言：\n善男子！如来功德，假使十方一切诸佛，经不可说不可说佛刹极微尘数劫，相续演说，不可穷尽！\n若欲成就此功德门，应修十种广大行愿。何等为十？\n\n一者、礼敬诸佛。\n二者、称赞如来。\n三者、广修供养。\n四者、忏悔业障。\n五者、随喜功德。\n六者、请转法轮。\n七者、请佛住世。\n八者、常随佛学。\n九者、恒顺众生。\n十者、普皆回向。\n\n善财白言：大圣！云何礼敬乃至回向？\n\n普贤菩萨告善财言：\n\n善男子！言礼敬诸佛者，所有尽法界、虚空界，十方三世一切佛刹，极微尘数诸佛世尊，\n我以普贤行愿力故，深心信解，如对目前，悉以清净身语意业，常修礼敬。\n一一佛所，皆现不可说不可说佛刹极微尘数身。\n一一身，遍礼不可说不可说佛刹极微尘数佛。\n虚空界尽，我礼乃尽，以虚空界不可尽故，我此礼敬无有穷尽。\n如此乃至众生界尽，众生业尽，众生烦恼尽，我礼乃尽，\n而众生界乃至烦恼无有尽故，我此礼敬无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言称赞如来者，所有尽法界、虚空界，十方三世一切刹土，\n所有极微一一尘中，皆有一切世间极微尘数佛；一一佛所，皆有菩萨海会围绕。\n我当悉以甚深胜解，现前知见，各以出过辩才天女微妙舌根，\n一一舌根，出无尽音声海，一一音声，出一切言辞海，称扬赞叹一切如来诸功德海。\n穷未来际，相续不断，尽于法界，无不周遍。\n如是虚空界尽，众生界尽，众生业尽，众生烦恼尽，我赞乃尽，\n而虚空界乃至烦恼，无有尽故，我此赞叹无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言广修供养者，所有尽法界、虚空界，十方三世一切佛刹极微尘中，\n一一各有一切世界极微尘数佛，一一佛所，种种菩萨海会围绕。\n我以普贤行愿力故，起深信解，现前知见，悉以上妙诸供养具而为供养。\n所谓华云、鬘云、天音乐云、天伞盖云、天衣服云、天种种香、涂香、烧香、末香，\n如是等云，一一量如须弥山王。\n然种种灯，酥灯、油灯，诸香油灯，一一灯柱如须弥山，一一灯油如大海水。\n以如是等诸供养具，常为供养。\n\n善男子！诸供养中，法供养最。\n所谓如说修行供养，利益众生供养，摄受众生供养，代众生苦供养，\n勤修善根供养，不舍菩萨业供养，不离菩提心供养。\n善男子！如前供养无量功德，比法供养一念功德，百分不及一，千分不及一，\n百千俱胝那由他分、迦罗分、算分、数分、喻分、优波尼沙陀分，亦不及一。\n何以故？以诸如来尊重法故，以如说行，出生诸佛故。\n若诸菩萨行法供养，则得成就供养如来，如是修行，是真供养故。\n此广大最胜供养，虚空界尽，众生界尽，众生业尽，众生烦恼尽，我供乃尽，\n而虚空界乃至烦恼不可尽故，我此供养亦无有尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言忏悔业障者，菩萨自念：\n我于过去无始劫中，由贪嗔痴，发身口意，作诸恶业，无量无边。\n若此恶业有体相者，尽虚空界不能容受。\n我今悉以清净三业，遍于法界极微尘刹一切诸佛菩萨众前，诚心忏悔，后不复造，恒住净戒一切功德。\n如是虚空界尽，众生界尽，众生业尽，众生烦恼尽，我忏乃尽，\n而虚空界乃至众生烦恼不可尽故，我此忏悔无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言随喜功德者，所有尽法界、虚空界，十方三世一切佛刹极微尘数诸佛如来，\n从初发心，为一切智，勤修福聚，不惜身命，经不可说不可说佛刹极微尘数劫，\n一一劫中，舍不可说不可说佛刹极微尘数头目手足。\n如是一切难行苦行，圆满种种波罗蜜门，证入种种菩萨智地，成就诸佛无上菩提及般涅槃，\n分布舍利，所有善根，我皆随喜。\n及彼十方一切世界，六趣四生，一切种类，所有功德，乃至一尘，我皆随喜。\n十方三世一切声闻及辟支佛，有学无学，所有功德，我皆随喜。\n一切菩萨所修无量难行苦行，志求无上正等菩提，广大功德，我皆随喜。\n如是虚空界尽，众生界尽，众生业尽，众生烦恼尽，我此随喜，无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言请转法轮者，所有尽法界、虚空界，十方三世一切佛刹极微尘中，\n一一各有不可说不可说佛刹极微尘数广大佛刹。\n一一刹中，念念有不可说不可说佛刹极微尘数一切诸佛成等正觉，一切菩萨海会围绕。\n而我悉以身口意业，种种方便，殷勤劝请，转妙法轮。\n如是虚空界尽，众生界尽，众生业尽，众生烦恼尽，我常劝请一切诸佛，转正法轮，无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言请佛住世者，所有尽法界、虚空界，十方三世一切佛刹极微尘数诸佛如来，\n将欲示现般涅槃者，及诸菩萨、声闻、缘觉，有学无学，乃至一切诸善知识，\n我悉劝请莫入涅槃，经于一切佛刹极微尘数劫，为欲利乐一切众生。\n如是虚空界尽，众生界尽，众生业尽，众生烦恼尽，我此劝请，无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言常随佛学者，如此娑婆世界毗卢遮那如来，从初发心，精进不退，\n以不可说不可说身命而为布施。剥皮为纸，析骨为笔，刺血为墨，书写经典，积如须弥。\n为重法故，不惜身命，何况王位、城邑、聚落、宫殿、园林，一切所有，及余种种难行苦行，\n乃至树下成大菩提，示种种神通，起种种变化，现种种佛身，处种种众会，\n或处一切诸大菩萨众会道场，或处声闻及辟支佛众会道场，\n或处转轮圣王、小王眷属众会道场，或处刹利及婆罗门、长者、居士众会道场，\n乃至或处天龙八部、人非人等众会道场。\n处于如是种种众会，以圆满音，如大雷震，随其乐欲，成熟众生，乃至示现入于涅槃，\n如是一切，我皆随学。\n如今世尊毗卢遮那，如是尽法界、虚空界，十方三世一切佛刹所有尘中一切如来，皆亦如是，\n于念念中，我皆随学。\n如是虚空界尽，众生界尽，众生业尽，众生烦恼尽，我此随学，无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言恒顺众生者，谓尽法界、虚空界，十方刹海所有众生，种种差别。\n所谓卵生、胎生、湿生、化生；\n或有依于地、水、火、风而生住者；或有依空及诸卉木而生住者，\n种种生类，种种色身，种种形状，种种相貌，种种寿量，种种族类，\n种种名号，种种心性，种种知见，种种欲乐，种种意行，种种威仪，种种衣服，种种饮食，\n处于种种村营、聚落、城邑、宫殿。\n乃至一切天龙八部、人非人等，无足、二足、四足、多足、有色、无色、有想、无想、非有想、非无想，\n如是等类，我皆于彼，随顺而转。\n种种承事，种种供养，如敬父母，如奉师长及阿罗汉，乃至如来，等无有异。\n于诸病苦，为作良医；于失道者，示其正路；于闇夜中，为作光明；于贫穷者，令得伏藏。\n菩萨如是平等饶益一切众生。\n\n何以故？菩萨若能随顺众生，则为随顺供养诸佛。\n若于众生尊重承事，则为尊重承事如来。\n若令众生生欢喜者，则令一切如来欢喜。\n何以故？诸佛如来以大悲心而为体故。\n因于众生，而起大悲；因于大悲，生菩提心；因菩提心，成等正觉。\n\n譬如旷野砂碛之中，有大树王，若根得水，枝叶华果悉皆繁茂。\n生死旷野菩提树王，亦复如是。\n一切众生而为树根，诸佛菩萨而为华果，以大悲水饶益众生，则能成就诸佛菩萨智慧华果。\n何以故？若诸菩萨以大悲水饶益众生，则能成就阿耨多罗三藐三菩提故。\n是故菩提属于众生，若无众生，一切菩萨终不能成无上正觉。\n\n善男子！汝于此义，应如是解。\n以于众生心平等故，则能成就圆满大悲。\n以大悲心随众生故，则能成就供养如来。\n菩萨如是随顺众生，虚空界尽，众生界尽，众生业尽，众生烦恼尽，我此随顺无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n复次，善男子！言普皆回向者，从初礼拜乃至随顺所有功德，皆悉回向，尽法界、虚空界一切众生。\n愿令众生，常得安乐，无诸病苦。欲行恶法，皆悉不成。所修善业，皆速成就。\n关闭一切诸恶趣门，开示人天涅槃正路。\n若诸众生，因其积集诸恶业故，所感一切极重苦果，我皆代受，令彼众生，悉得解脱，\n究竟成就无上菩提。\n菩萨如是所修回向，虚空界尽，众生界尽，众生业尽，众生烦恼尽，我此回向，无有穷尽。\n念念相续，无有间断，身语意业，无有疲厌。\n\n善男子！是为菩萨摩诃萨十种大愿，具足圆满。\n若诸菩萨，于此大愿，随顺趣入，则能成熟一切众生，\n则能随顺阿耨多罗三藐三菩提，则能成满普贤菩萨诸行愿海。\n\n是故善男子！汝于此义，应如是知。\n若有善男子、善女人，以满十方无量无边不可说不可说佛刹极微尘数一切世界，上妙七宝，\n及诸人天最胜安乐，布施尔所一切世界所有众生，供养尔所一切世界诸佛菩萨，\n经尔所佛刹极微尘数劫，相续不断，所得功德；\n若复有人，闻此愿王，一经于耳，所有功德，比前功德，百分不及一，千分不及一，\n乃至优波泥沙陀分亦不及一。\n\n或复有人，以深信心，于此大愿，受持读诵，乃至书写一四句偈，速能除灭五无间业。\n所有世间身心等病，种种苦恼，乃至佛刹极微尘数一切恶业，皆得消除。\n一切魔军、夜叉、罗刹、若鸠槃茶、若毗舍阇、若部多等，饮血啖肉诸恶鬼神，皆悉远离。\n或时发心，亲近守护。\n\n是故若人诵此愿者，行于世间，无有障碍，如空中月，出于云翳。\n诸佛菩萨之所称赞，一切人天皆应礼敬，一切众生悉应供养。\n此善男子，善得人身，圆满普贤所有功德。\n不久当如普贤菩萨，速得成就微妙色身，具三十二大丈夫相。\n若生人天，所在之处，常居胜族，悉能破坏一切恶趣，悉能远离一切恶友，\n悉能制服一切外道，悉能解脱一切烦恼。\n如师子王摧伏群兽，堪受一切众生供养。\n\n又复是人临命终时，最后刹那，一切诸根悉皆散坏；一切亲属悉皆舍离；\n一切威势悉皆退失；辅相大臣、宫城内外、象马车乘、珍宝伏藏，如是一切无复相随。\n唯此愿王，不相舍离，于一切时，引导其前。\n一刹那中，即得往生极乐世界。\n到已即见阿弥陀佛、文殊师利菩萨、普贤菩萨、观自在菩萨、弥勒菩萨等。\n此诸菩萨，色相端严，功德具足，所共围绕。\n其人自见生莲华中，蒙佛授记。\n得授记已，经于无数百千万亿那由他劫，普于十方不可说不可说世界，\n以智慧力，随众生心而为利益。\n不久当坐菩提道场，降服魔军，成等正觉，转妙法轮。\n能令佛刹极微尘数世界众生，发菩提心，随其根性，教化成熟，乃至尽于未来劫海，广能利益一切众生。\n\n善男子！彼诸众生，若闻、若信此大愿王，受持读诵，广为人说，所有功德，除佛世尊，余无知者。\n是故汝等，闻此愿王，莫生疑念，应当谛受。\n受已能读，读已能诵，诵已能持，乃至书写，广为人说。\n是诸人等，于一念中，所有行愿，皆得成就；所获福聚，无量无边！\n能于烦恼大苦海中，拔济众生，令其出离，皆得往生阿弥陀佛极乐世界。\n\n尔时，普贤菩萨摩诃萨，欲重宣此义，普观十方，而说偈言：\n\n所有十方世界中，三世一切人师子，\n我以清净身语意，一切遍礼尽无余。\n普贤行愿威神力，普现一切如来前，\n一身复现刹尘身，一一遍礼刹尘佛。\n\n于一尘中尘数佛，各处菩萨众会中，\n无尽法界尘亦然，深信诸佛皆充满。\n各以一切音声海，普出无尽妙言辞，\n尽于未来一切劫，赞佛甚深功德海。\n\n以诸最胜妙华鬘，伎乐涂香及伞盖，\n如是最胜庄严具，我以供养诸如来。\n最胜衣服最胜香，末香烧香与灯烛，\n一一皆如妙高聚，我悉供养诸如来。\n\n我以广大胜解心，深信一切三世佛，\n悉以普贤行愿力，普遍供养诸如来。\n我昔所造诸恶业，皆由无始贪嗔痴，\n从身语意之所生，一切我今皆忏悔。\n\n十方一切诸众生，二乘有学及无学，\n一切如来与菩萨，所有功德皆随喜。\n十方所有世间灯，最初成就菩提者，\n我今一切皆劝请，转于无上妙法轮。\n\n诸佛若欲示涅槃，我悉至诚而劝请，\n唯愿久住刹尘劫，利乐一切诸众生。\n所有礼赞供养福，请佛住世转法轮，\n随喜忏悔诸善根，回向众生及佛道。\n\n我随一切如来学，修习普贤圆满行，\n供养过去诸如来，及与现在十方佛。\n未来一切天人师，一切意乐皆圆满，\n我愿普随三世学，速得成就大菩提。\n\n所有十方三世刹，广大清净妙庄严，\n众会围绕诸如来，悉在菩提树王下。\n十方所有诸众生，愿离忧患常安乐，\n获得甚深正法利，灭除烦恼尽无余。\n\n我为菩提修行时，一切趣中成宿命，\n常得出家修净戒，无垢无破无穿漏。\n天龙夜叉鸠槃茶，乃至人与非人等，\n所有一切众生语，悉以诸音而说法。\n\n勤修清净波罗密，恒不忘失菩提心，\n灭除障垢无有余，一切妙行皆成就。\n于诸惑业及魔境，世间道中得解脱，\n犹如莲华不著水，亦如日月不住空。\n\n悉除一切恶道苦，等与一切群生乐，\n如是经于刹尘劫，十方利益恒无尽。\n我常随顺诸众生，尽于未来一切劫，\n恒修普贤广大行，圆满无上大菩提。\n\n所有与我同行者，于一切处同集会，\n身口意业皆同等，一切行愿同修学。\n所有益我善知识，为我显示普贤行，\n常愿与我同集会，于我常生欢喜心。\n\n愿常面见诸如来，及诸佛子众围绕，\n于彼皆兴广大供，尽未来劫无疲厌。\n愿持诸佛微妙法，光显一切菩提行，\n究竟清净普贤道，尽未来劫常修习。\n\n我于一切诸有中，所修福智恒无尽，\n定慧方便及解脱，获诸无尽功德藏。\n一尘中有尘数刹，一一刹有难思佛，\n一一佛处众会中，我见恒演菩提行。\n\n普尽十方诸刹海，一一毛端三世海，\n佛海及与国土海，我遍修行经劫海。\n一切如来语清净，一言具众音声海，\n随诸众生意乐音，一一流佛辩才海。\n\n三世一切诸如来，于彼无尽语言海，\n恒转理趣妙法轮，我深智力普能入。\n我能深入于未来，尽一切劫为一念，\n三世所有一切劫，为一念际我皆入。\n\n我于一念见三世，所有一切人师子，\n亦常入佛境界中，如幻解脱及威力。\n于一毛端极微中，出现三世庄严刹，\n十方尘刹诸毛端，我皆深入而严净。\n\n所有未来照世灯，成道转法悟群有，\n究竟佛事示涅槃，我皆往诣而亲近。\n速疾周遍神通力，普门遍入大乘力，\n智行普修功德力，威神普覆大慈力。\n\n遍净庄严胜福力，无著无依智慧力，\n定慧方便威神力，普能积集菩提力，\n清净一切善业力，摧灭一切烦恼力，\n降服一切诸魔力，圆满普贤诸行力。\n\n普能严净诸刹海，解脱一切众生海，\n善能分别诸法海，能甚深入智慧海。\n普能清净诸行海，圆满一切诸愿海，\n亲近供养诸佛海，修行无倦经劫海。\n\n三世一切诸如来，最胜菩提诸行愿，\n我皆供养圆满修，以普贤行悟菩提。\n一切如来有长子，彼名号曰普贤尊，\n我今回向诸善根，愿诸智行悉同彼。\n\n愿身口意恒清净，诸行刹土亦复然，\n如是智慧号普贤，愿我与彼皆同等。\n我为遍净普贤行，文殊师利诸大愿，\n满彼事业尽无余，未来际劫恒无倦。\n\n我所修行无有量，获得无量诸功德，\n安住无量诸行中，了达一切神通力。\n文殊师利勇猛智，普贤慧行亦复然，\n我今回向诸善根，随彼一切常修学。\n\n三世诸佛所称叹，如是最胜诸大愿，\n我今回向诸善根，为得普贤殊胜行。\n愿我临欲命终时，尽除一切诸障碍，\n面见彼佛阿弥陀，即得往生安乐刹。\n\n我既往生彼国已，现前成就此大愿，\n一切圆满尽无余，利乐一切众生界。\n彼佛众会咸清净，我时于胜莲华生，\n亲睹如来无量光，现前授我菩提记。\n\n蒙彼如来授记已，化身无数百俱胝，\n智力广大遍十方，普利一切众生界。\n乃至虚空世界尽，众生及业烦恼尽，\n如是一切无尽时，我愿究竟恒无尽。\n\n十方所有无边刹，庄严众宝供如来，\n最胜安乐施天人，经一切刹微尘劫。\n若人于此胜愿王，一经于耳能生信，\n求胜菩提心渴仰，获胜功德过于彼。\n\n即常远离恶知识，永离一切诸恶道，\n速见如来无量光，具此普贤最胜愿。\n此人善得胜寿命，此人善来人中生，\n此人不久当成就，如彼普贤菩萨行。\n\n往昔由无智慧力，所造极恶五无间，\n诵此普贤大愿王，一念速疾皆消灭。\n族姓种类及容色，相好智慧咸圆满，\n诸魔外道不能摧，堪为三界所应供。\n\n速诣菩提大树王，坐已降服诸魔众，\n成等正觉转法轮，普利一切诸含识。\n若人于此普贤愿，读诵受持及演说，\n果报唯佛能证知，决定获胜菩提道。\n\n若人诵持普贤愿，我说少分之善根，\n一念一切悉皆圆，成就众生清净愿。\n我此普贤殊胜行，无边胜福皆回向，\n普愿沉溺诸众生，速往无量光佛刹。\n\n尔时，普贤菩萨摩诃萨，于如来前，说此普贤广大愿王清净偈已。\n善财童子，踊跃无量，一切菩萨，皆大欢喜。\n如来赞言：善哉！善哉！\n\n尔时，世尊与诸圣者菩萨摩诃萨，演说如是不可思议解脱境界胜法门时，\n文殊师利菩萨而为上首，诸大菩萨，及所成熟六千比丘，弥勒菩萨而为上首，\n贤劫一切诸大菩萨，无垢普贤菩萨而为上首，一生补处住灌顶位诸大菩萨，\n及余十方种种世界，普来集会。\n一切刹海极微尘数菩萨摩诃萨众，大智舍利弗、摩诃目犍连等而为上首，\n诸大声闻，并诸人天一切世主，\n天、龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人等一切大众，\n闻佛所说，皆大欢喜，信受奉行。","sourceUrl":"https://www.fojingzaixian.com/puxianxingyuanpin.html","audios":[{"title":"普贤行愿品读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/puxianxingyuanpin.html"}],"teachAudios":[{"title":"普贤行愿品讲经开示","url":""}]},{"id":"lifodachanhuiwen","title":"礼佛大忏悔文","fullTitle":"礼佛大忏悔文","category":"忏悔·念诵","summary":"忏悔无始以来一切业障，礼敬八十八佛，日课必诵。","explanation":"礼佛大忏悔文以礼拜八十八佛为主体，忏悔无始以来身口意三业所造一切罪业。每日持诵，虔心礼拜，是净化身心、消除业障的最直接方式。","fullText":"大慈大悲悯众生，大喜大舍济含识，\n相好光明以自严，众等至心皈命礼。\n\n南无皈依十方尽虚空界一切诸佛，\n南无皈依十方尽虚空界一切尊法，\n南无皈依十方尽虚空界一切贤圣僧。\n\n南无如来、应供、正遍知、明行足、善逝世间解、无上士、调御丈夫、天人师、佛、世尊。\n\n南无普光佛　南无普明佛　南无普净佛　南无多摩罗跋栴檀香佛　南无栴檀光佛\n南无摩尼幢佛　南无欢喜藏摩尼宝积佛　南无一切世间乐见上大精进佛　南无摩尼幢灯光佛\n南无慧炬照佛　南无海德光明佛　南无金刚牢强普散金光佛　南无大强精进勇猛佛\n南无大悲光佛　南无慈力王佛　南无慈藏佛　南无栴檀窟庄严胜佛　南无贤善首佛\n南无善意佛　南无广庄严王佛　南无金华光佛　南无宝盖照空自在力王佛\n南无虚空宝华光佛　南无琉璃庄严王佛　南无普现色身光佛　南无不动智光佛\n南无降伏众魔王佛　南无才光明佛　南无智慧胜佛　南无弥勒仙光佛\n南无善寂月音妙尊智王佛　南无世净光佛　南无龙种上尊王佛　南无日月光佛\n南无日月珠光佛　南无慧幢胜王佛　南无狮子吼自在力王佛　南无妙音胜佛　南无常光幢佛\n南无观世灯佛　南无慧威灯王佛　南无法胜王佛　南无须弥光佛　南无须曼那华光佛\n南无优坛钵罗华殊胜王佛　南无大慧力王佛　南无阿閦毘欢喜光佛\n南无无量音声王佛　南无才光佛　南无金海光佛　南无山海慧自在通王佛\n南无大通光佛　南无一切法常满王佛　南无释迦牟尼佛　南无金刚不坏佛\n南无宝光佛　南无龙尊王佛　南无精进军佛　南无精进喜佛　南无宝火佛\n南无宝月光佛　南无现无愚佛　南无宝月佛　南无无垢佛　南无离垢佛\n南无勇施佛　南无清净佛　南无清净施佛　南无娑留那佛　南无水天佛\n南无坚德佛　南无栴檀功德佛　南无无量拘光佛　南无光德佛　南无无忧德佛\n南无那罗延佛　南无功德华佛　南无莲花光游戏神通佛　南无财功德佛　南无德念佛\n南无善名称功德佛　南无红燄帝幢王佛　南无善游步功德佛　南无斗战胜佛\n南无善游步佛　南无周匝庄严功德佛　南无宝华游步佛　南无宝莲华善住娑罗树王佛\n南无法界藏身阿弥陀佛\n\n如是等一切世界，诸佛世尊，常住在世。\n是诸世尊，当慈念我。\n\n若我此生，若我前生，从无始生死以来，所做众罪，\n若自作，若教他作，见作随喜；\n若塔若僧，若四方僧物，若自取，若教他取，见取随喜；\n五无间罪，若自作，若教他作，见作随喜；\n十不善道，若自作，若教他作，见作随喜。\n所作罪障，或有覆藏，或不覆藏，\n应堕地狱、恶鬼畜生、诸余恶趣、边地下贱及蔑戾车，\n如是等处所作罪障，今皆忏悔。\n\n今诸佛世尊，当证知我，当忆念我。\n我复于诸佛世尊前，作如是言：\n\n若我此生，若我余生，\n曾行布施或守净戒，乃至施与畜生一抟之食，\n或修净行所有善根，成就众生所有善根，\n修行菩提所有善根，及无上智所有善根，\n一切合集，校计筹量，皆悉回向阿耨多罗三藐三菩提。\n\n如过去未来现在诸佛，所作回向，我亦如是回向。\n众罪皆忏悔，诸福尽随喜，及请佛功德，愿成无上智。\n去来现在佛，于众生最胜，无量功德海，我今皈命礼。\n\n所有十方世界中　三世一切人师子　我以清净身语意　一切遍礼尽无余\n普贤行愿威神力　普现一切如来前　一身复现刹尘身　一一遍礼刹尘佛\n于一尘中尘数佛　各处菩萨众会中　无尽法界尘亦然　深信诸佛皆充满\n各以一切音声海　普出无尽妙言辞　尽于未来一切劫　赞佛甚深功德海\n以诸最胜妙华鬘　伎乐涂香及伞盖　如是最胜庄严具　我以供养诸如来\n最胜衣服最胜香　末香烧香与灯烛　一一皆如妙高聚　我悉供养诸如来\n我以广大胜解心　深信一切三世佛　悉以普贤行愿力　普遍供养诸如来\n我昔所造诸恶业　皆由无始贪嗔痴　从身语意之所生　一切我今皆忏悔\n十方一切诸众生　二乘有学及无学　一切如来与菩萨　所有功德皆随喜\n十方所有世间灯　最初成就菩提者　我今一切皆劝请　转于无上妙法轮\n诸佛若欲示涅盘　我悉至诚而劝请　唯愿久住刹尘劫　利乐一切诸众生\n所有礼赞供养福　请佛住世转法轮　随喜忏悔诸善根　回向众生及佛道\n\n愿将以此胜功德　回向无上真法界\n性相佛法及僧伽　二谛融通三昧印\n如是无量功德海　我今皆悉尽回向\n所有众生身口意　见惑弹谤我法等\n如是一切诸业障　悉皆消灭尽无余\n念念智周于法界　广度众生皆不退\n乃至虚空世界尽　众生及业烦恼尽\n如是四法广无边　愿今回向亦如是\n\n南无大行普贤菩萨\n南无大行普贤菩萨\n南无大行普贤菩萨","sourceUrl":"https://www.fojingzaixian.com/lifodachanhuiwen.html","audios":[{"title":"礼佛大忏悔文·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/lifodachanhuiwen.html"}],"teachAudios":[{"title":"礼佛大忏悔文讲经开示","url":""}]},{"id":"badarenjuejing","title":"八大人觉经","fullTitle":"佛说八大人觉经","category":"日常持诵","summary":"八项觉悟，佛弟子每日应修，短小精要，日课必备。","explanation":"《八大人觉经》仅三百余字，却涵摄大乘修行精髓：觉无常、觉多欲之苦、觉心无厌足、觉懈怠堕落……每日清晨诵读，时时提醒自己精进修行。","fullText":"为佛弟子，常于昼夜，至心诵念，八大人觉：\n\n第一觉悟：世间无常，国土危脆；四大苦空，五阴无我；\n生灭变异，虚伪无主；心是恶源，形为罪薮。\n如是观察，渐离生死。\n\n第二觉知：多欲为苦，生死疲劳，从贪欲起，\n少欲无为，身心自在。\n\n第三觉知：心无厌足，唯得多求，增长罪恶；\n菩萨不尔，常念知足，安贫守道，唯慧是业。\n\n第四觉知：懈怠坠落；常行精进，破烦恼恶，\n摧伏四魔，出阴界狱。\n\n第五觉悟：愚痴生死；菩萨常念，广学多闻，\n增长智慧，成就辩才，教化一切，悉以大乐。\n\n第六觉知：贫苦多怨，横结恶缘；菩萨布施，\n等念怨亲，不念旧恶，不憎恶人。\n\n第七觉悟：五欲过患；虽为俗人，不染世乐，\n常念三衣，瓦钵法器，志愿出家，守道清白，\n梵行高远，慈悲一切。\n\n第八觉知：生死炽然，苦恼无量；发大乘心，\n普济一切，愿代众生，受无量苦；\n令诸众生，毕竟大乐。\n\n如此八事，乃是诸佛、菩萨大人之所觉悟；\n精进行道，慈悲修慧，乘法身船，至涅槃岸。\n复还生死，度脱众生，以前八事，\n开导一切，令诸众生，觉生死苦，\n舍离五欲，修心圣道。\n\n若佛弟子，诵此八事，于念念中，灭无量罪，\n进趣菩提，速登正觉，永断生死，常住快乐。","sourceUrl":"https://www.fojingzaixian.com/badarenjuejing.html","audios":[{"title":"八大人觉经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/badarenjuejing.html"}],"teachAudios":[{"title":"八大人觉经讲经开示","url":""}]},{"id":"sishierzhangjing","title":"四十二章经","fullTitle":"佛说四十二章经","category":"日常持诵","summary":"佛陀四十二段教诫，是最早传入中国的佛经之一。","explanation":"《四十二章经》是最早传入中国的佛经，简练精要，每章短小而深刻。适合初学佛法的人每日研读一章，循序渐进体悟佛陀教导。","fullText":"世尊成道已。作是思惟。离欲寂静。\n是最为胜。住大禅定。降诸魔道。\n于鹿野苑中。转四谛法轮。度憍陈如等五人。\n而证道果。复有比丘所说诸疑。求佛进止。\n世尊教敕。一一开悟。合掌敬诺。\n而顺尊敕。\n\n第一章·出家证果\n佛言。辞亲出家。识心达本。\n解无为法。名曰沙门。常行二百五十戒。\n进止清净。为四真道行。成阿罗汉。\n阿罗汉者。能飞行变化。旷劫寿命。\n住动天地。次为阿那含。阿那含者。\n寿终灵神。上十九天。证阿罗汉。\n次为斯陀含。斯陀含者。一上一还。\n即得阿罗汉。次为须陀洹。须陀洹者。\n七死七生。便证阿罗汉。爱欲断者。\n如四肢断。不复用之。\n\n第二章·断欲绝求\n佛言。出家沙门者。断欲去爱。\n识自心源。达佛深理。悟无为法。\n内无所得。外无所求。心不系道。\n亦不结业。无念无作。非修非证。\n不历诸位。而自崇最。名之为道。\n\n第三章·割爱去贪\n佛言。剃除须发。而为沙门。\n受道法者。去世资财。乞求取足。\n日中一食。树下一宿。慎勿再矣。\n使人愚蔽者。爱与欲也。\n\n第四章·善恶并明\n佛言。众生以十事为善。亦以十事为恶。\n何等为十。身三。口四。\n意三。身三者。杀。\n盗。淫。口四者。\n两舌。恶口。妄言。\n绮语。意三者。嫉。\n恚。痴。如是十事。\n不顺圣道。名十恶行。是恶若止。\n名十善行耳。\n\n第五章·转重令轻\n佛言。人有众过。而不自悔。\n顿息其心。罪来赴身。如水归海。\n渐成深广。若人有过。自解知非。\n改恶行善。罪自消灭。如病得汗。\n渐有痊损耳。\n\n第六章·忍恶无瞋\n佛言。恶人闻善。故来扰亂者。\n汝自禁息。当无瞋责。彼来恶者。\n而自恶之。\n\n第七章·恶还本身\n佛言。有人闻吾守道。行大仁慈。\n故致罵佛。佛默不對。罵止。\n问曰。子以禮从人。其人不納。\n禮归子乎。對曰。归矣。\n佛言。今子罵我。我今不納。\n子自持祸。归子身矣。\n猶响应声。影之随形。终无免离。\n慎勿为恶。\n\n第八章·尘唾自污\n佛言。恶人害贤者。猶仰天而唾。\n唾不至天。还从己墮。逆風扬尘。\n尘不至彼。还坌己身。贤不可毁。\n祸必灭己。\n\n第九章·返本会道\n佛言。博闻爱道。道必难会。\n守志奉道。其道甚大。\n\n第十章·喜施获福\n佛言。睹人施道。助之欢喜。\n得福甚大。沙门问曰。此福盡乎。\n佛言。譬如一炬之火。数千百人。\n各以炬来分取。熟食除冥。此炬如故。\n福亦如之。\n\n第十一章·施饭转胜\n佛言。饭恶人百。不如饭一善人。\n饭善人千。不如饭一持五戒者。饭持五戒者万。\n不如饭一须陀洹。饭百万须陀洹。不如饭一斯陀含。\n饭千万斯陀含。不如饭一阿那含。饭一亿阿那含。\n不如饭一阿罗汉。饭十亿阿罗汉。不如饭一辟支佛。\n饭百亿辟支佛。不如饭一三世诸佛。饭千亿三世诸佛。\n不如饭一无念无住无修无证之者。\n\n第十二章·舉难勸修\n佛言。人有二十难。贫穷布施难。\n豪贵學道难。弃命必死难。得睹佛經难。\n生值佛世难。忍色忍欲难。见好不求难。\n被辱不瞋难。有势不临难。触事无心难。\n广學博究难。除灭我慢难。不轻未學难。\n心行平等难。不说是非难。会善知识难。\n见性學道难。随化度人难。睹境不动难。\n善解方便难。\n\n第十三章·问道宿命\n沙门问佛。以何因緣。得知宿命。\n会其至道。佛言。净心守志。\n可会至道。譬如磨镜。垢去明存。\n断欲无求。当得宿命。\n\n第十四章·请问善大\n沙门问佛。何者为善。何者最大。\n佛言。行道守真者善。志与道合者大。\n\n第十五章·请问力明\n沙门问佛。何者多力。何者最明。\n佛言。忍辱多力。不怀恶故。\n兼加安健。忍者无恶。必为人尊。\n心垢灭盡。净无瑕秽。是为最明。\n未有天地。逮于今日。十方所有。\n无有不见。无有不知。无有不闻。\n得一切智。可謂明矣。\n\n第十六章·舍爱得道\n佛言。人怀爱欲。不见道者。\n譬如澄水。致手搅之。众人共临。\n无有睹其影者。人以爱欲交錯。心中浊兴。\n故不见道。汝等沙门。当舍爱欲。\n爱欲垢盡。道可见矣。\n\n第十七章·明来暗謝\n佛言。夫见道者。譬如持炬。\n入冥室中。其冥即灭。而明獨存。\n學道见谛。无明即灭。而明常存矣。\n\n第十八章·念等本空\n佛言。吾法念无念念。行无行行。\n言无言言。修无修修。会者近尔。\n迷者远乎。言语道断。非物所拘。\n差之毫釐。失之须臾。\n\n第十九章·假真并观\n佛言。观天地。念非常。\n观世界。念非常。观灵覺。\n即菩提。如是知识。得道疾矣。\n\n第二十章·推我本空\n佛言。当念身中四大。各自有名。\n都无我者。我既都无。其如幻耳。\n\n第二十一章·名声喪本\n佛言。人随情欲。求于声名。\n声名显著。身已故矣。\n贪世常名。而不學道。枉功劳形。\n譬如烧香。虽人闻香。香之燼矣。\n危身之火。而在其后。\n\n第二十二章·财色招苦\n佛言。财色于人。人之不舍。\n譬如刀刃有蜜。不足一餐之美。小兒舐之。\n則有割舌之患。\n\n第二十三章·妻子甚狱\n佛言。人系于妻子舍宅。甚于牢狱。\n牢狱有散释之期。妻子无远离之念。情爱于色。\n豈憚驱驰。虽有虎口之患。心存甘伏。\n投泥自溺。故曰凡夫。透得此门。\n出尘罗汉。\n\n第二十四章·色欲障道\n佛言。爱欲莫甚于色。色之为欲。\n其大无外。賴有一矣。\n若使二同。普天之人。无能为道者矣。\n\n第二十五章·欲火烧身\n佛言。爱欲之人。猶如执炬。\n逆風而行。必有烧手之患。\n\n第二十六章·天魔扰佛\n天神献玉女于佛。欲坏佛意。佛言。\n革囊众秽。尔来何为。去。\n吾不用。天神愈敬。因问道意。\n佛为解说。即得须陀洹果。\n\n第二十七章·无著得道\n佛言。夫为道者。猶木在水。\n寻流而行。不触两岸。不为人取。\n不为鬼神所遮。不为洄流所住。亦不腐败。\n吾保此木。决定入海。學道之人。\n不为情欲所惑。不为众邪所扰。精进无为。\n吾保此人。必得道矣。\n\n第二十八章·意马莫纵\n佛言。慎勿信汝意。汝意不可信。\n慎勿与色会。色会即祸生。得阿罗汉已。\n乃可信汝意。\n\n第二十九章·正观敵色\n佛言。慎勿视女色。亦莫共言语。\n若与语者。正心思念。我为沙门。\n處于浊世。当如莲华。不为泥污。\n想其老者如母。長者如姊。少者如妹。\n稚者如子。生度脫心。息灭恶念。\n\n第三十章·欲火远离\n佛言。夫为道者。如被干草。\n火来须避。道人见欲。必当远之。\n\n第三十一章·心寂欲除\n佛言。有人患淫不止。欲自断阴。\n佛謂之曰。若断其阴。不如断心。\n心如功曹。功曹若止。从者都息。\n邪心不止。断阴何益。佛为说偈。\n欲生于汝意。意以思想生。二心各寂静。\n非色亦非行。佛言。此偈是迦叶佛说。\n\n第三十二章·我空怖灭\n佛言。人从爱欲生忧。从忧生怖。\n若离于爱。何忧何怖。\n\n第三十三章·智明破魔\n佛言。夫为道者。譬如一人与万人战。\n挂铠出门。意或怯弱。或半路而退。\n或格斗而死。或得胜而还。沙门學道。\n应当坚持其心。精进勇锐。不畏前境。\n破灭众魔。而得道果。\n\n第三十四章·處中得道\n沙门夜诵迦叶佛遺教經。其声悲紧。思悔欲退。\n佛问之曰。汝昔在家。曾为何业。\n對曰。爱弹琴。佛言。\n弦缓如何。對曰。不鸣矣。\n弦急如何。對曰。声绝矣。\n急缓得中如何。對曰。诸音普矣。\n佛言。沙门學道亦然。心若调适。\n道可得矣。\n于道若暴。暴即身疲。其身若疲。\n意即生恼。意若生恼。行即退矣。\n其行既退。罪必加矣。\n但清净安樂。道不失矣。\n\n第三十五章·垢净明存\n佛言。如人锻铁。去滓成器。\n器即精好。學道之人。去心垢染。\n行即清净矣。\n\n第三十六章·辗转获胜\n佛言。人离恶道。得为人难。\n既得为人。去女即男难。既得为男。\n六根完具难。六根既具。生中國难。\n既生中國。值佛世难。既值佛世。\n遇道者难。既得遇道。兴信心难。\n既兴信心。发菩提心难。既发菩提心。\n无修无证难。\n\n第三十七章·念戒近道\n佛言。佛子离吾数千里。忆念吾戒。\n必得道果。在吾左右。虽常见吾。\n不顺吾戒。终不得道。\n\n第三十八章·生即有灭\n佛问沙门。人命在幾间。對曰。\n数日间。佛言。子未知道。\n复问一沙门。人命在幾间。對曰。\n饭食间。佛言。子未知道。\n复问一沙门。人命在幾间。對曰。\n呼吸间。佛言。善哉。\n子知道矣。\n\n第三十九章·教诲无差\n佛言。學佛道者。佛所言说。\n皆应信顺。譬如食蜜。中邊皆甜。\n吾經亦尔。\n\n第四十章·行道在心\n佛言。沙门行道。无如磨牛。\n身虽行道。心道不行。心道若行。\n何用行道。\n\n第四十一章·直心出欲\n佛言。夫为道者。如牛负重。\n行深泥中。疲极。不敢左右顾视。\n出离淤泥。乃可苏息。沙门当观。\n情欲甚于淤泥。直心念道。可免苦矣。\n\n第四十二章·达世如幻\n佛言。吾视王侯之位。如过隙尘。\n视金玉之宝。如瓦砾。视纨素之服。\n如敝帛。视大千界。如一诃子。\n视阿耨池水。如涂足油。视方便门。\n如化宝聚。视无上乘。如梦金帛。\n视佛道。如眼前华。视禅定。\n如须彌柱。视涅槃。如昼夕寤。\n视倒正。如六龙舞。视平等。\n如一真地。视兴化。如四时木。","sourceUrl":"https://www.fojingzaixian.com/sishierzhangjing.html","audios":[{"title":"四十二章经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/sishierzhangjing.html"}],"teachAudios":[{"title":"四十二章经讲经开示","url":""}]},{"id":"weimojiejing","title":"维摩诘经","fullTitle":"维摩诘所说经","category":"般若","summary":"\"不二法门\"，在家居士维摩诘示现病相，为诸菩萨说不二之理。","explanation":"《维摩诘经》以维摩诘居士（在家菩萨）为主角，以其深广智慧让文殊菩萨等诸大菩萨皆叹服。\"默然无言\"即是最高的\"不二法门\"，是入世修行者的精神典范。","fullText":"维摩诘所说经\n姚秦三藏 鸠摩罗什译\n\n【佛国品第一】\n\n如是我闻：一时，佛在毗耶离庵罗树园，与大比丘众八千人俱，菩萨三万二千，众所知识。\n大智本行，皆悉成就。诸佛威神之所建立，为护法城，受持正法；\n能师子吼，名闻十方；众人不请，友而安之；绍隆三宝，能使不绝；\n降伏魔怨，制诸外道，悉已清净，永离盖缠；\n心常安住，无碍解脱；念、定、总持，辩才不断；\n布施、持戒、忍辱、精进、禅定、智慧及方便力，无不具足；\n逮无所得，不起法忍；已能随顺，转不退轮；\n善解法相，知众生根；盖诸大众，得无所畏；\n功德智慧，以修其心；相好严身，色像第一，舍诸世间所有饰好；\n名称高远，踰于须弥；深信坚固，犹若金刚；\n法宝普照，而雨甘露；于众言音，微妙第一；\n深入缘起，断诸邪见，有无二边，无复余习；\n演法无畏，犹师子吼，其所讲说，乃如雷震；\n无有量，已过量；集众法宝，如海导师，了达诸法深妙之义；\n善知众生往来所趣及心所行；近无等等佛自在慧、十力、无畏、十八不共；\n关闭一切诸恶趣门，而生五道以现其身；\n为大医王，善疗众病，应病与药，令得服行；\n无量功德皆成就，无量佛土皆严净；\n其见闻者，无不蒙益；诸有所作，亦不唐捐。\n如是一切功德，皆悉具足，其名曰：\n等观菩萨、不等观菩萨、等不等观菩萨、定自在王菩萨、法自在王菩萨、\n法相菩萨、光相菩萨、光严菩萨、大严菩萨、宝积菩萨、辩积菩萨、\n宝手菩萨、宝印手菩萨、常举手菩萨、常下手菩萨、常惨菩萨、\n喜根菩萨、喜王菩萨、辩音菩萨、虚空藏菩萨、执宝炬菩萨、\n宝勇菩萨、宝见菩萨、帝网菩萨、明网菩萨、无缘观菩萨、慧积菩萨、\n宝胜菩萨、天王菩萨、坏魔菩萨、电德菩萨、自在王菩萨、\n功德相严菩萨、师子吼菩萨、雷音菩萨、山相击音菩萨、\n香象菩萨、白香象菩萨、常精进菩萨、不休息菩萨、妙生菩萨、\n华严菩萨、观世音菩萨、得大势菩萨、梵网菩萨、宝杖菩萨、\n无胜菩萨、严土菩萨、金髻菩萨、珠髻菩萨、弥勒菩萨、\n文殊师利法王子菩萨，如是等三万二千人。\n\n复有万梵天王尸弃等，从余四天下，来诣佛所，而为听法；\n复有万二千天帝，亦从余四天下，来在会坐；\n并余大威力诸天、龙神、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽等，悉来会坐；\n诸比丘、比丘尼、优婆塞、优婆夷、俱来会坐。\n彼时佛与无量百千之众，恭敬围绕，而为说法，\n譬如须弥山王，显于大海，安处众宝师子之座，蔽于一切诸来大众。\n\n尔时，毗耶离城，有长者子，名曰宝积，与五百长者子，俱持七宝盖，来诣佛所，头面礼足，各以其盖共供养佛；\n佛之威神，令诸宝盖合成一盖，遍覆三千大千世界，而此世界广长之相，悉于中现；\n又此三千大千世界诸须弥山、雪山、目真邻陀山、摩诃目真邻陀山、香山、宝山、金山、黑山、铁围山、大铁围山，\n大海江河，川流泉源，及日月星辰，天宫龙宫，诸尊神宫，悉现于宝盖中；\n又十方诸佛，诸佛说法，亦现于宝盖中。\n尔时，一切大众，睹佛神力，叹未曾有！合掌礼佛，瞻仰尊颜，目不暂舍。\n\n长者子宝积，即于佛前，以偈颂曰：\n\n目净修广如青莲　心净已度诸禅定　久积净业称无量　导众以寂故稽首\n既见大圣以神变　普现十方无量土　其中诸佛演说法　于是一切悉见闻\n法王法力超群生　常以法财施一切　能善分别诸法相　于第一义而不动\n已于诸法得自在　是故稽首此法王　说法不有亦不无　以因缘故诸法生\n无我无造无受者　善恶之业亦不亡　始在佛树力降魔　得甘露灭觉道成\n已无心意无受行　而悉摧伏诸外道　三转法轮于大千　其轮本来常清净\n天人得道此为证　三宝于是现世间　以斯妙法济群生　一受不退常寂然\n度老病死大医王　当礼法海德无边　毁誉不动如须弥　于善不善等以慈\n心行平等如虚空　孰闻人宝不敬承　今奉世尊此微盖　于中现我三千界\n诸天龙神所居宫　乾闼婆等及夜叉　悉见世间诸所有　十力哀现是化变\n众睹希有皆叹佛　今我稽首三界尊　大圣法王众所归　净心观佛靡不欣\n各见世尊在其前　斯则神力不共法　佛以一音演说法　众生随类各得解\n皆谓世尊同其语　斯则神力不共法　佛以一音演说法　众生各各随所解\n普得受行获其利　斯则神力不共法　佛以一音演说法　或有恐畏或欢喜\n或生厌离或断疑　斯则神力不共法　稽首十力大精进　稽首已得无所畏\n稽首住于不共法　稽首一切大导师　稽首能断诸结缚　稽首已到于彼岸\n稽首能度诸世间　稽首永离生死道　悉知众生来去相　善于诸法得解脱\n不著世间如莲华　常善入于空寂行　达诸法相无挂碍　稽首如空无所依\n\n尔时，长者子宝积说此偈已，白佛言：\n世尊！是五百长者子，皆已发阿耨多罗三藐三菩提心，愿闻得佛国土清净，唯愿世尊说诸菩萨净土之行。\n佛言：善哉！宝积！乃能为诸菩萨，问于如来净土之行，谛听！谛听！善思念之！当为汝说。\n于是宝积及五百长者子，受教而听。\n\n佛言：宝积！众生之类是菩萨佛土。\n所以者何？菩萨随所化众生而取佛土，随所调伏众生而取佛土，\n随诸众生应以何国入佛智慧而取佛土，随诸众生应以何国起菩萨根而取佛土。\n所以者何？菩萨取于净国，皆为饶益诸众生故。\n譬如有人，欲于空地，造立宫室，随意无碍，若于虚空，终不能成！\n菩萨如是，为成就众生故，愿取佛国，愿取佛国者，非于空也。\n\n宝积当知：\n直心是菩萨净土，菩萨成佛时，不谄众生来生其国；\n深心是菩萨净土，菩萨成佛时，具足功德众生来生其国；\n大乘心是菩萨净土，菩萨成佛时，大乘众生来生其国；\n布施是菩萨净土，菩萨成佛时，一切能舍众生来生其国；\n持戒是菩萨净土，菩萨成佛时，行十善道满愿众生来生其国；\n忍辱是菩萨净土，菩萨成佛时，三十二相庄严众生来生其国；\n精进是菩萨净土，菩萨成佛时，勤修一切功德众生来生其国；\n禅定是菩萨净土，菩萨成佛时，摄心不乱众生来生其国；\n智慧是菩萨净土，菩萨成佛时，正定众生来生其国；\n四无量心是菩萨净土，菩萨成佛时，成就慈悲喜舍众生来生其国；\n四摄法是菩萨净土，菩萨成佛时，解脱所摄众生来生其国；\n方便是菩萨净土，菩萨成佛时，于一切法方便无碍众生来生其国；\n三十七道品是菩萨净土，菩萨成佛时，念处正勤神足根力觉道众生来生其国；\n回向心是菩萨净土，菩萨成佛时，得一切具足功德国土；\n说除八难是菩萨净土，菩萨成佛时，国土无有三恶八难；\n自守戒行不讥彼阙是菩萨净土，菩萨成佛时，国土无有犯禁之名；\n十善是菩萨净土，菩萨成佛时，命不中夭，大富梵行，所言诚谛，\n常以软语，眷属不离，善和斗讼，言必饶益，不嫉不恚，正见众生来生其国。\n\n如是宝积，菩萨随其直心，则能发行；随其发行，则得深心；\n随其深心，则意调伏；随意调伏，则如说行；随如说行，则能回向；\n随其回向，则有方便；随其方便，则成就众生；随成就众生，则佛土净；\n随佛土净，则说法净；随说法净，则智慧净；随智慧净，则其心净；\n随其心净，则一切功德净。\n是故宝积，若菩萨欲得净土，当净其心；随其心净，则佛土净。\n\n尔时，舍利弗承佛威神作是念：若菩萨心净，则佛土净者，我世尊本为菩萨时，意岂不净，而是佛土不净若此？\n佛知其念，即告之言：于意云何？日月岂不净耶！而盲者不见。\n对曰：不也！世尊！是盲者过，非日月咎。\n舍利弗！众生罪故，不见如来国土严净，非如来咎；\n舍利弗！我此土净，而汝不见。\n\n尔时，螺髻梵王语舍利弗：\n勿作是念，谓此佛土以为不净，所以者何？\n我见释迦牟尼佛土清净，譬如自在天宫。\n舍利弗言：我见此土丘陵坑坎，荆棘沙砾，土石诸山，秽恶充满。\n螺髻梵王言：仁者心有高下，不依佛慧，故见此土为不净耳！\n舍利弗！菩萨于一切众生，悉皆平等，深心清净，依佛智慧，则能见此佛土清净。\n\n于是佛以足指按地，即时三千大千世界，若干百千珍宝严饰，\n譬如宝庄严佛，无量功德宝庄严土，一切大众叹未曾有！而皆自见坐宝莲华。\n佛告舍利弗：汝且观是佛土严净？\n舍利弗言：唯然，世尊！本所不见，本所不闻，今佛国土严净悉现。\n佛语舍利弗：我佛国土，常净若此，为欲度斯下劣人故，示是众恶不净土耳！\n譬如诸天，共宝器食，随其福德，饭色有异；\n如是舍利弗，若人心净，便见此土功德庄严。\n\n当佛现此国土严净之时，宝积所将五百长者子，皆得无生法忍，\n八万四千人皆发阿耨多罗三藐三菩提心。\n佛摄神足，于是世界，还复如故；\n求声闻乘，三万二千诸天及人，知有为法，皆悉无常，远尘离垢，得法眼净；\n八千比丘，不受诸法，漏尽意解。\n\n【方便品第二】\n\n尔时，毗耶离大城中，有长者名维摩诘，已曾供养无量诸佛，深植善本，得无生忍；\n辩才无碍，游戏神通，逮诸总持；获无所畏，降魔劳怨；\n入深法门，善于智度，通达方便，大愿成就；\n明了众生心之所趣，又能分别诸根利钝；\n久于佛道，心已纯淑，决定大乘；诸有所作，能善思量；\n住佛威仪，心大如海，诸佛咨嗟！弟子、释、梵、世主所敬。\n欲度人故，以善方便，居毗耶离；\n资财无量，摄诸贫民；奉戒清净，摄诸毁禁；\n以忍调行，摄诸恚怒；以大精进，摄诸懈怠；\n一心禅寂，摄诸乱意；以决定慧，摄诸无智；\n虽为白衣，奉持沙门清净律行；虽处居家，不著三界；\n示有妻子，常修梵行；现有眷属，常乐远离；\n虽服宝饰，而以相好严身；虽复饮食，而以禅悦为味；\n若至博奕戏处，辄以度人；受诸异道，不毁正信；\n虽明世典，常乐佛法；一切见敬，为供养中最；\n执持正法，摄诸长幼；一切治生谐偶，虽获俗利，不以喜悦；\n游诸四衢，饶益众生；入治政法，救护一切；\n入讲论处，导以大乘；入诸学堂，诱开童蒙；\n入诸淫舍，示欲之过；入诸酒肆，能立其志；\n若在长者，长者中尊，为说胜法；\n若在居士，居士中尊，断其贪著；\n若在刹利，刹利中尊，教以忍辱；\n若在婆罗门，婆罗门中尊，除其我慢；\n若在大臣，大臣中尊，教以正法；\n若在王子，王子中尊，示以忠孝；\n若在内官，内官中尊，化正宫女；\n若在庶民，庶民中尊，令兴福力；\n若在梵天，梵天中尊，诲以胜慧；\n若在帝释，帝释中尊，示现无常；\n若在护世，护世中尊，护诸众生。\n长者维摩诘，以如是等无量方便饶益众生。\n\n其以方便，现身有疾。以其疾故，国王大臣、长者居士、婆罗门等，及诸王子，并余官属，无数千人，皆往问疾。\n其往者，维摩诘因以身疾，广为说法：\n\n诸仁者！是身无常、无强、无力、无坚、速朽之法，不可信也！为苦、为恼，众病所集。\n诸仁者！如此身，明智者所不怙；\n是身如聚沫，不可撮摩；是身如泡，不可久立；是身如焰，从渴爱生；\n是身如芭蕉，中无有坚；是身如幻，从颠倒起；是身如梦，为虚妄见；\n是身如影，从业缘现；是身如响，属诸因缘；是身如浮云，须臾变灭；\n是身如电，念念不住；是身无主，为如地；是身无我，为如火；\n是身无寿，为如风；是身无人，为如水；是身不实，四大为家；\n是身为空，离我我所；是身无知，如草木瓦砾；是身无作，风力所转；\n是身不净，秽恶充满；是身为虚伪，虽假以澡浴衣食，必归磨灭；\n是身为灾，百一病恼；是身如丘井，为老所逼；是身无定，为要当死；\n是身如毒蛇、如怨贼、如空聚、阴界诸入所共合成。\n\n诸仁者！此可患厌，当乐佛身。所以者何？佛身者即法身也；\n从无量功德智慧生，从戒、定、慧、解脱、解脱知见生，\n从慈、悲、喜、舍生，从布施、持戒、忍辱、柔和、勤行精进、禅定、解脱、三昧、多闻、智慧诸波罗蜜生，\n从方便生，从六通生，从三明生，从三十七道品生，从止观生，\n从十力、四无所畏、十八不共法生，从断一切不善法集一切善法生，\n从真实生，从不放逸生；\n从如是无量清净法，生如来身。\n诸仁者！欲得佛身，断一切众生病者，当发阿耨多罗三藐三菩提心。\n\n如是长者维摩诘，为问诸病者，如应说法，令无数千人皆发阿耨多罗三藐三菩提心。\n\n【弟子品第三】\n\n尔时，长者维摩诘，自念：寝疾于床，世尊大慈，宁不垂愍？\n佛知其意，即告舍利弗：汝行诣维摩诘问疾。\n\n舍利弗白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔，曾于林中宴坐树下，时维摩诘来谓我言：\n唯，舍利弗！不必是坐，为宴坐也。\n夫宴坐者，不于三界现身意，是为宴坐；\n不起灭定而现诸威仪，是为宴坐；\n不舍道法而现凡夫事，是为宴坐；\n心不住内亦不在外，是为宴坐；\n于诸见不动，而修行三十七道品，是为宴坐；\n不断烦恼而入涅槃，是为宴坐；\n若能如是坐者，佛所印可。\n时我，世尊！闻说是语，默然而止，不能加报！故我不任诣彼问疾。\n\n佛告大目犍连：汝行诣维摩诘问疾。\n目连白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔入毗耶离大城，于里巷中为诸居士说法。\n时维摩诘来谓我言：\n唯，大目连！为白衣居士说法，不当如仁者所说。\n夫说法者，当如法说；\n法无众生，离众生垢故；法无有我，离我垢故；法无寿命，离生死故；\n法无有人，前后际断故；法常寂然，灭诸相故；法离于相，无所缘故；\n法无名字，言语断故；法无有说，离觉观故；法无形相，如虚空故；\n法无戏论，毕竟空故；法无我所，离我所故；法无分别，离诸识故；\n法无有比，无相待故；法不属因，不在缘故；法同法性，入诸法故；\n法随于如，无所随故；法住实际，诸边不动故；法无动摇，不依六尘故；\n法无去来，常不住故；法顺空，随无相，应无作；\n法离好丑，法无增损，法无生灭，法无所归；\n法过眼耳鼻舌身心；法无高下，法常住不动，法离一切观行。\n唯，大目连！法相如是，岂可说乎？\n夫说法者，无说无示；其听法者，无闻无得，譬如幻士，为幻人说法，当建是意，而为说法。\n当了众生根有利钝；善于知见无所挂碍；以大悲心赞于大乘，念报佛恩不断三宝，然后说法。\n维摩诘说是法时，八百居士，发阿耨多罗三藐三菩提心。\n我无此辩，是故不任诣彼问疾。\n\n佛告大迦叶：汝行诣维摩诘问疾。\n迦叶白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔，于贫里而行乞，时维摩诘来谓我言：\n唯，大迦叶！有慈悲心而不能普，舍豪富，从贫乞。\n迦叶！住平等法，应次行乞食；\n为不食故，应行乞食；为坏和合相故，应取揣食；\n为不受故，应受彼食；以空聚相，入于聚落；\n所见色与盲等，所闻声与响等，所嗅香与风等，所食味不分别，受诸触如智证，知诸法如幻相；\n无自性，无他性；本自不然，今则无灭。\n迦叶！若能不舍八邪，入八解脱；以邪相入正法；\n以一食施一切，供养诸佛，及众贤圣，然后可食；\n如是食者，非有烦恼，非离烦恼；非入定意，非起定意；非住世间，非住涅槃。\n其有施者，无大福，无小福；不为益，不为损，是为正入佛道，不依声闻。\n迦叶！若如是食，为不空食人之施也。\n时我，世尊！闻说是语，得未曾有，即于一切菩萨，深起敬心。\n我从是来，不复劝人以声闻辟支佛行。是故不任诣彼问疾。\n\n佛告须菩提：汝行诣维摩诘问疾。\n须菩提白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔，入其舍，从乞食，时维摩诘取我钵，盛满饭，谓我言：\n唯，须菩提！若能于食等者，诸法亦等，诸法等者，于食亦等；如是行乞，乃可取食。\n若须菩提不断淫怒痴，亦不与俱；不坏于身，而随一相；不灭痴爱，起于解脱；\n以五逆相而得解脱，亦不解不缚；不见四谛，非不见谛；\n非得果，非不得果；非凡夫，非离凡夫法；非圣人，非不圣人；\n虽成就一切法，而离诸法相，乃可取食。\n若须菩提不见佛，不闻法，彼外道六师是汝之师。因其出家，彼师所堕，汝亦随堕，乃可取食。\n若须菩提入诸邪见，不到彼岸；住于八难，不得无难；同于烦恼，离清净法；\n汝得无诤三昧，一切众生亦得是定；其施汝者，不名福田；供养汝者，堕三恶道；\n为与众魔共一手作诸劳侣，汝与众魔，及诸尘劳，等无有异；\n于一切众生而有怨心，谤诸佛、毁于法，不入众数，终不得灭度，汝若如是，乃可取食。\n时我，世尊！闻此茫然，不识是何言？不知以何答？便置钵欲出其舍。\n维摩诘言：唯，须菩提！取钵勿惧。于意云何？如来所作化人，若以是事诘，宁有惧不？\n我言：不也。\n维摩诘言：一切诸法，如幻化相，汝今不应有所惧也。\n所以者何？一切言说，不离是相；至于智者，不著文字，故无所惧。\n何以故？文字性离，无有文字，是则解脱；解脱相者，则诸法也。\n维摩诘说是法时，二百天子得法眼净，故我不任诣彼问疾。\n\n佛告富楼那弥多罗尼子：汝行诣维摩诘问疾。\n富楼那白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔于大林中，在一树下，为诸新学比丘说法。\n时维摩诘来谓我言：\n唯，富楼那！先当入定，观此人心，然后说法。\n无以秽食置于宝器，当知是比丘心之所念，无以琉璃同彼水精。\n汝不能知众生根源，无得发起以小乘法。彼自无疮，勿伤之也！\n欲行大道，莫示小径；无以大海，内于牛迹；无以日光，等彼萤火。\n富楼那！此比丘久发大乘心，中忘此意，如何以小乘法而教导之？\n我观小乘智慧微浅，犹如盲人，不能分别一切众生根之利钝。\n时，维摩诘即入三昧，令此比丘自识宿命，曾于五百佛所植众德本，回向阿耨多罗三藐三菩提，即时豁然，还得本心。\n于是诸比丘稽首礼维摩诘足，时维摩诘因为说法，于阿耨多罗三藐三菩提，不复退转。\n我念声闻不观人根，不应说法，是故不任诣彼问疾。\n\n佛告摩诃迦旃延：汝行诣维摩诘问疾。\n迦旃延白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念昔者，佛为诸比丘略说法要，我即于后，敷演其义，谓无常义、苦义、空义、无我义、寂灭义。\n时维摩诘来谓我言：\n唯，迦旃延！无以生灭心行，说实相法。\n迦旃延！诸法毕竟不生不灭，是无常义；\n五受阴，通达空无所起，是苦义；\n诸法究竟无所有，是空义；\n于我无我而不二，是无我义；\n法本不然，今则无灭，是寂灭义。\n说是法时，彼诸比丘心得解脱。故我不任诣彼问疾。\n\n佛告阿那律：汝行诣维摩诘问疾。\n阿那律白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔于一处经行，时有梵王，名曰严净，与万梵俱，放净光明，来诣我所，稽首作礼，问我言：\n几何阿那律天眼所见？\n我即答言：仁者！吾见此释迦牟尼佛土三千大千世界，如观掌中庵摩勒果。\n时维摩诘来谓我言：\n唯，阿那律！天眼所见，为作相耶？无作相耶？\n假使作相，则与外道五通等；若无作相，即是无为，不应有见。\n世尊！我时默然。彼诸梵闻其言，得未曾有！即为作礼而问曰：世孰有真天眼者？\n维摩诘言：有佛世尊，得真天眼，常在三昧，悉见诸佛国，不以二相。\n于是严净梵王及其眷属五百梵天，皆发阿耨多罗三藐三菩提心，礼维摩诘足已，忽然不现！\n故我不任诣彼问疾。\n\n佛告优波离：汝行诣维摩诘问疾。\n优波离白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念昔者，有二比丘犯律行，以为耻，不敢问佛，来问我言：\n唯，优波离！我等犯律，诚以为耻，不敢问佛，愿解疑悔，得免斯咎！\n我即为其如法解说；时维摩诘来谓我言：\n唯，优波离！无重增此二比丘罪！当直除灭，勿扰其心。\n所以者何？彼罪性不在内，不在外，不在中间，如佛所说。\n心垢故众生垢，心净故众生净；心亦不在内，不在外，不在中间，如其心然，罪垢亦然，诸法亦然，不出于如。\n如优波离，以心相得解脱时，宁有垢不？\n我言：不也。\n维摩诘言：一切众生，心相无垢，亦复如是。\n唯，优波离！妄想是垢，无妄想是净；颠倒是垢，无颠倒是净；取我是垢，不取我是净。\n优波离！一切法生灭不住，如幻如电，诸法不相待，乃至一念不住；\n诸法皆妄见，如梦如焰，如水中月，如镜中像，以妄想生。\n其知此者，是名奉律；其知此者，是名善解。\n于是二比丘疑悔即除，发阿耨多罗三藐三菩提心。故我不任诣彼问疾。\n\n佛告罗侯罗：汝行诣维摩诘问疾。\n罗侯罗白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念昔时，毗耶离诸长者子来诣我所，稽首作礼，问我言：\n唯，罗侯罗！汝佛之子，舍转轮王位，出家为道，其出家者，有何等利？\n我即如法为说出家功德之利。时维摩诘来谓我言：\n唯，罗侯罗！不应说出家功德之利，所以者何？无利无功德，是为出家。\n有为法者，可说有利有功德；夫出家者，为无为法，无为法中，无利无功德。\n罗侯罗！出家者，无彼无此，亦无中间；离六十二见，处于涅槃；\n智者
