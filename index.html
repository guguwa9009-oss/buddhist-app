所受，圣所行处；降伏众魔，度五道，净五眼，得五力，立五根；\n不恼于彼，离众杂恶；摧诸外道，超越假名；\n出淤泥，无系著；无我所，无所受；无扰乱，内怀喜；护彼意，随禅定，离众过。\n若能如是，是真出家。\n于是维摩诘语诸长者子：汝等于正法中，宜共出家，所以者何？佛世难值！\n诸长者子言：居士！我闻佛言，父母不听，不得出家。\n维摩诘言：然，汝等便发阿耨多罗三藐三菩提心，是即出家，是即具足。\n尔时，三十二长者子，皆发阿耨多罗三藐三菩提心，故我不任诣彼问疾。\n\n佛告阿难：汝行诣维摩诘问疾。\n阿难白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念昔时，世尊身小有疾，当用牛乳，我即持钵，诣大婆罗门家门下立。\n时维摩诘来谓我言：\n唯，阿难！何为晨朝，持钵住此？\n我言：居士！世尊身小有疾，当用牛乳，故来至此。\n维摩诘言：止止！阿难！莫作是语！\n如来身者，金刚之体，诸恶已断，众善普会，当有何疾？当有何恼？\n默往阿难，勿谤如来，莫使异人闻此粗言；\n无令大威德诸天，及他方净土诸来菩萨得闻斯语。\n阿难！转轮圣王，以少福故，尚得无病，岂况如来无量福会普胜者哉！\n行矣，阿难！勿使我等受斯耻也。\n外道、梵志，若闻此语，当作是念：何名为师？自疾不能救，而能救诸疾人？\n可密速去，勿使人闻。\n当知，阿难！诸如来身，即是法身，非思欲身。\n佛为世尊，过于三界；佛身无漏，诸漏已尽；佛身无为，不堕诸数。\n如此之身，当有何疾？\n时我，世尊！实怀惭愧，得无近佛而谬听耶！\n即闻空中声曰：阿难！如居士言。但为佛出五浊恶世，现行斯法，度脱众生。行矣，阿难！取乳勿惭。\n世尊！维摩诘智慧辩才，为若此也，是故不任诣彼问疾。\n\n如是五百大弟子，各各向佛说其本缘，称述维摩诘所言，皆曰：不任诣彼问疾。\n\n【菩萨品第四】\n\n于是佛告弥勒菩萨：汝行诣维摩诘问疾。\n弥勒白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔，为兜率天王及其眷属，说不退转地之行，时维摩诘来谓我言：\n弥勒！世尊授仁者记，一生当得阿耨多罗三藐三菩提，为用何生，得受记乎？\n过去耶？未来耶？现在耶？\n若过去生，过去生已灭；若未来生，未来生未至；若现在生，现在生无住，如佛所说。\n比丘，汝今即时，亦生亦老亦灭。\n若以无生得受记者，无生即是正位，于正位中，亦无受记，亦无得阿耨多罗三藐三菩提，云何弥勒受一生记乎？\n为从如生得受记耶？为从如灭得受记耶？\n若以如生得受记者，如无有生；若以如灭得受记者，如无有灭。\n一切众生皆如也，一切法亦如也，众圣贤亦如也，至于弥勒亦如也。\n若弥勒得受记者，一切众生亦应受记，所以者何？夫如者，不二不异。\n若弥勒得阿耨多罗三藐三菩提者，一切众生皆亦应得，所以者何？一切众生即菩提相。\n若弥勒得灭度者，一切众生亦当灭度，所以者何？诸佛知一切众生毕竟寂灭，即涅槃相，不复更灭。\n是故弥勒无以此法诱诸天子，实无发阿耨多罗三藐三菩提心者，亦无退者。\n弥勒！当令此诸天子，舍于分别菩提之见，所以者何？\n菩提者不可以身得，不可以心得；\n寂灭是菩提，灭诸相故；不观是菩提，离诸缘故；\n不行是菩提，无忆念故；断是菩提，舍诸见故；离是菩提，离诸妄想故；\n障是菩提，障诸愿故；不入是菩提，无贪著故；顺是菩提，顺于如故；\n住是菩提，住法性故；至是菩提，至实际故；不二是菩提，离意法故；\n等是菩提，等虚空故；无为是菩提，无生住灭故；知是菩提，了众生心行故；\n不会是菩提，诸入不会故；不合是菩提，离烦恼习故；无处是菩提，无形色故；\n假名是菩提，名字空故；如化是菩提，无取舍故；无乱是菩提，常自静故；\n善寂是菩提，性清净故；无取是菩提，离攀缘故；无异是菩提，诸法等故；\n无比是菩提，无可喻故；微妙是菩提，诸法难知故。\n世尊！维摩诘说是法时，二百天子得无生法忍。故我不任诣彼问疾。\n\n佛告光严童子：汝行诣维摩诘问疾。\n光严白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔出毗耶离大城，时维摩诘方入城，我即为作礼而问言：居士从何所来？\n答我言：吾从道场来。\n我问：道场者何所是？\n答曰：\n直心是道场，无虚假故；发行是道场，能办事故；深心是道场，增益功德故；\n菩提心是道场，无错谬故；布施是道场，不望报故；持戒是道场，得愿具故；\n忍辱是道场，于诸众生心无碍故；精进是道场，不懈退故；禅定是道场，心调柔故；\n智慧是道场，现见诸法故；慈是道场，等众生故；悲是道场，忍疲苦故；\n喜是道场，悦乐法故；舍是道场，憎爱断故；神通是道场，成就六通故；\n解脱是道场，能背舍故；方便是道场，教化众生故；四摄是道场，摄众生故；\n多闻是道场，如闻行故；伏心是道场，正观诸法故；\n三十七品是道场，舍有为法故；四谛是道场，不诳世间故；\n缘起是道场，无明乃至老死皆无尽故；诸烦恼是道场，知如实故；\n众生是道场，知无我故；一切法是道场，知诸法空故；\n降魔是道场，不倾动故；三界是道场，无所趣故；\n师子吼是道场，无所畏故；力、无畏、不共法是道场，无诸过故；\n三明是道场，无余碍故；一念知一切法是道场，成就一切智故。\n如是，善男子！菩萨若应诸波罗蜜，教化众生，诸有所作，举足下足，当知皆从道场来，住于佛法矣！\n说是法时，五百天人皆发阿耨多罗三藐三菩提心，故我不任诣彼问疾。\n\n佛告持世菩萨：汝行诣维摩诘问疾。\n持世白佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔，住于静室，时魔波旬，从万二千天女，状如帝释，鼓乐弦歌，来诣我所。\n与其眷属，稽首我足，合掌恭敬，于一面立。\n我意谓是帝释，而语之言：善来憍尸迦！虽福应有，不当自恣。当观五欲无常，以求善本，于身命财而修坚法。\n即语我言：正士！受是万二千天女，可备扫洒。\n我言：憍尸迦！无以此非法之物要我沙门释子，此非我宜。\n所言未讫，时维摩诘来谓我言：非帝释也，是为魔来娆固汝耳！\n即语魔言：是诸女等，可以与我，如我应受。\n魔即惊惧，念维摩诘：将无恼我？欲隐形去，而不能隐；尽其神力，亦不得去。\n即闻空中声曰：波旬以女与之，乃可得去。\n魔以畏故，俯仰而与。\n\n尔时，维摩诘语诸女言：魔以汝等与我，今汝皆当发阿耨多罗三藐三菩提心。\n即随所应而为说法，令发道意。复言：汝等已发道意，有法乐可以自娱，不应复乐五欲乐也。\n天女即问：何谓法乐？\n答言：\n乐常信佛，乐欲听法，乐供养众，乐离五欲；乐观五阴如怨贼，乐观四大如毒蛇，乐观内入如空聚；\n乐随护道意，乐饶益众生，乐敬养师；乐广行施，乐坚持戒，乐忍辱柔和，乐勤集善根，乐禅定不乱，乐离垢明慧；\n乐广菩提心，乐降伏众魔，乐断诸烦恼，乐净佛国土，乐成就相好故，修诸功德，乐庄严道场；\n乐闻深法不畏；乐三脱门，不乐非时；乐近同学，乐于非同学中，心无恚碍；\n乐将护恶知识，乐亲近善知识；乐心喜清净，乐修无量道品之法，是为菩萨法乐。\n\n于是波旬告诸女言：我欲与汝俱还天宫。\n诸女言：以我等与此居士，有法乐，我等甚乐，不复乐五欲乐也。\n魔言：居士可舍此女？一切所有施于彼者，是为菩萨。\n维摩诘言：我已舍矣！汝便将去，令一切众生得法愿具足。\n\n于是诸女问维摩诘：我等云何，止于魔宫？\n维摩诘言：诸姊！有法门名无尽灯，汝等当学。\n无尽灯者，譬如一灯，然百千灯，冥者皆明，明终不尽。\n如是诸姊！夫一菩萨开导百千众生，令发阿耨多罗三藐三菩提心，于其道意亦不灭尽，随所说法，而自增益一切善法，是名无尽灯也。\n汝等虽住魔宫，以是无尽灯，令无数天子天女，发阿耨多罗三藐三菩提心者，为报佛恩，亦大饶益一切众生。\n尔时，天女头面礼维摩诘足，随魔还宫，忽然不现。\n世尊！维摩诘有如是自在神力，智慧辩才，故我不任诣彼问疾。\n\n佛告长者子善德：汝行诣维摩诘问疾。\n善德向佛言：世尊！我不堪任诣彼问疾。所以者何？\n忆念我昔，自于父舍，设大施会，供养一切沙门婆罗门，及诸外道贫穷下贱孤独乞人。\n期满七日，时维摩诘，来入会中，谓我言：\n长者子！夫大施会不当如汝所设，当为法施之会，何用是财施会为？\n我言：居士！何谓法施之会？\n法施会者，无前无后，一时供养一切众生，是名法施之会。\n曰：何谓也？\n谓以菩提，起于慈心；以救众生，起大悲心；以持正法，起于喜心；以摄智慧，行于舍心；\n以摄悭贪，起檀波罗蜜；以化犯戒，起尸罗波罗蜜；以无我法，起羼提波罗蜜；\n以离身心相，起毗梨耶波罗蜜；以菩提相，起禅波罗蜜；以一切智，起般若波罗蜜；\n教化众生，而起于空；不舍有为法，而起无相；示现受生，而起无作；\n护持正法，起方便力；以度众生，起四摄法；以敬事一切，起除慢法；\n于身命财，起三坚法；于六念中，起思念法；于六和敬，起质直心；\n正行善法，起于净命；心净欢喜，起近贤圣；不憎恶人，起调伏心；\n以出家法，起于深心；以如说行，起于多闻；以无诤法，起空闲处；\n趣向佛慧，起于宴坐；解众生缚，起修行地；以具相好，及净佛土，起福德业；\n知一切众生心念，如应说法，起于智业；知一切法，不取不舍，入一相门，起于慧业；\n断一切烦恼、一切障碍、一切不善法，起一切善业；\n以得一切智慧、一切善法，起于一切助佛道法。\n如是善男子，是为法施之会。\n若菩萨住是法施会者，为大施主，亦为一切世间福田。\n世尊！维摩诘说是法时，婆罗门众中二百人，皆发阿耨多罗三藐三菩提心。\n我时心得清净，叹未曾有！稽首礼维摩诘足，即解璎珞价值百千而以上之，不肯取。\n我言：居士愿必纳受，随意所与。\n维摩诘乃受璎珞，分作二分，持一分施此会中一最下乞人，持一分奉彼难胜如来。\n一切众会皆见光明国土难胜如来，又见珠璎在彼佛上变成四柱宝台，四面严饰，不相障蔽。\n时维摩诘现神变已，又作是言：\n若施主等心施一最下乞人，犹如如来福田之相，无所分别，等于大悲，不求果报，是则名曰具足法施。\n城中一最下乞人，见是神力，闻其所说，皆发阿耨多罗三藐三菩提心，故我不任诣彼问疾。\n\n如是诸菩萨各各向佛说其本缘，称述维摩诘所言，皆曰：不任诣彼问疾。\n\n【文殊师利问疾品第五】\n\n尔时，佛告文殊师利：汝行诣维摩诘问疾。\n文殊师利白佛言：\n世尊！彼上人者，难为詶对。深达实相，善说法要，辩才无滞，智慧无碍；\n一切菩萨法式悉知，诸佛秘藏无不得入；降伏众魔，游戏神通，其慧方便，皆已得度。\n虽然，当承佛圣旨，诣彼问疾。\n\n于是众中诸菩萨大弟子，释梵四天王等，咸作是念：\n今二大士，文殊师利、维摩诘共谈，必说妙法。\n即时八千菩萨，五百声闻，百千天人，皆欲随从。\n于是文殊师利与诸菩萨大弟子众，及诸天人恭敬围绕，入毗耶离大城。\n\n尔时，长者维摩诘心念：今文殊师利，与大众俱来。\n即以神力，空其室内，除去所有，及诸侍者；唯置一床，以疾而卧。\n\n文殊师利，既入其舍，见其室空，无诸所有，独寝一床。\n\n时维摩诘言：善来，文殊师利！不来相而来，不见相而见。\n\n文殊师利言：如是！居士！若来已，更不来；若去已，更不去。\n所以者何？来者无所从来，去者无所至，所可见者，更不可见。\n且置是事，居士！是疾宁可忍不？疗治有损，不至增乎！\n世尊殷勤，致问无量，居士是疾，何所因起？其生久如？当云何灭？\n\n维摩诘言：\n从痴有爱，则我病生；以一切众生病，是故我病；若一切众生得不病者，则我病灭。\n所以者何？菩萨为众生故入生死，有生死则有病；若众生得离病者，则菩萨无复病。\n譬如长者，唯有一子，其子得病，父母亦病。若子病愈，父母亦愈。\n菩萨如是，于诸众生，爱之若子；众生病则菩萨病，众生病愈，菩萨亦愈。\n又言是疾，何所因起？菩萨疾者，以大悲起。\n\n文殊师利言：居士此室，何以空无侍者？\n维摩诘言：诸佛国土，亦复皆空。\n又问：以何为空？答曰：以空空。\n又问：空何用空？答曰：以无分别空故空。\n又问：空可分别耶？答曰：分别亦空。\n又问：空当于何求？答曰：当于六十二见中求。\n又问：六十二见当于何求？答曰：当于诸佛解脱中求。\n又问：诸佛解脱当于何求？答曰：当于一切众生心行中求。\n又仁所问：何无侍者？一切众魔，及诸外道，皆吾侍也。\n所以者何？众魔者乐生死，菩萨于生死而不舍；外道者乐诸见，菩萨于诸见而不动。\n\n文殊师利言：居士所疾，为何等相？\n维摩诘言：我病无形不可见。\n又问：此病身合耶？心合耶？\n答曰：非身合，身相离故；亦非心合，心如幻故。\n又问：地大、水大、火大、风大，于此四大，何大之病？\n答曰：是病非地大，亦不离地大；水火风大，亦复如是。而众生病，从四大起，以其有病，是故我病。\n\n尔时，文殊师利问维摩诘言：菩萨应云何慰喻有疾菩萨？\n维摩诘言：\n说身无常，不说厌离于身；说身有苦，不说乐于涅槃；\n说身无我，而说教导众生；说身空寂，不说毕竟寂灭；\n说悔先罪，而不说入于过去；以己之疾，愍于彼疾；\n当识宿世无数劫苦，当念饶益一切众生；忆所修福，念于净命，勿生忧恼，常起精进；\n当作医王，疗治众病。菩萨应如是慰喻有疾菩萨，令其欢喜。\n\n文殊师利言：居士！有疾菩萨云何调伏其心？\n维摩诘言：\n有疾菩萨，应作是念：今我此病，皆从前世妄想颠倒诸烦恼生，无有实法，谁受病者！\n所以者何？四大合故，假名为身；四大无主，身亦无我；又此病起，皆由著我，是故于我，不应生著。\n既知病本，即除我想及众生想。当起法想，应作是念：\n但以众法，合成此身；起唯法起，灭唯法灭。\n又此法者，各不相知，起时不言我起，灭时不言我灭。\n\n彼有疾菩萨，为灭法想，当作是念：\n此法想者，亦是颠倒，颠倒者即是大患，我应离之。\n云何为离？离我我所。云何离我我所？谓离二法。云何离二法？谓不念内外诸法行于平等。\n云何平等？谓我等涅槃等。\n所以者何？我及涅槃，此二皆空，以何为空？但以名字故空。\n如此二法，无决定性，得是平等；无有余病，唯有空病；空病亦空。\n是有疾菩萨，以无所受而受诸受，未具佛法，亦不灭受而取证也。\n\n设身有苦，念恶趣众生，起大悲心，我既调伏，亦当调伏一切众生；但除其病，而不除法，为断病本而教导之。\n何谓病本？谓有攀缘，从有攀缘，则为病本。\n何所攀缘？谓之三界。云何断攀缘？以无所得，若无所得，则无攀缘。\n何谓无所得？谓离二见。何谓二见？谓内见外见，是无所得。\n\n文殊师利！是为有疾菩萨调伏其心，为断老病死苦，是菩萨菩提。\n若不如是，已所修治，为无慧利。\n\n彼有疾菩萨，复应作是念：\n如我此病，非真非有，众生病亦非真非有。\n作是观时，于诸众生若起爱见大悲，即应舍离，所以者何？\n菩萨断除客尘烦恼而起大悲。爱见悲者，则于生死有疲厌心，若能离此，无有疲厌，\n在在所生，不为爱见之所覆也。所生无缚，能为众生说法解缚。\n\n何谓缚？何谓解？\n贪著禅味，是菩萨缚；以方便生，是菩萨解。\n又无方便慧缚，有方便慧解；无慧方便缚，有慧方便解。\n\n文殊师利！彼有疾菩萨，应如是观诸法。\n又复观身无常，苦、空、非我，是名为慧。\n虽身有疾，常在生死，饶益一切，而不厌倦，是名方便。\n\n文殊师利！有疾菩萨应如是调伏其心，不住其中，亦复不住不调伏心。\n所以者何？若住不调伏心，是愚人法；若住调伏心，是声闻法。\n是故菩萨不当住于调伏不调伏心，离此二法，是菩萨行。\n在于生死，不为污行；住于涅槃，不永灭度，是菩萨行；\n非凡夫行，非贤圣行，是菩萨行；非垢行，非净行，是菩萨行；\n虽过魔行，而现降伏众魔，是菩萨行；\n求一切智，无非时求，是菩萨行；\n虽观诸法不生，而不入正位，是菩萨行；\n虽观十二缘起，而入诸邪见，是菩萨行；\n虽摄一切众生，而不爱著，是菩萨行；\n虽乐远离，而不依身心尽，是菩萨行；\n虽行三界，而不坏法性，是菩萨行；\n虽行于空，而殖众德本，是菩萨行；\n虽行无相，而度众生，是菩萨行；\n虽行无作，而现受身，是菩萨行；\n虽行无起，而起一切善行，是菩萨行；\n虽行六波罗蜜，而遍知众生心心数法，是菩萨行；\n虽行六通，而不尽漏，是菩萨行；\n虽行四无量心，而不贪著生于梵世，是菩萨行；\n虽行禅定解脱三昧，而不随禅生，是菩萨行；\n虽行四念处，不毕竟永离身受心法，是菩萨行；\n虽行四正勤，而不舍身心精进，是菩萨行；\n虽行四如意足，而得自在神通，是菩萨行；\n虽行五根，而分别众生诸根利钝，是菩萨行；\n虽行五力，而乐求佛十力，是菩萨行；\n虽行七觉分，而分别佛之智慧，是菩萨行；\n虽行八正道，而乐行无量佛道，是菩萨行；\n虽行止观助道之法，而不毕竟堕于寂灭，是菩萨行；\n虽行诸法不生不灭，而以相好庄严其身，是菩萨行；\n虽现声闻辟支佛威仪，而不舍佛法，是菩萨行；\n虽随诸法究竟净相，而随所应为现其身，是菩萨行；\n虽观诸佛国土永寂如空，而现种种清净佛土，是菩萨行；\n虽得佛道转于法轮入于涅槃，而不舍于菩萨之道，是菩萨行。\n\n说是语时，文殊师利所将大众，其中八千天子，皆发阿耨多罗三藐三菩提心。\n\n【不思议品第六】\n\n尔时，舍利弗见此室中无有床座，作是念：斯诸菩萨大弟子众，当于何坐？\n\n长者维摩诘知其意，语舍利弗言：云何仁者为法来耶？求床座耶？\n舍利弗言：我为法来，非为床座。\n维摩诘言：唯，舍利弗！夫求法者，不贪躯命，何况床座？\n\n夫求法者，非有色受想行识之求，非有界入之求，非有欲色无色之求。\n唯，舍利弗！夫求法者，不著佛求，不著法求，不著众求；\n夫求法者，无见苦求，无断集求，无造尽证修道之求。\n所以者何？法无戏论，若言我当见苦、断集、证灭、修道，是则戏论，非求法也。\n唯，舍利弗！法名寂灭，若行生灭，是求生灭，非求法也；\n法名无染，若染于法，乃至涅槃，是则染著，非求法也；\n法无行处，若行于法，是则行处，非求法也；\n法无取舍，若取舍法，是则取舍，非求法也；\n法无处所，若著处所，是则著处，非求法也；\n法名无相，若随相识，是则求相，非求法也；\n法不可住，若住于法，是则住法，非求法也；\n法不可见闻觉知，若行见闻觉知，是则见闻觉知，非求法也；\n法名无为，若行有为，是求有为，非求法也。\n是故舍利弗！若求法者，于一切法，应无所求。\n\n说是语时，五百天子于诸法中，得法眼净。\n\n尔时，长者维摩诘，问文殊师利：仁者游于无量千万亿阿僧祇国，何等佛土有好上妙功德成就师子之座？\n文殊师利言：居士！东方度三十六恒河沙国，有世界名须弥相，其佛号须弥灯王，今现在。\n彼佛身长八万四千由旬，其师子座高八万四千由旬，严饰第一。\n\n于是长者维摩诘现神通力，即时彼佛遣三万二千师子座，高广严净，来入维摩诘室，\n诸菩萨大弟子，释梵四天王等，昔所未见！其室广博，悉皆包容三万二千师子之座，无所妨碍。\n于毗耶离城，及阎浮提四天下，亦不迫迮，悉见如故。\n\n尔时，维摩诘语文殊师利：就师子座，与诸菩萨上人俱坐，当自立身如彼座像。\n其得神通菩萨，即自变形为四万二千由旬，坐师子座。诸新发意菩萨及大弟子，皆不能升。\n\n尔时，维摩诘语舍利弗：就师子座。\n舍利弗言：居士！此座高广，吾不能升。\n维摩诘言：唯，舍利弗！为须弥灯王如来作礼，乃可得坐。\n于是新发意菩萨及大弟子，即为须弥灯王如来作礼，便得坐师子座。\n\n舍利弗言：居士！未曾有也，如是小室，乃容受此高广之座，于毗耶离城，无所妨碍，又于阎浮提聚落城邑，及四天下诸天龙王鬼神宫殿，亦不迫迮。\n维摩诘言：唯，舍利弗！诸佛菩萨，有解脱名\"不可思议\"，若菩萨住是解脱者，\n以须弥之高广内芥子中无所增减，须弥山王本相如故，而四天王、忉利诸天，不觉不知己之所入，\n唯应度者乃见须弥入芥子中，是名\"不可思议解脱法门\"。\n又以四大海水入一毛孔，不娆鱼鳖鼋鼍水性之属，而彼大海本相如故，诸龙鬼神阿修罗等，不觉不知己之所入。\n又舍利弗！住不可思议解脱菩萨，断取三千大千世界，如陶家轮，著右掌中，掷过恒沙世界之外，其中众生，不觉不知己之所往。又复还置本处，都不使人有往来想，而此世界本相如故。\n又舍利弗！或有众生，乐久住世，而可度者，菩萨即演七日以为一劫，令彼众生谓之一劫；或有众生不乐久住，而可度者，菩萨即促一劫以为七日，令彼众生谓之七日。\n又舍利弗！住不可思议解脱菩萨，以一切佛土严饰之事，集在一国，示于众生。\n又菩萨以一切佛土众生置之右掌，飞到十方遍示一切，而不动本处。\n又舍利弗！十方众生供养诸佛之具，菩萨于一毛孔，皆令得见。\n又十方国土所有日月星宿，于一毛孔，普使见之。\n又舍利弗！十方世界所有诸风，菩萨悉能吸著口中，而身无损，外诸树木，亦不摧折。\n又十方世界劫尽烧时，以一切火内于腹中，火事如故，而不为害。\n又于下方过恒河沙等诸佛世界，取一佛土，举著上方，过恒河沙无数世界，如持针锋举一枣叶，而无所娆。\n又舍利弗！住不可思议解脱菩萨，能以神通现作佛身，或现辟支佛身，或现声闻身，或现帝释身，或现梵王身，或现世主身，或现转轮圣王身。\n又十方世界所有众声，上中下音，皆能变之，令作佛声，演出无常苦空无我之音。\n及十方诸佛，所说种种之法，皆于其中，普令得闻。\n舍利弗！我今略说菩萨不可思议解脱之力，若广说者，穷劫不尽。\n\n是时，大迦叶闻说菩萨不可思议解脱法门，叹未曾有，谓舍利弗：\n譬如有人，于盲者前现众色像，非彼所见；\n一切声闻，闻是不可思议解脱法门，不能解了，为若此也！\n智者闻是，其谁不发阿耨多罗三藐三菩提心？\n我等何为永绝其根？于此大乘，已如败种！\n一切声闻，闻是不可思议解脱法门，皆应号泣，声震三千大千世界；\n一切菩萨，应大欣庆，顶受此法。\n若有菩萨信解不可思议解脱法门者，一切魔众无如之何。\n大迦叶说此语时，三万二千天子，皆发阿耨多罗三藐三菩提心。\n\n尔时，维摩诘语大迦叶：\n仁者！十方无量阿僧祗世界中作魔王者，多是住不可思议解脱菩萨，以方便力故，教化众生，现作魔王。\n又迦叶！十方无量菩萨，或有人从乞手足耳鼻、头目髓脑、血肉皮骨、聚落城邑、妻子奴婢、象马车乘、金银琉璃、砗磲玛瑙、珊瑚琥珀、真珠珂贝、衣服饮食，\n如此乞者，多是住不可思议解脱菩萨，以方便力，而往试之，令其坚固。\n所以者何？住不可思议解脱菩萨，有威德力，故行逼迫，示诸众生，如是难事。\n凡夫下劣，无有力势，不能如是逼迫菩萨；\n譬如龙象蹴踏，非驴所堪，是名住不可思议解脱菩萨智慧方便之门。\n\n【观众生品第七】\n\n尔时，文殊师利问维摩诘言：菩萨云何观于众生？\n\n维摩诘言：\n譬如幻师，见所幻人。菩萨观众生为若此。\n如智者见水中月，如镜中见其面像；\n如热时焰，如呼声响，如空中云，如水聚沫，如水上泡；\n如芭蕉坚，如电久住，如第五大，如第六阴，如第七情，如十三入，如十九界；\n菩萨观众生为若此。\n如无色界色，如焦谷芽，如须陀洹身见，如阿那含入胎，如阿罗汉三毒，\n如得忍菩萨贪恚毁禁，如佛烦恼习，如盲者见色，如入灭尽定出入息，\n如空中鸟迹，如石女儿，如化人烦恼，如梦所见已寤，如灭度者受身，如无烟之火，\n菩萨观众生为若此。\n\n文殊师利言：若菩萨作是观者，云何行慈？\n维摩诘言：\n菩萨作是观已，自念我当为众生说如斯法，是即真实慈也。\n行寂灭慈，无所生故；行不热慈，无烦恼故；行等之慈，等三世故；\n行无诤慈，无所起故；行不二慈，内外不合故；行不坏慈，毕竟尽故；\n行坚固慈，心无毁故；行清净慈，诸法性净故；行无边慈，如虚空故；\n行阿罗汉慈，破结贼故；行菩萨慈，安众生故；行如来慈，得如相故；\n行佛之慈，觉众生故；行自然慈，无因得故；行菩提慈，等一味故；\n行无等慈，断诸爱故；行大悲慈，导以大乘故；行无厌慈，观空无我故；\n行法施慈，无遗惜故；行持戒慈，化毁禁故；行忍辱慈，护彼我故；\n行精进慈，荷负众生故；行禅定慈，不受味故；行智慧慈，无不知时故；\n行方便慈，一切示现故；行无隐慈，直心清净故；行深心慈，无杂行故；\n行无诳慈，不虚假故；行安乐慈，令得佛乐故。菩萨之慈，为若此也。\n\n文殊师利又问：何谓为悲？\n答曰：菩萨所作功德，皆与一切众生共之。\n何谓为喜？答曰：有所饶益，欢喜无悔。\n何谓为舍？答曰：所作福祐，无所希望。\n\n文殊师利又问：生死有畏，菩萨当何所依？\n维摩诘言：菩萨于生死畏中，当依如来功德之力。\n文殊师利又问：菩萨欲依如来功德之力，当于何住？\n答曰：菩萨欲依如来功德之力者，当住度脱一切众生。\n又问：欲度众生，当何所除？答曰：欲度众生，除其烦恼。\n又问：欲除烦恼，当何所行？答曰：当行正念。\n又问：云何行于正念？答曰：当行不生不灭。\n又问：何法不生？何法不灭？答曰：不善不生，善法不灭。\n又问：善不善孰为本？答曰：身为本。\n又问：身孰为本？答曰：欲贪为本。\n又问：欲贪孰为本？答曰：虚妄分别为本。\n又问：虚妄分别孰为本？答曰：颠倒想为本。\n又问：颠倒想孰为本？答曰：无住为本。\n又问：无住孰为本？答曰：无住则无本。\n文殊师利！从无住本，立一切法。\n\n时维摩诘室有一天女，见诸天人闻所说法，便现其身，即以天华，散诸菩萨大弟子上。\n华至诸菩萨，即皆堕落，至大弟子，便著不堕。\n一切弟子，神力去华，不能令去。\n尔时，天问舍利弗：何故去华？\n答曰：此华不如法，是以去之。\n天曰：勿谓此华为不如法，所以者何？是华无所分别，仁者自生分别想耳！\n若于佛法出家，有所分别，为不如法；若无所分别，是则如法。\n观诸菩萨华不著者，已断一切分别想故。\n譬如人畏时，非人得其便；如是弟子畏生死故，色声香味触得其便也。\n已离畏者，一切五欲无能为也；结习未尽，华著身耳！结习尽者华不著也。\n\n舍利弗言：天止此室，其已久如。\n答曰：我止此室，如耆年解脱。\n舍利弗言：止此久耶？\n天曰：耆年解脱，亦何如久？\n舍利弗默然不答。天曰：如何耆旧大智而默？\n答曰：解脱者无所言说，故吾于是不知所云。\n天曰：言说文字，皆解脱相，所以者何？\n解脱者，不内、不外，不在两间，文字亦不内不外，不在两间，是故舍利弗，无离文字说解脱也，所以者何？一切诸法是解脱相。\n舍利弗言：不复以离淫怒痴为解脱乎？\n天曰：佛为增上慢人，说离淫怒痴为解脱耳！若无增上慢者，佛说淫怒痴性，即是解脱。\n舍利弗言：善哉！善哉！天女汝何所得？以何为证？辩乃如是！\n天曰：我无得无证，故辩如是，所以者何？若有得有证者，则于佛法为增上慢。\n\n舍利弗问天：汝于三乘，为何志求？\n天曰：以声闻法化众生故，我为声闻；以因缘法化众生故，我为辟支佛；以大悲法化众生故，我为大乘。\n舍利弗！如人入瞻卜林，唯嗅瞻卜，不嗅余香。\n如是，若入此室，但闻佛功德之香，不乐闻声闻辟支佛功德香也。\n舍利弗！其有释梵四天王，诸天龙鬼神等，入此室者，闻斯上人讲说正法，皆乐佛功德之香，发心而出。\n舍利弗！吾止此室，十有二年，初不闻说声闻辟支佛法，但闻菩萨大慈大悲，不可思议诸佛之法。\n舍利弗！此室常现八未曾有难得之法：\n此室常以金色光照，昼夜无异，不以日月所照为明，是为一未曾有难得之法；\n此室入者，不为诸垢之所恼也，是为二未曾有难得之法；\n此室常有释梵四天王、他方菩萨来会不绝，是为三未曾有难得之法；\n此室常说六波罗密不退转法，是为四未曾有难得之法；\n此室常作天人第一之乐，弦出无量法化之声，是为五未曾有难得之法；\n此室有四大藏，众宝积满，周穷济乏，求得无尽，是为六未曾有难得之法；\n此室十方无量诸佛，是上人念时，即为皆来，广说诸佛秘要法藏，说已还去，是为七未曾有难得之法；\n此室一切诸天严饰宫殿，诸佛净土，皆于中现，是为八未曾有难得之法。\n舍利弗！此室常现八未曾有难得之法，谁有见斯不思议事，而复乐于声闻法乎？\n\n舍利弗言：汝何以不转女身？\n天曰：我从十二年来求女人相，了不可得，当何所转！\n譬如幻师化作幻女，若有人问：何以不转女身？是人为正问不？\n舍利弗言：不也！幻无定相，当何所转？\n天曰：一切诸法亦复如是，无有定相，云何乃问不转女身？\n\n即时天女以神通力，变舍利弗令如天女，天自化身如舍利弗，而问言：何以不转女身？\n舍利弗以天女像而答言：我今不知何转而变为女身？\n天曰：舍利弗，若能转此女身，则一切女人亦当能转。\n如舍利弗非女而现女身，一切女人亦复如是，虽现女身，而非女也。\n是故佛说一切诸法非男非女。\n即时天女还摄神力，舍利弗身还复如故。\n天问舍利弗：女身色相，今何所在？\n舍利弗言：女身色相，无在无不在。\n天曰：一切诸法，亦复如是，无在无不在。夫无在无不在者，佛所说也。\n\n舍利弗问天：汝于此没，当生何所？\n天曰：佛化所生，吾如彼生。\n曰：佛化所生，非没生也。\n天曰：众生犹然，无没生也。\n\n舍利弗问天：汝久如当得阿耨多罗三藐三菩提？\n天曰：如舍利弗还为凡夫，我乃当成阿耨多罗三藐三菩提。\n舍利弗言：我作凡夫，无有是处。\n天曰：我得阿耨多罗三藐三菩提，亦无是处。\n所以者何？菩提无住处，是故无有得者。\n舍利弗言：今诸佛得阿耨多罗三藐三菩提，已得当得，如恒河沙，皆谓何乎？\n天曰：皆以世俗文字数故，说有三世，非谓菩提有去来今。\n天曰：舍利弗！汝得阿罗汉道耶？曰：无所得故而得。\n天曰：诸佛菩萨，亦复如是，无所得故而得。\n\n尔时，维摩诘语舍利弗：\n是天女已曾供养九十二亿诸佛，已能游戏菩萨神通，所愿具足，得无生忍，住不退转；以本愿故，随意能现，教化众生。\n\n【佛道品第八】\n\n尔时，文殊师利问维摩诘言：菩萨云何通达佛道？\n维摩诘言：若菩萨行于非道，是为通达佛道。\n又问：云何菩萨行于非道？\n答曰：\n若菩萨行五无间，而无恼恚；至于地狱，无诸罪垢；\n至于畜生，无有无明憍慢等过；至于饿鬼，而具足功德；\n行色无色界道，不以为胜。\n示行贪欲，离诸染著；示行嗔恚，于诸众生，无有恚碍；\n示行愚痴，而以智慧，调伏其心。\n示行悭贪，而舍内外所有，不惜身命；示行毁禁，而安住净戒，乃至小罪，犹怀大惧；\n示行嗔恚，而常慈忍；示行懈怠，而勤修功德；\n示行乱意，而常念定；示行愚痴，而通达世间、出世间慧；\n示行谄伪，而善方便，随诸经义；示行憍慢，而于众生，犹如桥梁；\n示行诸烦恼，而心常清净；示入于魔，而顺佛智慧，不随他教；\n示入声闻，而为众生，说未闻法；示入辟支佛，而成就大悲，教化众生；\n示入贫穷，而有宝手，功德无尽；示入形残，而具诸相好，以自庄严；\n示入下贱，而生佛种性中，具诸功德；示入羸劣丑陋，而得那罗延身，一切众生之所乐见；\n示入老病，而永断病根，超越死畏；示有资生，而恒观无常，实无所贪；\n示有妻妾婇女，而常远离五欲淤泥；现于讷钝，而成就辩才，总持无失；\n示入邪济，而以正济，度诸众生；现遍入诸道，而断其因缘；\n现于涅槃，而不断生死。\n文殊师利！菩萨能如是行于非道，是为通达佛道。\n\n于是维摩诘问文殊师利：何等为如来种？\n文殊师利言：\n有身为种，无明有爱为种，贪恚痴为种，四颠倒为种，五盖为种，六入为种，\n七识处为种，八邪法为种，九恼处为种，十不善道为种。\n以要言之，六十二见及一切烦恼，皆为佛种。\n曰：何谓也？\n答曰：若见无为入正位者，不能复发阿耨多罗三藐三菩提心；\n譬如高原陆地，不生莲华，卑湿淤泥，乃生此华；\n如是见无为法入正位者，终不复能生于佛法；烦恼泥中，乃有众生起佛法耳！\n又如植种于空，终不得生！粪壤之地，乃能滋茂。\n如是入无为正位者，不生佛法；起于我见如须弥山，犹能发于阿耨多罗三藐三菩提心，生佛法矣！\n是故当知，一切烦恼，为如来种。\n譬如不下巨海，不能得无价宝珠。如是不入烦恼大海，则不能得一切智宝。\n\n尔时，大迦叶叹言：善哉！善哉！文殊师利！快说此语。\n诚如所言，尘劳之俦，为如来种；\n我等今者，不复堪任发阿耨多罗三藐三菩提心；\n乃至五无间罪，犹能发意生于佛法，而今我等永不能发？\n譬如根败之士，其于五欲不能复利。\n如是声闻诸结断者，于佛法中无所复益，永不志愿。\n是故文殊师利！凡夫于佛法有反复，而声闻无也。\n所以者何？凡夫闻佛法，能起无上道心，不断三宝。\n正使声闻终身闻佛法，力无畏等，永不能发无上道意。\n\n【入不二法门品第九】\n\n尔时，维摩诘谓众菩萨言：诸仁者！云何菩萨入不二法门？各随所乐说之。\n\n会中有菩萨名法自在，说言：诸仁者！生灭为二。法本不生，今则无灭，得此无生法忍，是为入不二法门。\n\n德守菩萨曰：我、我所为二。因有我故，便有我所，若无有我，则无我所，是为不二法门。\n\n不眴菩萨曰：受、不受为二。若法不受，则不可得，以不得，故无取无舍，无作无行，是为入不二法门。\n\n德顶菩萨曰：垢、净为二。见垢实性，则无净相，顺于灭相，是为入不二法门。\n\n善宿菩萨曰：是动、是念为二。不动则无念，无念即无分别，通达此者，是为入不二法门。\n\n善眼菩萨曰：一相、无相为二。若知一相即是无相，亦不取无相，入于平等，是为入不二法门。\n\n妙臂菩萨曰：菩萨心、声闻心为二。观心相空如幻化者，无菩萨心，无声闻心，是为入不二法门。\n\n弗沙菩萨曰：善、不善为二。若不起善不善，入无相际而通达者，是为入不二法门。\n\n师子菩萨曰：罪、福为二。若达罪性，则与福无异，以金刚慧决了此相，无缚无解者，是为入不二法门。\n\n师子意菩萨曰：有漏、无漏为二。若得诸法等，则不起漏不漏想，不著于相，亦不住无相，是为入不二法门。\n\n净解菩萨曰：有为、无为为二。若离一切数，则心如虚空，以清净慧无所碍者，是为入不二法门。\n\n那罗延菩萨曰：世间、出世间为二。世间性空，即是出世间，于其中不入、不出、不溢、不散，是为入不二法门。\n\n善意菩萨曰：生死、涅槃为二。若见生死性，则无生死，无缚无解，不然不灭，如是解者，是为入不二法门。\n\n现见菩萨曰：尽、不尽为二。法若究竟，尽若不尽，皆是无尽相；无尽相即是空，空则无有尽不尽相，如是入者，是为入不二法门。\n\n普守菩萨曰：我、无我为二。我尚不可得，非我何可得？见我实性者，不复起二，是为入不二法门。\n\n电天菩萨曰：明、无明为二。无明实性即是明，明亦不可取，离一切数，于其中平等无二者，是为入不二法门。\n\n喜见菩萨曰：色、色空为二。色即是空，非色灭空，色性自空。如是受想行识、识空为二，识即是空，非识灭空，识性自空，于其中而通达者，是为入不二法门。\n\n明相菩萨曰：四种异、空种异为二。四种性即是空种性，如前际后际空，故中际亦空，若能如是知诸种性者，是为入不二法门。\n\n妙意菩萨曰：眼、色为二。若知眼性于色，不贪不恚不痴，是名寂灭。如是耳声、鼻香、舌味、身触、意法为二，若知意性于法，不贪不恚不痴，是名寂灭，安住其中，是为入不二法门。\n\n无尽意菩萨曰：布施、回向一切智为二。布施性即是回向一切智性，如是持戒、忍辱、精进、禅定、智慧、回向一切智为二，智慧性即是回向一切智性，于其中入一相者，是为入不二法门。\n\n深慧菩萨曰：是空、是无相、是无作为二。空即无相，无相即无作；若空、无相、无作，则无心意识，于一解脱门即是三解脱门者，是为入不二法门。\n\n寂根菩萨曰：佛、法、众为二。佛即是法，法即是众，是三宝皆无为相，与虚空等，一切法亦尔，能随此行者，是为入不二法门。\n\n心无碍菩萨曰：身、身灭为二。身即是身灭，所以者何？见身实相者，起不见身及见灭身，身与灭身，无二无分别，于其中不惊不惧者，是为入不二法门。\n\n上善菩萨曰：身口意善为二。是三业皆无作相，身无作相，即口无作相，口无作相，即意无作相，是三业无作相，即一切法无作相，能如是随无作慧者，是为入不二法门。\n\n福田菩萨曰：福行、罪行、不动行为二。三行实性即是空，空则无福行、无罪行、无不动行，于此三行而不起者，是为入不二法门。\n\n华严菩萨曰：从我起二为二。见我实相者，不起二法，若不住二法，则无有识，无所识者，是为入不二法门。\n\n德藏菩萨曰：有所得相为二。若无所得，则无取舍，无取舍者，是为入不二法门。\n\n月上菩萨曰：闇与明为二。无闇无明，则无有二，所以者何？如入灭受想定，无闇无明，一切法相亦复如是，于其中平等入者，是为入不二法门。\n\n宝印手菩萨曰：乐涅槃、不乐世间为二。若不乐涅槃、不厌世间，则无有二，所以者何？若有缚，则有解，若本无缚，其谁求解？无缚无解，则无乐厌，是为入不二法门。\n\n珠顶王菩萨曰：正道、邪道为二。住正道者，则不分别是邪是正，离此二者，是为入不二法门。\n\n乐实菩萨曰：实、不实为二。实见者尚不见实，何况非实！所以者何？非肉眼所见，慧眼乃能见，而此慧眼，无见无不见，是为入不二法门。\n\n如是诸菩萨各各说已，问文殊师利：何等是菩萨入不二法门？\n文殊师利曰：如我意者，于一切法，无言无说，无示无识，离诸问答，是为入不二法门。\n\n于是文殊师利问维摩诘：我等各自说已，仁者当说何等是菩萨入不二法门？\n时维摩诘默然无言。\n文殊师利叹曰：善哉！善哉！乃至无有文字语言，是真入不二法门。\n\n说是入不二法门品时，于此众中，五千菩萨，皆入不二法门，得无生法忍。\n\n【香积佛品第十】\n\n于是舍利弗心念：日时欲至，此诸菩萨当于何食？\n时维摩诘，知其意而语言：\n佛说八解脱，仁者受行，岂杂欲食而闻法乎？\n若欲食者，且待须臾，当令汝得未曾有食。\n\n时维摩诘即入三昧，以神通力，示诸大众，上方界分过四十二恒河沙佛土，有国名众香，佛号香积，今现在。\n其国香气，比于十方诸佛世界人天之香，最为第一。\n彼土无有声闻辟支佛名，唯有清净大菩萨众，佛为说法。\n其界一切，皆以香作楼阁，经行香地，苑园皆香，其食香气，周流十方无量世界。\n时彼佛与诸菩萨，方共坐食，有诸天子皆号香严，悉发阿耨多罗三藐三菩提心，供养彼佛及诸菩萨，此诸大众莫不目见。\n\n时维摩诘问众菩萨言：诸仁者！谁能致彼佛饭？\n以文殊师利威神力故，咸皆默然。\n维摩诘言：仁此大众，无乃可耻？\n文殊师利曰：如佛所言，勿轻未学。\n\n于是，维摩诘不起于座，居众会前，化作菩萨，相好光明，威德殊胜，蔽于众会，而告之曰：\n汝往上方界分，度如四十二恒河沙佛土，有国名众香，佛号香积，与诸菩萨方共坐食。\n汝往到彼，如我辞曰：维摩诘稽首世尊足下！致敬无量，问讯起居，少病少恼，气力安不？\n愿得世尊所食之余，当于娑婆世界施作佛事，令此乐小法者得弘大道，亦使如来名声普闻。\n\n时化菩萨既受钵饭，与彼九百万菩萨俱，承佛威神，及维摩诘力，于彼世界，忽然不现，须臾之间，至维摩诘舍。\n时维摩诘即化作九百万师子之座，严好如前，诸菩萨皆坐其上。\n时化菩萨以满钵香饭与维摩诘，饭香普薰毗耶离城，及三千大千世界。\n\n时毗耶离婆罗门、居士等，闻是香气，身意快然，叹未曾有！\n于是长者主月盖，从八万四千人，来入维摩诘舍，见其室中菩萨甚多，诸师子座，高广严好，皆大欢喜，礼众菩萨及大弟子，却住一面。\n诸地神虚空神及欲色界诸天，闻此香气，亦皆来入维摩诘舍。\n\n时维摩诘，语舍利弗等诸大声闻：仁者可食，如来甘露味饭，大悲所熏，无以限意食之，使不销也。\n化菩萨曰：勿以声闻小德小智，称量如来无量福慧！\n四海有竭，此饭无尽！使一切人食，抟若须弥，乃至一劫，犹不能尽，所以者何？\n无尽戒、定、智慧、解脱、解脱知见，功德具足者，所食之余，终不可尽。\n于是钵饭悉饱众会，犹故不尽。\n其诸菩萨声闻天人，食此饭者，身安快乐，譬如一切乐庄严国诸菩萨也，又诸毛孔皆出妙香，亦如众香国土诸树之香。\n\n尔时，维摩诘问众香菩萨：香积如来，以何说法？\n彼菩萨曰：我土如来无文字说，但以众香令诸天人得入律行。\n菩萨各各坐香树下，闻斯妙香，即获一切德藏三昧，得是三昧者，菩萨所有功德皆悉具足。\n\n彼诸菩萨问维摩诘：今世尊释迦牟尼，以何说法？\n维摩诘言：此土众生，刚强难化，故佛为说刚强之语以调伏之。\n言是地狱、是畜生、是饿鬼、是诸难处、是愚人生处；\n是身邪行，是身邪行报；是口邪行，是口邪行报；是意邪行，是意邪行报；\n是杀生，是杀生报；是不与取，是不与取报；是邪淫，是邪淫报；\n是妄语，是妄语报；是两舌，是两舌报；是恶口，是恶口报；是无义语，是无义语报；\n是贪嫉，是贪嫉报；是嗔恼，是嗔恼报；是邪见，是邪见报；\n是悭吝，是悭吝报；是毁戒，是毁戒报；是嗔恚，是嗔恚报；\n是懈怠，是懈怠报；是乱意，是乱意报；是愚痴，是愚痴报；\n是结戒，是持戒，是犯戒；是应作，是不应作；是障碍，是不障碍；\n是得罪，是离罪；是净，是垢；是有漏，是无漏；是邪道，是正道；是有为，是无为；是世间，是涅槃。\n以难化之人，心如猕猴，故以若干种法，制御其心，乃可调伏。\n\n彼诸菩萨，闻说是已，皆曰：未曾有也！如世尊释迦牟尼佛，隐其无量自在之力，乃以贫所乐法，度脱众生；\n斯诸菩萨亦能劳谦，以无量大悲，生是佛土。\n维摩诘言：此土菩萨于诸众生大悲坚固，诚如所言。然其一世饶益众生，多于彼国百千劫行。\n所以者何？此娑婆世界，有十事善法，诸余净土之所无有。何等为十？\n以布施摄贫穷，以净戒摄毁禁，以忍辱摄嗔恚，以精进摄懈怠，以禅定摄乱意，以智慧摄愚痴，\n说除难法度八难者，以大乘法度乐小乘者，以诸善根济无德者，常以四摄成就众生，是为十。\n\n彼菩萨曰：菩萨成就几法？于此世界行无疮疣，生于净土。\n维摩诘言：菩萨成就八法，于此世界行无疮疣，生于净土。何等为八？\n饶益众生，而不望报；代一切众生受诸苦恼，所作功德尽以施之；等心众生，谦下无碍；\n于诸菩萨视之如佛；所未闻经，闻之不疑；不与声闻而相违背；\n不嫉彼供，不高己利，而于其中调伏其心；常省己过，不讼彼短，恒以一心求诸功德，是为八。\n\n维摩诘、文殊师利于大众中说是法时，百千天人皆发阿耨多罗三藐三菩提心，十千菩萨得无生法忍。\n\n【菩萨行品第十一】\n\n是时，佛说法于庵罗树园，其地忽然广博严事，一切众会皆作金色。\n阿难白佛言：世尊！以何因缘，有此瑞应？是处忽然广博严事，一切众会皆作金色。\n佛告阿难：是维摩诘、文殊师利，与诸大众恭敬围绕，发意欲来，故先为此瑞应。\n\n于是维摩诘语文殊师利：可共见佛，与诸菩萨礼事供养。\n文殊师利言：善哉！行矣！今正是时。\n\n维摩诘即以神力，持诸大众并师子座，置于右掌，往诣佛所。\n到已著地，稽首佛足，右绕七匝，一心合掌，在一面立；\n其诸菩萨，即皆避座，稽首佛足，亦绕七匝，于一面立；\n诸大弟子，释梵四天王等，亦皆避座，稽首佛足，在一面立。\n于是世尊如法慰问诸菩萨已，各令复座，即皆受教。\n众坐已定，佛语舍利弗：汝见菩萨大士，自在神力之所为乎？\n唯然已见。于汝意云何？\n世尊！我睹其为不可思议，非意所图，非度所测。\n\n尔时，阿难白佛言：世尊！今所闻香，自昔未有，是为何香？\n佛告阿难：是彼菩萨毛孔之香。\n于是舍利弗语阿难言：我等毛孔亦出是香。\n阿难言：此所从来？\n曰：是长者维摩诘，从众香国，取佛余饭，于舍食者，一切毛孔皆香若此。\n\n阿难问维摩诘：是香气住当久如？\n维摩诘言：至此饭消。\n曰：此饭久如当消？\n曰：此饭势力至于七日，然后乃消。\n又阿难，若声闻人，未入正位，食此饭者，得入正位，然后乃消；\n已入正位，食此饭者，得心解脱，然后乃消；\n若未发大乘意，食此饭者，至发意乃消；已发意食此饭者，得无生忍，然后乃消；\n已得无生忍，食此饭者，至一生补处，然后乃消。\n譬如有药，名曰上味，其有服者，身诸毒灭，然后乃消。此饭如是，灭除一切诸烦恼毒，然后乃消。\n\n阿难白佛言：未曾有也！世尊，如此香饭，能作佛事。\n\n佛言：如是！如是！阿难，或有佛土，以佛光明而作佛事，有以诸菩萨而作佛事，\n有以佛所化人而作佛事，有以菩提树而作佛事，有以佛衣服卧具而作佛事，\n有以饭食而作佛事，有以园林台观而作佛事，\n有以三十二相、八十随形好而作佛事，有以佛身而作佛事，有以虚空而作佛事；\n众生应以此缘得入律行。\n有以梦、幻、影、响、镜中像、水中月、热时焰，如是等喻而作佛事。\n有以音声、语言、文字而作佛事。\n或有清净佛土、寂寞无言、无说无示、无识无作无为，而作佛事。\n如是，阿难！诸佛威仪进止，诸所施为，无非佛事。\n阿难！有此四魔，八万四千诸烦恼门，而诸众生为之疲劳，诸佛即以此法而作佛事，是名入一切诸佛法门。\n菩萨入此门者，若见一切净好佛土，不以为喜，不贪不高；若见一切不净佛土，不以为忧，不碍不没；\n但于诸佛生清净心，欢喜恭敬，未曾有也！诸佛如来功德平等！为教化众生故，而现佛土不同。\n阿难！汝见诸佛国土，地有若干，而虚空无若干也；\n如是见诸佛色身有若干耳，其无碍慧无若干也。\n\n阿难！诸佛色身、威相、种性，戒、定、智慧、解脱、解脱知见、力无所畏，不共之法、大慈、大悲，威仪所行，及其寿命，说法教化，成就众生，净佛国土，具诸佛法，悉皆同等。是故名为三藐三佛陀，名为多陀阿伽度，名为佛陀。\n阿难！若我广说此三句义，汝以劫寿，不能尽受；正使三千大千世界满中众生，皆如阿难多闻第一，得念总持，此诸人等，以劫之寿，亦不能受。如是，阿难！诸佛阿耨多罗三藐三菩提，无有限量，智慧辩才不可思议。\n\n阿难白佛言：我从今已往，不敢自谓以为多闻。\n佛告阿难：勿起退意。所以者何？我说汝于声闻中为最多闻，非谓菩萨。\n且止，阿难！其有智者不应限度诸菩萨也；一切海渊尚可测量，菩萨禅定智慧总持辩才，一切功德不可量也。\n阿难！汝等舍置菩萨所行，是维摩诘一时所现神通之力，一切声闻辟支佛于百千劫，尽力变化所不能作。\n\n尔时，众香世界菩萨来者，合掌白佛言：\n世尊！我等初见此土，生下劣想，今自悔责，舍离是心。\n所以者何？诸佛方便，不可思议！为度众生故，随其所应，现佛国异。\n唯然世尊！愿赐少法，还于彼土，当念如来。\n\n佛告诸菩萨：有尽无尽解脱法门，汝等当学。\n何谓为尽？谓有为法；何谓无尽？谓无为法。\n如菩萨者，不尽有为，不住无为。\n\n何谓不尽有为？\n谓不离大慈，不舍大悲；深发一切智心，而不忽忘；教化众生，终不厌倦；\n于四摄法，常念顺行；护持正法，不惜躯命；种诸善根，无有疲厌；\n志常安住，方便回向；求法不懈，说法无吝；勤供诸佛，故入生死而无所畏；\n于诸荣辱，心无忧喜；不轻未学，敬学如佛；堕烦恼者，令发正念；\n于远离乐，不以为贵；不著己乐，庆于彼乐；\n在诸禅定，如地狱想；于生死中，如园观想；见来求者，为善师想；\n舍诸所有，具一切智想；见毁戒人，起救护想；诸波罗密，为父母想；\n道品之法，为眷属想；发行善根，无有齐限；以诸净国严饰之事，成己佛土；\n行无限施，具足相好；除一切恶，净身口意；\n生死无数劫，意而有勇；闻佛无量德，志而不倦；\n以智慧剑，破烦恼贼；出阴界入，荷负众生，永使解脱；\n以大精进，摧伏魔军，常求无念实相智慧；\n行少欲知足，而不舍世法；不坏威仪，而能随俗；\n起神通慧，引导众生，得念总持，所闻不忘；\n善别诸根，断众生疑；以乐说辩，演说无碍；\n净十善道，受天人福；修四无量，开梵天道；劝请说法，随喜赞善，得佛音声；\n身口意善，得佛威仪；深修善法，所行转胜；以大乘教，成菩萨僧；\n心无放逸，不失众善。行如此法，是名菩萨不尽有为。\n\n何谓菩萨不住无为？\n谓修学空，不以空为证；修学无相无作，不以无相无作为证；修学无起，不以无起为证；\n观于无常，而不厌善本；观世间苦，而不恶生死；观于无我，而诲人不倦；\n观于寂灭，而不永寂灭；观于远离，而身心修善；观无所归，而归趣善法；\n观于无生，而以生法荷负一切；观于无漏，而不断诸漏；观无所行，而以行法教化众生；\n观于空无，而不舍大悲；观正法位，而不随小乘；\n观诸法虚妄，无牢无人，无主无相，本愿未满，而不虚福德禅定智慧。\n修如此法，是名菩萨不住无为。\n\n又具福德故，不住无为；具智慧故，不尽有为；\n大慈悲故，不住无为；满本愿故，不尽有为；\n集法药故，不住无为；随授药故，不尽有为；\n知众生病故，不住无为；灭众生病故，不尽有为。\n诸正士菩萨！已修此法，不尽有为，不住无为，是名尽无尽解脱法门，汝等当学。\n\n尔时，彼诸菩萨，闻说是法，皆大欢喜，以众妙华，若干种色，若干种香，散遍三千大千世界，供养于佛，及此经法，并诸菩萨已，稽首佛足，叹未曾有！言释迦牟尼佛，乃能于此善行方便。言已，忽然不现，还到彼国。\n\n【见阿閦佛品第十二】\n\n尔时，世尊问维摩诘：汝欲见如来，为以何等观如来乎？\n维摩诘言：\n如自观身实相，观佛亦然。\n我观如来前际不来，后际不去，今则不住。\n不观色，不观色如，不观色性；不观受想行识，不观识如，不观识性；\n非四大起，同于虚空；六入无积，眼耳鼻舌身心已过；不在三界，三垢已离；\n顺三脱门，具足三明，与无明等；不一相，不异相，不自相，不他相，非无相，非取相；\n不此岸，不彼岸，不中流，而化众生；观于寂灭，亦不永灭；不此不彼；不以此，不以彼；\n不可以智知，不可以识识；无晦无明，无名无相，无强无弱，非净非秽；\n不在方，不离方；非有为，非无为；无示无说；不施不悭，不戒不犯，不忍不恚，不进不怠，不定不乱，不智不愚；\n不诚不欺，不来不去，不出不入，一切言语道断；\n非福田，非不福田；非应供养，非不应供养；非取非舍；非有相，非无相；\n同真际，等法性；不可称，不可量，过诸称量；非大非小，非见非闻，非觉非知，离众结缚；\n等诸智，同众生，于诸法无分别；一切无得无失，无浊无恼，无作无起，无生无灭；\n无畏无忧，无喜无厌；无已有，无当有，无今有；不可以一切言说分别显示。\n世尊！如来身为若此，作如是观。以斯观者，名为正观，若他观者，名为邪观。\n\n尔时，舍利弗问维摩诘：汝于何没？而来生此？\n维摩诘言：汝所得法有没生乎？\n舍利弗言：无没生也。\n若诸法无没生相，云何问言：汝于何没？而来生此？\n于意云何？譬如幻师，幻作男女，宁没生耶？\n舍利弗言：无没生也。汝岂不闻佛说诸法如幻相乎？\n答曰：如是！若一切法如幻相者！云何问言：汝于何没？而来生此？\n舍利弗！没者为虚诳法，坏败之相；生者为虚诳法，相续之相。\n菩萨虽没不尽善本，虽生不长诸恶。\n\n是时，佛告舍利弗：有国名妙喜，佛号无动。是维摩诘于彼国没，而来生此。\n舍利弗言：未曾有也！世尊，是人乃能舍清净土，而来乐此多怒害处。\n维摩诘语舍利弗：于意云何？日光出时与冥合乎？\n答言：不也，日光出时，则无众冥。\n维摩诘言：夫日何故行阎浮提？\n答曰：欲以明照，为之除冥。\n维摩诘言：菩萨如是，虽生不净佛土，为化众生，不与愚闇而共合也，但灭众生烦恼闇耳！\n\n是时大众渴仰，欲见妙喜世界无动如来，及其菩萨声闻之众。\n佛知一切众会所念，告维摩诘言：善男子！为此众会，现妙喜国无动如来，及诸菩萨声闻之众，众皆欲见。\n\n于是维摩诘心念：吾当不起于座，接妙喜国，\n铁围山川溪谷江河，大海泉源，须弥诸山，及日月星宿天龙鬼神梵天等宫，\n并诸菩萨声闻之众，城邑聚落，男女大小，乃至无动如来，及菩提树，诸妙莲华，\n能于十方作佛事者；三道宝阶从阎浮提，至忉利天，以此宝阶，诸天来下，悉为礼敬无动如来，听受经法。\n阎浮提人，亦登其阶，上升忉利，见彼诸天。\n妙喜世界成就如是无量功德，上至阿迦尼吒天，下至水际；以右手断取，如陶家轮，入此世界，犹持华鬘，示一切众。\n作是念已，入于三昧，现神通力，以其右手断取妙喜世界，置于此土。\n\n彼得神通菩萨及声闻众，并余天人，俱发声言：唯然世尊！谁取我去！愿见救护。\n无动佛言：非我所为，是维摩诘神力所作。\n其余未得神通者，不觉不知己之所往。\n妙喜世界，虽入此土，而不增减，于是世界亦不迫隘，如本无异。\n\n尔时，释迦牟尼佛告诸大众：汝等且观妙喜世界无动如来，其国严饰，菩萨行净，弟子清白。\n皆曰：唯然已见。\n佛言：若菩萨欲得如是清净佛土，当学无动如来所行之道。\n现此妙喜国时，娑婆世界十四那由他人，发阿耨多罗三藐三菩提心，皆愿生于妙喜佛土。\n释迦牟尼佛即记之曰：当生彼国。\n时妙喜世界于此国土所应饶益，其事讫已，还复本处，举众皆见。\n\n佛告舍利弗：汝见此妙喜世界及无动佛不？\n唯然已见，世尊！愿使一切众生得清净土，如无动佛；获神通力，如维摩诘。\n世尊！我等快得善利，得见是人亲近供养。\n其诸众生，若今现在，若佛灭后，闻此经者，亦得善利；\n况复闻已信解，受持读诵解说，如法修行。\n若有手得是经典者，便为已得法宝之藏；\n若有读诵解释其义，如说修行，则为诸佛之所护念；\n其有供养如是人者，当知则为供养于佛；\n其有书持此经卷者，当知其室有如来；\n若闻是经能随喜者，斯人则为趣一切智；\n若能信解此经，乃至一四句偈，为他说者，当知此人，即是受阿耨多罗三藐三菩提记。\n\n【法供养品第十三】\n\n尔时，释提恒因，于大众中白佛言：\n世尊！我虽从佛及文殊师利闻百千经，未曾闻此不可思议，自在神通，决定实相经典。\n如我解佛所说义趣，若有众生闻此经法，信解受持读诵之者，必得是法不疑，何况如说修行？\n斯人则为闭众恶趣开诸善门，常为诸佛之所护念；降伏外学，摧灭魔怨；修治菩提，安处道场；履践如来所行之迹。\n世尊！若有受持读诵如说修行者，我当与诸眷属供养给事；所在聚落城邑、山林旷野，有是经处，我亦与诸眷属，听受法故共到其所；其未信者，当令生信；其已信者，当为作护。\n\n佛言：善哉！善哉！天帝，如汝所说，吾助尔喜。\n此经广说过去未来现在诸佛，不可思议阿耨多罗三藐三菩提。\n是故，天帝！若善男子，善女人，受持读诵供养是经者，则为供养去来今佛。\n\n天帝！正使三千大千世界，如来满中，譬如甘蔗竹苇，稻麻丛林；\n若有善男子，善女人，或以一劫，或减一劫，恭敬尊重，赞叹供养，奉诸所安，至诸佛灭后，以一一全身舍利，起七宝塔，纵广一四天下，高至梵天，表刹庄严；以一切华香璎珞，幢幡伎乐，微妙第一，若一劫，若减一劫，而供养之。\n天帝！于意云何？其人植福，宁为多不？\n释提桓因言：甚多，世尊！彼之福德，若以百千亿劫，说不能尽。\n\n佛告天帝：当知是善男子，善女人，闻是不可思议解脱经典，信解受持，读诵修行，福多于彼。\n所以者何？诸佛菩提，皆从此生；菩提之相，不可限量，以是因缘福不可量。\n\n佛告天帝：\n过去无量阿僧祇劫，时世有佛，号曰药王如来、应供、正遍知、明行足、善逝、世间解、无上士、调御丈夫、天人师、佛、世尊。\n世界名大庄严，劫名庄严，佛寿二十小劫；其声闻僧，三十六亿那由他；菩萨僧有十二亿。\n天帝！是时有转轮圣王，名曰宝盖；七宝具足，王四天下。王有千子，端正勇健，能伏怨敌。\n\n尔时，宝盖与其眷属，供养药王如来，施诸所安，至满五劫，过五劫已，告其千子：\n汝等亦当如我，以深心供养于佛。\n于是千子受父王命，供养药王如来，复满五劫，一切施安。\n\n其王一子，名曰月盖，独坐思惟：宁有供养殊过此者？\n以佛神力，空中有天曰：善男子！法之供养，胜诸供养。\n即问：何谓法之供养？\n天曰：汝可往问药王如来，当广为汝说法之供养。\n即时月盖王子，行诣药王如来，稽首佛足，却住一面，白佛言：\n世尊！诸供养中，法供养胜。云何名为法之供养？\n\n佛言：善男子！法供养者，诸佛所说深经，一切世间难信难受，微妙难见，清净无染，\n非但分别思惟之所能得，菩萨法藏所摄，陀罗尼印印之，至不退转，成就六度，\n善分别义，顺菩提法，众经之上，入大慈悲，离众魔事，及诸邪见，\n顺因缘法，无我，无人，无众生，无寿命，空、无相、无作、无起，\n能令众生坐于道场，而转法轮，诸天龙神，乾闼婆等，所共叹誉，\n能令众生入佛法藏，摄诸贤圣一切智慧，说众菩萨所行之道，依于诸法实相之义，\n明宣无常苦空无我寂灭之法，能救一切毁禁众生，诸魔外道及贪著者，能使怖畏，\n诸佛贤圣所共称叹，背生死苦，示涅槃乐，十方三世诸佛所说。\n若闻如是等经，信解受持读诵，以方便力，为诸众生分别解说，显示分明，守护法故，是名法之供养。\n又于诸法如说修行，随顺十二因缘，离诸邪见，得无生忍，决定无我无有众生，\n而于因缘果报无违无诤，离诸我所，依于义，不依语；依于智，不依识；\n依了义经，不依不了义经；依于法，不依人；\n随顺法相，无所入，无所归，无明毕竟灭故，诸行亦毕竟灭；\n乃至生毕竟灭故，老死亦毕竟灭。\n作如是观，十二因缘，无有尽相，不复起相，是名最上法之供养。\n\n佛告天帝：王子月盖，从药王佛，闻如是法，得柔顺忍。\n即解宝衣严身之具，以供养佛，白佛言：\n世尊！如来灭后，我当行法供养，守护正法，愿以威神加哀建立，令我得降伏魔怨，修菩萨行。\n佛知其深心所念，而记之曰：汝于末后，守护法城。\n\n天帝！时王子月盖，见法清净，闻佛授记，以信出家，修习善法，精进不久，得五神通，具菩萨道，得陀罗尼，无断辩才。\n于佛灭后，以其所得神通、总持、辩才之力，满十小劫，药王如来所转法轮随而分布。\n月盖比丘以守护法，勤行精进，即于此身，化百万亿人于阿耨多罗三藐三菩提，立不退转；\n十四那由他人，深发声闻辟支佛心；无量众生得生天上。\n\n天帝！时王宝盖，岂异人乎？今现得佛，号宝焰如来；其王千子，即贤劫中千佛是也。\n从迦罗鸠孙驮为始得佛，最后如来号曰楼至。月盖比丘，则我身是。\n\n如是，天帝！当知此要，以法供养，于诸供养为上为最，第一无比。\n是故天帝！当以法之供养，供养于佛。\n\n【嘱累品第十四】\n\n于是，佛告弥勒菩萨言：\n弥勒！我今以是无量亿阿僧祇劫，所集阿耨多罗三藐三菩提法付嘱于汝。\n如是辈经，于佛灭后末世之中，汝等当以神力，广宣流布于阎浮提，无令断绝。\n所以者何？未来世中，当有善男子善女人，及天龙鬼神乾闼婆罗刹等，发阿耨多罗三藐三菩提心，乐于大法；\n若使不闻如是等经，则失善利。\n如此辈人，闻是等经，必多信乐，发希有心，当以顶受，随诸众生所应得利，而为广说。\n\n弥勒当知，菩萨有二相。何谓为二？\n一者好于杂句文饰之事。二者不畏深义如实能入。\n若好杂句文饰事者，当知是为新学菩萨；\n若于如是无染无著甚深经典，无有恐畏，能入其中，闻已心净，受持读诵，如说修行，当知是为久修道行。\n\n弥勒！复有二法，名新学者，不能决定于甚深法。何等为二？\n一者所未闻深经，闻之惊怖生疑，不能随顺，毁谤不信，而作是言：我初不闻，从何所来？\n二者若有护持解说如是深经者，不肯亲近供养恭敬，或时于中说其过恶。\n有此二法，当知是新学菩萨，为自毁伤，不能于深法中，调伏其心。\n\n弥勒！复有二法，菩萨虽信解深法，犹自毁伤，而不能得无生法忍。何等为二？\n一者轻慢新学菩萨，而不教诲；二者虽信解深法，而取相分别，是为二法。\n\n弥勒菩萨闻说是已，白佛言：\n世尊！未曾有也。如佛所说，我当远离如斯之恶，奉持如来无数阿僧祇劫，所集阿耨多罗三藐三菩提法。\n若未来世，善男子善女人，求大乘者，当令手得如是等经，与其念力，使受持读诵，为他广说。\n世尊！若后末世，有能受持读诵，为他说者，当知是弥勒神力之所建立。\n\n佛言：善哉！善哉！弥勒！如汝所说，佛助尔喜。\n\n于是一切菩萨，合掌白佛：\n我等亦于如来灭后，十方国土，广宣流布阿耨多罗三藐三菩提法，复当开导诸说法者，令得是经。\n\n尔时，四天王白佛言：\n世尊！在在处处，城邑聚落，山林旷野，有是经卷，读诵解说者，我当率诸官属，为听法故，往诣其所，拥护其人，面百由旬，令无伺求得其便者。\n\n是时，佛告阿难：受持是经，广宣流布。\n阿难言：唯！我已受持要者。世尊！当何名斯经？\n佛言：阿难！是经名为维摩诘所说，亦名不可思议解脱法门，如是受持。\n\n佛说是经已，长者维摩诘、文殊师利、舍利弗、阿难等，\n及诸天、人、阿修罗，一切大众，闻佛所说，皆大欢喜，信受奉行。","sourceUrl":"https://www.fojingzaixian.com/weimojiejing.html","audios":[{"title":"维摩诘经讲解·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/weimojiejing.html"}],"teachAudios":[{"title":"维摩诘经讲经开示","url":""}]},{"id":"shishanyedaojing","title":"十善业道经","fullTitle":"佛说十善业道经","category":"日常持诵","summary":"以十善业为基础，引发一切人天、声闻、菩萨、佛果。","explanation":"《十善业道经》以不杀生、不偷盗、不邪淫、不妄语、不两舌、不恶口、不绮语、不贪欲、不嗔恚、不邪见为十善，是日常生活中最切实可行的修行规范。","fullText":"佛说十善业道经\n唐于阗三藏法师实叉难陀译\n\n如是我闻。\n一时，佛在娑竭罗龙宫，与八千大比丘众、三万二千菩萨摩诃萨俱。\n\n尔时，世尊告龙王言：\n一切众生，心想异故，造业亦异，由是故有诸趣轮转。\n龙王，汝见此会及大海中，形色种类，各别不耶？\n如是一切，靡不由心，造善不善，身业语业意业所致。\n而心无色，不可见取，但是虚妄，诸法集起，毕竟无主，无我我所。\n虽各随业，所现不同，而实于中，无有作者，故一切法皆不思议。\n自性如幻，智者知已，应修善业，以是所生蕴处界等，皆悉端正，见者无厌。\n\n龙王，汝观佛身，从百千亿福德所生，诸相庄严，光明显曜，蔽诸大众，\n设无量亿自在梵王，悉不复现，其有瞻仰如来身者，岂不目眩。\n汝又观此诸大菩萨，妙色严净，一切皆由修习善业福德而生。\n又诸天龙八部众等大威势者，亦因善业福德所生。\n今大海中所有众生，形色粗鄙，或大或小，皆由自心种种想念，作身语意诸不善业，是故随业，各自受报。\n汝今常应如是修学，亦令众生了达因果，修习善业。\n汝当于此，正见不动，勿复堕在断常见中，于诸福田，欢喜敬养，是故汝等，亦得人天尊敬供养。\n\n龙王，当知菩萨有一法，能断一切诸恶道苦。何等为一？\n谓于昼夜，常念思惟观察善法，令诸善法念念增长，不容毫分不善间杂，\n是即能令诸恶永断，善法圆满，常得亲近诸佛菩萨及余圣众。\n\n言善法者，谓人天身、声闻菩提、独觉菩提、无上菩提，皆依此法，以为根本，而得成就，故名善法。\n此法即是十善业道。何等为十？\n谓能永离杀生、偷盗、邪行、妄语、两舌、恶口、绮语、贪欲、嗔恚、邪见。\n\n龙王，若离杀生，即得成就十离恼法。何等为十？\n一、于诸众生，普施无畏。\n二、常于众生，起大慈心。\n三、永断一切嗔恚习气。\n四、身常无病。\n五、寿命长远。\n六、恒为非人之所守护。\n七、常无恶梦，寝觉快乐。\n八、灭除怨结，众怨自解。\n九、无恶道怖。\n十、命终生天。\n是为十。若能回向阿耨多罗三藐三菩提者，后成佛时，得佛随心自在寿命。\n\n复次龙王。若离偷盗，即得十种可保信法。何等为十？\n一、资财盈积，王贼水火及非爱子，不能散灭。\n二、多人爱念。\n三、人不欺负。\n四、十方赞美。\n五、不忧损害。\n六、善名流布。\n七、处众无畏。\n八、财命色力安乐，辩才具足无缺。\n九、常怀施意。\n十、命终生天。\n是为十。若能回向阿耨多罗三藐三菩提者，后成佛时，得证清净大菩提智。\n\n复次龙王。若离邪行，即得四种智所赞法。何等为四？\n一、诸根调顺。\n二、永离喧掉。\n三、世所称叹。\n四、妻莫能侵。\n是为四。若能回向阿耨多罗三藐三菩提者，后成佛时，得佛丈夫隐密藏相。\n\n复次龙王。若离妄语，即得八种天所赞法。何等为八？\n一、口常清净，优钵华香。\n二、为诸世间之所信伏。\n三、发言成证，人天敬爱。\n四、常以爱语，安慰众生。\n五、得胜意乐，三业清净。\n六、言无误失，心常欢喜。\n七、发言尊重，人天奉行。\n八、智慧殊胜，无能制伏。\n是为八。若能回向阿耨多罗三藐三菩提者，后成佛时，即得如来真实语。\n\n复次龙王。若离两舌，即得五种不可坏法。何等为五？\n一、得不坏身，无能害故。\n二、得不坏眷属，无能破故。\n三、得不坏信，顺本业故。\n四、得不坏法行，所修坚固故。\n五、得不坏善知识，不诳惑故。\n是为五。若能回向阿耨多罗三藐三菩提者，后成佛时，得正眷属，诸魔外道不能沮坏。\n\n复次龙王。若离恶口，即得成就八种净业。何等为八？\n一、言不乖度。\n二、言皆利益。\n三、言必契理。\n四、言词美妙。\n五、言可承领。\n六、言则信用。\n七、言无可讥。\n八、言尽爱乐。\n是为八。若能回向阿耨多罗三藐三菩提者，后成佛时，具足如来梵音声相。\n\n复次龙王。若离绮语，即得成就三种决定。何等为三？\n一、定为智人所爱。\n二、定能以智，如实答问。\n三、定于人天，威德最胜，无有虚妄。\n是为三。若能回向阿耨多罗三藐三菩提者，后成佛时，得如来诸所授记，皆不唐捐。\n\n复次龙王。若离贪欲，即得成就五种自在。何等为五？\n一、三业自在，诸根具足故。\n二、财物自在，一切怨贼不夺故。\n三、福德自在，随心所欲，物皆备故。\n四、王位自在，珍奇妙物，皆奉献故。\n五、所获之物，过本所求百倍殊胜，由于昔时不悭嫉故。\n是为五。若能回向阿耨多罗三藐三菩提者，后成佛时，三界特尊，皆共敬养。\n\n复次龙王。若离嗔恚，即得八种喜悦心法。何等为八？\n一、无损恼心。\n二、无嗔恚心。\n三、无诤讼心。\n四、柔和质直心。\n五、得圣者慈心。\n六、常作利益，安众生心。\n七、身相端严，众共尊敬。\n八、以和忍故，速生梵世。\n是为八。若能回向阿耨多罗三藐三菩提者，后成佛时，得佛无碍心，观者无厌。\n\n复次龙王。若离邪见，即得成就十功德法。何等为十？\n一、得真善意乐、真善等侣。\n二、深信因果，宁殒身命，终不作恶。\n三、惟归依佛，非余天等。\n四、直心正见，永离一切吉凶疑网。\n五、常生人天，不更恶道。\n六、无量福慧，转转增胜。\n七、永离邪道，行于圣道。\n八、不起身见，舍诸恶业。\n九、住无碍见。\n十、不堕诸难。\n是为十。若能回向阿耨多罗三藐三菩提者，后成佛时，速证一切佛法，成就自在神通。\n\n尔时，世尊复告龙王言：若有菩萨，依此善业，于修道时，\n能离杀害，而行施故，常富财宝，无能侵夺，长寿无夭，不为一切怨贼损害。\n离不与取，而行施故，常富财宝，无能侵夺，最胜无比，悉能备集诸佛法藏。\n离非梵行，而行施故，常富财宝，无能侵夺，其家贞顺，母及妻子，无有能以欲心视者。\n离虚诳语，而行施故，常富财宝，无能侵夺，离众毁谤，摄持正法，如其誓愿，所作必果。\n离离间语，而行施故，常富财宝，无能侵夺，眷属和睦，同一志乐，恒无乖诤。\n离粗恶语，而行施故，常富财宝，无能侵夺，一切众会，欢喜归依，言皆信受，无违拒者。\n离无义语，而行施故，常富财宝，无能侵夺，言不虚设，人皆敬受，能善方便，断诸疑惑。\n离贪求心，而行施故，常富财宝，无能侵夺，一切所有，悉以惠舍，信解坚固，具大威力。\n离忿怒心，而行施故，常富财宝，无能侵夺，速自成就，无碍心智，诸根严好，见皆敬爱。\n离邪倒心，而行施故，常富财宝，无能侵夺，恒生正见敬信之家，见佛闻法，供养众僧，常不忘失大菩提心。\n是为大士修菩萨道时，行十善业，以施庄严，所获大利如是。\n\n龙王，举要言之，行十善道：\n以戒庄严故，能生一切佛法义利，满足大愿。\n忍辱庄严故，得佛圆音，具众相好。\n精进庄严故，能破魔怨，入佛法藏。\n定庄严故，能生念慧惭愧轻安。\n慧庄严故，能断一切分别妄见。\n\n慈庄严故，于诸众生，不起恼害。\n悲庄严故，愍诸众生，常不厌舍。\n喜庄严故，见修善者，心无嫌嫉。\n舍庄严故，于顺违境，无爱恚心。\n\n四摄庄严故，常勤摄化一切众生。\n\n念处庄严故，善能修习四念处观。\n正勤庄严故，悉能断除一切不善法，成一切善法。\n神足庄严故，恒令身心轻安快乐。\n五根庄严故，深信坚固，精勤匪懈，常无迷妄，寂然调顺，断诸烦恼。\n力庄严故，众怨尽灭，无能坏者。\n觉支庄严故，常善觉悟一切诸法。\n正道庄严故，得正智慧常现在前。\n\n止庄严故，悉能涤除一切结使。\n观庄严故，能如实知，诸法自性。\n\n方便庄严故，速得成满，为无为乐。\n\n龙王，当知此十善业，乃至能令十力、无畏、十八不共、一切佛法，皆得圆满，是故汝等应勤修学。\n\n龙王，譬如一切城邑聚落，皆依大地而得安住，一切药草卉木丛林，亦皆依地而得生长。\n此十善道，亦复如是。\n一切人天，依之而立，一切声闻独觉菩提、诸菩萨行、一切佛法，\n咸共依此十善大地，而得成就。\n\n佛说此经已，娑竭罗龙王及诸大众、一切世间天人阿修罗等，皆大欢喜，信受奉行。","sourceUrl":"https://www.fojingzaixian.com/shishanyedaojing.html","audios":[{"title":"十善业道经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/shishanyedaojing.html"}],"teachAudios":[{"title":"十善业道经讲经开示","url":""}]}];
if(typeof EMBEDDED_SCRIPTURES!=="undefined"){
      this.data=EMBEDDED_SCRIPTURES;
      this.render();
    }
  },

  applyFont(){
    const s=FONT_STEPS[this.fontIdx];
    document.documentElement.style.setProperty('--fs-body',s+'px');
    document.documentElement.style.setProperty('--fs-title',(s+4)+'px');
    document.documentElement.style.setProperty('--fs-char',s+'px');
    document.documentElement.style.setProperty('--fs-exp',s+'px');
  },

  fontDown(){
    if(this.fontIdx>0){this.fontIdx--;this.applyFont();localStorage.setItem('fontIdx',this.fontIdx);this.toast('字号已缩小');this.vibrate()}
  },
  fontUp(){
    if(this.fontIdx<FONT_STEPS.length-1){this.fontIdx++;this.applyFont();localStorage.setItem('fontIdx',this.fontIdx);this.toast('字号已放大');this.vibrate()}
  },
  vibrate(){try{navigator.vibrate&&navigator.vibrate(30)}catch(e){}},

  toast(t){
    this.toastText=t;
    const el=document.getElementById('toast');
    if(el){el.textContent=t;el.classList.remove('hidden')}
    clearTimeout(this.toastTm);
    this.toastTm=setTimeout(()=>{this.toastText='';const e=document.getElementById('toast');if(e)e.classList.add('hidden')},1500);
  },

  // ═══ 导航 ═══
  showHome(){this.tab='home';this.render()},
  showAudioCenter(){this.tab='audio';this.render()},

  openReader(id){
    this.sid=id;
    const s=this.data.find(x=>x.id===id);
    this.scr=s;if(!s)return;
    const raw=paginate(s.fullText,PAGE_SIZE);
    this.toc=extractToc(raw);
    this.pages=raw.map(ls=>ls.map(l=>l.split('').map(ch=>({ch,h:isHan(ch)}))));
    this.pi=0;this.tp=this.pages.length;
    this.curLines=this.pages[0]||[];
    this.audioMode='read';
    this.ttsOn=false;this.ttsLine=-1;
    this.tab='reader';
    this.render();
    // 恢复播放进度
    this.restoreProgress(id);
  },

  goPage(i){
    if(i<0||i>=this.tp)return;
    this.stopTTS();
    this.pi=i;this.curLines=this.pages[i]||[];
    this.renderReaderContent();
    document.querySelector('.reader-scroll')?.scrollTo(0,0);
  },

  // ═══ 音频播放器 ═══
  // url判断：.mp3/.m4a/.wav/.ogg结尾 或 本地相对路径 = 可播放音频
  // 其他http链接 = 外部网页，跳转打开
  _isPlayableUrl(url){
    if(!url)return false;
    const u=url.toLowerCase();
    // 本地文件（不以http开头）都当音频
    if(!u.startsWith('http'))return true;
    // 常见音频后缀
    if(/\.(mp3|m4a|wav|ogg|aac|flac)(\?.*)?$/i.test(u))return true;
    return false;
  },

  playAudio(sid,mode){
    const s=this.data.find(x=>x.id===sid);if(!s)return;
    // audios=诵经音频, teachAudios=讲经音频
    const list=mode==='teach'?(s.teachAudios||[]):(s.audios||[]);
    let a=list.find(x=>x.url);
    if(!a){
      if(mode==='read'){this.startTTSFull(sid);return}
      this.toast('暂无讲经音频');return;
    }
    // 判断是否为外部网页链接（非音频直链）
    if(a.url.startsWith('http')&&!this._isPlayableUrl(a.url)){
      // 跳转到外部网站
      window.open(a.url,'_blank');
      this.toast('已跳转到外部网站');
      return;
    }
    // 如果正在播放同一个，切换暂停/播放
    if(this.audio&&this.pSid===sid&&this.pMode===mode){
      if(this.playing){this.audio.pause();this.playing=false}
      else{this.audio.play();this.playing=true}
      this.render();return;
    }
    // 检查是否为外部链接+本地file协议（浏览器会阻止）
    const isFileProto=location.protocol==='file:';
    const isRemoteUrl=a.url.startsWith('http');
    if(isFileProto&&isRemoteUrl){
      if(mode==='read'){
        this.toast('网络音频需部署服务器，已切换语音朗读');
        this.startTTSFull(sid);return;
      }
      this.toast('请部署到服务器后播放网络音频');return;
    }
    // 新建播放
    if(this.audio){this.saveProgress();this.audio.pause();this.audio.src=''}
    this.stopTTS();
    const el=new Audio(a.url);
    el.playbackRate=this.speed;
    this.audio=el;this.pSid=sid;this.pMode=mode;this.playing=true;
    this.progress=0;this.curTime=0;this.duration=0;
    let errFired=false;
    const onErr=msg=>{if(errFired)return;errFired=true;this.toast(msg);this.playing=false;this.render()};
    // 恢复进度
    const saved=this.getSavedProgress(sid,mode);
    if(saved>0)el.currentTime=saved;
    el.play().catch(()=>onErr('播放失败，请检查音频链接'));
    el.addEventListener('timeupdate',()=>{
      this.curTime=el.currentTime;this.duration=el.duration||0;
      this.progress=this.duration>0?(this.curTime/this.duration)*100:0;
      this.updateMiniPlayer();
    });
    el.addEventListener('ended',()=>{
      this.playing=false;this.saveProgress();this.nextTrack();
    });
    el.addEventListener('error',()=>onErr('音频加载失败'));
    this.render();
  },

  togglePlay(){
    if(!this.audio)return;
    if(this.playing){this.audio.pause();this.playing=false}
    else{this.audio.play();this.playing=true}
    this.render();
  },

  setSpeed(s){
    this.speed=s;
    if(this.audio)this.audio.playbackRate=s;
    this.render();
  },
  cycleSpeed(){
    const i=SPEED_OPTIONS.indexOf(this.speed);
    this.speed=SPEED_OPTIONS[(i+1)%SPEED_OPTIONS.length];
    if(this.audio)this.audio.playbackRate=this.speed;
    this.toast(this.speed+'x');
    this.render();
  },

  seekTo(pct){
    if(!this.audio||!this.duration)return;
    this.audio.currentTime=(pct/100)*this.duration;
  },

  nextTrack(){
    const idx=this.data.findIndex(x=>x.id===this.pSid);
    if(idx<this.data.length-1)this.playAudio(this.data[idx+1].id,this.pMode);
  },
  prevTrack(){
    const idx=this.data.findIndex(x=>x.id===this.pSid);
    if(idx>0)this.playAudio(this.data[idx-1].id,this.pMode);
  },

  saveProgress(){
    if(!this.pSid||!this.audio)return;
    const key=`prog_${this.pSid}_${this.pMode}`;
    localStorage.setItem(key,Math.floor(this.audio.currentTime));
  },
  getSavedProgress(sid,mode){
    return parseInt(localStorage.getItem(`prog_${sid}_${mode}`))||0;
  },
  restoreProgress(sid){
    // 不自动播放，只是记忆
  },

  updateMiniPlayer(){
    const el=document.getElementById('mp-fill');
    if(el)el.style.width=this.progress+'%';
    const t=document.getElementById('mp-time');
    if(t)t.textContent=fmtTime(this.curTime);
  },

  showFullPlayer(){this.fpShow=true;this.render()},
  hideFullPlayer(){this.fpShow=false;this.render()},

  // ═══ TTS 跟读 ═══
  startTTSFull(sid){
    if(!('speechSynthesis' in window)){this.toast('浏览器不支持语音合成');return}
    const s=this.data.find(x=>x.id===sid);if(!s)return;
    // 获取当前页文本
    this.startTTSPage();
  },
  startTTSPage(){
    if(!('speechSynthesis' in window))return;
    const lines=this.curLines.map(cs=>cs.map(c=>c.ch).join('').trim()).filter(Boolean);
    if(!lines.length)return;
    this.ttsLines=lines;this.ttsIdx=0;this.ttsOn=true;
    this.readNextTTS();
  },
  startTTSFromLine(lineIdx){
    if(!('speechSynthesis' in window)){this.toast('浏览器不支持语音合成');return}
    const lines=this.curLines.map(cs=>cs.map(c=>c.ch).join('').trim()).filter(Boolean);
    if(!lines.length)return;
    this.ttsLines=lines;this.ttsIdx=Math.min(lineIdx,lines.length-1);this.ttsOn=true;
    speechSynthesis.cancel();
    this.readNextTTS();
  },
  readNextTTS(){
    if(!this.ttsOn)return;
    if(this.ttsIdx>=this.ttsLines.length){
      this.stopTTS();this.toast('本页朗读完毕');return;
    }
    this.ttsLine=this.ttsIdx;
    this.highlightLine();
    const u=new SpeechSynthesisUtterance(this.ttsLines[this.ttsIdx]);
    u.lang='zh-CN';u.rate=this.speed>1?1:0.85;
    u.onend=()=>{if(!this.ttsOn)return;this.ttsIdx++;this.readNextTTS()};
    u.onerror=()=>{if(!this.ttsOn)return;this.ttsIdx++;this.readNextTTS()};
    this.ttsUtt=u;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  },
  toggleTTS(){
    if(this.ttsOn)this.stopTTS();
    else this.startTTSPage();
    this.render();
  },
  stopTTS(){
    speechSynthesis.cancel();
    this.ttsOn=false;this.ttsLine=-1;this.ttsIdx=0;this.ttsLines=[];
    this.highlightLine();
  },
  highlightLine(){
    document.querySelectorAll('.text-line').forEach((el,i)=>{
      el.classList.toggle('reading',this.ttsOn&&i===this.ttsLine);
    });
  },

  // ═══ 字典 ═══
  showDict(ch){
    if(!ch)return;
    this.dictCh=ch;this.dictInfo=DICT[ch]||null;this.dictShow=true;
    // TTS单字
    if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(ch);u.lang='zh-CN';speechSynthesis.cancel();speechSynthesis.speak(u)}
    this.vibrate();
    this.renderDict();
  },
  hideDict(){this.dictShow=false;this.renderDict()},

  dismissGuide(){this.guideShow=false;localStorage.setItem('guided','1');this.render()},

    html+=this.renderFullPlayer();
    // 字典浮层
    html+=this.renderDictSheet();
    // 引导
    html+=this.renderGuide();
    // Toast
    html+=`<div id="toast" class="toast${this.toastText?'':' hidden'}">${esc(this.toastText)}</div>`;
    app.innerHTML=html;
    this.bindAll();

  // ═══ 事件绑定 ═══
  _longTimer:null,_longCh:null,
  bindAll(){
    const app=document.getElementById('app');
    // 点击事件委托
    app.onclick=e=>{
      const t=e.target.closest('[data-act]');if(!t)return;
      const act=t.dataset.act;
      e.stopPropagation();
      switch(act){
        case'open':this.openReader(t.dataset.id);break;
        case'back':this.stopTTS();this.tab='home';this.render();break;
        case'tab':
          if(t.dataset.tab==='home')this.showHome();
          else if(t.dataset.tab==='audio')this.showAudioCenter();
          break;
        case'fontDown':this.fontDown();break;
        case'fontUp':this.fontUp();break;
        case'toc':this.goPage(parseInt(t.dataset.pi));break;
        case'prevP':this.goPage(this.pi-1);break;
        case'nextP':this.goPage(this.pi+1);break;
        case'amode':
          this.audioMode=t.dataset.mode;
          if(this.scr)this.playAudio(this.scr.id,t.dataset.mode);
          this.render();break;
        case'toggleTTS':this.toggleTTS();this.render();break;
        case'tapLine':
          if(this.ttsOn){this.stopTTS();this.startTTSFromLine(parseInt(t.dataset.li))}
          break;
        // 字典 — 不用长按了，直接点击
        case'tapChar':this.showDict(t.dataset.ch);break;
        case'hideDict':this.hideDict();break;
        case'mpToggle':e.stopPropagation();this.togglePlay();this.render();break;
        case'fullPlayer':this.showFullPlayer();break;
        case'closeFP':this.hideFullPlayer();break;
        case'fpToggle':this.togglePlay();this.render();break;
        case'cycleSpeed':this.cycleSpeed();break;
        case'prevTrack':this.prevTrack();break;
        case'nextTrack':this.nextTrack();break;
        case'acPlay':this.playAudio(t.dataset.id,t.dataset.mode||'read');this.render();break;
        case'acTab':this.acMode=t.dataset.mode;this.render();break;
        case'dismissGuide':this.dismissGuide();break;
      }
    };
    // 全屏播放器滑块拖拽
    const slider=document.getElementById('fp-slider');
    if(slider){
      const seek=e=>{
        const r=slider.getBoundingClientRect();
        const x=Math.max(0,Math.min(1,(e.clientX||e.touches[0].clientX)-r.left)/r.width);
        this.seekTo(x*100);
      };
      slider.addEventListener('touchstart',e=>{seek(e);
        const move=ev=>{ev.preventDefault();seek(ev)};
        const up=()=>{document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up)};
        document.addEventListener('touchmove',move,{passive:false});
        document.addEventListener('touchend',up);
      },{passive:false});
      slider.addEventListener('mousedown',e=>{seek(e);
        const move=ev=>seek(ev);
        const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up)};
        document.addEventListener('mousemove',move);
        document.addEventListener('mouseup',up);
      });
    }
    // 定时更新全屏播放器
    if(this.fpShow&&this.audio){
      clearInterval(this._fpTimer);
      this._fpTimer=setInterval(()=>{
        const fill=document.querySelector('.fp-slider-fill');
        const thumb=document.querySelector('.fp-slider-thumb');
        const times=document.querySelectorAll('.fp-time span');
        if(fill)fill.style.width=this.progress+'%';
        if(thumb)thumb.style.left=this.progress+'%';
        if(times[0])times[0].textContent=fmtTime(this.curTime);
        if(times[1])times[1].textContent=fmtTime(this.duration);
        // spinning
        const art=document.querySelector('.fp-cover-art');
        if(art)art.classList.toggle('spinning',this.playing);
      },300);
    }
    // 保存进度 — 页面关闭前
    window.onbeforeunload=()=>{this.saveProgress()};
  }
};

// ═══ 启动 ═══
A.init();
</script>
</body>
</html>
