<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2c1810">
<title>甚深微妙法</title>
<style>
/*═══════════════════════════════════════════════
  佛教讲经 APP v2 · 全局样式
  古典宣纸调 · 适老化 · 大字号 · 高对比
═══════════════════════════════════════════════*/
:root{
  --bg:#fdf6ec;--bg-card:#fff;--bg-paper:#faf4e8;--bg-muted:#f2ead8;
  --ink:#1e120a;--ink2:#3d2b1a;--ink3:#6b5040;--ink4:#a08878;--ink5:#c8b8a8;
  --gold:#9a7a50;--gold-deep:#7a5c38;--gold-light:#e8dcc8;--gold-pale:#f5ede0;
  --divider:#e8ddd0;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --shadow:0 2px 12px rgba(100,60,20,.09);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  /* 字号档位 */
  --fs-body:20px;--fs-title:24px;--fs-char:22px;--fs-exp:20px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;color:var(--ink2);line-height:1.75;-webkit-font-smoothing:antialiased}
button{font-family:inherit;border:none;cursor:pointer;background:none}
#app{height:100%;position:relative}
.page{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform,opacity}
.page.hidden{pointer-events:none;opacity:0;transform:translateX(30%)}
.page.hidden-left{pointer-events:none;opacity:0;transform:translateX(-30%)}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/*═══ 顶部栏 ═══*/
.topbar{background:linear-gradient(160deg,#3a2010 0%,#6b3e20 60%,#9a7a50 100%);padding:calc(var(--safe-t) + 8px) 14px 10px;flex-shrink:0;position:relative;overflow:hidden;z-index:50}
.topbar::after{content:'☸';position:absolute;right:-10px;top:calc(var(--safe-t) - 10px);font-size:130px;color:rgba(255,255,255,.035);pointer-events:none}
.topbar-row{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:22px;font-weight:700;color:#f5e8d0;letter-spacing:3px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-sub{display:block;font-size:12px;color:rgba(245,232,208,.6);letter-spacing:1px;margin-top:2px}
.btn-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-icon svg{width:22px;height:22px}

/*═══ 首页 · 横向书架 ═══*/
.home-shelf-wrap{padding:20px 0 30px}
/* 每排书架 */
.shelf-row{position:relative;padding:12px 14px 0;margin-bottom:0}
/* 书排列容器 */
.shelf-books{display:flex;align-items:flex-end;gap:8px;padding-bottom:10px;position:relative;z-index:1}
/* 木质隔板 */
.shelf-board{height:14px;margin:0 6px;border-radius:2px;position:relative;background:linear-gradient(180deg,#d4b88a 0%,#b89468 30%,#9a7848 70%,#8a6838 100%);box-shadow:0 4px 8px rgba(60,30,5,.2),inset 0 1px 0 rgba(255,255,255,.25)}
.shelf-board::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.3) 30%,rgba(255,255,255,.3) 70%,rgba(255,255,255,.05))}
.shelf-board::after{content:'';position:absolute;bottom:-4px;left:6px;right:6px;height:4px;background:linear-gradient(180deg,rgba(80,40,10,.1),transparent);border-radius:0 0 3px 3px}
/* 单本书 */
.book-item{flex:1;min-width:0;cursor:pointer;transition:transform .15s}
.book-item:active{transform:translateY(-4px)}
.book-spine{height:140px;border-radius:3px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:transparent;border:2px solid var(--gold-light)}
/* 内嵌细线框 */
.book-spine::before{content:'';position:absolute;inset:4px;border:1px solid var(--gold-light);border-radius:2px;pointer-events:none}
.book-spine::after{content:none}
/* 竖排书名 */
.book-title-vert{writing-mode:vertical-rl;font-size:15px;font-weight:700;letter-spacing:4px;position:relative;z-index:1;max-height:90%;overflow:hidden;line-height:1.1}

/* 透明方框 — 边框和文字用分类色 */
.cover-bore{border-color:#C49A2A}.cover-bore::before{border-color:rgba(196,154,42,.3)}.cover-bore .book-title-vert{color:#A07D1F}
.cover-jingtu{border-color:#4A82B8}.cover-jingtu::before{border-color:rgba(74,130,184,.3)}.cover-jingtu .book-title-vert{color:#356FA0}
.cover-guanyin{border-color:#B85A8A}.cover-guanyin::before{border-color:rgba(184,90,138,.3)}.cover-guanyin .book-title-vert{color:#9A4A7A}
.cover-mizou{border-color:#6B5AB8}.cover-mizou::before{border-color:rgba(107,90,184,.3)}.cover-mizou .book-title-vert{color:#5A4AA0}
.cover-chanzong{border-color:#4A9A5B}.cover-chanzong::before{border-color:rgba(74,154,91,.3)}.cover-chanzong .book-title-vert{color:#3A8A4A}
.cover-yaoshi{border-color:#2AADAD}.cover-yaoshi::before{border-color:rgba(42,173,173,.3)}.cover-yaoshi .book-title-vert{color:#1F9A9A}
.cover-fahua{border-color:#D46F4D}.cover-fahua::before{border-color:rgba(212,111,77,.3)}.cover-fahua .book-title-vert{color:#B85A3A}
.cover-huayan{border-color:#C7A040}.cover-huayan::before{border-color:rgba(199,160,64,.3)}.cover-huayan .book-title-vert{color:#B09030}
.cover-xiaodu{border-color:#6B9E4A}.cover-xiaodu::before{border-color:rgba(107,158,74,.3)}.cover-xiaodu .book-title-vert{color:#5A8A3A}
.cover-chanhui{border-color:#A87E5E}.cover-chanhui::before{border-color:rgba(168,126,94,.3)}.cover-chanhui .book-title-vert{color:#8A6A4A}
.cover-richang{border-color:#8B7355}.cover-richang::before{border-color:rgba(139,115,85,.3)}.cover-richang .book-title-vert{color:#6B5A40}
.cover-lundian{border-color:#6B7A8B}.cover-lundian::before{border-color:rgba(107,122,139,.3)}.cover-lundian .book-title-vert{color:#4A5A6A}

/* 底部标签栏 */
.tab-bar{display:flex;background:var(--bg-card);border-top:1px solid var(--divider);padding:6px 0 calc(6px + var(--safe-b));flex-shrink:0;box-shadow:0 -2px 8px rgba(100,60,20,.06)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer}
.tab-item-icon{font-size:22px;line-height:1}
.tab-item-text{font-size:11px;color:var(--ink4)}
.tab-item.active .tab-item-text{color:var(--gold);font-weight:600}

/*═══ 阅读页 ═══*/
.reader-topbar{display:flex;align-items:center;gap:6px}
.font-ctrl{display:flex;align-items:center;gap:4px}
.font-grp{display:flex;align-items:center;gap:2px}
.font-label{font-size:11px;color:rgba(245,232,208,.6);white-space:nowrap}
.font-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#f5e8d0}
.font-btn:active{background:rgba(255,255,255,.3)}

/* 阅读页音频切换 */
.audio-switch{display:flex;gap:8px;padding:8px 14px;background:var(--bg-card);border-bottom:1px solid var(--divider);flex-shrink:0}
.audio-switch-btn{flex:1;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:15px;font-weight:600;color:var(--ink3);background:var(--bg-muted);border:2px solid transparent;position:relative;overflow:hidden;transition:all .2s}
.audio-switch-btn.active{color:#fff;background:var(--gold);border-color:var(--gold)}
.audio-switch-btn.playing{animation:none}
.audio-switch-btn.playing::after{content:'';position:absolute;inset:0;border-radius:inherit;border:2px solid var(--gold);animation:ripple 1.5s ease-out infinite;pointer-events:none}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.12);opacity:0}}

/* 目录tab */
.toc-bar{background:var(--bg-card);border-bottom:1px solid var(--divider);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.toc-bar::-webkit-scrollbar{display:none}
.toc-list{display:inline-flex;padding:0 8px;white-space:nowrap}
.toc-item{position:relative;display:inline-flex;align-items:center;justify-content:center;min-width:60px;height:42px;padding:0 12px;cursor:pointer;font-size:13px;color:var(--ink4)}
.toc-item:active{background:var(--gold-pale)}
.toc-item.active{color:var(--gold);font-weight:700;font-size:14px}
.toc-item.active::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:3px;background:var(--gold);border-radius:2px 2px 0 0}

/* 经文内容区 */
.reader-body{padding:0 14px}
.section{padding:18px 0;border-bottom:1px solid var(--divider)}
.section:last-child{border-bottom:none}
.section-label{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:1px;padding-left:8px;border-left:3px solid var(--gold);margin-bottom:12px}
.explanation-card{background:var(--gold-pale);border-radius:var(--r-lg);padding:14px;border-left:3px solid var(--gold)}
.explanation{display:block;font-size:var(--fs-exp);color:var(--ink2);line-height:1.85;text-align:justify}

/* 经文原文 */
.full-text{background:var(--bg-paper);border-radius:var(--r-lg);padding:16px 14px;border:1px solid var(--divider);position:relative}
.full-text::before{content:'';position:absolute;left:7px;top:12px;bottom:12px;width:1px;background:var(--gold-light)}
.text-line{padding:3px 0;line-height:2.1;min-height:1.5em;cursor:pointer;border-radius:4px;transition:background .2s}
.text-line:active{background:var(--gold-pale)}
.text-line.reading{background:rgba(154,122,80,.12);border-left:3px solid var(--gold);padding-left:6px;margin-left:-9px}
.char{font-size:var(--fs-char);color:var(--ink2);display:inline;line-height:2.1}
.han-char{color:var(--ink)}

/* 翻页 */
.pager{display:flex;align-items:center;margin-top:14px;gap:8px}
.pager-btn{flex-shrink:0;min-width:80px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--gold);border-radius:var(--r-md);font-size:15px;color:#fff;font-weight:600}
.pager-btn:active{opacity:.8}
.pager-btn.dis{background:var(--bg-muted);color:var(--ink5);pointer-events:none}
.pager-mid{flex:1;text-align:center;font-size:14px;color:var(--gold)}

/*═══ 底部播放器 (迷你) ═══*/
.mini-player{background:var(--bg-card);border-top:1px solid var(--divider);padding:6px 14px calc(6px + var(--safe-b));display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.mini-player.hidden{display:none}
.mp-play-btn{width:44px;height:44px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mp-play-btn svg{width:20px;height:20px;fill:#fff}
.mp-info{flex:1;min-width:0}
.mp-title{font-size:14px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp-sub{font-size:11px;color:var(--ink4);margin-top:1px}
.mp-progress{height:3px;background:var(--bg-muted);border-radius:2px;margin-top:4px;overflow:hidden}
.mp-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.mp-speed{font-size:12px;color:var(--gold);font-weight:600;padding:4px 8px;background:var(--gold-pale);border-radius:10px;flex-shrink:0}

/*═══ 音频中心页 ═══*/
.ac-card{background:var(--bg-card);border-radius:var(--r-lg);margin:0 14px 10px;box-shadow:var(--shadow);overflow:hidden}
.ac-card-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer}
.ac-card-header:active{background:var(--gold-pale)}
.ac-cover-sm{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;font-weight:700;color:rgba(255,255,255,.9)}
.ac-info{flex:1;min-width:0}
.ac-title{font-size:16px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-sub{font-size:12px;color:var(--ink4);margin-top:2px}
.ac-play-btn{width:44px;height:44px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ac-play-btn svg{width:20px;height:20px;fill:#fff}
.ac-play-btn--gray{background:var(--bg-muted)}
.ac-play-btn--gray svg{fill:var(--ink5)}
.ac-card--empty{opacity:.55}

/*═══ 全屏播放器 ═══*/
.full-player{position:fixed;inset:0;background:linear-gradient(180deg,#3a2010 0%,#1a0d06 100%);z-index:200;display:flex;flex-direction:column;padding:var(--safe-t) 0 var(--safe-b);color:#f5e8d0;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform}
.full-player.hidden{transform:translateY(100%);pointer-events:none}
.fp-top{display:flex;align-items:center;padding:12px 14px}
.fp-close{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
.fp-close svg{width:22px;height:22px}
.fp-top-title{flex:1;text-align:center;font-size:14px;color:rgba(245,232,208,.7)}
.fp-cover{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.fp-cover-art{width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:700;color:rgba(255,255,255,.85);box-shadow:0 8px 40px rgba(0,0,0,.4);position:relative}
.fp-cover-art.spinning{animation:spin 20s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.fp-title{text-align:center;font-size:22px;font-weight:700;padding:0 20px;letter-spacing:2px}
.fp-subtitle{text-align:center;font-size:13px;color:rgba(245,232,208,.5);margin-top:6px}
.fp-progress{padding:20px 24px 10px}
.fp-slider-wrap{position:relative;height:44px;display:flex;align-items:center}
.fp-slider-track{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:2px;position:relative}
.fp-slider-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.fp-slider-thumb{position:absolute;width:44px;height:44px;border-radius:50%;background:var(--gold);top:50%;transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none}
.fp-slider-thumb::after{content:'';width:16px;height:16px;border-radius:50%;background:#fff}
.fp-time{display:flex;justify-content:space-between;font-size:12px;color:rgba(245,232,208,.5);margin-top:4px}
.fp-controls{display:flex;align-items:center;justify-content:center;gap:20px;padding:10px 0 20px}
.fp-ctrl-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center}
.fp-ctrl-btn svg{width:24px;height:24px}
.fp-ctrl-btn:active{background:rgba(255,255,255,.15)}
.fp-play-btn{width:64px;height:64px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(154,122,80,.4)}
.fp-play-btn svg{width:28px;height:28px;fill:#fff}
.fp-speed-btn{font-size:14px;font-weight:700;color:var(--gold);min-width:48px;text-align:center}

/*═══ 字典半屏浮层 ═══*/
.dict-overlay{position:fixed;inset:0;background:rgba(30,18,10,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.dict-overlay.hidden{display:none}
.dict-sheet{width:100%;max-width:500px;background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-b));max-height:55vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.dict-handle{width:40px;height:4px;border-radius:2px;background:var(--ink5);margin:0 auto 16px}
.dict-char-row{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.dict-char{font-size:56px;font-weight:700;color:var(--ink)}
.dict-pinyin{font-size:24px;color:var(--gold);font-weight:600}
.dict-meaning{font-size:17px;color:var(--ink2);line-height:1.8;background:var(--gold-pale);border-radius:var(--r-lg);padding:14px;margin-bottom:16px}
.dict-close{width:100%;height:50px;border-radius:25px;background:var(--gold);color:#fff;font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center}
.dict-close:active{opacity:.8}

/*═══ 引导弹窗 ═══*/
.guide-overlay{position:fixed;inset:0;background:rgba(30,18,10,.6);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.guide-overlay.hidden{display:none}
.guide-card{background:#fff;border-radius:var(--r-xl);padding:28px 24px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(100,60,20,.2);animation:slideUp .3s}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.guide-icon{font-size:48px;margin-bottom:12px}
.guide-title{font-size:20px;font-weight:700;color:var(--ink);margin-bottom:8px}
.guide-text{font-size:16px;color:var(--ink3);line-height:1.7;margin-bottom:20px}
.guide-btn{width:100%;height:50px;border-radius:25px;background:var(--gold);color:#fff;font-size:17px;font-weight:600}
.guide-btn:active{opacity:.8}

/*═══ Toast ═══*/
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(30,18,10,.88);color:#f5e8d0;font-size:16px;padding:14px 28px;border-radius:12px;z-index:500;animation:fadeIn .2s;white-space:nowrap;pointer-events:none}
.toast.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
// 佛教讲经 H5 APP v2 · 全部逻辑
// ═══════════════════════════════════════════════

const PAGE_SIZE=20;

function isHan(ch){const c=ch.charCodeAt(0);return(c>=0x4E00&&c<=0x9FFF)||(c>=0x3400&&c<=0x4DBF)}
function paginate(t,n){n=n||PAGE_SIZE;const l=(t||'').split('\n'),p=[];for(let i=0;i<l.length;i+=n)p.push(l.slice(i,i+n));if(!p.length)p.push([]);return p}
function extractToc(pp){const t=[],r=/^【(.+?)】/;pp.forEach((ls,pi)=>{ls.forEach(l=>{const m=l.match(r);if(m&&(!t.length||t[t.length-1].pi!==pi))t.push({title:m[1],pi})})});return t}
function fmtTime(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}

    const EMBEDDED_SCRIPTURES=[{"id":"xinjing","title":"心经","fullTitle":"般若波罗蜜多心经","category":"般若","summary":"短短二百六十字，浓缩般若智慧核心，照见五蕴皆空。","explanation":"《心经》讲\"照见五蕴皆空，度一切苦厄\"。不是把世界看空，而是不执着于现象，心不随境转，自然离苦。日常遇事不慌、不贪不嗔，就是在用《心经》的智慧。","fullText":"观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。\n舍利子，色不异空，空不异色；色即是空，空即是色；受想行识，亦复如是。\n舍利子，是诸法空相，不生不灭，不垢不净，不增不减。\n是故空中无色，无受想行识，\n无眼耳鼻舌身意，无色声香味触法，\n无眼界，乃至无意识界，\n无无明，亦无无明尽，乃至无老死，亦无老死尽。\n无苦集灭道，无智亦无得，以无所得故。\n菩提萨埵，依般若波罗蜜多故，心无挂碍。\n无挂碍故，无有恐怖，远离颠倒梦想，究竟涅槃。\n三世诸佛，依般若波罗蜜多故，得阿耨多罗三藐三菩提。\n故知般若波罗蜜多，是大神咒，是大明咒，是无上咒，是无等等咒。\n能除一切苦，真实不虚。故说般若波罗蜜多咒。\n即说咒曰：揭谛揭谛，波罗揭谛，波罗僧揭谛，菩提萨婆诃。","sourceUrl":"https://www.fojingzaixian.com/xinjing.html","audios":[{"title":"心经读诵·善音居士 ✅","url":"https://www.fojingzaixian.com/img/%E5%BF%83%E7%BB%8F%E5%8E%9F%E9%9F%B3-%E5%96%84%E9%9F%B3%E5%B1%85%E5%A3%AB.mp3"}],"teachAudios":[{"title":"心经讲经开示","url":"http://fjsong.com/s/962.htm"}]},{"id":"jingangjing","title":"金刚经","fullTitle":"金刚般若波罗蜜经","category":"般若","summary":"\"应无所住而生其心\"，破执著、开智慧，大乘般若要典。","explanation":"《金刚经》教我们\"无住\"——不把心钉在过去的怨、未来的怕、当下的贪上。做事认真做，做完不挂怀，就是\"生其心\"又\"无所住\"。老人家用它来安心、少计较，最合适。","fullText":"【法会因由分第一】\n如是我闻：\n一时，佛在舍卫城祇树给孤独园，与大比丘众千二百五十人俱。\n尔时，世尊食时，着衣持钵，入舍卫大城乞食。\n于其城中次第乞已，还至本处。\n饭食讫，收衣钵，洗足已，敷座而坐。\n\n【善现启请分第二】\n时长老须菩提在大众中，即从座起，偏袒右肩，右膝着地，合掌恭敬，而白佛言：\n\"希有！世尊。\n如来善护念诸菩萨，善付嘱诸菩萨。\n世尊！善男子、善女人，发阿耨多罗三藐三菩提心，云何应住？云何降伏其心？\"\n\n佛言：\"善哉！善哉！须菩提！\n如汝所说，如来善护念诸菩萨，善付嘱诸菩萨。\n汝今谛听，当为汝说。\n善男子、善女人，发阿耨多罗三藐三菩提心，应如是住，如是降伏其心。\"\n\n\"唯然！世尊！愿乐欲闻。\"\n\n【大乘正宗分第三】\n佛告须菩提：\n\"诸菩萨摩诃萨，应如是降伏其心：\n所有一切众生之类──若卵生、若胎生、若湿生、若化生；\n若有色、若无色；若有想、若无想；若非有想非无想，\n我皆令入无余涅槃而灭度之。\n如是灭度无量无数无边众生，实无众生得灭度者。\n何以故？须菩提！若菩萨有我相、人相、众生相、寿者相，即非菩萨。\"\n\n【妙行无住分第四】\n复次，须菩提！\n\"菩萨于法，应无所住，行于布施。\n所谓不住色布施，不住声、香、味、触、法布施。\n须菩提！菩萨应如是布施，不住于相。\n何以故？若菩萨不住相布施，其福德不可思量。\n\n须菩提！于意云何？东方虚空可思量不？\"\n\"不也，世尊！\"\n\"须菩提！南、西、北方、四维、上、下虚空，可思量不？\"\n\"不也，世尊！\"\n\"须菩提！菩萨无住相布施，福德亦复如是，不可思量。\n须菩提！菩萨但应如所教住！\"\n\n【如理实见分第五】\n\"须菩提！于意云何？可以身相见如来不？\"\n\"不也，世尊！不可以身相得见如来。\n何以故？如来所说身相，即非身相。\"\n佛告须菩提：\n\"凡所有相，皆是虚妄。若见诸相非相，即见如来。\"\n\n【正信希有分第六】\n须菩提白佛言：\"世尊！颇有众生，得闻如是言说章句，生实信不？\"\n佛告须菩提：\n\"莫作是说！如来灭后，后五百岁，有持戒修福者，\n于此章句，能生信心，以此为实。\n当知是人，不于一佛、二佛、三四五佛而种善根，\n已于无量千万佛所种诸善根。\n闻是章句，乃至一念生净信者，\n须菩提！如来悉知悉见，是诸众生得如是无量福德。\n\n何以故？是诸众生，无复我相、人相、众生相、寿者相，\n无法相，亦无非法相。\n何以故？是诸众生若心取相，即为着我、人、众生、寿者。\n若取法相，即着我、人、众生、寿者。\n若取非法相，即着我、人、众生、寿者。\n是故不应取法，不应取非法。\n以是义故，如来常说：\n汝等比丘！知我说法，如筏喻者；法尚应舍，何况非法？\"\n\n【无得无说分第七】\n\"须菩提！于意云何？如来得阿耨多罗三藐三菩提耶？如来有所说法耶？\"\n须菩提言：\n\"如我解佛所说义，无有定法，名阿耨多罗三藐三菩提；\n亦无有定法如来可说。\n何以故？如来所说法，皆不可取、不可说；非法、非非法。\n所以者何？一切贤圣，皆以无为法，而有差别。\"\n\n【依法出生分第八】\n\"须菩提！于意云何？\n若人满三千大千世界七宝，以用布施，是人所得福德，宁为多不？\"\n须菩提言：\"甚多，世尊！何以故？是福德，即非福德性，是故如来说福德多。\"\n\"若复有人，于此经中，受持乃至四句偈等，为他人说，其福胜彼。\n何以故？须菩提！一切诸佛，及诸佛阿耨多罗三藐三菩提法，皆从此经出。\n须菩提！所谓佛法者，即非佛法。\"\n\n【一相无相分第九】\n\"须菩提！于意云何？须陀洹能作是念：我得须陀洹果不？\"\n须菩提言：\"不也，世尊！\n何以故？须陀洹名为入流，而无所入；不入色、声、香、味、触、法，是名须陀洹。\"\n\n\"须菩提！于意云何？斯陀含能作是念：我得斯陀含果不？\"\n须菩提言：\"不也，世尊！\n何以故？斯陀含名一往来，而实无往来，是名斯陀含。\"\n\n\"须菩提！于意云何？阿那含能作是念：我得阿那含果不？\"\n须菩提言：\"不也，世尊！\n何以故？阿那含名为不来，而实无不来，是故名阿那含。\"\n\n\"须菩提！于意云何？阿罗汉能作是念：我得阿罗汉道不？\"\n须菩提言：\"不也，世尊！\n何以故？实无有法名阿罗汉。\n世尊！若阿罗汉作是念：我得阿罗汉道，即为着我、人、众生、寿者。\n世尊！佛说我得无诤三昧，人中最为第一，是第一离欲阿罗汉。\n世尊！我不作是念：我是离欲阿罗汉。\n世尊！我若作是念：我得阿罗汉道，\n世尊则不说须菩提是乐阿兰那行者。\n以须菩提实无所行，而名须菩提，是乐阿兰那行。\"\n\n【庄严净土分第十】\n佛告须菩提：\n\"于意云何？如来昔在然灯佛所，于法有所得不？\"\n\"不也，世尊！如来在然灯佛所，于法实无所得。\"\n\n\"须菩提！于意云何？菩萨庄严佛土不？\"\n\"不也，世尊！何以故？庄严佛土者，即非庄严，是名庄严。\"\n\n\"是故，须菩提！诸菩萨摩诃萨，应如是生清净心，\n不应住色生心，不应住声、香、味、触、法生心，\n应无所住，而生其心。\n\n须菩提！譬如有人，身如须弥山王，于意云何？是身为大不？\"\n须菩提言：\"甚大，世尊！何以故？佛说非身，是名大身。\"\n\n【无为福胜分第十一】\n\"须菩提！如恒河中所有沙数，如是沙等恒河，于意云何？是诸恒河沙，宁为多不？\"\n须菩提言：\"甚多，世尊！但诸恒河，尚多无数，何况其沙？\"\n\n\"须菩提！我今实言告汝，\n若有善男子、善女人，以七宝满尔所恒河沙数三千大千世界，以用布施，得福多不？\"\n须菩提言：\"甚多，世尊！\"\n佛告须菩提：\n\"若善男子、善女人，于此经中，乃至受持四句偈等，为他人说，\n而此福德，胜前福德。\"\n\n【尊重正教分第十二】\n\"须菩提！随说是经，乃至四句偈等，\n当知此处，一切世间天、人、阿修罗，皆应供养，如佛塔庙。\n何况有人，尽能受持、读诵。\n须菩提！当知是人，成就最上第一希有之法；\n若是经典所在之处，即为有佛，若尊重弟子。\"\n\n【如法受持分第十三】\n尔时，须菩提白佛言：\"世尊！当何名此经？我等云何奉持？\"\n佛告须菩提：\n\"是经名为《金刚般若波罗蜜》，以是名字，汝当奉持。\n所以者何？须菩提！佛说般若波罗蜜，即非般若波罗蜜，是名般若波罗蜜。\n\n须菩提！于意云何？如来有所说法不？\"\n须菩提白佛言：\"世尊！如来无所说。\"\n\n\"须菩提！于意云何？三千大千世界所有微尘，是为多不？\"\n须菩提言：\"甚多，世尊！\"\n\"须菩提！诸微尘，如来说非微尘，是名微尘。\n如来说世界非世界，是名世界。\n\n须菩提！于意云何？可以三十二相见如来不？\"\n\"不也，世尊！不可以三十二相得见如来。\n何以故？如来说三十二相，即是非相，是名三十二相。\"\n\n\"须菩提！若有善男子、善女人，以恒河沙等身命布施；\n若复有人，于此经中，乃至受持四句偈等，为他人说，其福甚多！\"\n\n【离相寂灭分第十四】\n尔时，须菩提闻说是经，深解义趣，涕泪悲泣，而白佛言：\n\"希有！世尊。佛说如是甚深经典，我从昔来所得慧眼，未曾得闻如是之经。\n世尊！若复有人得闻是经，信心清净，即生实相，当知是人成就第一希有功德。\n世尊！是实相者，则是非相，是故如来说名实相。\n世尊！我今得闻如是经典，信解受持不足为难；\n若当来世后五百岁，其有众生，得闻是经，信解受持，是人则为第一希有。\n何以故？此人无我相、人相、众生相、寿者相。\n所以者何？我相即是非相；人相、众生相、寿者相，即是非相。\n何以故？离一切诸相，则名诸佛。\"\n\n佛告须菩提：\n\"如是！如是！若复有人，得闻是经，不惊、不怖、不畏，当知是人，甚为希有。\n何以故？须菩提！如来说第一波罗蜜，即非第一波罗蜜，是名第一波罗蜜。\n\n须菩提！忍辱波罗蜜，如来说非忍辱波罗蜜，是名忍辱波罗蜜。\n何以故？须菩提！如我昔为歌利王割截身体，\n我于尔时，无我相、无人相、无众生相、无寿者相。\n何以故？我于往昔节节支解时，\n若有我相、人相、众生相、寿者相，应生瞋恨。\n\n须菩提！又念过去于五百世，作忍辱仙人，\n于尔所世，无我相、无人相、无众生相、无寿者相。\n\n是故，须菩提！菩萨应离一切相，发阿耨多罗三藐三菩提心，\n不应住色生心，不应住声、香、味、触、法生心，应生无所住心。\n若心有住，即为非住。\n是故佛说菩萨心，不应住色布施。\n须菩提！菩萨为利益一切众生故，应如是布施。\n\n如来说一切诸相，即是非相；又说一切众生，即非众生。\n须菩提！如来是真语者、实语者、如语者、不诳语者、不异语者。\n须菩提！如来所得此法，此法无实无虚。\n\n须菩提！若菩萨心住于法而行布施，如人入闇，则无所见。\n若菩萨心不住法而行布施，如人有目，日光明照，见种种色。\n\n须菩提！当来之世，若有善男子、善女人，\n能于此经受持、读诵，则为如来以佛智慧，\n悉知是人，悉见是人，皆得成就无量无边功德。\"\n\n【持经功德分第十五】\n\"须菩提！若有善男子、善女人，\n初日分以恒河沙等身布施，\n中日分复以恒河沙等身布施，\n后日分亦以恒河沙等身布施，\n如是无量百千万亿劫，以身布施。\n若复有人，闻此经典，信心不逆，其福胜彼，何况书写、受持、读诵、为人解说。\n\n须菩提！以要言之，是经有不可思议、不可称量、无边功德，\n如来为发大乘者说，为发最上乘者说。\n若有人能受持、读诵、广为人说，如来悉知是人、悉见是人，\n皆得成就不可量、不可称、无有边、不可思议功德，\n如是人等，即为荷担如来阿耨多罗三藐三菩提。\n\n何以故？须菩提！若乐小法者，着我见、人见、众生见、寿者见，\n则于此经，不能听受、读诵、为人解说。\n须菩提！在在处处，若有此经，一切世间天、人、阿修罗所应供养，\n当知此处，则为是塔，皆应恭敬，作礼围绕，以诸华香而散其处。\"\n\n【能净业障分第十六】\n\"须菩提！善男子、善女人，受持、读诵此经，若为人轻贱，\n是人先世罪业，应堕恶道；\n以今世人轻贱故，先世罪业则为消灭，当得阿耨多罗三藐三菩提。\n\n须菩提！我念过去无量阿僧祇劫，于然灯佛前，\n得值八百四千万亿那由他诸佛，悉皆供养承事，无空过者。\n若复有人，于后末世，能受持、读诵此经，所得功德，\n于我所供养诸佛功德，百分不及一，千万亿分，乃至算数譬喻所不能及。\n\n须菩提！若善男子、善女人，于后末世，有受持、读诵此经，所得功德，\n我若具说者，或有人闻，心则狂乱，狐疑不信。\n须菩提！当知是经义不可思议，果报亦不可思议。\"\n\n【究竟无我分第十七】\n尔时，须菩提白佛言：\n\"世尊！善男子、善女人，发阿耨多罗三藐三菩提心，云何应住？云何降伏其心？\"\n\n佛告须菩提：\n\"善男子、善女人，发阿耨多罗三藐三菩提心者，当生如是心：\n我应灭度一切众生；\n灭度一切众生已，而无有一众生实灭度者。\n何以故？须菩提！若菩萨有我相、人相、众生相、寿者相，则非菩萨。\n所以者何？须菩提！实无有法，发阿耨多罗三藐三菩提心者。\n\n须菩提！于意云何？如来于然灯佛所，有法得阿耨多罗三藐三菩提不？\"\n\"不也，世尊！如我解佛所说义，佛于然灯佛所，无有法得阿耨多罗三藐三菩提。\"\n\n佛言：\"如是！如是！须菩提！实无有法，如来得阿耨多罗三藐三菩提。\n须菩提！若有法如来得阿耨多罗三藐三菩提者，\n然灯佛即不与我授记：汝于来世当得作佛，号释迦牟尼。\n以实无有法，得阿耨多罗三藐三菩提，\n是故然灯佛与我授记，作是言：汝于来世，当得作佛，号释迦牟尼。\n\n何以故？如来者，即诸法如义。\n若有人言：如来得阿耨多罗三藐三菩提，\n须菩提！实无有法，佛得阿耨多罗三藐三菩提。\n须菩提！如来所得阿耨多罗三藐三菩提，于是中无实无虚。\n是故如来说一切法，皆是佛法。\n须菩提！所言一切法者，即非一切法，是故名一切法。\n\n须菩提！譬如人身长大。\"\n须菩提言：\"世尊！如来说人身长大，则为非大身，是名大身。\"\n\n\"须菩提！菩萨亦如是。若作是言：我当灭度无量众生，则不名菩萨。\n何以故？须菩提！实无有法，名为菩萨。\n是故佛说：一切法，无我、无人、无众生、无寿者。\n\n须菩提！若菩萨作是言：我当庄严佛土，是不名菩萨。\n何以故？如来说庄严佛土者，即非庄严，是名庄严。\n须菩提！若菩萨通达无我法者，如来说名真是菩萨。\"\n\n【一体同观分第十八】\n\"须菩提！于意云何？如来有肉眼不？\"\"如是，世尊！如来有肉眼。\"\n\"须菩提！于意云何？如来有天眼不？\"\"如是，世尊！如来有天眼。\"\n\"须菩提！于意云何？如来有慧眼不？\"\"如是，世尊！如来有慧眼。\"\n\"须菩提！于意云何？如来有法眼不？\"\"如是，世尊！如来有法眼。\"\n\"须菩提！于意云何？如来有佛眼不？\"\"如是，世尊！如来有佛眼。\"\n\n\"须菩提！于意云何？如恒河中所有沙，佛说是沙不？\"\n\"如是，世尊！如来说是沙。\"\n\n\"须菩提！于意云何？\n如一恒河中所有沙，有如是沙等恒河，是诸恒河所有沙数，佛世界如是，宁为多不？\"\n\"甚多，世尊！\"\n\n佛告须菩提：\n\"尔所国土中，所有众生若干种心，如来悉知。\n何以故？如来说诸心，皆为非心，是名为心。\n所以者何？须菩提！\n过去心不可得，现在心不可得，未来心不可得。\"\n\n【法界通化分第十九】\n\"须菩提！于意云何？\n若有人满三千大千世界七宝，以用布施，是人以是因缘，得福多不？\"\n\"如是，世尊！此人以是因缘，得福甚多。\"\n\"须菩提！若福德有实，如来不说得福德多；\n以福德无故，如来说得福德多。\"\n\n【离色离相分第二十】\n\"须菩提！于意云何？佛可以具足色身见不？\"\n\"不也，世尊！如来不应以具足色身见。\n何以故？如来说具足色身，即非具足色身，是名具足色身。\"\n\n\"须菩提！于意云何？如来可以具足诸相见不？\"\n\"不也，世尊！如来不应以具足诸相见。\n何以故？如来说诸相具足，即非诸相具足，是名诸相具足。\"\n\n【非说所说分第二十一】\n\"须菩提！汝勿谓如来作是念：我当有所说法。莫作是念！\n何以故？若人言如来有所说法，即为谤佛，不能解我所说故。\n须菩提！说法者，无法可说，是名说法。\"\n\n尔时，慧命须菩提白佛言：\"世尊！颇有众生，于未来世，闻说是法，生信心不？\"\n佛言：\n\"须菩提！彼非众生，非不众生。\n何以故？须菩提！众生众生者，如来说非众生，是名众生。\"\n\n【无法可得分第二十二】\n须菩提白佛言：\"世尊！佛得阿耨多罗三藐三菩提，为无所得耶？\"\n佛言：\n\"如是！如是！须菩提！\n我于阿耨多罗三藐三菩提，乃至无有少法可得，\n是名阿耨多罗三藐三菩提。\"\n\n【净心行善分第二十三】\n\"须菩提！是法平等，无有高下，是名阿耨多罗三藐三菩提。\n以无我、无人、无众生、无寿者，修一切善法，则得阿耨多罗三藐三菩提。\n须菩提！所言善法者，如来说即非善法，是名善法。\"\n\n【福智无比分第二十四】\n\"须菩提！若三千大千世界中，所有诸须弥山王，如是等七宝聚，有人持用布施；\n若人以此般若波罗蜜经，乃至四句偈等，受持、读诵，为他人说，\n于前福德，百分不及一，百千万亿分，乃至算数譬喻所不能及。\"\n\n【化无所化分第二十五】\n\"须菩提！于意云何？汝等勿谓如来作是念：我当度众生。\n须菩提！莫作是念！\n何以故？实无有众生如来度者。\n若有众生如来度者，如来即有我、人、众生、寿者。\n\n须菩提！如来说有我者，则非有我，而凡夫之人，以为有我。\n须菩提！凡夫者，如来说则非凡夫，是名凡夫。\"\n\n【法身非相分第二十六】\n\"须菩提！于意云何？可以三十二相观如来不？\"\n须菩提言：\"如是！如是！以三十二相观如来。\"\n佛言：\"须菩提！若以三十二相观如来者，转轮圣王即是如来。\"\n须菩提白佛言：\"世尊！如我解佛所说义，不应以三十二相观如来。\"\n尔时，世尊而说偈言：\n\"若以色见我，以音声求我，\n是人行邪道，不能见如来。\"\n\n【无断无灭分第二十七】\n\"须菩提！汝若作是念：如来不以具足相故，得阿耨多罗三藐三菩提。\n须菩提！莫作是念：如来不以具足相故，得阿耨多罗三藐三菩提。\n须菩提！汝若作是念，发阿耨多罗三藐三菩提心者，说诸法断灭。\n莫作是念！\n何以故？发阿耨多罗三藐三菩提心者，于法不说断灭相。\"\n\n【不受不贪分第二十八】\n\"须菩提！若菩萨以满恒河沙等世界七宝，持用布施；\n若复有人，知一切法无我，得成于忍，\n此菩萨胜前菩萨所得功德。\n何以故？须菩提！以诸菩萨不受福德故。\"\n须菩提白佛言：\"世尊！云何菩萨，不受福德？\"\n\"须菩提！菩萨所作福德，不应贪着，是故说：不受福德。\"\n\n【威仪寂静分第二十九】\n\"须菩提！若有人言：如来若来、若去；若坐、若卧。\n是人不解我所说义。\n何以故？如来者，无所从来，亦无所去，故名如来。\"\n\n【一合理相分第三十】\n\"须菩提！若善男子、善女人，以三千大千世界碎为微尘，于意云何？是微尘众，宁为多不？\"\n须菩提言：\n\"甚多，世尊！\n何以故？若是微尘众实有者，佛则不说是微尘众。\n所以者何？佛说微尘众，即非微尘众，是名微尘众。\n世尊！如来所说三千大千世界，则非世界，是名世界。\n何以故？若世界实有者，即是一合相；\n如来说一合相，则非一合相，是名一合相。\"\n\"须菩提！一合相者，则是不可说，但凡夫之人，贪着其事。\"\n\n【知见不生分第三十一】\n\"须菩提！若人言：佛说我见、人见、众生见、寿者见。\n须菩提！于意云何？是人解我所说义不？\"\n\"不也，世尊！是人不解如来所说义。\n何以故？世尊说我见、人见、众生见、寿者见，\n即非我见、人见、众生见、寿者见，\n是名我见、人见、众生见、寿者见。\"\n\"须菩提！发阿耨多罗三藐三菩提心者，\n于一切法，应如是知、如是见、如是信解，不生法相。\n须菩提！所言法相者，如来说即非法相，是名法相。\"\n\n【应化非真分第三十二】\n\"须菩提！若有人以满无量阿僧祇世界七宝，持用布施；\n若有善男子、善女人，发菩提心者，持于此经，乃至四句偈等，\n受持、读诵，为人演说，其福胜彼。\n云何为人演说？不取于相，如如不动。\n何以故？\n一切有为法，如梦幻泡影，\n如露亦如电，应作如是观。\"\n\n佛说是经已，长老须菩提，及诸比丘、比丘尼、优婆塞、优婆夷，\n一切世间天、人、阿修罗，闻佛所说，皆大欢喜，信受奉行。","sourceUrl":"https://www.fojingzaixian.com/jingangjing.html","audios":[{"title":"金刚经读诵·善音居士 ✅","url":"https://www.fojingzaixian.com/img/%E9%87%91%E5%88%9A%E7%BB%8F%E5%8E%9F%E9%9F%B3-%E5%96%84%E9%9F%B3%E5%B1%85%E5%A3%AB.mp3"}],"teachAudios":[{"title":"金刚经讲经开示","url":"http://fjsong.com/s/1086.htm"}]},{"id":"amituojing","title":"阿弥陀经","fullTitle":"佛说阿弥陀经","category":"净土","summary":"介绍西方极乐世界，持名念佛法门，简单易持。","explanation":"经中描述极乐世界\"无有众苦，但受诸乐\"，并教人专念\"南无阿弥陀佛\"。一句佛号简单易持，心有所寄、心有所归，对老年同修而言最为适合。","fullText":"如是我闻。一时，佛在舍卫国祇树给孤独园，与大比丘僧千二百五十人俱，\n皆是大阿罗汉，众所知识。\n长老舍利弗、摩诃目犍连、摩诃迦叶、摩诃迦旃延、摩诃俱絺罗、\n离婆多、周利槃陀伽、难陀、阿难陀、罗睺罗、憍梵波提、\n宾头卢颇罗堕、迦留陀夷、摩诃劫宾那、薄拘罗、阿㝹楼驮，\n如是等诸大弟子。并诸菩萨摩诃萨：文殊师利法王子、阿逸多菩萨、\n乾陀诃提菩萨、常精进菩萨，与如是等诸大菩萨。\n及释提桓因等，无量诸天大众俱。\n\n尔时，佛告长老舍利弗：\n\"从是西方过十万亿佛土，有世界名曰极乐，其土有佛，号阿弥陀，今现在说法。\n舍利弗，彼土何故名为极乐？\n其国众生，无有众苦，但受诸乐，故名极乐。\n\n又舍利弗，极乐国土，七重栏楯，七重罗网，七重行树，\n皆是四宝，周匝围绕，是故彼国名为极乐。\n\n又舍利弗，极乐国土，有七宝池，八功德水，充满其中，\n池底纯以金沙布地。\n四边阶道，金、银、琉璃、玻璃合成。\n上有楼阁，亦以金、银、琉璃、玻璃、砗磲、赤珠、玛瑙而严饰之。\n池中莲花，大如车轮，青色青光，黄色黄光，赤色赤光，白色白光，\n微妙香洁。舍利弗，极乐国土，成就如是功德庄严。\n\n又舍利弗，彼佛国土，常作天乐，黄金为地，\n昼夜六时，天雨曼陀罗华。\n其土众生，常以清旦，各以衣裓盛众妙华，供养他方十万亿佛，\n即以食时，还到本国，饭食经行。舍利弗，极乐国土，成就如是功德庄严。\n\n复次，舍利弗，彼国常有种种奇妙杂色之鸟：\n白鹤、孔雀、鹦鹉、舍利、迦陵频伽、共命之鸟。\n是诸众鸟，昼夜六时，出和雅音。\n其音演畅五根、五力、七菩提分、八圣道分，如是等法。\n其土众生，闻是音已，皆悉念佛、念法、念僧。\n\n舍利弗，汝勿谓此鸟实是罪报所生。所以者何？\n彼佛国土，无三恶趣。舍利弗，其佛国土，尚无恶趣之名，\n何况有实！是诸众鸟，皆是阿弥陀佛，欲令法音宣流，变化所作。\n\n舍利弗，彼佛国土，微风吹动诸宝行树及宝罗网，\n出微妙音，譬如百千种乐，同时俱作。\n闻是音者，自然皆生念佛、念法、念僧之心。\n舍利弗，其佛国土，成就如是功德庄严。\n\n舍利弗，于汝意云何？彼佛何故号阿弥陀？\n舍利弗，彼佛光明无量，照十方国，无所障碍，是故号为阿弥陀。\n又舍利弗，彼佛寿命，及其人民，无量无边阿僧祇劫，故名阿弥陀。\n\n舍利弗，阿弥陀佛成佛已来，于今十劫。\n\n又舍利弗，彼佛有无量无边声闻弟子，皆阿罗汉，非是算数之所能知。\n诸菩萨众，亦复如是。舍利弗，彼佛国土，成就如是功德庄严。\n\n又舍利弗，极乐国土，众生生者，皆是阿鞞跋致，\n其中多有一生补处，其数甚多，非是算数所能知之，\n但可以无量无边阿僧祇劫说。\n\n舍利弗，众生闻者，应当发愿，愿生彼国。\n所以者何？得与如是诸上善人，俱会一处。\n\n舍利弗，不可以少善根福德因缘，得生彼国。\n舍利弗，若有善男子、善女人，闻说阿弥陀佛，执持名号，\n若一日、若二日、若三日、若四日、若五日、若六日、若七日，\n一心不乱，其人临命终时，阿弥陀佛与诸圣众，现在其前。\n是人终时，心不颠倒，即得往生阿弥陀佛极乐国土。\n\n舍利弗，我见是利，故说此言。若有众生，闻是说者，\n应当发愿，生彼国土。\n\n舍利弗，如我今者，赞叹阿弥陀佛不可思议功德之利。\n东方亦有阿閦鞞佛、须弥相佛、大须弥佛、须弥光佛、妙音佛，\n如是等恒河沙数诸佛，各于其国，出广长舌相，遍覆三千大千世界，\n说诚实言：\"汝等众生，当信是称赞不可思议功德一切诸佛所护念经。\"\n\n（南方、西方、北方、下方、上方诸佛护念，文略，请参阅完整版）\n\n舍利弗，若有人已发愿、今发愿、当发愿，欲生阿弥陀佛国者，\n是诸人等，皆得不退转于阿耨多罗三藐三菩提，\n于彼国土，若已生、若今生、若当生。\n\n是故舍利弗，诸善男子、善女人，若有信者，应当发愿，生彼国土。\n\n舍利弗，如我今者，称赞诸佛不可思议功德，\n彼诸佛等，亦称赞我不可思议功德，而作是言：\n\"释迦牟尼佛能为甚难希有之事，能于娑婆国土，五浊恶世，\n劫浊、见浊、烦恼浊、众生浊、命浊中，\n得阿耨多罗三藐三菩提，为诸众生，说是一切世间难信之法。\"\n\n舍利弗，当知我于五浊恶世，行此难事，得阿耨多罗三藐三菩提，\n为一切世间说此难信之法，是为甚难。\n\n佛说此经已，舍利弗及诸比丘，一切世间天人阿修罗等，\n闻佛所说，欢喜信受，作礼而去。\n\n佛说阿弥陀经","sourceUrl":"https://www.fojingzaixian.com/amituojing.html","audios":[{"title":"阿弥陀经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/amituojing.html"}],"teachAudios":[{"title":"阿弥陀经讲经开示","url":"http://fjsong.com/s/928.htm"}]},{"id":"dizangjing","title":"地藏经","fullTitle":"地藏菩萨本愿经","category":"孝亲·度亡","summary":"孝亲、度亡、发大愿，地藏菩萨\"地狱不空誓不成佛\"。","explanation":"《地藏经》讲孝道与愿力。由孝亲开始，把心量扩大。为已故亲人诵经回向、为自己发善愿，都是日常可做的修行。","fullText":"赞\n\n稽首本然清净地　无尽佛藏大慈尊\n南方世界涌香云　香雨花云及花雨\n宝雨宝云无数种　为祥为瑞遍庄严\n天人问佛是何因　佛言地藏菩萨至\n三世如来同赞叹　十方菩萨共皈依\n我今宿植善因缘　称扬地藏真功德\n\n慈因积善，誓救众生，\n手中金锡，振开地狱之门。\n掌上明珠，光摄大千世界。\n智慧音里，吉祥云中，\n为阎浮提苦众生，作大证明功德主。\n大悲大愿，大圣大慈，\n本尊地藏菩萨摩诃萨。\n\n开经偈\n\n无上甚深微妙法\n百千万劫难遭遇\n我今见闻得受持\n愿解如来真实义\n\n唐于阗国三藏沙门实叉难陀译\n\n【忉利天宫神通品第一】\n\n如是我闻。一时佛在忉利天，为母说法。\n\n尔时十方无量世界，不可说不可说一切诸佛，及大菩萨摩诃萨，皆来集会。\n赞叹释迦牟尼佛，能于五浊恶世，现不可思议大智慧神通之力，\n调伏刚强众生，知苦乐法，各遣侍者，问讯世尊。\n\n是时，如来含笑，放百千万亿大光明云，\n所谓大圆满光明云、大慈悲光明云、大智慧光明云、大般若光明云、\n大三昧光明云、大吉祥光明云、大福德光明云、大功德光明云、\n大归依光明云、大赞叹光明云，放如是等不可说光明云已。\n\n又出种种微妙之音，\n所谓檀波罗蜜音、尸波罗蜜音、羼提波罗密音、毗离耶波罗蜜音、\n禅波罗蜜音、般若波罗密音、慈悲音、喜舍音、解脱音、\n无漏音、智慧音、大智慧音、师子吼音、大师子吼音、云雷音、大云雷音。\n\n出如是等不可说不可说音已，娑婆世界，及他方国土，\n有无量亿天龙鬼神，亦集到忉利天宫，\n所谓四天王天、忉利天、须焰摩天、兜率陀天、化乐天、他化自在天、\n梵众天、梵辅天、大梵天、少光天、无量光天、光音天、\n少净天、无量净天、遍净天、福生天、福爱天、广果天、无想天、\n无烦天、无热天、善见天、善现天、色究竟天、摩醯首罗天、\n乃至非想非非想处天，一切天众、龙众、鬼神等众，悉来集会。\n\n复有他方国土，及娑婆世界，海神、江神、河神、树神、山神、地神、\n川泽神、苗稼神、昼神、夜神、空神、天神、饮食神、草木神，\n如是等神，皆来集会。\n\n复有他方国土，及娑婆世界，诸大鬼王。\n所谓：恶目鬼王、啖血鬼王、啖精气鬼王、啖胎卵鬼王、行病鬼王、\n摄毒鬼王、慈心鬼王、福利鬼王、大爱敬鬼王，如是等鬼王，皆来集会。\n\n尔时释迦牟尼佛，告文殊师利法王子菩萨摩诃萨：\n汝观是一切诸佛菩萨及天龙鬼神，\n此世界、他世界，此国土、他国土，\n如是今来集会到忉利天者，汝知数不？\n\n文殊师利白佛言：世尊，若以我神力，千劫测度，不能得知。\n\n佛告文殊师利：\n吾以佛眼观故，犹不尽数。\n此皆是地藏菩萨久远劫来，已度、当度、未度，已成就、当成就、未成就。\n\n文殊师利白佛言：\n世尊，我已过去久修善根、证无碍智。\n闻佛所言，即当信受。\n小果声闻、天龙八部、及未来世诸众生等，\n虽闻如来诚实之语，必怀疑惑。\n设使顶受，未免兴谤。\n唯愿世尊、广说地藏菩萨摩诃萨，\n因地作何行？立何愿？而能成就不思议事。\n\n佛告文殊师利：\n譬如三千大千世界所有草木丛林、稻麻竹苇、山石微尘，\n一物一数，作一恒河；一恒河沙，一沙一界；\n一界之内、一尘一劫，一劫之内，所积尘数，尽充为劫，\n地藏菩萨证十地果位以来，千倍多于上喻。\n何况地藏菩萨在声闻、辟支佛地。\n\n文殊师利，此菩萨威神誓愿，不可思议。\n若未来世，有善男子、善女人，闻是菩萨名字，\n或赞叹、或瞻礼、或称名、或供养，乃至彩画刻镂塑漆形像，\n是人当得百返生于三十三天，永不堕恶道。\n\n文殊师利，是地藏菩萨摩诃萨，\n于过去久远不可说、不可说劫前，身为大长者子。\n时世有佛，号曰师子奋迅具足万行如来。\n时长者子，见佛相好，千福庄严，因问彼佛：\n作何行愿，而得此相？\n时师子奋迅具足万行如来告长者子：\n欲证此身，当须久远度脱一切受苦众生。\n\n文殊师利！时长者子，因发愿言：\n我今尽未来际不可计劫，为是罪苦六道众生，广设方便，尽令解脱，\n而我自身，方成佛道。\n以是于彼佛前，立斯大愿，于今百千万亿那由他不可说劫，尚为菩萨。\n\n又于过去，不可思议阿僧祇劫，时世有佛，号曰觉华定自在王如来，\n彼佛寿命，四百千万亿阿僧祇劫。\n像法之中，有一婆罗门女，宿福深厚，众所钦敬；\n行住坐卧，诸天卫护。其母信邪，常轻三宝。\n\n是时圣女广设方便，劝诱其母，令生正见，\n而此女母，未全生信。不久命终，魂神堕在无间地狱。\n\n时婆罗门女，知母在世，不信因果。\n计当随业，必生恶趣。\n遂卖家宅，广求香华，及诸供具，于先佛塔寺，大兴供养。\n见觉华定自在王如来，其形像在一寺中，塑画威容，端严毕备。\n\n时婆罗门女，瞻礼尊容，倍生敬仰，私自念言：\n佛名大觉，具一切智。若在世时，我母死后，傥来问佛，必知处所。\n\n时婆罗门女，垂泣良久，瞻恋如来。\n忽闻空中声曰：泣者圣女，勿至悲哀，我今示汝母之去处。\n\n婆罗门女合掌向空，而白空曰：\n是何神德，宽我忧虑。我自失母以来，昼夜忆恋，无处可问知母生界。\n\n时空中有声，再报女曰：\n我是汝所瞻礼者，过去觉华定自在王如来，\n见汝忆母，倍于常情众生之分，故来告示。\n\n婆罗门女闻此声已，举身自扑，肢节皆损。左右扶侍，良久方苏。\n而白空曰：愿佛慈愍，速说我母生界，我今身心，将死不久。\n\n时觉华定自在王如来，告圣女曰：\n汝供养毕，但早返舍，端坐思惟吾之名号，即当知母所生去处。\n\n时婆罗门女寻礼佛已，即归其舍。\n以忆母故，端坐念觉华定自在王如来。\n经一日一夜，忽见自身到一海边。\n其水涌沸，多诸恶兽，尽复铁身，飞走海上，东西驰逐。\n见诸男子女人，百千万数，出没海中，被诸恶兽争取食啖。\n又见夜叉，其形各异，或多手多眼、多足多头、口牙外出，利刃如剑。\n驱诸罪人，使近恶兽，复自搏攫，头足相就。其形万类，不敢久视。\n\n时婆罗门女，以念佛力故，自然无惧。\n有一鬼王，名曰无毒，稽首来迎，白圣女曰：\n善哉，菩萨，何缘来此？\n\n时婆罗门女问鬼王曰：此是何处？\n无毒答曰：此是大铁围山西面第一重海。\n圣女问曰：我闻铁围之内，地狱在中，是事实否？\n无毒答曰：实有地狱。\n圣女问曰：我今云何得到狱所？\n无毒答曰：若非威神，即须业力，非此二事，终不能到。\n\n圣女又问：此水何缘，而乃涌沸，多诸罪人，及以恶兽？\n无毒答曰：\n此是阎浮提造恶众生，新死之者，经四十九日后，无人继嗣，\n为作功德，救拔苦难，生时又无善因。\n当据本业所感地狱，自然先渡此海。\n海东十万由旬，又有一海，其苦倍此。\n彼海之东，又有一海，其苦复倍。\n三业恶因之所招感，共号业海，其处是也。\n\n圣女又问鬼王无毒曰：地狱何在？\n无毒答曰：三海之内，是大地狱，其数百千，各各差别。\n所谓大者，具有十八。次有五百，苦毒无量。次有千百，亦无量苦。\n\n圣女又问大鬼王曰：我母死来未久，不知魂神当至何趣？\n鬼王问圣女曰：菩萨之母，在生习何行业？\n圣女答曰：我母邪见，讥毁三宝。设或暂信，旋又不敬。死虽日浅，未知生处。\n无毒问曰：菩萨之母，姓氏何等？\n圣女答曰：我父我母，俱婆罗门种，父号尸罗善现，母号悦帝利。\n\n无毒合掌启菩萨曰：\n愿圣者却返本处，无至忧忆悲恋。\n悦帝利罪女，生天以来，经今三日。\n云承孝顺之子，为母设供修福，布施觉华定自在王如来塔寺。\n非唯菩萨之母，得脱地狱，应是无间罪人，此日悉得受乐，俱同生讫。\n\n鬼王言毕，合掌而退。\n婆罗门女，寻如梦归。悟此事已，\n便于觉华定自在王如来塔像之前，立弘誓愿：\n愿我尽未来劫，应有罪苦众生，广设方便，使令解脱。\n\n佛告文殊师利：\n时鬼王无毒者，当今财首菩萨是。\n婆罗门女者，即地藏菩萨是。\n\n【分身集会品第二】\n\n尔时百千万亿不可思、不可议、不可量、不可说无量阿僧祇世界，\n所有地狱处，分身地藏菩萨，俱来集在忉利天宫。\n以如来神力故，各以方面，\n与诸得解脱从业道出者，亦各有千万亿那由他数，共持香华，来供养佛。\n\n彼诸同来等辈，皆因地藏菩萨教化，永不退转于阿耨多罗三藐三菩提。\n是诸众等，久远劫来，流浪生死，六道受苦，暂无休息。\n以地藏菩萨广大慈悲，深誓愿故，各获果证。\n既至忉利，心怀踊跃，瞻仰如来，目不暂舍。\n\n尔时，世尊舒金色臂，摩百千万亿不可思、不可议、不可量、不可说、\n无量阿僧祇世界诸分身地藏菩萨摩诃萨顶，而作是言：\n吾于五浊恶世，教化如是刚强众生，令心调伏，舍邪归正，十有一二，尚恶习在。\n吾亦分身千百亿，广设方便。\n或有利根，闻即信受；或有善果，勤劝成就；\n或有暗钝，久化方归；或有业重，不生敬仰。\n如是等辈众生，各各差别，分身度脱。\n\n或现男子身、或现女人身、或现天龙身、或现神鬼身、\n或现山林川原、河池泉井，利及于人，悉皆度脱。\n或现天帝身、或现梵王身、或现转轮王身、或现居士身、\n或现国王身、或现宰辅身、或现官属身、\n或现比丘、比丘尼、优婆塞、优婆夷身、\n乃至声闻、罗汉、辟支佛、菩萨等身，而以化度。\n非但佛身，独现其前。\n\n汝观吾累劫勤苦，度脱如是等难化刚强罪苦众生。\n其有未调伏者，随业报应。\n若堕恶趣，受大苦时，汝当忆念吾在忉利天宫，殷勤付嘱。\n令娑婆世界，至弥勒出世已来众生，悉使解脱，永离诸苦，遇佛授记。\n\n尔时，诸世界分身地藏菩萨，共复一形，涕泪哀恋，白其佛言：\n我从久远劫来，蒙佛接引，使获不可思议神力，具大智慧。\n我所分身，遍满百千万亿恒河沙世界，\n每一世界化百千万亿身，每一身度百千万亿人，\n令归敬三宝，永离生死，至涅槃乐。\n但于佛法中所为善事，一毛一渧，一沙一尘，或毫发许，我渐度脱，使获大利。\n唯愿世尊，不以后世恶业众生为虑。\n\n如是三白佛言：唯愿世尊，不以后世恶业众生为虑。\n\n尔时，佛赞地藏菩萨言：\n善哉！善哉！吾助汝喜。\n汝能成就久远劫来，发弘誓愿，广度将毕，即证菩提。\n\n【观众生业缘品第三】\n\n尔时佛母摩耶夫人，恭敬合掌问地藏菩萨言：\n圣者，阎浮众生，造业差别，所受报应，其事云何？\n\n地藏答言：\n千万世界，乃及国土，或有地狱、或无地狱；\n或有女人、或无女人；或有佛法、或无佛法，\n乃至声闻辟支佛，亦复如是，非但地狱罪报一等。\n\n摩耶夫人重白菩萨：且愿闻于阎浮罪报所感恶趣。\n地藏答言：圣母，唯愿听受，我粗说之。\n佛母白言：愿圣者说。\n\n尔时地藏菩萨白圣母言：\n南阎浮提，罪报名号如是。\n\n若有众生不孝父母，或至杀害，当堕无间地狱，千万亿劫求出无期。\n若有众生出佛身血，毁谤三宝，不敬尊经，亦当堕于无间地狱，千万亿劫，求出无期。\n若有众生侵损常住，玷污僧尼，或伽蓝内恣行淫欲，或杀或害，\n如是等辈，当堕无间地狱，千万亿劫，求出无期。\n若有众生，伪作沙门，心非沙门，破用常住，欺诳白衣，违背戒律，种种造恶，\n如是等辈，当堕无间地狱，千万亿劫，求出无期。\n若有众生，偷窃常住财物谷米，饮食衣服，乃至一物不与取者，\n当堕无间地狱，千万亿劫，求出无期。\n\n地藏白言：圣母，若有众生，作如是罪，当堕五无间地狱，求暂停苦一念不得。\n\n摩耶夫人重白地藏菩萨言：云何名为无间地狱？\n\n地藏白言：\n圣母，诸有地狱在大铁围山之内，其大地狱有一十八所，\n次有五百，名号各别，次有千百，名字亦别。\n无间狱者，其狱城周匝八万余里，其城纯铁，高一万里，城上火聚，少有空缺。\n其狱城中，诸狱相连，名号各别。\n独有一狱，名曰无间，其狱周匝万八千里，狱墙高一千里，悉是铁围，\n上火彻下，下火彻上。铁蛇铁狗，吐火驰逐狱墙之上，东西而走。\n\n狱中有床，遍满万里。一人受罪，自见其身遍卧满床。\n千万人受罪，亦各自见身满床上。众业所感获报如是。\n\n又诸罪人，备受众苦。千百夜叉及以恶鬼，口牙如剑，眼如电光，手复铜爪，拖拽罪人。\n复有夜叉执大铁戟，中罪人身，或中口鼻，或中腹背。\n抛空翻接或置床上，复有铁鹰啖罪人目。\n复有铁蛇绞罪人颈。百肢节内，悉下长钉，\n拔舌耕犁，抽肠剉斩，烊铜灌口，热铁缠身。\n万死千生，业感如是。动经亿劫，求出无期。\n\n此界坏时，寄生他界，他界次坏，转寄他方；\n他方坏时，辗转相寄。此界成后，还复而来。\n无间罪报，其事如是。\n\n又五事业感，故称无间。何等为五？\n\n一者、日夜受罪，以至劫数，无时间绝，故称无间。\n\n二者、一人亦满，多人亦满，故称无间。\n\n三者、罪器叉棒，鹰蛇狼犬，碓磨锯凿，剉斫镬汤，铁网铁绳，铁驴铁马，\n生革络首，热铁浇身，饥吞铁丸，渴饮铁汁，从年竟劫，数那由他，\n苦楚相连，更无间断，故称无间。\n\n四者、不问男子女人，羌胡夷狄，老幼贵贱，或龙或神，或天或鬼，\n罪行业感，悉同受之，故称无间。\n\n五者、若堕此狱，从初入时，至百千劫，一日一夜，万死万生，\n求一念间暂住不得，除非业尽，方得受生，以此连绵，故称无间。\n\n地藏菩萨白圣母言：无间地狱，粗说如是。\n若广说地狱罪器等名，及诸苦事，一劫之中，求说不尽。\n摩耶夫人闻已，愁忧合掌，顶礼而退。\n\n【阎浮众生业感品第四】\n\n尔时地藏菩萨摩诃萨白佛言：\n世尊，我承佛如来威神力故，遍百千万亿世界，分是身形，救拔一切业报众生。\n若非如来大慈力故，即不能作如是变化。\n我今又蒙佛付嘱，至阿逸多成佛以来，六道众生，遣令度脱。\n唯然世尊，愿不有虑。\n\n尔时佛告地藏菩萨：\n一切众生未解脱者，性识无定，恶习结业，善习结果。\n为善为恶，逐境而生。轮转五道，暂无休息，动经尘劫，迷惑障难。\n如鱼游网，将是长流，脱入暂出，又复遭网。\n以是等辈，吾当忧念。\n汝既毕是往愿，累劫重誓，广度罪辈，吾复何虑。\n\n说是语时，会中有一菩萨摩诃萨，名定自在王，白佛言：\n世尊，地藏菩萨累劫以来，各发何愿，今蒙世尊殷勤赞叹。\n唯愿世尊，略而说之。\n\n尔时世尊告定自在王菩萨：\n谛听谛听！善思念之！吾当为汝分别解说。\n乃往过去无量阿僧祇那由他不可说劫，尔时有佛，号一切智成就如来，\n应供、正遍知、明行足、善逝、世间解、无上士、调御丈夫、天人师、佛、世尊，\n其佛寿命六万劫。\n未出家时为小国王，与一邻国王为友，同行十善，饶益众生。\n其邻国内所有人民，多造众恶。\n二王议计，广设方便。\n一王发愿，早成佛道，当度是辈，令使无余。\n一王发愿，若不先度罪苦，令是安乐，得至菩提，我终未愿成佛。\n\n佛告定自在王菩萨：\n一王发愿早成佛者，即一切智成就如来是。\n一王发愿永度罪苦众生，未愿成佛者，即地藏菩萨是。\n\n复于过去无量阿僧祇劫，有佛出世，名清净莲华目如来，其佛寿命四十劫。\n像法之中，有一罗汉，福度众生。因次教化，遇一女人，字曰光目，设食供养。\n\n罗汉问之：欲愿何等？\n光目答曰：我以母亡之日，资福救拔，未知我母生处何趣？\n\n罗汉愍之，为入定观，见光目女母堕在恶趣，受极大苦。\n罗汉问光目言：汝母在生，作何行业？今在恶趣，受极大苦。\n\n光目答言：\n我母所习，唯好食啖鱼鳖之属。\n所食鱼鳖，多食其子，或炒或煮，恣情食啖，计其命数，千万复倍。\n尊者慈愍，如何哀救？\n\n罗汉愍之，为作方便，劝光目言：\n汝可志诚念清净莲华目如来，兼塑画形像，存亡获报。\n\n光目闻已，即舍所爱，寻画佛像而供养之，复恭敬心，悲泣瞻礼。\n忽于夜后，梦见佛身金色晃耀，如须弥山，放大光明。而告光目：\n汝母不久当生汝家，才觉饥寒，即当言说。\n\n其后家内婢生一子，未满三日，而乃言说。\n稽首悲泣，告于光目：\n生死业缘，果报自受，吾是汝母，久处暗冥。\n自别汝来，累堕大地狱。\n蒙汝福力，方得受生。为下贱人，又复短命。\n寿年十三，更落恶道。汝有何计，令吾脱免？\n\n光目闻说，知母无疑，哽咽悲啼而白婢子：\n既是我母，合知本罪，作何行业，堕于恶道。\n\n婢子答言：\n以杀害毁骂二业受报。\n若非蒙福，救拔吾难，以是业故，未合解脱。\n\n光目问言：地狱罪报，其事云何？\n婢子答言：罪苦之事，不忍称说，百千岁中，卒白难竟。\n\n光目闻已，啼泪号泣而白空界：\n愿我之母，永脱地狱，毕十三岁，更无重罪，及历恶道。\n十方诸佛慈哀愍我，听我为母所发广大誓愿。\n若得我母永离三途及斯下贱，乃至女人之身永劫不受者。\n愿我自今日后，对清净莲华目如来像前，\n却后百千万亿劫中，应有世界，所有地狱及三恶道诸罪苦众生，\n誓愿救拔，令离地狱恶趣，畜生饿鬼等，\n如是罪报等人，尽成佛竟，我然后方成正等正觉。\n\n发誓愿已，具闻清净莲华目如来而告之曰：\n光目，汝大慈愍，善能为母发如是大愿。\n吾观汝母十三岁毕，舍此报已，生为梵志，寿年百岁。\n过是报后，当生无忧国土，寿命不可计劫。后成佛果，广度人天，数如恒河沙。\n\n佛告定自在王：\n尔时罗汉福度光目者，即无尽意菩萨是。\n光目母者，即解脱菩萨是，光目女者即地藏菩萨是。\n过去久远劫中，如是慈愍，发恒河沙愿，广度众生。\n未来世中，若有男子女人，不行善者行恶者，乃至不信因果者，\n邪淫妄语者，两舌恶口者，毁谤大乘者，如是诸业众生，必堕恶趣。\n若遇善知识，劝令一弹指间，归依地藏菩萨，是诸众生，即得解脱三恶道报。\n若能志心归敬及瞻礼赞叹，香华衣服，种种珍宝，或复饮食，如是奉事者。\n未来百千万亿劫中，常在诸天受胜妙乐。\n若天福尽，下生人间，犹百千劫常为帝王，能忆宿命因果本末。\n\n定自在王！如是地藏菩萨有如此不可思议大威神力，广利众生，\n汝等诸菩萨当记是经广宣流布。\n\n定自在王白佛言：世尊，愿不有虑。\n我等千万亿菩萨摩诃萨，必能承佛威神广演是经，于阎浮提利益众生。\n定自在王菩萨白世尊已，合掌恭敬作礼而退。\n\n尔时四方天王俱从座起，合掌恭敬白佛言：\n世尊，地藏菩萨于久远劫来，发如是大愿，云何至今犹度未绝，更发广大誓言。\n唯愿世尊为我等说。\n\n佛告四天王：善哉善哉！吾今为汝及未来现在天人众等，广利益故，\n说地藏菩萨于娑婆世界，阎浮提内生死道中，慈哀救拔，度脱一切罪苦众生方便之事。\n\n四天王言：唯然世尊，愿乐欲闻。\n\n佛告四天王：地藏菩萨久远劫来，迄至于今，度脱众生，犹未毕愿，\n慈愍此世罪苦众生。复观未来无量劫中，因蔓不断，以是之故，又发重愿。\n如是菩萨于娑婆世界，阎浮提中，百千万亿方便，而为教化。\n\n四天王，地藏菩萨若遇杀生者，说宿殃短命报。\n若遇窃盗者，说贫穷苦楚报。\n若遇邪淫者，说雀鸽鸳鸯报。\n若遇恶口者，说眷属斗诤报。\n若遇毁谤者，说无舌疮口报。\n若遇嗔恚者，说丑陋癃残报。\n若遇悭吝者，说所求违愿报。\n若遇饮食无度者，说饥渴咽病报。\n若遇畋猎恣情者，说惊狂丧命报。\n若遇悖逆父母者，说天地灾杀报。\n若遇烧山林木者，说狂迷取死报。\n若遇前后父母恶毒者，说返生鞭挞现受报。\n若遇网捕生雏者，说骨肉分离报。\n若遇毁谤三宝者，说盲聋喑哑报。\n若遇轻法慢教者，说永处恶道报。\n若遇破用常住者，说亿劫轮回地狱报。\n若遇污梵诬僧者，说永在畜生报。\n若遇汤火斩斫伤生者，说轮回递偿报。\n若遇破戒犯斋者，说禽兽饥饿报。\n若遇非理毁用者，说所求阙绝报。\n若遇吾我贡高者，说卑使下贱报。\n若遇两舌斗乱者，说无舌百舌报。\n若遇邪见者，说边地受生报。\n\n如是等阎浮提众生，身口意业，恶习结果，百千报应，今粗略说。\n如是等阎浮提众生业感差别，地藏菩萨百千方便而教化之。\n是诸众生，先受如是等报，后堕地狱，动经劫数，无有出期。\n是故汝等护人护国，无令是诸众业迷惑众生。\n\n四天王闻已，涕泪悲叹合掌而退。\n\n【地狱名号品第五】\n\n尔时普贤菩萨摩诃萨白地藏菩萨言：\n仁者，愿为天龙四众，及未来现在一切众生，\n说娑婆世界，及阎浮提罪苦众生，所受报处，地狱名号，及恶报等事，\n使未来世末法众生，知是果报。\n\n地藏答言：仁者，我今承佛威神，及大士之力，略说地狱名号，及罪报恶报之事。\n\n仁者，阎浮提东方有山，号曰铁围，其山黑邃，无日月光。\n\n有大地狱，号极无间，又有地狱，名大阿鼻。\n复有地狱，名曰四角；复有地狱，名曰飞刀；复有地狱，名曰火箭；\n复有地狱，名曰夹山；复有地狱，名曰通枪；复有地狱，名曰铁车；\n复有地狱，名曰铁床；复有地狱，名曰铁牛；复有地狱，名曰铁衣；\n复有地狱，名曰千刃；复有地狱，名曰铁驴；复有地狱，名曰烊铜；\n复有地狱，名曰抱柱；复有地狱，名曰流火；复有地狱，名曰耕舌；\n复有地狱，名曰剉首；复有地狱，名曰烧脚；复有地狱，名曰啖眼；\n复有地狱，名曰铁丸；复有地狱，名曰诤论；复有地狱，名曰铁呋；\n复有地狱，名曰多嗔。\n\n地藏白言：仁者，铁围之内，有如是等地狱，其数无限。\n\n更有叫唤地狱、拔舌地狱、粪尿地狱、铜锁地狱、火象地狱、火狗地狱、\n火马地狱、火牛地狱、火山地狱、火石地狱、火床地狱、火梁地狱、\n火鹰地狱、锯牙地狱、剥皮地狱、饮血地狱、烧手地狱、烧脚地狱、\n倒刺地狱、火屋地狱、铁屋地狱、火狼地狱，如是等地狱。\n\n其中各各复有诸小地狱，或一、或二、或三、或四、乃至百千，其中名号，各各不同。\n\n地藏菩萨告普贤菩萨言：\n仁者，此者皆是南阎浮提行恶众生，业感如是。\n业力甚大，能敌须弥，能深巨海，能障圣道。\n是故众生莫轻小恶，以为无罪，死后有报，纤毫受之。\n父子至亲，歧路各别，纵然相逢，无肯代受。\n我今承佛威力，略说地狱罪报之事，唯愿仁者暂听是言。\n\n普贤答言：吾已久知三恶道报，望仁者说，令后世末法一切恶行众生，闻仁者说，使令归佛。\n\n地藏白言：仁者，地狱罪报，其事如是。\n或有地狱，取罪人舌，使牛耕之。\n或有地狱取罪人心，夜叉食之。\n或有地狱，镬汤盛沸，煮罪人身。\n或有地狱，赤烧铜柱，使罪人抱。\n或有地狱，使诸火烧，趁及罪人。\n或有地狱，一向寒冰。\n或有地狱，无限粪尿。\n或有地狱，纯飞钑鑗。\n或有地狱，多攒火枪。\n或有地狱，唯撞胸背。\n或有地狱，但烧手足。\n或有地狱，盘缴铁蛇。\n或有地狱，驱逐铁狗。\n或有地狱，尽驾铁骡。\n\n仁者，如是等报，各各狱中，有百千种业道之器，无非是铜是铁，是石是火，\n此四种物，众业行感。若广说地狱罪报等事，一一狱中，更有百千种苦楚，\n何况多狱。我今承佛威神及仁者问，略说如是。若广解说，穷劫不尽。\n\n【如来赞叹品第六】\n\n尔时世尊举身放大光明，遍照百千万亿恒河沙等诸佛世界。\n出大音声，普告诸佛世界一切诸菩萨摩诃萨，及天、龙、鬼、神、人、非人等：\n听吾今日称扬赞叹地藏菩萨摩诃萨，于十方世界，现大不可思议威神慈悲之力，\n救护一切罪苦之事。\n吾灭度后，汝等诸菩萨大士，及天龙鬼神等，广作方便，卫护是经，令一切众生证涅槃乐。\n\n说是语已，会中有一菩萨，名曰普广，合掌恭敬而白佛言：\n今见世尊赞叹地藏菩萨，有如是不可思议大威神德，\n唯愿世尊为未来世末法众生，宣说地藏菩萨利益人天因果等事，\n使诸天龙八部，及未来世众生，顶受佛语。\n\n尔时世尊告普广菩萨及四众等：\n谛听谛听！吾当为汝略说地藏菩萨利益人天福德之事。\n\n普广白言：唯然！世尊，愿乐欲闻。\n\n佛告普广菩萨：\n未来世中，若有善男子、善女人，闻是地藏菩萨摩诃萨名者，\n或合掌者、赞叹者、作礼者、恋慕者，是人超越三十劫罪。\n\n普广，若有善男子、善女人，或彩画形像，或土石胶漆，金银铜铁、作此菩萨，\n一瞻一礼者，是人百返生于三十三天，永不堕于恶道。\n假如天福尽故，下生人间，犹为国王，不失大利。\n\n若有女人，厌女人身，尽心供养地藏菩萨画像，及土石胶漆铜铁等像，\n如是日日不退，常以华香、饮食、衣服、缯彩、幢旛、钱、宝物等供养。\n是善女人，尽此一报女身，百千万劫，更不生有女人世界，何况复受。\n除非慈愿力故，要受女身，度脱众生，承斯供养地藏力故，及功德力，百千万劫不受女身。\n\n复次普广：若有女人，厌是丑陋，多疾病者，\n但于地藏像前，志心瞻礼，食顷之间。\n是人千万劫中，所受生身，相貌圆满。\n是丑陋女人，如不厌女身，即百千万亿生中，常为王女，乃及王妃，\n宰辅大姓，大长者女，端正受生，诸相圆满。\n由志心故，瞻礼地藏菩萨，获福如是。\n\n复次普广：若有善男子、善女人，能对菩萨像前，作诸伎乐，及歌咏赞叹，\n香华供养，乃至劝于一人多人。\n如是等辈，现在世中及未来世，常得百千鬼神日夜卫护，不令恶事辄闻其耳，何况亲受诸横。\n\n复次普广：未来世中，若有恶人及恶神恶鬼，\n见有善男子、善女人，归敬供养赞叹瞻礼地藏菩萨形像，\n或妄生讥毁，谤无功德及利益事，或露齿笑，或背面非，\n或劝人共非，或一人非，或多人非，乃至一念生讥毁者。\n如是之人，贤劫千佛灭度，讥毁之报，尚在阿鼻地狱受极重罪。\n过是劫已，方受饿鬼。又经千劫，复受畜生。又经千劫，方得人身。\n纵受人身，贫穷下贱，诸根不具，多被恶业来结其心。\n不久之间，复堕恶道。\n是故普广，讥毁他人供养，尚获此报，何况别生恶见毁灭。\n\n复次普广：若未来世，有男子女人，久处床枕，求生求死，了不可得。\n或夜梦恶鬼，乃及家亲、或游险道、或多魇寐、共鬼神游。\n日月岁深，转复尪瘵，眠中叫苦，惨凄不乐者。\n此皆是业道论对，未定轻重，或难舍寿、或不得愈，男女俗眼，不辨是事。\n\n但当对诸佛菩萨像前，高声转读此经一遍。\n或取病人可爱之物，或衣服、宝贝，庄园、舍宅，对病人前，高声唱言：\n我某甲等，为是病人对经像前舍诸等物，\n或供养经像、或造佛菩萨形像、或造塔寺、或燃油灯、或施常住。\n如是三白病人，遣令闻知。\n\n假令诸识分散，至气尽者，乃至一日、二日、三日、四日至七日以来。\n但高声白，高声读经。是人命终之后，宿殃重罪，至于五无间罪，永得解脱，\n所受生处，常知宿命。\n何况善男子善女人自书此经或教人书、或自塑画菩萨形像乃至教人塑画。\n所受果报，必获大利。\n\n是故普广，若见有人读诵是经，乃至一念赞叹是经，或恭敬者。\n汝须百千方便，劝是等人，勤心莫退，\n能得未来、现在千万亿不可思议功德。\n\n复次普广：若未来世诸众生等，或梦或寐，\n见诸鬼神乃及诸形，或悲、或啼、或愁、或叹、或恐、或怖。\n此皆是一生十生百生千生过去父母、男女弟妹、夫妻眷属，\n在于恶趣，未得出离，无处希望福力救拔，\n当告宿世骨肉，使作方便，愿离恶道。\n\n普广，汝以神力，遣是眷属，令对诸佛菩萨像前，志心自读此经，\n或请人读，其数三遍或七遍。\n如是恶道眷属，经声毕是遍数，当得解脱，乃至梦寐之中，永不复见。\n\n复次普广：若未来世，有诸下贱等人，或奴或婢，乃至诸不自由之人，\n觉知宿业，要忏悔者。志心瞻礼地藏菩萨形像，\n乃至一七日中，念菩萨名，可满万遍。\n如是等人，尽此报后，千万生中，常生尊贵，更不经三恶道苦。\n\n复次普广：若未来世中，阎浮提内，刹利、婆罗门、长者、居士、一切人等，\n及异姓种族，有新产者，或男或女，七日之中，\n早与读诵此不可思议经典，更为念菩萨名，可满万遍。\n是新生子，或男或女，宿有殃报，便得解脱，安乐易养，寿命增长。\n若是承福生者，转增安乐，及与寿命。\n\n复次普广：若未来世众生，于月一日、八日、十四日、十五日、\n十八日、二十三、二十四、二十八、二十九日、乃至三十日，\n是诸日等，诸罪结集，定其轻重。\n南阎浮提众生，举止动念，无不是业，无不是罪，\n何况恣情杀害、窃盗、邪淫、妄语、百千罪状。\n能于是十斋日，对佛菩萨诸贤圣像前，读是经一遍，\n东西南北百由旬内，无诸灾难。\n\n当此居家，若长若幼，现在未来百千岁中，永离恶趣。\n能于十斋日每转一遍，现世令此居家无诸横病，衣食丰溢。\n是故普广，当知地藏菩萨有如是等不可说百千万亿大威神力，利益之事。\n\n阎浮众生，于此大士有大因缘。\n是诸众生，闻菩萨名，见菩萨像，乃至闻是经三字五字，或一偈一句者，\n现在殊妙安乐，未来之世，百千万生，常得端正，生尊贵家。\n\n尔时普广菩萨闻佛如来称扬赞叹地藏菩萨已，胡跪合掌复白佛言：\n世尊，我久知是大士有如此不可思议神力，及大誓愿力，为未来众生遣知利益，\n故问如来，唯然顶受。\n\n世尊，当何名此经，使我云何流布？\n\n佛告普广：此经有三名：\n一名地藏本愿，亦名地藏本行，亦名地藏本誓力经。\n缘此菩萨，久远劫来，发大重愿，利益众生，是故汝等，依愿流布。\n\n普广闻已，合掌恭敬作礼而退。\n\n【利益存亡品第七】\n\n尔时地藏菩萨摩诃萨白佛言：\n世尊，我观是阎浮众生，举心动念，无非是罪。\n脱获善利，多退初心。若遇恶缘，念念增益。\n是等辈人，如履泥涂，负于重石，渐困渐重，足步深邃。\n若得遇知识，替与减负，或全与负。\n是知识有大力故，复相扶助，劝令牢脚。\n若达平地，须省恶路，无再经历。\n\n世尊，习恶众生，从纤毫间，便至无量。\n是诸众生有如此习，临命终时，父母眷属，宜为设福，以资前路。\n或悬旛盖及燃油灯，或转读尊经、或供养佛像及诸圣像，\n乃至念佛菩萨，及辟支佛名字，一名一号，历临终人耳根，或闻在本识。\n是诸众生所造恶业，计其感果，必堕恶趣，\n缘是眷属为临终人修此圣因，如是众罪，悉皆消灭。\n\n若能更为身死之后，七七日内，广造众善。\n能使是诸众生永离恶趣，得生人天，受胜妙乐，现在眷属，利益无量。\n\n是故我今对佛世尊，及天龙八部人非人等，\n劝于阎浮提众生临终之日，慎勿杀害，及造恶缘，拜祭鬼神，求诸魍魉。\n\n何以故？尔所杀害乃至拜祭，无纤毫之力，利益亡人，但结罪缘，转增深重。\n假使来世或现在生，得获圣分，生人天中。\n缘是临终被诸眷属造是恶因，亦令是命终人殃累对辩，晚生善处。\n何况临命终人，在生未曾有少善根，各据本业，自受恶趣，\n何忍眷属更为增业。\n\n譬如有人从远地来，绝粮三日，所负担物，强过百斤，\n忽遇邻人，更附少物，以是之故，转复困重。\n\n世尊，我观阎浮众生，但能于诸佛教中，乃至善事，\n一毛一渧，一沙一尘，如是利益，悉皆自得。\n\n说是语时，会中有一长者，名曰大辩，是长者久证无生，化度十方，现长者身，\n合掌恭敬，问地藏菩萨言：\n大士，是南阎浮提众生，命终之后，小大眷属，为修功德，乃至设斋，\n造众善因，是命终人，得大利益及解脱不？\n\n地藏答言：\n长者，我今为未来现在一切众生，承佛威力，略说是事。\n长者，未来现在诸众生等，临命终日，得闻一佛名、一菩萨名、一辟支佛名，\n不问有罪无罪，悉得解脱。\n若有男子女人，在生不修善因多造众罪。\n命终之后，眷属小大，为造福利一切圣事，七分之中而乃获一，六分功德，生者自利。\n以是之故，未来现在善男女等，闻健自修，分分己获。\n\n无常大鬼，不期而到，冥冥游神，未知罪福。\n七七日内，如痴如聋，或在诸司辩论业果。\n审定之后，据业受生。未测之间，千万愁苦，何况堕于诸恶趣等。\n\n是命终人，未得受生，在七七日内，念念之间，望诸骨肉眷属，与造福力救拔。\n过是日后，随业受报。\n若是罪人，动经千百岁中，无解脱日。\n若是五无间罪，堕大地狱，千劫万劫，永受众苦。\n\n复次长者：如是罪业众生，命终之后，眷属骨肉，为修营斋，资助业道，\n未斋食竟，及营斋之次，米泔菜叶，不弃于地，乃至诸食未献佛僧，勿得先食。\n如有违食，及不精勤，是命终人，了不得力。\n如精勤护净奉献佛僧，是命终人，七分获一。\n是故长者，阎浮众生，若能为其父母乃至眷属，命终之后，设斋供养，志心勤恳，\n如是之人，存亡获利。\n\n说是语时，忉利天宫，有千万亿那由他阎浮鬼神，悉发无量菩提之心，\n大辩长者作礼而退。\n\n【阎罗王众赞叹品第八】\n\n尔时铁围山内，有无量鬼王，与阎罗天子，俱诣忉利，来到佛所。\n所谓：恶毒鬼王、多恶鬼王、大诤鬼王、白虎鬼王、血虎鬼王、赤虎鬼王、\n散殃鬼王、飞身鬼王、电光鬼王、狼牙鬼王、千眼鬼王、啖兽鬼王、\n负石鬼王、主耗鬼王、主祸鬼王、主食鬼王、主财鬼王、主畜鬼王、\n主禽鬼王、主兽鬼王、主魅鬼王、主产鬼王、主命鬼王、主疾鬼王、主险鬼王、\n三目鬼王、四目鬼王、五目鬼王、祁利失王、大祁利失王、祁利叉王、\n大祁利叉王、阿那吒王、大阿那吒王，如是等大鬼王，\n各各与百千诸小鬼王，尽居阎浮提，各有所执，各有所主。\n是诸鬼王与阎罗天子，承佛威神，及地藏菩萨摩诃萨力，俱诣忉利，在一面立。\n\n尔时阎罗天子，胡跪合掌白佛言：\n世尊，我等今者与诸鬼王，承佛威神，及地藏菩萨摩诃萨力，\n方得诣此忉利大会，亦是我等获善利故。\n我今有小疑事，敢问世尊。唯愿世尊慈悲宣说。\n\n佛告阎罗天子：恣汝所问，吾为汝说。\n\n是时阎罗天子瞻礼世尊，及回视地藏菩萨，而白佛言：\n世尊，我观地藏菩萨在六道中，百千方便而度罪苦众生，不辞疲倦，\n是大菩萨有如是不可思议神通之事。\n然诸众生获脱罪报，未久之间，又堕恶道。\n世尊，是地藏菩萨既有如是不可思议神力，云何众生而不依止善道，永取解脱？\n唯愿世尊为我解说。\n\n佛告阎罗天子：\n南阎浮提众生，其性刚强，难调难伏。\n是大菩萨，于百千劫，头头救拔如是众生，早令解脱。\n是罪报人乃至堕大恶趣，菩萨以方便力，拔出根本业缘，而遣悟宿世之事。\n自是阎浮提众生结恶习重，旋出旋入，劳斯菩萨久经劫数而作度脱。\n\n譬如有人迷失本家，误入险道，其险道中，多诸夜叉、及虎狼狮子、蚖蛇蝮蝎。\n如是迷人，在险道中，须臾之间，即遭诸毒。\n有一知识，多解大术，善禁是毒，乃及夜叉诸恶毒等。\n忽逢迷人欲进险道，而语之言：\n咄哉男子，为何事故而入此路，有何异术，能制诸毒。\n是迷路人忽闻是语，方知险道，即便退步，求出此路。\n是善知识，提携接手，引出险道，免诸恶毒。\n\n至于好道，令得安乐。而语之言：\n咄哉迷人，自今已后，勿履是道。此路入者，卒难得出，复损性命。\n是迷路人亦生感重。临别之时，知识又言：\n若见亲知及诸路人，若男若女，言于此路多诸毒恶，丧失性命。\n无令是众自取其死。\n\n是故地藏菩萨俱大慈悲，救拔罪苦众生，生人天中，令受妙乐。\n是诸罪众，知业道苦，脱得出离，永不再历。\n如迷路人，误入险道，遇善知识引接令出，永不复入。\n逢见他人，复劝莫入。\n自言因是迷故，得解脱竟，更不复入。\n若再履践，犹尚迷误，不觉旧曾所落险道，或致失命。\n如堕恶趣，地藏菩萨方便力故，使令解脱，生人天中。\n旋又再入，若业结重，永处地狱，无解脱时。\n\n尔时恶毒鬼王合掌恭敬白佛言：\n世尊，我等诸鬼王，其数无量，在阎浮提，或利益人，或损害人，各各不同。\n然是业报，使我眷属游行世界，多恶少善。\n过人家庭，或城邑聚落，庄园房舍。\n或有男子女人，修毛发善事，乃至悬一旛一盖，少香少华，\n供养佛像及菩萨像，或转读尊经，烧香供养一句一偈。\n我等鬼王敬礼是人，如过去现在未来诸佛。\n敕诸小鬼，各有大力，及土地分，便令卫护，\n不令恶事横事、恶病横病，乃至不如意事，近于此舍等处，何况入门。\n\n佛赞鬼王：善哉，善哉！\n汝等及与阎罗，能如是拥护善男女等，吾亦告梵王帝释，令卫护汝。\n\n说是语时，会中有一鬼王，名曰主命。白佛言：\n世尊，我本业缘，主阎浮人命，生时死时，我皆主之。\n在我本愿，甚欲利益。自是众生不会我意，致令生死俱不得安。\n\n何以故。是阎浮提人初生之时，不问男女，或欲生时，\n但作善事，增益宅舍，自令土地无量欢喜，拥护子母，得大安乐，利益眷属。\n或已生下，慎勿杀害，取诸鲜味供给产母，及广聚眷属，饮酒食肉，歌乐弦管，\n能令子母不得安乐。\n\n何以故。是产难时，有无数恶鬼及魍魉精魅，欲食腥血。\n是我早令舍宅土地灵只，荷护子母，使令安乐，而得利益。\n如是之人，见安乐故，便合设福，答诸土地。\n翻为杀害，聚集眷属。以是之故，犯殃自受，子母俱损。\n\n又阎浮提临命终人，不问善恶，我欲令是命终之人，不落恶道。\n何况自修善根增我力故。\n是阎浮提行善之人，临命终时，亦有百千恶道鬼神，\n或变作父母，乃至诸眷属，引接亡人，令落恶道。\n何况本造恶者。\n\n世尊，如是阎浮提男子女人临命终时，神识惛昧，不辨善恶，乃至眼耳更无见闻。\n是诸眷属，当须设大供养，转读尊经，念佛菩萨名号。\n如是善缘，能令亡者离诸恶道，诸魔鬼神悉皆退散。\n\n世尊，一切众生临命终时，若得闻一佛名，一菩萨名，或大乘经典，一句一偈。\n我观如是辈人，除五无间杀害之罪，小小恶业，合堕恶趣者，寻即解脱。\n\n佛告主命鬼王：\n汝大慈故，能发如是大愿，于生死中，护诸众生。\n若未来世中，有男子女人至生死时，汝莫退是愿，总令解脱，永得安乐。\n\n鬼王白佛言：愿不有虑。\n我毕是形，念念拥护阎浮众生，生时死时，俱得安乐。\n但愿诸众生于生死时，信受我语，无不解脱，获大利益。\n\n尔时佛告地藏菩萨：\n是大鬼王主命者，已曾经百千生，作大鬼王，于生死中，拥护众生。\n是大士慈悲愿故，现大鬼身，实非鬼也。\n却后过一百七十劫，当得成佛，号曰无相如来，劫名安乐，世界名净住，\n其佛寿命不可计劫。\n地藏，是大鬼王，其事如是不可思议，所度人天亦不可限量。\n\n【称佛名号品第九】\n\n尔时地藏菩萨摩诃萨白佛言：\n世尊，我今为未来众生演利益事，于生死中，得大利益，唯愿世尊听我说之。\n\n佛告地藏菩萨：\n汝今欲兴慈悲，救拔一切罪苦六道众生，演不思议事，今正是时，唯当速说。\n吾即涅槃，使汝早毕是愿，吾亦无忧现在未来一切众生。\n\n地藏菩萨白佛言：\n世尊，过去无量阿僧祇劫，有佛出世，号无边身如来。\n若有男子女人闻是佛名，暂生恭敬，即得超越四十劫生死重罪。\n何况塑画形像，供养赞叹，其人获福无量无边。\n\n又于过去恒河沙劫，有佛出世，号宝性如来。\n若有男子女人闻是佛名，一弹指顷，发心归依，是人于无上道永不退转。\n\n又于过去有佛出世，号波头摩胜如来。\n若有男子、女人，闻是佛名，历于耳根，是人当得千返生于六欲天中，何况志心称念。\n\n又于过去，不可说不可说阿僧祇劫，有佛出世，号师子吼如来。\n若有男子女人闻是佛名，一念归依，是人得遇无量诸佛摩顶授记。\n\n又于过去有佛出世，号拘留孙佛。\n若有男子女人，闻是佛名，志心瞻礼或复赞叹，是人于贤劫千佛会中，为大梵王，得授上记。\n\n又于过去有佛出世，号毗婆尸佛。\n若有男子女人闻是佛名，永不堕恶道，常生人天，受胜妙乐。\n\n又于过去无量无数恒河沙劫，有佛出世，号宝胜如来。\n若有男子女人闻是佛名，毕竟不堕恶道，常在天上受胜妙乐。\n\n又于过去有佛出世，号宝相如来。\n若有男子女人闻是佛名，生恭敬心，是人不久得阿罗汉果。\n\n又于过去无量阿僧祇劫，有佛出世，号袈裟幢如来。\n若有男子女人闻是佛名者，超一百大劫生死之罪。\n\n又于过去有佛出世，号大通山王如来。\n若有男子女人闻是佛名者，是人得遇恒河沙佛广为说法，必成菩提。\n\n又于过去有净月佛、山王佛、智胜佛、净名王佛、智成就佛、无上佛、\n妙声佛、满月佛、月面佛，有如是等不可说佛。\n世尊，现在未来一切众生，若天若人，若男若女，\n但念得一佛名号，功德无量，何况多名。\n\n是众生等，生时死时，自得大利，终不堕恶道。\n若有临命终人，家中眷属，乃至一人，为是病人高声念一佛名，\n是命终人，除五无间罪，余业报等悉得销灭。\n是五无间罪，虽至极重，动经亿劫，了不得出，\n承斯临命终时，他人为其称念佛名，于是罪中，亦渐销灭。\n何况众生自称自念，获福无量，灭无量罪。\n\n【校量布施功德缘品第十】\n\n尔时地藏菩萨摩诃萨，承佛威神，从座而起，胡跪合掌白佛言：\n世尊，我观业道众生，校量布施，有轻有重，\n有一生受福，有十生受福，有百生千生受大福利者。\n是事云何，唯愿世尊为我说之。\n\n尔时佛告地藏菩萨：\n吾今于忉利天宫一切众会，说阎浮提布施较量功德轻重，汝当谛听，吾为汝说。\n\n地藏白佛言：我疑是事，愿乐欲闻。\n\n佛告地藏菩萨：\n南阎浮提，有诸国王、宰辅大臣、大长者、大刹利、大婆罗门等，\n若遇最下贫穷，乃至癃残喑哑，聋痴无目，如是种种不完具者。\n是大国王等欲布施时，若能具大慈悲下心含笑，亲手遍布施，或使人施，软言慰喻，\n是国王等所获福利，如布施百恒河沙佛功德之利。\n何以故。缘是国王等，于是最贫贱辈及不完具者，发大慈心，是故福利有如此报。\n百千生中，常得七宝具足，何况衣食受用。\n\n复次地藏：若未来世，有诸国王，至婆罗门等，\n遇佛塔寺，或佛形像，乃至菩萨声闻辟支佛像，躬自营办供养布施。\n是国王等，当得三劫为帝释身，受胜妙乐。\n若能以此布施福利，回向法界，是大国王等，于十劫中，常为大梵天王。\n\n复次地藏：若未来世，有诸国王，至婆罗门等，\n遇先佛塔庙，或至经像，毁坏破落，乃能发心修补。\n是国王等，或自营办，或劝他人，乃至百千人等布施结缘。\n是国王等，百千生中常为转轮王身。\n如是他人同布施者，百千生中常为小国王身。\n更能于塔庙前，发回向心。如是国王乃及诸人，尽成佛道，以此果报无量无边。\n\n复次地藏：未来世中，有诸国王及婆罗门等，\n见诸老病及生产妇女，若一念间，具大慈心，布施医药饮食卧具，使令安乐。\n如是福利最不思议，一百劫中常为净居天主，二百劫中常为六欲天主，\n毕竟成佛，永不堕恶道，乃至百千生中，耳不闻苦声。\n\n复次地藏：若未来世中，有诸国王及婆罗门等，能作如是布施，获福无量。\n更能回向，不问多少，毕竟成佛，何况释梵转轮之报。\n是故地藏，普劝众生当如是学。\n\n复次地藏：未来世中，若善男子善女人，于佛法中，种少善根，\n毛发沙尘等许，所受福利，不可为喻。\n\n复次地藏：未来世中，若有善男子善女人，\n遇佛形像、菩萨形像、辟支佛形像、转轮王形像，布施供养得无量福，\n常在人天受胜妙乐。若能回向法界，是人福利不可为喻。\n\n复次地藏：未来世中，若有善男子善女人，遇大乘经典，或听闻一偈一句，\n发殷重心，赞叹恭敬，布施供养。是人获大果报，无量无边。若能回向法界，其福不可为喻。\n\n复次地藏：若未来世中，有善男子善女人，\n遇佛塔寺，大乘经典。新者布施供养，瞻礼赞叹，恭敬合掌。\n若遇故者，或毁坏者，修补营理，或独发心，或劝多人同共发心。\n如是等辈，三十生中常为诸小国王，檀越之人，常为轮王，还以善法教化诸小国王。\n\n复次地藏：未来世中，若有善男子善女人，于佛法中所种善根，\n或布施供养，或修补塔寺，或装理经典，乃至一毛一尘，一沙一渧。\n如是善事，但能回向法界，是人功德，百千生中受上妙乐。\n如但回向自家眷属，或自身利益，如是之果，即三生受乐，舍一得万报。\n是故地藏，布施因缘，其事如是。\n\n【地神护法品第十一】\n\n尔时坚牢地神白佛言：\n世尊，我从昔来瞻视顶礼无量菩萨摩诃萨，皆是大不可思议神通智慧，广度众生。\n是地藏菩萨摩诃萨，于诸菩萨誓愿深重，\n世尊，是地藏菩萨于阎浮提有大因缘。\n如文殊、普贤、观音、弥勒，亦化百千身形，度于六道，其愿尚有毕竟。\n是地藏菩萨教化六道一切众生，所发誓愿劫数，如千百亿恒河沙。\n\n世尊，我观未来及现在众生，于所住处，于南方清洁之地，\n以土石竹木作其龛室，是中能塑画，乃至金银铜铁，作地藏形像，\n烧香供养，瞻礼赞叹。是人居处，即得十种利益。何等为十：\n\n一者、土地丰壤；\n二者、家宅永安；\n三者、先亡生天；\n四者、现存益寿；\n五者、所求遂意；\n六者、无水火灾；\n七者、虚耗辟除；\n八者、杜绝恶梦；\n九者、出入神护；\n十者、多遇圣因。\n\n世尊，未来世中，及现在众生，若能于所住处方面，作如是供养，得如是利益。\n\n复白佛言：世尊，未来世中，若有善男子善女人，于所住处，\n有此经典及菩萨像，是人更能转读经典，供养菩萨。\n我常日夜以本神力，卫护是人，乃至水火盗贼，大横小横，一切恶事，悉皆消灭。\n\n佛告坚牢地神：汝大神力，诸神少及。何以故？\n阎浮土地，悉蒙汝护，乃至草木沙石，稻麻竹苇，谷米宝贝，从地而有，皆因汝力。\n又常称扬地藏菩萨利益之事，汝之功德，及以神通，百千倍于常分地神。\n若未来世中，有善男子善女人，供养菩萨，及转读是经，但依地藏本愿经一事修行者。\n汝以本神力而拥护之，勿令一切灾害及不如意事，辄闻于耳，何况令受。\n非但汝独护是人故，亦有释梵眷属，诸天眷属，拥护是人。\n何故得如是圣贤拥护，皆由瞻礼地藏形像，及转读是本愿经故，\n自然毕竟出离苦海，证涅槃乐。以是之故，得大拥护。\n\n【见闻利益品第十二】\n\n尔时世尊，从顶门上，放百千万亿大毫相光，\n所谓：白毫相光、大白毫相光、瑞毫相光、大瑞毫相光、\n玉毫相光、大玉毫相光、紫毫相光、大紫毫相光、\n青毫相光、大青毫相光、碧毫相光、大碧毫相光、\n红毫相光、大红毫相光、绿毫相光、大绿毫相光、\n金毫相光、大金毫相光、庆云毫相光、大庆云毫相光、\n千轮毫光、大千轮毫光、宝轮毫光、大宝轮毫光、\n日轮毫光、大日轮毫光、月轮毫光、大月轮毫光、\n宫殿毫光、大宫殿毫光、海云毫光、大海云毫光。\n\n于顶门上放如是等毫相光已，出微妙音，告诸大众，天龙八部、人非人等：\n听吾今日于忉利天宫，称扬赞叹地藏菩萨于人天中，利益等事、不思议事、\n超圣因事、证十地事、毕竟不退阿耨多罗三藐三菩提事。\n\n说是语时，会中有一菩萨摩诃萨，名观世音，从座而起，胡跪合掌白佛言：\n世尊，是地藏菩萨摩诃萨具大慈悲，怜愍罪苦众生，于千万亿世界，化千万亿身。\n所有功德及不思议威神之力。\n我闻世尊，与十方无量诸佛，异口同音，赞叹地藏菩萨云：\n正使过去现在未来诸佛，说其功德，犹不能尽。\n向者，又蒙世尊，普告大众：欲称扬地藏利益等事。\n唯愿世尊，为现在未来一切众生，称扬地藏不思议事，\n令天龙八部，瞻礼获福。\n\n佛告观世音菩萨：\n汝于娑婆世界有大因缘。\n若天若龙、若男若女、若神若鬼、乃至六道罪苦众生，\n闻汝名者、见汝形者、恋慕汝者、赞叹汝者。\n是诸众生，于无上道，必不退转。\n常生人天，具受妙乐。因果将熟，遇佛受记。\n汝今具大慈悲，怜愍众生，及天龙八部，听吾宣说地藏菩萨不思议利益之事。\n汝当谛听，吾今说之。\n\n观世音言：唯然，世尊，愿乐欲闻！\n\n佛告观世音菩萨：\n未来现在诸世界中，有天人受天福尽，有五衰相现，或有堕于恶道之者。\n如是天人，若男若女，当现相时，或见地藏菩萨形像、或闻地藏菩萨名，一瞻一礼。\n是诸天人，转增天福，受大快乐，永不堕三恶道报。\n何况见闻菩萨，以诸香华、衣服、饮食、宝贝、璎珞，布施供养，\n所获功德福利，无量无边。\n\n复次观世音：若未来现在诸世界中，六道众生临命终时，\n得闻地藏菩萨名，一声历耳根者，是诸众生，永不历三恶道苦。\n何况临命终时，父母眷属，将是命终人舍宅、财物、宝贝、衣服，\n塑画地藏形像，或使病人未终之时，眼耳见闻，\n知道眷属将舍宅、宝贝等为其自身塑画地藏菩萨形像。\n是人若是业报合受重病者，承斯功德，寻即除愈，寿命增益。\n是人若是业报命尽，应有一切罪障业障，合堕恶趣者，\n承斯功德，命终之后，即生人天，受胜妙乐，一切罪障，皆悉消灭。\n\n复次观世音菩萨：若未来世，有男子女人，\n或乳哺时、或三岁、五岁、十岁以下，亡失父母，乃及亡失兄弟姐妹，\n是人年既长大，思忆父母及诸眷属，不知落在何趣、生何世界、生何天中？\n是人若能塑画地藏菩萨形像，乃至闻名，一瞻一礼，一日至七日，莫退初心，\n闻名见形，瞻礼供养。\n是人眷属，假因业故，堕恶趣者，计当劫数，\n承斯男女，兄弟姊妹，塑画地藏形像，瞻礼功德，寻即解脱，生人天中，受胜妙乐。\n是人眷属，如有福力，已生人天，受胜妙乐者，即承斯功德，转增圣因，受无量乐。\n\n是人更能三七日中，一心瞻礼地藏形像，念其名字，满于万遍。\n当得菩萨现无边身，具告是人，眷属生界。\n或于梦中，菩萨现大神力，亲领是人，于诸世界，见诸眷属。\n更能每日念菩萨名千遍，至于千日。\n是人当得菩萨遣所在土地鬼神，终身卫护，现世衣食丰溢，无诸疾苦。\n乃至横事不入其门，何况及身。是人毕竟得菩萨摩顶授记。\n\n复次观世音菩萨：若未来世有善男子善女人，\n欲发广大慈心，救度一切众生者，欲修无上菩提者，欲出离三界者。\n是诸人等，见地藏形像，及闻名者，至心归依，\n或以香华、衣服、宝贝、饮食，供养瞻礼。\n是善男女等，所愿速成，永无障碍。\n\n复次观世音：若未来世，有善男子善女人，\n欲求现在未来百千万亿等愿，百千万亿等事。\n但当归依瞻礼、供养赞叹，地藏菩萨形像。\n如是所愿所求，悉皆成就。\n复愿地藏菩萨具大慈悲，永拥护我。\n是人于睡梦中，即得菩萨摩顶授记。\n\n复次观世音菩萨：若未来世，善男子善女人，于大乘经典，深生珍重，\n发不思议心，欲读欲诵。\n纵遇明师教视令熟，旋得旋忘，动经年月，不能读诵。\n是善男子等，有宿业障，未得消除，故于大乘经典，无读诵性。\n如是之人，闻地藏菩萨名、见地藏菩萨像，具以本心恭敬陈白，\n更以香华、衣服、饮食、一切玩具，供养菩萨。\n以净水一盏，经一日一夜安菩萨前，然后合掌请服，回首向南。\n临入口时，至心郑重，服水既毕，慎五辛酒肉，邪淫妄语，及诸杀害，\n一七日或三七日。\n是善男子善女人，于睡梦中，具见地藏菩萨现无边身，\n于是人处，授灌顶水。\n其人梦觉，即获聪明，应是经典，一历耳根，即当永记，更不忘失一句一偈。\n\n复次观世音菩萨：若未来世，有诸人等，\n衣食不足，求者乖愿、或多病疾、或多凶衰、家宅不安、眷属分散、\n或诸横事，多来忤身，睡梦之间，多有惊怖。\n如是人等，闻地藏名、见地藏形，至心恭敬，念满万遍。\n是诸不如意事，渐渐消灭，即得安乐、衣食丰益，乃至于睡梦中，悉皆安乐。\n\n复次观世音菩萨：若未来世，有善男子善女人，\n或因治生、或因公私、或因生死、或因急事，\n入山林中、过渡河海、乃及大水、或经险道。\n是人先当念地藏菩萨名万遍，所过土地，鬼神卫护，行住坐卧，永保安乐。\n乃至逢于虎狼师子，一切毒害，不能损之。\n\n佛告观世音菩萨：\n是地藏菩萨，于阎浮提有大因缘，若说于诸众生见闻利益等事，\n百千劫中，说不能尽。\n是故观世音，汝以神力流布是经，令娑婆世界众生，百千万劫永受安乐。\n\n尔时世尊，而说偈言：\n\n吾观地藏威神力，恒河沙劫说难尽，\n见闻瞻礼一念间，利益人天无量事。\n若男若女若龙神，报尽应当堕恶道，\n至心归依大士身，寿命转增除罪障。\n少失父母恩爱者，未知魂神在何趣，\n兄弟姊妹及诸亲，生长以来皆不识。\n或塑或画大士身，悲恋瞻礼不暂舍，\n三七日中念其名，菩萨当现无边体，\n示其眷属所生界，纵堕恶趣寻出离。\n若能不退是初心，即获摩顶受圣记。\n欲修无上菩提者，乃至出离三界苦，\n是人既发大悲心，先当瞻礼大士像，\n一切诸愿速成就，永无业障能遮止。\n有人发心念经典，欲度群迷超彼岸，\n虽立是愿不思议，旋读旋忘多废失，\n斯人有业障惑故，于大乘经不能记。\n供养地藏以香华，衣服饮食诸玩具，\n以净水安大士前，一日一夜求服之，\n发殷重心慎五辛，酒肉邪淫及妄语，\n三七日内勿杀害，至心思念大士名，\n即于梦中见无边，觉来便得利根耳，\n应是经教历耳闻，千万生中永不忘。\n以是大士不思议，能使斯人获此慧。\n贫穷众生及疾病，家宅凶衰眷属离，\n睡梦之中悉不安，求者乖违无称遂，\n至心瞻礼地藏像，一切恶事皆消灭，\n至于梦中尽得安，衣食丰饶神鬼护。\n欲入山林及渡海，毒恶禽兽及恶人，\n恶神恶鬼并恶风，一切诸难诸苦恼，\n但当瞻礼及供养，地藏菩萨大士像，\n如是山林大海中，应是诸恶皆消灭。\n观音至心听吾说，地藏无尽不思议，\n百千万劫说不周，广宣大士如是力。\n地藏名字人若闻，乃至见像瞻礼者，\n香华衣服饮食奉，供养百千受妙乐，\n若能以此回法界，毕竟成佛超生死。\n是故观音汝当知，普告恒沙诸国土。\n\n【嘱累人天品第十三】\n\n尔时世尊举金色臂，又摩地藏菩萨摩诃萨顶，而作是言：\n地藏地藏，汝之神力不可思议、汝之慈悲不可思议、\n汝之智慧不可思议、汝之辩才不可思议，\n正使十方诸佛，赞叹宣说汝之不思议事，千万劫中，不能得尽。\n\n地藏地藏，记吾今日在忉利天中，于百千万亿不可说，不可说，\n一切诸佛菩萨，天龙八部，大会之中，再以人天诸众生等，未出三界，\n在火宅中者，付嘱于汝。\n无令是诸众生，堕恶趣中，一日一夜，何况更落五无间，及阿鼻地狱，\n动经千万亿劫，无有出期。\n\n地藏，是南阎浮提众生，志性无定，习恶者多。\n纵发善心，须臾即退。若遇恶缘，念念增长。\n以是之故，吾分是形，百千亿化度，随其根性而度脱之。\n\n地藏，吾今殷勤，以天人众，付嘱于汝。\n未来之世，若有天人，及善男子善女人，于佛法中，种少善根，\n一毛一尘，一沙一渧，汝以道力，拥护是人，渐修无上，勿令退失。\n\n复次地藏，未来世中，若天若人，随业报应，落在恶趣。\n临堕趣中，或至门首，是诸众生，若能念得一佛名，一菩萨名，一句一偈大乘经典。\n是诸众生，汝以神力，方便救拔，于是人所，现无边身，\n为碎地狱，遣令生天，受胜妙乐。\n\n尔时世尊，而说偈言：\n\n现在未来天人众，吾今殷勤付嘱汝，\n以大神通方便度，勿令堕在诸恶趣。\n\n尔时地藏菩萨摩诃萨，胡跪合掌白佛言：\n世尊，唯愿世尊不以为虑。\n未来世中，若有善男子善女人，于佛法中，一念恭敬，\n我亦百千方便，度脱是人，于生死中速得解脱。\n何况闻诸善事，念念修行，自然于无上道永不退转。\n\n说是语时，会中有一菩萨，名虚空藏，白佛言：\n世尊，我自至忉利，闻于如来赞叹地藏菩萨，威神势力，不可思议。\n未来世中，若有善男子善女人，乃及一切天龙，闻此经典及地藏名字，\n或瞻礼形像，得几种福利？唯愿世尊，为未来现在一切众等，略而说之。\n\n佛告虚空藏菩萨：谛听谛听！吾当为汝分别说之。\n若未来世，有善男子善女人，见地藏形像，及闻此经，乃至读诵，\n香华饮食，衣服珍宝，布施供养，赞叹瞻礼，得二十八种利益：\n\n一者、天龙护念；二者、善果日增；三者、集圣上因；\n四者、菩提不退；五者、衣食丰足；六者、疾疫不临；\n七者、离水火灾；八者、无盗贼厄；九者、人见钦敬；\n十者、神鬼助持；十一者、女转男身；十二者、为王臣女；\n十三者、端正相好；十四者、多生天上；十五者、或为帝王；\n十六者、宿智命通；十七者、有求皆从；十八者、眷属欢乐；\n十九者、诸横消灭；二十者、业道永除；二十一者、去处尽通；\n二十二者、夜梦安乐；二十三者、先亡离苦；二十四者、宿福受生；\n二十五者、诸圣赞叹；二十六者、聪明利根；二十七者、饶慈愍心；\n二十八者、毕竟成佛。\n\n复次虚空藏菩萨：若现在未来，天龙鬼神，闻地藏名，礼地藏形，\n或闻地藏本愿事行，赞叹瞻礼，得七种利益：\n\n一者、速超圣地；二者、恶业消灭；三者、诸佛护临；\n四者、菩提不退；五者、增长本力；六者、宿命皆通；七者、毕竟成佛。\n\n尔时，十方一切诸来，不可说不可说诸佛如来，及大菩萨天龙八部，\n闻释迦牟尼佛，称扬赞叹地藏菩萨，大威神力，不可思议，叹未曾有。\n\n是时，忉利天，雨无量香华，天衣珠璎，供养释迦牟尼佛，及地藏菩萨已，\n一切众会，俱复瞻礼，合掌而退。\n\n回向偈\n\n愿以此功德　庄严佛净土\n上报四重恩　下济三涂苦\n若有见闻者　悉发菩提心\n尽此一报身　同生极乐国","sourceUrl":"https://www.fojingzaixian.com/dizangjing.html","audios":[{"title":"地藏经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/dizangjing.html"}],"teachAudios":[{"title":"地藏经讲经开示","url":""}]},{"id":"yulanpenjing","title":"盂兰盆经","fullTitle":"佛说盂兰盆经","category":"孝亲·度亡","summary":"目连救母，孝道感天，七月十五供养十方僧众以超度亡灵。","explanation":"《盂兰盆经》讲述目连尊者以神通见母堕饿鬼道，依佛所教，于七月十五日备办百味饮食，供养十方大德，以众僧威神之力使母解脱。是佛教孝道精神的集中体现。","fullText":"如是我闻。一时佛在舍卫国祇树给孤独园。\n大目犍连始得六通，欲度父母，报乳哺之恩。\n即以道眼观视世间，见其亡母，生饿鬼中，\n不见饮食，皮骨连立。目连悲哀，即以钵盛饭，\n往饷其母，母得钵饭，便以左手障钵，右手搏食，\n食未入口，化成火炭，遂不得食。\n\n目连大叫，悲号涕泣，驰还白佛，具陈如此。\n佛言：\"汝母罪根深结，非汝一人力所奈何，\n汝虽孝顺，声动天地，天神地神、邪魔外道、道士四天王神，\n亦不能奈何，当须十方众僧威神之力，乃得解脱。\n\n吾今当说救济之法，令一切难，皆离忧苦。\"\n\n佛告目连：\"十方众生，七月十五日，僧自恣时，\n当为七世父母及现在父母厄难中者，\n具饭、百味五果、汲灌盆器、香油锭烛、床敷卧具、\n尽世甘美，以著盆中，供养十方大德众僧。\n\n当此之日，一切圣众，或在山间禅定、或得四道果、\n或在树下经行、或六通自在教化声闻缘觉、\n或十地菩萨大人，权现比丘，在大众中，\n皆同一心，受钵和罗饭，具清净戒，\n圣众之道，其德汪洋。\n\n其有供养此等自恣僧者，现世父母、六亲眷属，\n得出三途之苦，应时解脱，衣食自然。\n若父母现在者，福乐百年。\n若七世父母，生天，自在化生，入天华光。\"\n\n时目连比丘，及大菩萨众，皆大欢喜，\n目连悲啼泣声，释然除灭。\n\n是时目连，其母即于是日，得脱一劫饿鬼之苦。\n\n目连复白佛言：\"弟子所生母，得蒙三宝功德之力，\n众僧威神之力故，若未来世，一切佛弟子，\n亦应奉盂兰盆，救度现在父母，乃至七世父母，可为尔否？\"\n\n佛言：\"大善！我正欲说，汝今复问。\n善男子，若比丘比丘尼、国王太子、大臣宰相、三公百官、\n万民庶人行慈孝者，皆应先为所生现在父母、过去七世父母，\n于七月十五日，佛欢喜日，僧自恣日，\n以百味饮食，安盂兰盆中，施十方自恣僧。\n愿使现在父母，寿命百年无病，无一切苦恼之患，\n乃至七世父母，离饿鬼苦，生人天中，福乐无极。\"\n\n是佛弟子修孝顺者，应念念中，\n常忆父母，乃至七世父母。\n年年七月十五日，常以孝慈，忆所生父母，\n为作盂兰盆，施佛及僧，以报父母长养慈爱之恩。\n\n若一切佛弟子，应受持是法。\n\n时目连比丘，四辈弟子，欢喜奉行。","sourceUrl":"https://www.fojingzaixian.com/yulanjing.html","audios":[{"title":"盂兰盆经读诵·佛经在线","url":"","sourceUrl":"https://www.fojingzaixian.com/yulanjing.html"}],"teachAudios":[{"title":"盂兰盆经讲经开示","url":""}]},{"id":"pumenpin","title":"普门品","fullTitle":"观世音菩萨普门品","category":"观音","summary":"观世音菩萨寻声救苦、有求必应，法华经第二十五品。","explanation":"遇难时至心称念\"南无观世音菩萨\"，心定下来，再面对事情，就是\"感应\"。适合日常持诵，求平安、求心安。","fullText":"妙法莲华经·观世音菩萨普门品\n姚秦三藏法师鸠摩罗什译\n\n尔时，无尽意菩萨即从座起，偏袒右肩，合掌向佛，而作是言：\n世尊！观世音菩萨以何因缘，名观世音？\n\n佛告无尽意菩萨：\n善男子！若有无量百千万亿众生受诸苦恼，\n闻是观世音菩萨，一心称名，观世音菩萨即时观其音声，皆得解脱。\n\n若有持是观世音菩萨名者，设入大火，火不能烧，由是菩萨威神力故；\n若为大水所漂，称其名号，即得浅处。\n若有百千万亿众生，为求金、银、琉璃、砗磲、玛瑙、珊瑚、琥珀、真珠等宝，\n入于大海，假使黑风吹其船舫，飘堕罗刹鬼国，\n其中若有乃至一人称观世音菩萨名者，是诸人等皆得解脱罗刹之难。\n以是因缘，名观世音。\n\n若复有人临当被害，称观世音菩萨名者，彼所执刀杖寻段段坏，而得解脱。\n若三千大千国土满中夜叉罗刹，欲来恼人，\n闻其称观世音菩萨名者，是诸恶鬼尚不能以恶眼视之，况复加害？\n\n设复有人，若有罪、若无罪，杻械、枷锁检系其身，\n称观世音菩萨名者，皆悉断坏，即得解脱。\n\n若三千大千国土满中怨贼，有一商主将诸商人赍持重宝，经过险路，\n其中一人作是唱言：\n诸善男子！勿得恐怖，汝等应当一心称观世音菩萨名号，\n是菩萨能以无畏施于众生。汝等若称名者，于此怨贼当得解脱。\n众商人闻，俱发声言：南无观世音菩萨！\n称其名故，即得解脱。\n\n无尽意！观世音菩萨摩诃萨威神之力，巍巍如是。\n\n若有众生多于淫欲，常念恭敬观世音菩萨，便得离欲；\n若多嗔恚，常念恭敬观世音菩萨，便得离嗔；\n若多愚痴，常念恭敬观世音菩萨，便得离痴。\n\n无尽意！观世音菩萨有如是等大威神力，多所饶益，是故众生常应心念。\n\n若有女人设欲求男，礼拜供养观世音菩萨，便生福德智慧之男；\n设欲求女，便生端正有相之女，宿植德本，众人爱敬。\n\n无尽意！观世音菩萨有如是力，若有众生恭敬礼拜观世音菩萨，福不唐捐；\n是故众生皆应受持观世音菩萨名号。\n\n无尽意！若有人受持六十二亿恒河沙菩萨名字，复尽形供养饮食、衣服、卧具、医药，\n于汝意云何？是善男子、善女人功德多不？\n\n无尽意言：甚多！世尊！\n\n佛言：若复有人受持观世音菩萨名号，乃至一时礼拜供养，\n是二人福正等无异，于百千万亿劫不可穷尽。\n无尽意！受持观世音菩萨名号，得如是无量无边福德之利。\n\n无尽意菩萨白佛言：\n世尊！观世音菩萨云何游此娑婆世界？云何而为众生说法？方便之力，其事云何？\n\n佛告无尽意菩萨：\n善男子！若有国土众生应以佛身得度者，观世音菩萨即现佛身而为说法；\n应以辟支佛身得度者，即现辟支佛身而为说法；\n应以声闻身得度者，即现声闻身而为说法；\n应以梵王身得度者，即现梵王身而为说法；\n应以帝释身得度者，即现帝释身而为说法；\n应以自在天身得度者，即现自在天身而为说法；\n应以大自在天身得度者，即现大自在天身而为说法；\n应以天大将军身得度者，即现天大将军身而为说法；\n应以毗沙门身得度者，即现毗沙门身而为说法；\n应以小王身得度者，即现小王身而为说法；\n应以长者身得度者，即现长者身而为说法；\n应以居士身得度者，即现居士身而为说法；\n应以宰官身得度者，即现宰官身而为说法；\n应以婆罗门身得度者，即现婆罗门身而为说法；\n应以比丘、比丘尼、优婆塞、优婆夷身得度者，\n即现比丘、比丘尼、优婆塞、优婆夷身而为说法；\n应以长者、居士、宰官、婆罗门妇女身得度者，即现妇女身而为说法；\n应以童男、童女身得度者，即现童男、童女身而为说法；\n应以天、龙、夜叉、乾闼婆、阿修罗、迦楼罗、紧那罗、摩侯罗伽、人非人等身得度者，\n即皆现之而为说法；\n应以执金刚神得度者，即现执金刚神而为说法。\n\n无尽意！是观世音菩萨成就如是功德，以种种形，游诸国土，度脱众生，\n是故汝等应当一心供养观世音菩萨。\n是观世音菩萨摩诃萨于怖畏急难之中，能施无畏，\n是故，此娑婆世界皆号之为施无畏者。\n\n无尽意菩萨白佛言：世尊！我今当供养观世音菩萨。\n即解颈众宝珠璎珞，价值百千两金，而以与之，作是言：\n仁者！受此法施珍宝璎珞。\n\n时，观世音菩萨不肯受之。\n无尽意复白观世音菩萨言：仁者！愍我等故，受此璎珞。\n\n尔时，佛告观世音菩萨：\n当愍此无尽意菩萨及四众，天、龙、夜叉、乾闼婆、阿修罗、迦楼罗、\n紧那罗、摩侯罗伽、人非人等故，受是璎珞。\n\n即时，观世音菩萨愍诸四众及于天、龙、人非人等，受其璎珞；\n分作二分，一分奉释迦牟尼佛，一分奉多宝佛塔。\n无尽意！观世音菩萨有如是自在神力，游于娑婆世界。\n\n尔时，无尽意菩萨以偈问曰：\n\n世尊妙相具　我今重问彼　佛子何因缘　名为观世音\n\n具足妙相尊　偈答无尽意　汝听观音行　善应诸方所\n弘誓深如海　历劫不思议　侍多千亿佛　发大清净愿\n我为汝略说　闻名及见身　心念不空过　能灭诸有苦\n假使兴害意　推落大火坑　念彼观音力　火坑变成池\n或漂流巨海　龙鱼诸鬼难　念彼观音力　波浪不能没\n或在须弥峰　为人所推堕　念彼观音力　如日虚空住\n或被恶人逐　堕落金刚山　念彼观音力　不能损一毛\n或值怨贼绕　各执刀加害　念彼观音力　咸即起慈心\n或遭王难苦　临刑欲寿终　念彼观音力　刀寻段段坏\n或囚禁枷锁　手足被杻械　念彼观音力　释然得解脱\n咒诅诸毒药　所欲害身者　念彼观音力　还著于本人\n或遇恶罗刹　毒龙诸鬼等　念彼观音力　时悉不敢害\n若恶兽围绕　利牙爪可怖　念彼观音力　疾走无边方\n蚖蛇及蝮蝎　气毒烟火然　念彼观音力　寻声自回去\n云雷鼓掣电　降雹澍大雨　念彼观音力　应时得消散\n众生被困厄　无量苦逼身　观音妙智力　能救世间苦\n具足神通力　广修智方便　十方诸国土　无刹不现身\n种种诸恶趣　地狱鬼畜生　生老病死苦　以渐悉令灭\n真观清净观　广大智慧观　悲观及慈观　常愿常瞻仰\n无垢清净光　慧日破诸闇　能伏灾风火　普明照世间\n悲体戒雷震　慈意妙大云　澍甘露法雨　灭除烦恼焰\n诤讼经官处　怖畏军阵中　念彼观音力　众怨悉退散\n妙音观世音　梵音海潮音　胜彼世间音　是故须常念\n念念勿生疑　观世音净圣　于苦恼死厄　能为作依怙\n具一切功德　慈眼视众生　福聚海无量　是故应顶礼\n\n尔时，持地菩萨即从座起，前白佛言：\n世尊！若有众生闻是观世音菩萨品自在之业，普门示现神通力者，当知是人功德不少。\n\n佛说是普门品时，众中八万四千众生，皆发无等等阿耨多罗三藐三菩提心。","sourceUrl":"https://www.fojingzaixian.com/guanshiyinpushapumenpin.html","audios":[{"title":"普门颂·齐豫 ✅","url":"https://www.fojingzaixian.com/img/%E6%99%AE%E9%97%A8%E9%A2%82_%E9%BD%90%E8%B1%AB_2087937.mp3"}],"teachAudios":[{"title":"普门品讲经开示","url":""}]},{"id":"wuliangshoujing","title":"无量寿经","fullTitle":"佛说无量寿经","category":"净土","summary":"净土三经之首，详述阿弥陀佛四十八大愿与极乐世界庄严。","explanation":"《无量寿经》是净土宗最重要的经典之一，详细讲述法藏比丘（阿弥陀佛前身）发四十八大愿，经无量劫修行成佛，成就西方极乐世界的故事。经中教导我们：只要至心信乐、愿生彼国、乃至十念，即可往生。对老人家来说，一心念佛、求生净土，是最简单也最殊胜的修行法门。","fullText":"佛说无量寿经\n曹魏天竺三藏康僧铠译\n我闻如是。一时，佛住王舍城，耆阇崛山中，与大比丘众万二千人俱，一切大圣神通已达，\n其名曰：尊者了本际、尊者正愿、尊者正语、尊者大号、尊者仁贤、尊者离垢、尊者名闻、尊者善实、尊者具足、尊者牛王、\n尊者优楼频螺迦叶、尊者伽耶迦叶、尊者那提迦叶、尊者摩诃迦叶、尊者舍利弗、尊者大目犍连、尊者劫宾那、尊者大住、尊者大净志、尊者摩诃周那、尊者满愿子、\n尊者离障、尊者流灌、尊者坚伏、尊者面王、尊者果乘、尊者仁性、尊者喜乐、尊者善来、尊者罗云、尊者阿难，皆如斯等上首者也；\n又与大乘众菩萨俱，普贤菩萨、妙德菩萨、慈氏菩萨等，此贤劫中一切菩萨；\n又贤护等十六正士；善思议菩萨、信慧菩萨、空无菩萨、神通华菩萨、光英菩萨、慧上菩萨、智幢菩萨、寂根菩萨、愿慧菩萨、香象菩萨、宝英菩萨、中住菩萨、制行菩萨、解脱菩萨；\n皆遵普贤大士之德，具诸菩萨无量行愿，安住一切功德之法，游步十方，行权方便，入佛法藏究竟彼岸，于无量世界现成等觉。\n处兜率天，弘宣正法，舍彼天宫，降神母胎，从右胁生，现行七步，光明显耀，普照十方，无量佛土，六种振动，\n举声自称：‘吾当于世，为无上尊，释梵奉侍，天人归仰！’\n示现算计文艺射御，博综道术，贯练群籍，游于后园，讲武试艺。现处宫中，色味之间。见老病死，悟世非常。\n弃国财位，入山学道。服乘白马，宝冠璎珞，遣之令还。\n舍珍妙衣，而著法服。剃除须发，端坐树下，勤苦六年，行如所应。\n现五浊刹，随顺群生。\n示有尘垢，沐浴金流。\n天按树枝，得攀出池，灵禽翼从，往谐道场，吉祥感征，表章功祚。\n哀受施草，敷佛树下，跏趺而坐。\n奋大光明，使魔知之，魔率官属，而来逼试，制以智力，皆令降伏。\n得微妙法，成最正觉。\n释梵祈劝，请转法轮，以佛游步，佛吼而吼。\n扣法鼓，吹法螺，执法剑，建法幢，震法雷，曜法电，澍法雨，演法施，常以法音觉诸世间。\n光明普照无量佛土，一切世界，六种震动。\n总摄魇界，动魔宫殿，众魔摄怖，莫不归伏。\n掴裂邪网，消灭诸见，散诸尘劳，坏诸欲堑。\n严护法城，开阐法门。洗灌垢污，显明清白，光融佛法，宣流正化。\n入国分卫，护诸丰膳。贮功德，示福田。\n欲宣法，现欣笑。以诸法药，救疗三苦，显现道意，无量功德。\n授菩萨记，成等正觉。示现灭度，拯济无极。\n消除诸漏，植众德本。具足功德，微妙难量；\n游诸佛国，普现道教。其所修行，清净无秽。\n譬如幻师，现众异像。为男为女，无所不变。\n本学明了，在意所为。此诸菩萨，亦复如是。\n学一切法，贯综缕练，所住安谛，靡不感化。无数佛土，皆悉普现。\n未曾慢恣，愍伤众生。如是之法，一切具足。\n菩萨经典，究畅要妙，名称普至，道御十方。\n无量诸佛，咸共护念。佛所住者，皆已得住。\n大圣所立，而皆己立。如来道化，各能宣布。为诸菩萨，而作大师。\n以甚深禅慧，开导众生。通诸法性，达众生相。明了诸国，供养诸佛。\n化现其身，犹如电光，善学无畏之网，晓了幻化之法。\n坏裂魔网，解诸缠缚。超越声闻、缘觉之地，得空无相无愿三昧。\n善立方便，显示三乘。于此化终，而现灭度。\n亦无所作，亦无所有。不起不灭，得平等法。\n具足成就无量总持百千三昧。\n诸根智慧，广普寂定。\n深入菩萨法藏，得佛华严三昧，宣扬演说一切经典。\n住深定门，悉睹现在无量诸佛，一念之顷，无不周遍。\n济诸剧难，诸闲不闲，分别显示真实之际，得诸如来辩才之智。\n入众言音，开化一切。\n超过世间诸所有法，心常谛住度世之道。\n于一切万物，随意自在。\n为诸庶类，作不请之友。\n荷负群生，为之重担。\n受持如来甚深法藏，护佛种性，常使不绝。\n兴大悲，愍众生。\n演慈辩，授法眼。\n杜三趣，开善门。\n以不请之法，施诸黎庶。\n如纯孝之子，爱敬父母。\n于诸众生，视若自己，一切善本，皆度彼岸。\n悉获诸佛无量功德。\n智慧圣明，不可思议。\n如是之等菩萨大士，不可称计，一时来会。\n尔时世尊，诸根悦豫，姿色清净，光颜巍巍。\n尊者阿难，承佛圣旨，即从座起，偏袒右肩，长跪合掌，而白佛言：‘今日世尊，诸根悦豫，姿色清净，光颜巍巍。\n如明镜净，影畅表里。\n威容显耀，超绝无量。\n未曾瞻睹殊妙如今！唯然大圣，我心念言：“今日世尊住奇特之法；今日世雄住诸佛所住；今日世眼住导师之行；今日世英住最胜之道；今日天尊行如来之德；去来现在，佛佛相念，得无今佛念诸佛耶？何故威神光光乃尔？”’于是世尊告阿难曰：‘云何，阿难！诸天教汝来问佛耶？自以慧见问威颜乎？’阿难白佛：‘无有诸天来教我者，自以所见问斯义耳。’\n佛言：‘善哉！阿难！所问甚快，发深智慧，真妙辩才，愍念众生，问斯慧义。\n如来以无尽大悲，矜哀三界，所以出兴于世，光阐道教。\n欲拯济群萌，惠以真实之利。\n无量亿劫，难值难见。\n犹灵瑞华，时时乃出。\n今所问者，多所饶益，开化一切诸天人民。\n阿难！当知如来正觉，其智难量，多所导御。\n慧见无碍，无能遏绝。\n以一餐之力，能住寿命忆百干劫，无数无量，复过于此，诸根悦豫，不以毁损，姿色不变，光颜无异。\n所以者何？如来定慧，究畅无极，于一切法，而得自在。\n阿难谛听！今为汝说！’对曰：‘唯然！愿乐欲闻！’佛告阿难：‘乃往过去久远无量不可思议无央数劫，绽光如来，兴出于世，教化度脱无量众生，皆令得道，乃取灭度。\n次有如来，名曰光远，次名月光，次名旃檀香，次名善山王，次名须弥天冠，次名须弥等曜，次名月色，次名正念，次名离垢，次名无著，次名龙天，次名夜光，次名安明顶，次名不动地，次名琉璃妙华，次名琉璃金色，次名金藏，次名炎光，次名炎根，次名地种，次名月像，次名日音，次名解脱华，次名庄严光明，次名海觉神通，次名水光，次名大香，次名离尘垢，次名舍厌意，次名宝炎，次名妙顶，次名勇立，次名功德持慧，次名蔽日月光，次名日月琉璃光，次名无上琉璃光，次名最上首，次名菩提华，次名月明，次名日光，次名华色王，次名水月光，次名除痴冥，次名度盖行，次名净信，次名善宿，次名威神，次名法慧，次名鸾音，次名师子音，次名龙音，次名处世，如此诸佛，皆悉已过。’\n尔时，次有佛，名世自在王，如来、应供、等正觉、明行足、善逝、世间解、无上士、调御丈夫、天人师、佛世尊。\n时有国王，闻佛说法，心怀悦豫，寻发无上正真道意，弃国捐王，行作沙门，号曰法藏，高才勇哲，与世超异。\n诣世自在王如来所，稽首佛足，右绕三匝，长跪合掌，以颂赞曰：光颜巍巍，威神无极。如是炎明，无与等者。\n日月摩尼，珠光焰耀，皆悉隐蔽，犹如聚墨。\n如来容颜，超世无伦。正觉大音，响流十方。\n戒闻精进，三昧智慧，威德无侣，殊胜希有。\n深谛善念，诸佛法海，穷深尽奥，究其涯底。\n无明欲怒，世尊永无。人雄师子，神德无量。\n功勋广大，智慧深妙，光明威相，震动大千。\n愿我作佛，齐圣法王。过度生死，靡不解脱。\n布施调意，戒忍精进，如是三昧，智慧无上。\n吾誓得佛，普行此愿。一切恐惧，为作大安。\n假令有佛，百千亿万，无量大圣，数如恒沙。\n供养一切，斯等诸佛，不如求道，坚正不却。\n譬如恒沙，诸佛世界，复不可计，无数刹土。\n光明悉照，遍此诸国，如是精进，威神难量。\n令我作佛，国土第一。其众奇妙，道场超绝。\n国如泥洹，而无等双。我当愍衷，度脱一切。\n十方来生，心悦清净，已至我国，快乐安隐。\n幸佛信明，是我真证。发愿于彼，力精所欲。\n十方世尊，智慧无碍，常令此尊，知我心行。\n假使身止，诸苦毒中，我行精进，忍终不悔。\n佛告阿难：‘法藏比丘说此颂已，而白佛言：“唯然，世尊！我发无上正觉之心。\n愿佛为我广宣经法，我当修行，摄取佛国清净庄严无量妙土。\n令我于世，速成正觉，拔诸生死勤苦之本。’\n佛告阿难：‘时世自在王佛，谓法藏比丘：“如所修行，庄严佛土，汝自当知。\n比丘白佛：斯义弘深，非我境界。\n唯愿世尊，广为敷演诸佛如来净土之行，我闻此己，当如说修行，成满所愿。\n尔时，世自在王佛，知其高明，志愿深广，即为法藏比丘而说经言：“譬如大海，一人斗量，经历劫数，尚可穷底，得其妙宝。\n人有至心精进，求道不止，会当克果，何愿不得？’\n于是世自在王佛即为广说二百一十亿诸佛刹土，天人之善恶、国土之粗妙，应其心愿，悉现与之。\n时彼比丘，闻佛所说严净国土，皆悉睹见，起发无上殊胜之愿。\n其心寂静，志无所著。\n一切世间，无能及者。\n具足五劫，思惟摄取庄严佛国清净之行。\n阿难白佛：‘彼佛国土，寿量几何？’佛言：‘其佛寿命，四十二劫。\n时法藏比丘，摄取二百一十亿诸佛妙土清净之行。\n如是修已，诣彼佛所，稽首礼足，绕佛三匝，合掌而住，白佛言：世尊！我已摄取庄严佛土清净之行。\n佛告比丘：汝今可说，宜知是时，发起悦可一切大众。\n菩萨闻已，修行比法，缘致满足无量大愿。\n比丘白佛：“唯垂听察！如我所愿，当具说之：设我得佛，国有地狱、饿鬼、畜生者，不取正觉。\n设我得佛，国中天人寿终之后，复更三恶道者，不取正觉。\n设我得佛，国中天人，不悉真金色者，不取正觉。\n设我得佛，国中天人，形色不同有好丑者，不取正觉。\n设我得佛，国中天人，不识宿命，下至知百千亿那由他诸劫事者，不取正觉。\n设我得佛，国中天人，不得天眼，下至见百千亿那由他诸佛国者，不取正觉。\n设我得佛，国中天人，不得天耳，下至闻百千亿那由他诸佛所说，不悉受持者，不取正觉。\n设我得佛，国中天人，不得见他心智，下至知百千亿那由他诸佛国中众生心念者，不取正觉。\n设我得佛，国中天人，不得神足，于一念顷，下至不能超过百千亿那由他诸佛国者，不取正觉。\n设我得佛，国中天人，若起想念贪计身者，不取正觉。\n设我得佛，国中天人，不住定聚，必至灭度者，不取正觉。\n设我得佛，光明有限量，下至不照百千亿那由他诸佛国者，不取正觉。\n设我得佛，寿命有限量，下至知百千亿那由他劫者，不取正觉。\n设我得佛，国中声闻，有能计量，乃至三千大千世界众生，悉成缘觉，于百千劫，悉共计校知其数者，不取正觉。\n设我得佛，国中天人，寿命无能限量，除其本愿，修短自在。\n若不尔者，不取正觉。\n设我得佛，国中天人，乃至闻有不善名者，不取正觉。\n设我得佛，十方世界无量诸佛，不悉咨嗟称我名者，不取正觉。\n设我得佛，十方众生，至心信乐，欲生我国，乃至十念，若不生者，不取正觉。\n唯除五逆，诽谤正法。\n设我得佛，十方众生，发菩提心，修诸功德，至心发愿，欲生我国，临寿终时，假令不与大众围绕现其人前者，不取正觉。\n设我得佛，十方众生，闻我名号，系念我国，植诸德本，至心迥向，欲生我国，不果遂者，不取正觉。\n设我得佛，国中天人，不悉成满三十二大人相者，不取正觉。\n设我得佛，他方佛土诸菩萨众，来生我国，究竟必至一生补处。\n除其本愿，自在所化。\n为众生故，被弘誓铠，积累德本，度脱一切，游诸佛国，修菩萨行，供养十方诸佛如来。\n开化恒沙无量众生，使立无上正真之道，超出常伦，诸地之行，现前修习普贤之德。\n若不尔者，不取正觉。\n设我得佛，国中菩萨，承佛神力，供养诸佛，一食之顷，不能遍至无量，无数亿那由他诸佛国者，不取正觉。\n设我得佛，国中菩萨，在诸佛前，现其德本，诸所求欲供养之具，若不如意者，不取正觉。\n设我得佛，国中菩萨，不能演说一切智者，不取正觉。\n设我得佛，国中菩萨，不得金刚那罗延身者，不取正觉。\n设我得佛，国中天人，一切万物，严净光丽，形色殊特，穷微极妙，无能称量。\n其诸众生，乃至逮得天眼，有能明了，辩其名数者，不取正觉。\n设我得佛，国中菩萨，乃至少功德者，不能知见其道场树无量光色，高四百万里者，不取正觉。\n设我得佛，国中菩萨，若受读经法，讽诵持说，而不得辩才智慧者，不取正觉。\n设我得佛，国中菩萨，智慧辩才若可限量者，不取正觉。\n设我得佛，国土清净，皆悉照见十方一切无量无数不可思议诸佛世界，犹如明镜，睹其面像。\n若不尔者，不取正觉。\n设我得佛，自地以上，至于虚空，宫殿楼观，池流华树，国土所有一切万物，皆以无量杂宝百千种香而共合成。\n严饰奇妙，超诸天人。\n其香普薰十方世界。\n菩萨闻者，皆修佛行。\n若不尔者，不取正觉。\n设我得佛，十方无量不可思议诸佛世界众生之类，蒙我光明触其身者，身心柔软，超过天人。\n若不尔者，不取正觉。\n设我得佛，十方无量不可思议诸佛世界众生之类，闻我名字，不得菩萨无生法忍诸深总持者，不取正觉。\n设我得佛，十方无量不可思议诸佛世界，其有女人，闻我名字，欢喜信乐，发菩提心，厌恶女身，寿终之后，复为女像者，不取正觉。\n设我得佛，十方无量不可思议诸佛世界诸菩萨众，闻我名字，寿终之后，常修梵行，至成佛道。\n若不尔者，不取正觉。\n设我得佛，十方无量不可思议诸佛世界诸天人民，闻我名字，五体投地，稽首作礼，欢喜信乐，修菩萨行，诸天世人，莫不致敬。\n若不尔者，不取正觉。\n设我得佛，国中天人，欲得衣服，随念即至，如佛所赞应法妙服，自然在身。\n若有裁缝捣染浣濯者，不取正觉。\n设我得佛，国中天人，所受快乐，不如漏尽比丘者，不取正觉。\n设我得佛，国中菩萨，随意欲见十方无量严净佛土，应时如愿，于宝树中，皆悉照见，犹如明镜，睹其面像。\n若不尔者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名字，至于得佛，诸根缺陋不具足者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名字，皆悉逮得清净解脱三昧，住是三昧，一发意顷，供养无量不可思议诸佛世尊，而不失定意。\n若不尔者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名字，寿终之后，生尊贵家。\n若不尔者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名字，欢喜踊跃，修菩萨行，具足德本。\n若不尔者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名宇，皆悉逮得普等三昧。\n住是三昧，至于成佛，常见无量不可思议一切诸佛。\n若不尔者，不取正觉。\n设我得佛，国中菩萨，随其志愿所欲闻法，自然得闻。\n若不尔者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名宇，不即得至不退转者，不取正觉。\n设我得佛，他方国土诸菩萨众，闻我名字，不即得至第一忍，第二第三法忍，于诸佛法不能即得不退转者，不取正觉。\n佛告阿难：‘尔时，法藏比丘说此愿已，以偈颂曰：我建超世愿，必至无上道，斯愿不满足，誓不成等觉。\n我于无量劫，不为大施主，普济诸贫苦，誓不成等觉。\n我至成佛道，名声超十方，究竟有不闻，誓不成等觉。\n离欲深正念，净慧修梵行，志求无上尊，为诸天人师。\n神力演大光，普照无际土，消除三垢冥，明济众厄难。\n开彼智慧眼，灭此昏盲闇，闭塞诸恶道，通达善趣门。\n功祚成满足，威曜朗十方，日月戢重晖，天光隐不现。\n为众开法藏，广施功德宝，常于大众中，说法师子吼。\n供养一切佛，具足众德本，愿慧悉成满，得为三界雄。\n如佛无量智，通达靡不照，愿我功德力，等此最胜尊，\n斯愿若克果，大千应感动，虚空诸天神，当雨珍妙华。\n佛谓阿难：‘法藏比丘说此颂已，应时普地六种震动，天雨妙华，以散其上。\n自然音乐，空中赞言：“决定必成无上正觉！”于是法藏比丘具足修满如是大愿，诚谛不虚，超出世间，深乐寂灭。\n阿难！法藏比丘于其佛所，诸天、魔、梵龙神八部大众之中，发斯弘誓，建此愿已，一向专志庄严妙土。\n所修佛国，开廓广大，超胜独妙，建立常然，无衰无变。\n于不可思议兆载永劫，积植菩萨无量德行，不生欲觉、嗔觉、害觉，不起欲想、嗔想、害想，不著色声香味触法，忍力成就，不计众苦。\n少欲知足，无染恚痴，三昧常寂，智慧无碍，无者虚伪谄曲之心，和颜爱语先意承问。\n勇猛精进，志愿无倦。\n专求清白之法，以惠利群生。\n恭敬三宝，奉事师长。\n以大庄严具足众行，令诸众生功德成就。\n‘住空无相无愿之法，无作无起，观法如化。\n远离粗言，自害害彼，彼此俱害。\n修习善语，自利利人，人我兼利。\n弃国捐王，绝去财色，自行六波罗密，教人令行。\n无央数劫，积功累德。\n随其生处，在意所欲，无量宝藏自然发应。\n教化安立无数众生，住于无上正真之道。\n或为长者居士豪姓尊贵，或为刹利国君转轮圣帝，或为六欲天主乃至梵王。\n常以四事供养恭敬一切诸佛，如是功德不可称说。\n口气香洁如优钵罗华，身诸毛孔出旃檀香，其香普熏无量世界。\n容色端正，相好殊妙；其手常出无尽之宝，衣服饮食、珍妙华香、缯盖幢幡庄严之具，如是等事，超诸人天，于一切法，而得自在。’\n阿难白佛：‘法藏菩萨为已成佛而取灭度？为未成佛？为今现在？’佛告阿难：‘法藏菩萨今已成佛，现在西方，去此十万亿刹，其佛世界名曰安乐。’\n阿难又问：‘其佛成道已来为经几时？’佛言：‘成佛已来，凡历十劫，其佛国土，自然七宝，金、银、琉璃、珊瑚、琥珀、砗磲、玛瑙合成为地，恢廓旷荡，不可限极，悉相杂厕，转相间人。\n光赫煜烁，微妙奇丽，清净庄严，超踰十方一切世界众宝中精，其宝犹如第六天宝。\n又其国土，无须弥山，及金刚围一切诸山，亦无大海、小海、溪渠、井谷，佛神力故，欲见则见。\n亦无地狱、饿鬼、畜生诸难之趣。\n亦无四时春夏秋冬，不寒不热，常和调适。’\n尔时，阿难白佛言：‘世尊！若彼国土，无须弥山，其四天王及忉利天，依何而住？’佛语阿难：‘第三炎天，乃至色究竟天，皆依何住？’阿难白佛：‘行业果报，不可思议。’\n佛语阿难：‘行业果报不可思议，诸佛世界亦不可思议，其诸众生功德善力，住行业之地，故能尔耳。’\n阿难白佛：‘我不疑比法，但为将来众生，欲除其疑惑，故问斯义。’\n佛告阿难：‘无量寿佛威神光明最尊第一，诸佛光明所不能及。\n或照百佛世界，或千佛世界，取要言之，乃照东方恒沙佛刹，南西北方，四维上下，亦复如是；或有佛光照于七尺，或照一由旬，二三四五由旬，如是转倍，乃至照一佛刹，是故无量寿佛号无量光佛、无边光佛、无碍光佛、无对光佛、炎王光佛、清净光佛、欢喜光佛、智慧光佛、不断光佛、难思光佛、无称光佛、超日月光佛。\n其有众生遇斯光者，三垢消灭，身意柔软，欢喜踊跃，善心生焉。\n若在三涂极苦之处，见此光明，皆得休息，无复苦恼，寿终之后，皆蒙解脱。\n无量寿佛，光明显赫，照曜十方，诸佛国土，莫不闻焉。\n不但我今称其光明，一切诸佛、声闻、缘觉、诸菩萨众咸共叹誉，亦复如是。\n若有众生，闻其光明威神功德，日夜称说，至心不断，随意所愿，得生其国。\n为诸菩萨、声闻之众所共叹誉、称其功德；至其然后得佛道时，普为十方诸佛菩萨叹其光明，亦如今也。’\n佛言：‘我说无量寿佛光明威神，巍巍殊妙，昼夜一劫，尚未能尽！’佛语阿难：‘又无量寿佛，寿命长久，不可称计，汝宁知乎？假使十方世界无量众生皆得人身，悉令成就声闻、缘觉，都共集会禅思一心，竭其智力，于百千万劫悉共推算，计其寿命长远之数，不能穷尽，知其限极。\n声闻菩萨、天人之众，寿命长短亦复如是，非算数譬喻所能知也。\n又声闻菩萨其数难量不可称说，神智洞达威力自在，能于掌中持一切世界。‘\n佛语阿难：‘彼佛初会，声闻众数不可称计，菩萨亦然。\n能如大目犍连，百千万亿无量无数，于阿僧祇那由他劫，乃至灭度，悉共计校，不能究了多少之数。\n譬如大海，深广无量。\n假使有人析其一毛，以为百分，以一分毛沾取一渧，于意云何？其所渧者，于彼大海，何所为多？’阿难白佛：‘彼所渧水比于大海，多少之量，非巧历算数言辞譬类所能知也。’\n佛语阿难：‘如目连等，于百干万亿那由他劫，计彼初会声闻、菩萨，所知数者独如一渧，其所不知如大海水。\n‘又其国土，七宝诸树，周满世界，金树、银树、琉璃树、玻黎树、珊瑚树、玛瑙树、砗磲之树；或有二宝、三宝，乃至七宝，转共合成；或有金树，银叶华果；或有银树，金叶华果；或琉璃树，玻黎为叶，华果亦然；或水精树，琉璃为叶，华果亦然；或珊瑚树，玛瑙为叶，华果亦然；或玛瑙树，琉璃为叶，华果亦然；或砗磲树，众宝为叶，华果亦然。\n ‘或有宝树，紫金为本，白银为茎，琉璃为枝，水精为条，珊瑚为叶，玛瑙为华，砗磲为实；或有宝树，白银为本，琉璃为茎，水精为枝，珊瑚为条，玛瑙为叶，砗磲为华，紫金为实；或有宝树，琉璃为本，水精为茎，珊瑚为枝，玛瑙为条，砗磲为叶，紫金为华，白银为实；或有宝树，水精为本，珊瑚为茎，玛瑙为枝、砗磲为条，紫金为叶，白银为华、琉璃为实；或有宝树，珊瑚为本，玛瑙为茎，砗磲为枝，紫金为条，白银为叶，琉璃为华，水精为实；或有宝树，玛瑙为本，砗磲为茎，紫金为枝，白银为条，琉璃为叶，水精为华，珊瑚为实；或有宝树，砗磲为本，紫金为茎，白银为枝，琉璃为条，水精为叶，珊瑚为华，玛瑙为实。\n行行相值，茎茎相望，枝枝相准，叶叶相向，华华相顺，实实相当，紫色光曜不可胜视。\n清风时发出五音声，微妙官商自然相和。\n‘又无量寿佛，其道场树，高四百万里，其本周围五千由旬，枝叶四布二十万里，一切众宝自然合成，以月光摩尼，持海轮宝，众宝之王，而庄严之，，周匝条间，垂宝璎珞，百千万色，种种异变，无量光炎，照曜无极。\n\n珍妙宝网，罗覆其上，一切庄严，随应而现。\n\n微风徐动，吹诸宝树，演出无量妙法音声。\n其声流布，偏诸佛国。\n闻其音者，得深法忍，住不退转，至成佛道，耳根清彻，不遭苦患。\n目睹其色，鼻知其香，口尝其味，身触其光，心以法缘，皆得甚深法忍，住不退转至成佛道，六根清彻，无诸恼患。\n阿难！若彼国土天人，见此树者，得三法忍：一者音响忍；二者柔顺忍；三者无生法忍。\n比皆无量寿佛威神力故，本愿力故，满足愿故，明了愿故，坚固愿故，究竟愿故。’\n佛告阿难：‘世间帝王有百千音乐，自转轮圣王，乃至第六天上，伎乐音声，展转相胜千亿万倍。\n第六天上万种乐音，不如无量寿国诸七宝树一种音声千亿倍也！亦有自然万种伎乐。\n又其乐声，无非法音。\n清畅哀亮，微妙和雅，十方世界音声之中，最为第一。\n‘其讲堂、精舍、宫殿、楼观，皆七宝庄严，自然化成，复以真珠明月摩尼众宝以为交络，覆盖其上。\n内外左右，有诸浴池，或十由旬，或二十三十，乃至百千由旬；纵广深浅，各皆一等。\n八功德水，湛然盈满，清净香洁，味如甘露。\n黄金池者，底白银沙；白银池者，底黄金沙；水精池者，底琉璃沙；琉璃池者，底水精沙；珊瑚池者，底琥珀沙；琥珀池者，底珊瑚沙；砗磲池者，底玛瑙沙；玛瑙池者，底砗磲沙；白玉池者，底紫金沙；紫金池者，底白玉沙；或二宝三宝，乃至七宝，转共合成。\n其池岸上，有旃檀树，华叶垂布，香气普熏。\n天优钵罗华、钵昙摩华、拘牟头华、分陀利华，杂色光茂，弥覆水上。\n‘彼诸菩萨，及声闻众，若入宝池，意欲令水没足，水即没足；欲令至膝，即至于膝；欲令至腰，水即至腰；欲令至颈，水即至颈；欲令灌身，自然灌身；欲令还复，水辄还复。\n调和冷暖，自然随意，开神悦体，荡除心垢，清明澄洁，净若无形。\n宝沙映彻，无深不照，彻澜回流，转相灌注，安详徐逝，不迟不疾。\n波扬无量自然妙声，随其所应，莫不闻者。\n或闻佛声，或闻法声，或闻僧声、或寂静声、空无我声、大慈悲声、波罗蜜声，或十力无畏不共法声、诸通慧声、无所作声、不起灭声、无生忍声、乃至甘露灌顶，众妙法声。\n如是等声，称其所闻，欢喜无量。\n‘随顺清净离欲寂灭真实之义，随顺三宝力无所谓不共之法，随顺通慧菩萨声闻所行之道。\n无有三涂苦难之名，但有自然快乐之音，是故其国，名曰极乐。\n‘阿难！彼佛国土，诸往生者，具足如是清净色身，诸妙音声，神通功德。\n所处宫殿，衣服饮食，众妙华香，庄严之具，犹第六天自然之物。\n若欲食时，七宝钵器，自然在前。\n金、银、琉璃、砗磲、玛瑙、珊瑚、琥珀、明月、真珠，如是诸钵，随意而至。\n百味饮食，自然盈满。\n虽有此食，实无食者，但见色闻香，意以为食，自然饱足。\n身心柔软，无所味著，事已化去，时至复现。\n‘彼佛国土，清净安隐，微妙快乐，次于无为泥洹之道。\n其诸声闻菩萨天人，智慧高明，神通洞达，咸同一类，形无异状，但因顺余方，故有天人之名。\n颜貌端正，超世希有，容色微妙，非天非人，皆受自然虚无之身，无极之体。’\n佛告阿难：‘譬如世间贫穷乞人，在帝王边，形貌容状，宁可类乎？’阿难白佛：‘假令此人在帝王边，羸陋丑恶，无以为喻，百千万亿不可计倍。\n所以然者，贫穷乞人，底极斯下，衣不蔽形，食趣支命，饥寒困苦，人理殆尽。\n皆坐前世不植德本，积财不施，富有益悭，但欲唐得，贪求无厌。\n不信修善，犯恶山积。\n如是寿终，财宝消散。\n苦身聚积，为之忧恼，于己无益，徒为他有。\n无善可怙，无德可恃，是故死堕恶趣，受此长苦；罪毕得出，生为下贱，愚鄙斯极，示同人类。\n所以世间帝王，人中独尊，皆由宿世积德所致。\n慈惠博施，仁爱兼济，履信修善，无所违争。\n是以寿终福应，得升善道。\n上生天上，享兹福乐。\n积善余庆，今得为人，乃生王家，自然尊贵。\n仪容端正，众所敬事。\n妙衣珍膳，随心服御，宿福所追，故能致此。’\n佛告阿难：‘汝言是也。\n计如帝王，虽人中尊贵，形色端正，比之转轮圣王，甚为鄙陋，犹彼乞人在帝王边。\n转轮圣王，威相殊妙，天下第一，比之忉利天王，又复丑恶，不得相喻万亿倍也。\n假令天帝，比第六天王，百千亿倍不相类也。\n设第六天王，比无量寿佛国菩萨声闻，光颜容色，不相及逮，百千万亿不可计倍。’\n佛告阿难：‘无量寿国，其诸天人，衣服、饮食、华香、璎珞、缯盖幢幡、微妙音声、所居舍宅宫殿楼阁，称其形色，高下大小，或一宝二宝，乃至无量众宝，随意所欲，应念即至。\n又以众宝妙衣，遍布其地，一切天人践之而行。\n无量宝网，弥覆佛土，皆以金缕真珠百千杂宝奇妙珍异，庄严校饰，周匝四面，垂以宝铃，光色晃曜，尽极严丽，自然德风，徐起微动。\n其风调和，不寒不暑，温凉柔软，不迟不疾。\n吹诸罗网，及众宝树，演发无量微妙法音，流布万种温雅德香。\n其有闻者，尘劳垢习，自然不起。\n风触其身，皆得快乐，譬如比丘，得灭尽三昧。\n‘又风吹散华，遍满佛土，随色次第，而不杂乱，柔软光泽，馨香芬烈。\n足履其上，蹈下四寸，随举足已，还复如故。\n华用已讫，地辄开裂，以次化没，清净无遗。\n随其时节，风吹散华，如是六反。\n又众宝莲华，周满世界，一一宝华，百千亿叶，其华光明，无量种色，青色青光、白色白光，玄黄朱紫，光色赫然，炜烨焕烂，明曜日月，一一华中，出三十六百千亿光，一一光中，出三十六百千亿佛，身色紫金，相好殊特；一一诸佛，又放百千光明，普为十方说微妙法。\n如是诸佛，各各安立无量众生于佛正道。’\n佛告阿难：‘其有众生，生彼国者，皆悉住于正定之聚。\n所以者何？彼佛国中，无诸邪聚，及不定聚。\n十方恒沙诸佛如来，皆共赞叹无量寿佛威神功德不可思议。\n诸有众生，闻其名号，信心欢喜，乃至一念，至心回向，愿生彼国，即得往生，住不退转。\n唯除五逆，诽谤正法。’\n佛告阿难：‘十方世界诸天人民，其有至心愿生彼国，凡有三辈。\n其上辈者，舍家弃欲，而作沙门，发菩提心，一向专念无量寿佛，修诸功德，愿生彼国。\n此等众生，临寿终时，无量寿佛，与诸大众，现其人前，即随彼佛，往生其国，便于七宝华中，自然化生，住不退转，智慧勇猛，神通自在。\n是故，阿难！其有众生，欲于今世见无量寿佛，应发无上菩提之心，修行功德，愿生彼国！’佛语阿难：‘其中辈者，十方世界诸天人民，其有至心，愿生彼国，虽不能行作沙门，大修功德，当发无上菩提之心，一向专念无量寿佛，多少修善，奉持斋戒，起立塔像，饭食沙门，悬缯然灯，散华烧香，以此回向，愿生彼国。\n其人临终，无量寿佛，化现其身，光明相好，具如真佛，与诸大众，现其人前。\n即随化佛往生其国，住不退转，功德智慧，次如上辈者也。’\n佛语阿难：‘其下辈者，十方世界，诸天人民，其有至心，欲生彼国，假使不能作诸功德，当发无上菩提之心，一向专意，乃至十念，念无量寿佛，愿生其国。\n若闻深法，欢喜信乐，不生疑惑，乃至一念，念于彼佛，以至诚心，愿生其国。\n此人临终，梦见彼佛，亦得往生，功德智慧，次如中辈者也。’\n佛告阿难：‘无量寿佛，威神无极。\n十方世界，无量无边不可思议诸佛如来，莫不称叹。\n于彼东方恒河沙佛国，无量无数诸菩萨众，皆悉往诣无量寿佛所，恭敬供养，及诸菩萨声闻之众，听受经法，宣布道化。\n南西北方，四维上下，亦复如是。’\n尔时世尊，而说颂曰：\n东方诸佛国，其数如恒沙，彼土诸菩萨，往觐无量觉。\n南西北四维，上下亦复然，彼土菩萨众，往觐无量觉。\n一切诸菩萨，各赍天妙华，宝香无价衣，供养无量觉。\n咸然奏天乐，畅发和雅音，歌叹最胜尊，供养无量觉。\n究达神通慧，游入深法门，具足功德藏，妙智无等伦。\n慧日朗世间，消除生死云，恭敬绕三匝，稽首无上尊。\n见彼严净土，微妙难思议，因发无量心，愿我国亦然。\n应时无量尊，动容发欣笑，口出无数光，遍照十方国。\n回光围绕身，三匝从顶入，一切天人众，踊跃皆欢喜。\n大士观世音，整服稽首问，白佛何缘笑，唯然愿说意。\n梵声犹雷震，八音畅妙响，当授菩萨记，今说仁谛听。\n十方来正士，吾悉知彼愿，志求严净土，受决当作佛。\n觉了一切法，犹如梦幻响，满足诸妙愿，必成如是刹。\n知法如电影，究竟菩萨道，其诸功德本，受决当作佛。\n通达诸法性，一切空无我，惠求净佛土，必成如是刹。\n诸佛告菩萨，今觐安养佛，闻法乐受行，疾得清净处。\n至彼严净国，便速得神通，必于无量尊，受记成等觉。\n其佛本愿力，闻名欲往生，皆悉到彼国，自致不退转。\n菩萨兴至愿，愿己国无异，普念度一切，名显满十方。\n奉事亿如来，飞化遍诸刹，恭敬欢喜去，还到安养国。\n若人无善心，不得闻此经，清净有戒者，乃获闻正法。\n曾更见世尊，则能信此事，谦敬闻奉行，踊跃大欢喜。\n憍慢弊懈怠，难以信比法，宿世见诸佛，乐听如是教。\n声闻或菩萨，莫能究圣心，譬如从生盲，欲行开导人。\n如来智慧海，深广无涯底，二乘非所测，唯佛独明了。\n假使一切人，具足皆得道，净慧如本空，亿劫思佛智。\n穷力极讲说，尽寿犹不知，佛慧无边际，如是致清净。\n寿命甚难得，佛世亦难值，人有信慧难，若闻精进求。\n闻法能不忘，见敬得大庆，则我善亲友，是故当发意。\n设满世界火，必过要闻法，会当成佛道，广济生死流。\n佛告阿难：‘彼国菩萨，皆当究竟一生补处，除其本愿，为众生故，以弘誓功德，而自庄严，普欲度脱一切众生。\n阿难！彼佛国中，诸声闻众，身光一寻。\n菩萨光明照百由旬。\n有二菩萨，最尊第一，威神光明，普照三千大千世界。'\n阿难白佛：‘彼二菩萨，其号云何？’佛言：‘一名观世音，二名大势至。\n此二菩萨，于此国土，修菩萨行，命终转化，生彼佛国。\n阿难！其有众生，生彼国者，皆悉具足三十二相，智慧成满，深入诸法，究畅要妙，神通无碍，诸根明利。\n其钝根者，成就二忍。\n其利根者，得不可计无生法忍。\n又彼菩萨，乃至成佛，不受恶趣，神通自在，常识宿命。\n除生他方五浊恶世，示现同彼，如我国也。’\n佛语阿难：‘彼国菩萨，承佛威神，一食之顷，往诣十方无量世界，恭敬供养，诸佛世尊。\n随心所念，华香、伎乐、衣盖、幢幡，无数无量供养之具，自然化生，应念即至。\n珍妙殊特，非世所有，辄以奉散诸佛，及诸菩萨声闻之众。\n在虚空中，化成华盖，光色昱烁，香气普熏。\n其华周圆四百里者，如是转倍，乃覆三千大千世界，随其前后，以次化没。\n其诸菩萨佥然欣悦，于虚空中，共奏天乐，以微妙音，歌叹佛德，听受经法，欢喜无量。\n供养佛已，未食之前，忽然轻举，还其本国。’\n佛语阿难：‘无量寿佛，为诸声闻菩萨天人颁宣法时，都悉集会七宝讲堂，广宣道教，演畅妙法，莫不欢喜，心解得道。\n即时四方自然风起，吹七宝树，出五音声。\n无量妙华，随风四散，自然供养，如是不绝。\n一切诸天，皆赍天上百千华香，万种伎乐，供养其佛，及诸菩萨声闻之众。\n普散华香，奏诸音乐，前后来往，更相开避，当斯之时，熙怡快乐，不可胜言。’\n佛告阿难：‘生彼佛国诸菩萨等，所可讲说，常宣正法，随顺智慧，无违无失。\n于其国土，所有万物，无我所心，无染著心。\n去来进止，情无所系。\n随意自在，无所适莫，无彼无我，无竞无讼。\n于诸众生，得大慈悲饶益之心。\n柔软调伏，无岔恨心。\n离盖清净，无厌怠心。\n等心、胜心、深心、定心、爱法乐法喜法之心。\n灭诸烦恼，离恶趣心。\n究竟一切菩萨所行，具足成就无量功德。\n得深禅定，诸通明慧，游志七觉，修心佛法。\n‘肉眼清彻，靡不分了；天眼通达，无量无限；法眼观察，究竟诸道；慧眼见真，能度彼岸；佛眼具足，觉了法性，以无碍智为人演说。\n等观三界，空无所有，志求佛法，具诸辩才，除灭众生烦恼之患。\n从如来生，解法如如，善知集灭音声方便。\n不欣世语，乐在正论。\n修诸善本，志崇佛道。\n知一切法，皆悉寂灭。\n生身烦恼，二余俱尽。\n闻甚深法，心不疑惧。\n常能修行其大悲者，深远微妙，靡不覆载。\n究竟一乘，至于彼岸，决断疑网，慧由心出。\n‘于佛教法，该罗无外，智慧如大海，三昧如山王。\n慧光明净，超踰日月。\n清白之法，具足圆满。\n犹如云山，照诸功德等一净故；犹如大地，净秽好恶无异心故；犹如净水，洗除尘劳诸垢染故；犹如火王，烧灭一切烦恼薪故；犹如大风，行诸世界无障碍故；犹如虚空，于一切有无所著故；犹如莲华，于诸世间无染污故；犹如大乘，运载群萌出生死故；犹如重云，震大法雷觉未觉故；犹如大雨，雨甘露法润众生故；如金刚山，众魔外道不能动故；如梵天王，于诸善法最上首故；如尼拘类树，普覆一切故；如优昙钵华，希有难遇故；如金翅鸟，威伏外道故；如众游禽，无所藏积故；犹如牛王，无能胜故；犹如象王，善调伏故；如师子王，无所畏故；旷若虚空，大慈等故；摧灭嫉心，不忌胜故。\n‘专乐求法，心无厌足。\n常欲广说，志无疲倦。\n击法鼓，建法幢，曜慧日，除痴闇。\n修六和敬，常行法施，志勇精进，心不退弱。\n为世灯明，最胜福田。\n常为师导，等无憎爱，唯乐正道，无余欣戚。\n拔诸欲刺，以安群生。\n功德殊胜，莫不尊敬。\n灭三垢障，游诸神通。\n因力、缘力、意力、愿力、方便之力；常力、善力、定力、慧力，多闻之力；施戒忍辱，精进禅定、智慧之力；正念止观，诸通明力；如来调伏，诸众生力。\n如是等力，一切具足。\n身色相好，功德辩才，具足庄严，无与等者。\n恭敬供养无量诸佛，常为诸佛所共称叹。\n究竟菩萨诸波罗蜜，修空无相无愿三昧，不生不灭诸三昧门，远离声闻缘觉之地。\n阿难！彼诸菩萨，成就如是无量功德，我但为汝略言之耳。\n若广说者，百千万劫不能穷尽。’\n佛告弥勒菩萨诸天人等：‘无量寿国，声闻菩萨，功德智慧不可称说。\n又其国土，微妙安乐，清净若此，何不力为善？念道之自然。\n著于无上下，洞达无边际，宜各勤精进，努力自求之。\n必得超绝去，往生安乐国，横截五恶道。\n道趣自然闭。\n升道无穷极，易往而无人，其国不逆违，自然之所牵。\n何不弃世事？勤行求道德；可得极长生，寿乐无有极。\n‘然世人薄俗，共诤不急之事，于此剧恶极苦之中，勤身营务，以自给济。\n无尊无卑，无贫无富，少长男女，共忧钱财，有无同然，忧思适等。\n屏营愁苦，累念积虑。\n为心走使，无有安时；有田忧田，有宅忧宅；牛马、六畜、奴婢、钱财、衣食什物，复共忧之。\n重思累息，忧念愁怖，横为非常水火、盗贼、怨家、债主，焚漂劫夺，消散磨灭，忧毒忪忪，无有解时。\n结愤心中，不离忧恼。\n心坚意固，适无纵舍。\n或坐摧碎，身亡命终，弃捐之去，莫谁随者，尊贵豪富，亦有斯患，忧惧万端，勤苦若此，结众寒热，与痛共居。\n贫穷下劣，困乏常无。\n无田亦忧欲有田，无宅亦忧欲有宅，无牛、马、六畜、奴婢、钱财、衣食什物，亦忧欲有之。\n适有一，复少一，有是少是，思有齐等。\n适欲具有，便复糜散。\n如是忧苦，当复求索，不能时得，思想无益。\n身心俱劳，坐起不安，忧念相随，勤苦若此，亦结众寒热，与痛共居，或时坐之，终身夭命，不肯为善，行道进德。\n寿终身死，当独远去，有所趣向，善恶之道，莫能知者。\n‘世间人民，父子兄弟，夫妇家室，中外亲属，当相敬爱，无相憎嫉。\n有无相通，无得贪惜，言色常和，莫相违戾。\n或时心静，有所恚怒，今世恨意，微相憎嫉，后世转剧，至成大怨。\n所以者何？世间之事，更相患害，虽不即时，应急相破。\n然含毒畜怒，结愤精神，自然克识，不得相离，皆当对生，更相报复。\n人在世间，爱欲之中，独生独死，独去独来，当行至趣苦乐之地，身自当之，无有代者。\n善恶变化，殃福异处，宿豫严待，当独趣入，远到他所，莫能见者。\n善恶自然，追行所生，窈窈冥冥，别离久长，道路不同，会见无期。\n甚难甚难，今得相值。\n何不弃众事，各遇强健时，努力勤修善，精进愿度世，可得极长生。\n如何不求道，安所须待，欲何乐乎？如是世人，不信作善得善，为道得道；不信人死更生，惠施得福。\n善恶之事，都不信之，谓之不然，终无有是。\n但坐此故，且自见之，更相瞻视，先后同然。\n转相承受，父余教令，先人祖父，素不为善，不识道德，身愚神闇，心塞意闭。\n死生之趣，善恶之道，自不能见，无有语者。\n吉凶祸福，竞各作之，无一怪也。\n生死常道，转相嗣立，或父哭子，或子哭父，兄弟夫妇，更相哭泣。\n颠倒上下，无常根本，皆当过去，不可常保。\n教语开导，信之者少，是以生死流转，无有休止。\n如此之人，蒙冥抵突，不信经法，心无远虑，各欲快意，痴惑爱欲，不达于道德，迷没于嗔怒，贪狼于财色。\n坐之不得道，当更恶趣苦，生死无穷已，哀哉甚可伤！'\n或时室家父子，兄弟夫妇，一死一生，更相哀愍。\n恩爱思慕，忧念结缚，心意痛著，迭相顾恋，穷日卒岁，无有解已。\n教语道德，心不开明，思想恩好，不离情欲。\n惛蒙闇塞，愚惑所覆，不能深思熟计，心自端正，专精行道，决断世事。\n便旋至竟，年寿终尽，不能得道，无可奈何。\n总猥愦扰，皆贪爱欲。\n惑道者众，悟之者少，世间匆匆，无可聊赖。\n尊卑上下，贫富贵贱，勤苦匆务，各怀杀毒。\n恶气窈冥，为妄兴事。\n违逆天地，不从人心。\n自然非恶，先随与之，恣听所为，待其罪极。\n其寿未终，便顿夺之。\n下人恶道，累世勤苦，展转其中，数千亿劫，无有出期。\n痛不可言，甚可哀愍！’\n佛告弥勒菩萨，诸天人等：‘我今语汝，世间之事，人用是故，坐不得道。\n当熟思计，远离众恶。\n择其善者，勤而行之。\n爱欲荣华，不可常保，皆当别离，无可乐者。\n遇佛在世，当勤精进。\n其有至愿生安乐国者，可得智慧明达，功德殊胜。\n勿得随心所欲，亏负经戒，在人后也。\n傥有疑意不解经者，可具问佛，当为说之。’\n弥勒菩萨长跪白言：‘佛威神尊重，所说快善。\n听佛经语，贯心思之，世人实尔，如佛所言。\n今佛慈愍，显示大道，耳目开明，长得度脱，闻佛所说，莫不欢喜。\n诸天人民蠕动之类，皆蒙慈恩，解脱忧苦。\n佛语教戒，甚深甚善，智慧明见，八方上下去来今事，莫不究畅。\n今我众等，所以蒙得度脱，皆佛前世求道之时，谦苦所致。\n恩德普覆，福禄巍巍，光明彻照，达空无极，开人泥洹。\n教授典揽，威制消化。\n感动十方，无穷无极。\n佛为法王，尊超众圣，普为一切天人之师，随心所愿，皆令得道。\n今得值佛，复闻无量寿声，靡不欢喜，心得开明。’\n佛告弥勒：‘汝言是也。\n若有慈敬于佛者，实为大善。\n天下久久，乃复有佛。\n今我于此世作佛，演说经法，宣布道教，断诸疑网，拔爱欲之本，杜众恶之源。\n游步三界，无所圣碍。\n典揽智慧，众道之要，执持纲维，昭然分明。\n开示五趣，度未度者，决正生死泥洹之道。\n‘弥勒当知，汝从无数劫来，修菩萨行，欲度众生，其已久远。\n从汝得道，至于泥洹不可称数。\n汝及十方诸天人民一切四众，永劫已来，展转五道，忧畏勤苦，不可具言，乃至今世，生死不绝，与佛相值，听受经法，又复得闻无量寿佛，快哉甚善！吾助尔喜。\n‘汝今亦可自厌生死老病痛苦，恶露不净，无可乐者。\n宜自决断，端身正行，益作诸善。\n修己洁体，洗除心垢。\n言行忠信，表里相应。\n人能自度，转相拯济，精明求愿，积累善本。\n虽一世勤苦，须臾之间，后生无量寿国，快乐无极。\n长与道德合明，永拔生死根本，无复贪恚愚痴苦恼之患，欲寿一劫百劫，千亿万劫，自在随意，皆可得之。\n无为自然，次于泥洹之道。\n汝等宜各精进，求心所愿，无得疑惑中悔，自为过咎。\n生彼边地七宝宫殿，五百岁中，受诸厄也。’\n弥勒白言：‘受佛重诲，专精修学，如教奉行，不敢有疑。’ \n佛告弥勒：‘汝等能于此世，端心正意，不作众恶，甚为至德，十方世界，最无伦匹。\n所以者何？诸佛国土，天人之类，自然作善，不大为恶，易可开化。\n今我于此世间作佛，处于五恶五痛五烧之中，为最剧苦。\n教化群生，令舍五恶，令去五痛，令离五烧，降化其意，令持五善，获其福德，度世长寿泥洹之道。’\n佛言：‘何等五恶？何等五痛？何等五烧？何等消化五恶，令持五善，获其福德度世长寿泥洹之道？\n‘其一恶者：诸天人民蠕动之类，欲为众恶，莫不皆然。\n强者伏弱，转相克贼，残害杀戮，迭相吞噬，不知修善，恶逆无道。\n后受殃罚，自然趣向。\n神明记识，犯者不赦。\n故有贫穷下贱，乞丐狐独，聋盲喑哑，愚痴弊恶，至有尪狂不逮之属。\n又有尊贵豪富，高才明达，皆由宿世慈孝，修善积德所致。\n世有常道，王法牢狱，不肯畏慎，为恶入罪，受其殃罚，求望解脱，难得勉出。\n世间有此目前现事，寿终后世，尤深尤剧。\n入其幽冥，转生受身。\n譬如王法，痛苦极刑。\n‘故有自然三涂，无量苦恼。\n转贸其身，改形易道，所受寿命，或长或短。\n魂神精识，自然趣之。\n当独值向，相从共生。\n更相报复，无有止已。\n殃恶未尽，不得相离。\n展转其中，无有出期，难得解脱，痛不可言。\n天地之间，自然有是，虽不即时卒暴应至，善恶之道，会当归之。\n是为一大恶一痛一烧，勤苦如是。\n譬如大火焚烧人身，人能于中一心制意，端身正行，独作诸善，不为众恶者，身独度脱，获其福德度世上天泥洹之道，是为一大善也。’\n佛言：‘其二恶者，，世间人民，父子兄弟，室家夫妇，都无义理，不顺法度，奢淫憍纵，各欲快意。\n任心自恣，更相欺惑。\n心口各异，言念无实。\n佞谄不忠，巧言谀媚。\n嫉贤谤善，陷入怨枉。\n主上不明，任用臣下；臣下自在，机伪多端。\n践度能行，知其形势。\n在位不正，为其所欺。\n妄损忠良，不当天心。\n臣欺其君，子欺其父，兄弟夫妇，中外知识，更相欺诳。\n各怀贪欲，嗔恚愚痴。\n欲自厚己，欲贪多有。\n尊卑上下，心俱同然。\n破家亡身，不顾前后。\n亲属内外，坐之灭族。\n或时室家知识，乡党市里，愚民野人，转共从事。\n更相利害，忿成怨结。\n富有悭惜，不肯施与，爱保贪重，心劳身苦。\n如是至竟，无所恃怙，独来独去，无一随者。\n善恶祸福，追命所生，或在乐处，或入苦毒，然后乃悔，当复何及!\n‘世间人民，心愚少智，见善憎谤，不思慕及，但欲为恶，妄作非法。\n常怀盗心，希望他利，消散磨尽，而复求索。\n邪心不正，惧人有色，不豫思计，事至乃悔。\n‘今世现有王法牢狱，随罪趣向，受其殃罚。\n因其前世，不信道德，不修善本，今复为恶，天神克识，别其名籍。\n寿终神逝，下入恶道。\n故有自然三涂，无量苦恼。\n展转其中，世世累劫，无有出期，难得解脱，痛不可言。\n是为二大恶二痛二烧，勤苦如是。\n譬如大火焚烧人身，人能于中一心制意，端身正行，独作诸善，不为众恶者，身独度脱，获其福德度世上天泥洹之道，是为二大善也。’\n佛言：‘其三恶者，世间人民，相因寄生，共居天地之间。\n处年寿命，无能几何。\n上有贤明长者尊贵豪富，下有贫穷厮贱，尪劣愚夫，中有不善之人。\n常怀邪恶，但念淫泆，烦满胸中。\n爱欲交乱，坐起不安；贪意守惜，但欲唐得。\n眄睐细色，邪态外逸。\n自妻厌憎，私妄出入，费损家财，事为非法。\n交结聚会，兴师相伐，攻劫杀戮，强夺无道。\n恶心在外，不自修业。\n盗窃趣得，欲击成事。\n恐势迫胁，归给妻子，恣心快意，极身作乐。\n或于亲属，不避尊卑，家室中外，患而苦之，亦复不畏王法禁令。\n如是之恶，著于人鬼。\n日月照见，神明记识。\n故有自然三涂，无量苦恼。\n展转其中，世世累劫，无有出期，难得解脱，痛不可言。\n是为三大恶三痛三烧，勤苦如是。\n譬如大火焚烧人身，人能于中一心制意，端身正行，独作诸善，不为众恶者，身独度脱，获其福德度世上天泥洹之道，是为三大善也。’\n佛言：‘其四恶者，世间人民，不念修善。\n转相教令，共为众恶。\n两舌，恶口，妄言，绮语。\n谗贼斗乱，憎嫉善人，败坏贤明。\n于傍快喜。\n不孝二亲，轻慢师长。\n朋友无信，难得诚实。\n尊贵自大，谓己有道。\n横行威势，侵易于人。\n不能自知，为恶无耻。\n自以强健，欲人敬难。\n不畏天地神明日月，不肯作善，难可降化。\n自用偃蹇，谓可常尔，无所忧惧，常怀憍慢。\n如是众恶，天神记识。\n赖其前世颇作福德，小善扶接，营护助之。\n今世为恶，福德尽灭，诸善神鬼，各去离之，身独空立，无所复依。\n寿命终尽，诸恶所归，自然迫促，共趣夺之。\n又其名籍，记在神明。\n殃咎牵引，当往趣向。\n罪报自然，无从舍离。\n但得前行，入于火镬。\n身心摧碎，精神痛苦。\n当斯之时，悔复何及？天道冏然，不得蹉跌。\n故有自然三涂，无量苦恼。\n展转其中，世世累劫，无有出期，难得解脱，痛不可言。\n是为四大恶四痛四烧，勤苦如是。\n譬如大火焚烧人身，人能于中一心制意，端身正行，独作诸善，不为众恶，身独度脱，获其福德度世上天泥洹之道，是为四大善也。’\n佛言：‘其五恶者，世间人民，徙倚懈惰，不肯作善，治身修业。\n家室眷属，饥寒困苦，父母教诲，嗔目怒应。\n言令不和，违戾反逆，譬如怨家，不如无子。\n取与无节，众共患厌。\n负恩违义，无有报偿之心。\n贫穷困乏，不能复得，辜较纵夺，放恣游散。\n串数唐得，用自赈给，耽酒嗜美，饮食无度，肆心荡逸，鲁扈抵突。\n不识人情，强欲抑制。\n见人有善，妒嫉恶之。\n无义无礼，无所顾难，自用识当，不可谏晓。\n六亲眷属，所资有无，不能忧念。\n不惟父母之恩，不存师友之义。\n心常念恶，口常言恶，身常行恶，曾无一善。\n不信先圣诸佛经法，不信行道可得度世，不信死后神明更生。\n不信作善得善，为恶得恶。\n欲杀真人，斗乱众僧。\n欲害父母兄弟眷属。\n六亲憎恶，愿令其死。\n如是世人，心意俱然，愚痴蒙昧，而自以智慧。\n不知生所从来，死所趣向。\n不仁不顺，恶逆天地。\n而于其中，希望侥幸，欲求长生，会当归死。\n慈心教诲，今其念善。\n开示生死，善恶之趣，自然有是，而不肯信之。\n苦心与语，无益其人，心中闭塞，意不开解，大命将终，悔惧交至。\n不豫修善，临穷方悔。\n悔之于后，将何及乎？\n‘天地之间，五道分明，恢廓窈冥，浩浩茫茫。\n善恶报应，祸福相承，身自当之，无谁代者。\n数之自然，应其所行，殃咎追命，无得纵舍。\n善人行善，从乐入乐，从明入明；恶人行恶，从苦入苦，从冥入冥。\n谁能知者？独佛知耳。\n教语开示，信用者少，生死不休，恶道不绝。\n如是世人，难可具尽，故有自然三涂，无量苦恼。\n展转其中，世世累劫，无有出期，难得解脱，痛不可言。\n是为五大恶五痛五烧，勤苦如是。\n譬如大火焚烧人身，人能于中一心制意，端身正念，言行相副，所作至诚，所语如语，心口不转，独作诸善，不为众恶，身独度脱，获其福德度世上天泥洹之道，是为五大善也。’\n佛告弥勒：‘吾语汝等，是世五恶，勤苦若此。\n五痛五烧，展转相生，但作众恶，不修善本，皆悉自然入诸恶趣，或其今世先被殃病，求死不得，求生不得，罪恶所招，示众见之。\n身死随行，入三恶道，苦毒无量，自相燋然，至其久后，共作怨结，从小微起，遂成大恶。\n皆由贪著财色，不能施惠，痴欲所迫，随心思想，烦恼结缚，无有解已。\n厚己诤利，无所省录。\n富贵荣华，当时快意。\n不能忍辱，不务修善。\n威势无几，随以磨灭。\n身坐劳苦，久后大剧。\n天道弛张，自然纠举，纲维罗网，上下相应，茕茕忪忪，富入其中。古今有是，痛哉可伤！’\n佛语弥勒：‘世间如是，佛皆哀之。\n以威神力，摧灭众恶，悉令就善。\n弃捐所思。\n奉持经戒，受行道法，无所违失，终得度世泥洹之道。’\n佛言：‘汝今诸天人民，及后世人，得佛经语，当熟思之，能于其中，端心正行。\n主上为善，率化其下，转相敕令，各自端守。\n尊圣敬善，仁慈博爱。\n佛语教诲，无敢亏负。\n当求度世，拔断生死众恶之本，当离三涂无量忧怖苦痛之道。\n汝等于是广植德本，布恩施惠，勿犯道禁。\n忍辱精进，一心智慧。\n转相教化，为德立善。\n正心正意，斋戒清净，一日一夜，胜在无量寿国为善百岁。\n所以者何？彼佛国土，无为自然，皆积众善，无毛发之恶。\n于此修善，十日十夜，胜于他方诸佛国中为善千岁。\n所以者何？他方佛国，为善者多，为恶者少，福德自然，无造恶之地。\n唯此间多恶，无有自然，勤苦求欲，转相欺殆，心劳形困，饮苦食毒，如是恶务，未尝宁息。\n‘吾哀汝等天人之类，苦心诲喻，教令修善。\n随宜开导，授与经法，莫不承用。\n在意所愿，皆令得道。\n佛所游履，国邑丘聚，靡不蒙化。\n天下和顺、日月清明。\n风雨以时，灾厉不起。\n国丰民安，兵戈无用。\n崇德兴仁，务修礼让。’\n佛言：‘我哀愍汝等诸天人民，甚于父母念子。\n今我于此世作佛，降化五恶，消除五痛，绝灭五烧，以善攻恶，拔生死之苦。\n令获五德，升无为之安。\n吾去世后，经道渐灭，人民谄伪，复为众恶。\n五烧五痛，还如前法。\n久后转剧，不可悉说，我但为汝略言之耳。’\n佛语弥勒：‘汝等各善思之，转相教诫，如佛经法，无得犯也。’\n于是弥勒菩萨，合掌白言：‘佛所说甚善，世人实尔。\n如来普慈哀怨，悉令度脱，受佛重诲，不敢违失。’\n佛告阿难：‘汝起，更整衣服，合掌恭敬，礼无量寿佛。\n十方国土诸佛如来，常共称扬赞叹彼佛，无著无碍。’\n于是阿难起整衣服，正身西面，恭敬合掌，五体投地，礼无量寿佛。\n白言：‘世尊，愿见彼佛安乐国土，及诸菩萨声闻大众。’\n说是语已，即时无量寿佛，放大光明，普照一切诸佛世界。\n金刚围山、须弥山王、大小诸山，一切所有，皆同一色。\n譬如劫水弥满世界，其中万物沉没不现，滉漾浩汗，唯见大水，彼佛光明，亦复如是。\n声闻菩萨，一切光明，皆悉隐蔽，唯见佛光，明耀显赫。\n尔时，阿难即见无量寿佛，威德巍巍，如须弥山王，高出一切诸世界上，相好光明，靡不照耀。’ \n此会四众，一时悉见；彼见此土，亦复如是。\n尔时，佛告阿难及慈氏菩萨：‘汝见彼国，从地已上，至净居天，其中所有微妙严净自然之物，为悉见不？’阿难对曰：‘唯然己见。’ \n‘汝宁复闻无量寿佛大音宣布一切世界化众生不？’阿难对曰：‘唯然已闻。’\n彼国人民，乘百千由旬七宝宫殿，无所障碍，遍至十方供养诸佛，汝复见不？’对曰：‘己见。’\n‘彼国人民有胎生者，汝复见不？’对曰：‘己见。\n其胎生者，所处宫殿，或百由旬，或五百由旬，各于其中受诸快乐，如忉利天，亦皆自然。’\n尔时慈氏菩萨白佛言：‘世尊！何因何缘，彼国人民，胎生化生？’佛告慈氏：‘若有众生，以疑惑心，修诸功德，愿生彼国，不了佛智、不思议智、不可称智、大乘广智、无等无伦最上胜智。\n于此诸智，疑惑不信；然犹信罪福，修习善本，愿生其国。\n此诸众生，生彼宫殿，寿五百岁，常不见佛，不闻经法，不见菩萨声闻圣众。\n是故于彼国土，谓之胎生。\n若有众生，明信佛智，乃至胜智，作诸功德，信心回向，此诸众生，于七宝华中，自然化生，跏趺而坐，须臾之顷，身相光明，智慧功德，如诸菩萨具足成就。\n复次，慈氏！他方诸大菩萨，发心欲见无量寿佛，恭敬供养，及诸菩萨声闻圣众。\n彼菩萨等，命终得生无量寿国，于七宝华中，自然化生。\n弥勒当知！彼化生者，智慧胜故；其胎生者，皆无智慧，于五百岁中，常不见佛，不闻经法，不见菩萨诸声闻众，无由供养于佛，不知菩萨法式，不得修习功德。\n当知此人，宿世之时，无有智慧，疑惑所致。’\n佛告弥勒：‘譬如转轮圣王，有七宝牢狱，种种庄严，张设床帐，悬诸缯盖。\n若有诸小王子，得罪于王，辄内彼狱中，系以金锁。\n供养饭食衣服床蓐，华香伎乐，如转轮王，无所乏少。\n于意云何？此诸王子，宁乐彼处不？’对曰：‘不也！但种种方便，求诸大力，欲自勉出。’\n佛告弥勒：‘此诸众生，亦复如是。\n以疑惑佛智故，生彼七宝宫殿，无有刑罚，乃至一念恶事。\n但于五百岁中，不见三宝，不得供养修诸善本，以此为苦。\n虽有余乐，犹不乐彼处。\n若此众生，识其本罪，深自悔责，求离彼处，即得如意，往诸无量寿佛所，恭敬供养，亦得遍至无量无数诸余佛所，修诸功德。\n弥勒当知！其有菩萨，生疑惑者，为失大利，是故应当明信诸佛无上智慧。’\n弥勒菩萨白佛言：‘世尊！于此世界，有几所不退菩萨，生彼佛国？’佛告弥勒：‘于此世界，有六十七亿不退菩萨，往生彼国。\n一一菩萨，已曾供养无数诸佛，次如弥勒者也。\n诸小行菩萨，及修习少功德者，不可称计，皆当往生。’\n佛告弥勒：‘不但我刹诸菩萨等，往生彼国。\n他方佛土，亦复如是。\n其第一佛，名曰远照，彼有百八十亿菩萨，皆当往生。\n其第二佛，名曰宝藏，彼有九十亿菩萨，皆当往生。\n其第三佛名曰无量音，彼有二百二十亿菩萨，皆当往生。\n其第四佛名曰甘露味，彼有二百五十亿菩萨，皆当往生。\n其第五佛，名曰龙胜，彼有十四亿菩萨，皆当往生。\n其第六佛名曰胜力，彼有万四千菩萨，皆当往生。\n其第七佛，名曰师子，彼有五百亿菩萨，皆当往生。\n其第八佛，名曰离垢光，彼有八十亿菩萨，皆当往生。\n其第九佛，名曰德首，彼有六十亿菩萨，皆当往生。\n其第十佛，名曰妙德山，彼有六十亿菩萨，皆当往生。\n其第十一佛，名曰人王，彼有十亿菩萨，皆当往生。\n其第十二佛，名曰无上华，彼有无数不可称计诸菩萨众，皆不退转，智慧勇猛，已普供养无量诸佛，于七日中，即能摄取百千亿劫大士所修坚固之法。\n斯等菩萨皆当往生。\n其第十三佛，名曰无畏，彼有七百九十亿大菩萨众，诸小菩萨，及比丘等，不可称计，皆当往生。’\n佛语弥勒：‘不但此十四佛国中诸菩萨等，当往生也，十方世界无量佛国，其往生者，亦复如是，甚多无数。\n我但说十方诸佛名号，及菩萨比丘生彼国者，昼夜一劫，尚未能尽
